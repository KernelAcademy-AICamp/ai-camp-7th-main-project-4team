<style>
  :root{--bg:#F6F6F5;--surface:#FFFFFF;--ink:#16140F;--ink-soft:#3A382F;--sub:#6E6B63;--sub2:#A6A29A;--line:#E6E5E1;--line2:#DAD8D2;--green:#2E4A3B;--green-soft:#E7EFEA;--warn:#B0553F;--sans:'Pretendard','Apple SD Gothic Neo',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}

  .top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:15px 30px;display:flex;align-items:center;gap:12px}
  .top .logo{font-size:20px;font-weight:800;letter-spacing:-.05em;color:var(--green);text-decoration:none}
  .top .logo i{display:inline-block;width:6px;height:6px;background:var(--green);margin-left:1px;vertical-align:baseline}
  .top .crumb{font-size:13.5px;color:var(--sub)}
  .top .hint{margin-left:auto;font-size:12px;color:var(--sub2)}

  .side{position:sticky;top:59px;align-self:start;height:calc(100vh - 59px);overflow-y:auto;padding:26px 16px 60px;border-right:1px solid var(--line)}
  .side .tl{font-size:11px;font-weight:800;letter-spacing:.11em;color:var(--sub2);text-transform:uppercase;margin:22px 8px 9px}
  .side .tl:first-child{margin-top:0}
  .side a{display:block;font-size:14px;color:var(--sub);text-decoration:none;padding:8px 10px;border-radius:8px;line-height:1.45}

  .side #docnav a.active{background:var(--green);color:#fff;font-weight:700}
  .side .viz a::after{content:"↗";margin-left:6px;font-size:11px;color:var(--sub2)}

  .content table{border-collapse:collapse;width:100%;margin:20px 0;font-size:14.5px;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;line-height:1.6}

  .iatree .fb.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .iatree .tbtn{border:none;background:transparent;color:var(--green);font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;padding:6px 4px}

  .ianode>.row>.tw{width:12px;flex:none;color:var(--sub2);font-size:11px;transition:.15s}

  .uf-split{width:100%;max-width:520px;display:grid;grid-template-columns:1fr 1fr;gap:14px}

  .uf-bnode .ic{font-size:16px}.uf-bnode .ttl{font-size:14px;font-weight:800;letter-spacing:-.03em}

# 핏팅(Fitting) 기획 문서

> **처음 오셨나요?** 이 폴더는 표준 기획 산출물(제품정의·정보구조·플로우·화면정의·정책/데이터·엔진명세·매칭도메인·디자인)로 나뉘어 있습니다. **0→8 순서대로** 읽으면 핏팅이 뭘 하는 서비스이고 어떻게 만들지 파악됩니다.

**핏팅 한 줄 소개** — 안 입어본 브랜드에서도 "내 사이즈가 뭔지" 몰라 망설이는 사람에게, **평소 잘 맞는 옷의 착용 경험**을 기준으로 브랜드를 가로질러 **내 사이즈를 번역**해 주는 AI 진단 서비스. 이후 전문가(스타일리스트) 매칭으로 확장.

라이브 프로토타입 👉 **https://fitting-kr.vercel.app**

📖 **한 곳에서 편하게 읽기 👉 [html/통합문서.html](html/통합문서.html)** — 아래 md 문서 전부를 딥그린 스타일로 렌더(좌측 목차·문서 전환). 더블클릭해서 브라우저로 여세요. (내용은 .md가 원본, 이 뷰어는 렌더용입니다.)

---

## 읽는 순서 (산출물 지도)

| # | 문서 | 표준 산출물 | 무엇을 답하나 |
|---|---|---|---|
| 0 | **[0_용어집.md](0_용어집.md)** | Glossary | 용어 한곳에 — 옆에 두고 읽기 |
| 1 | **[1_제품정의.md](1_제품정의.md)** | PRD | **왜 만드나** — 문제·타깃·MVP·킬 메트릭 ≥65% |
| 2 | **[2_정보구조.md](2_정보구조.md)** | IA | **어떤 화면·URL·역할이 있나** — 3면 사이트맵·우선순위·구현상태 |
| 3 | **[3_사용자플로우.md](3_사용자플로우.md)** | User Flow | **사용자가 어떻게 움직이나** — 메인 흐름·분기·가입 시점 |
| 4 | **[4_화면정의.md](4_화면정의.md)** | 화면 정의서 | **화면마다 무엇을 보여주나** — 요소·상태·카테고리·8유형 브릿지 |
| 5 | **[5_정책·데이터.md](5_정책·데이터.md)** | 정책/데이터 | **동의·가입·버저닝 정책 + 데이터 모델** |
| 6 | **[6_사이즈엔진.md](6_사이즈엔진.md)** | 엔진 명세서 | **사이즈를 어떻게 계산하나** — 스키마·역산/추천/경고 규칙·계약 |
| 7 | **[7_전문가매칭.md](7_전문가매칭.md)** | 매칭 도메인 | **쇼퍼찾기 3면** — 사용자·전문가·운영 화면·플로우·데이터 |
| 8 | **[8_디자인가이드.md](8_디자인가이드.md)** | 디자인 가이드 | **어떤 색·글꼴·모양·말투로** — 딥그린 언어 + UX 라이팅 |

**보조 문서**
- **[마일스톤1-측정가능MVP.md](마일스톤1-측정가능MVP.md)** — 정식 서비스 첫 슬라이스 실행 계획(Next.js+TS+Supabase, 운영비 $0). 킬 메트릭을 측정 가능하게 만드는 것이 목표.
- **[협업가이드.md](협업가이드.md)** — 3인 분담(팀장·디자이너·개발자) 파일 소유·경계·브랜치/PR 관례. 소유 강제는 [`../.github/CODEOWNERS`](../.github/CODEOWNERS).
- **[의사결정기록.md](의사결정기록.md)** — 방향을 바꾼 결정과 이유(피벗·G.5 폐기·엔진 정본화 등). 정본 문서는 "지금 상태"만, "왜"는 여기.
- **[문서작성규칙.md](문서작성규칙.md)** — 기여자·AI용. 뷰어 전용 블록(swatch/compare/iatree/flow) 문법 + 재생성법.

## 정본(SSOT)이 어디인가
- **정보구조** = [2_정보구조.md](2_정보구조.md) (구 IA.md·화면과흐름의 IA 파트를 여기로 단일화)
- **엔진 규칙 명세** = [6_사이즈엔진.md](6_사이즈엔진.md) / **엔진 구현** = `web/js/engine.js` (유일 구현, `npm test`로 잠금)
- **8유형 표현 데이터** = `web/data/bodytypes.json` / **디자인 토큰** = `web/css/tokens.css`

## 핵심만 빠르게
- **문제**: 무신사 같은 몰은 자기 안 + 구매이력으로만 사이즈를 추천해, **새 브랜드로 넘어가는 순간** 아무도 번역해주지 않는다.
- **해결**: "평소 잘 맞는 옷"의 착용감을 거꾸로 풀어 체형을 추정하고, 다른 브랜드에서 맞을 사이즈로 번역.
- **원칙**: 사이즈 계산은 **규칙 기반**(검증 가능), 자연어 서술만 LLM. 진단은 **옷 종류 단위**(기반=상의+하의). 성패는 **킬 메트릭 ≥65%** 하나로 판단.
- **디자인**: 오프화이트 + 딥그린 1포인트 + 잉크블랙. 결과 카드만 예외(다크+8유형색).

# 핏팅 용어집 (Glossary)

> **이 문서는 무엇?** 기획 문서 전체에 흩어져 있던 용어 풀이를 한곳에 모은 **정본 용어집**입니다. 각 문서는 이제 용어를 다시 풀지 않고 여기를 가리킵니다. 처음 읽는 분은 이 문서를 옆에 두고 1번(제품정의)부터 읽으세요.

---

## 1. 제품 · 전략

| 용어 | 뜻 |
|---|---|
| **킬 메트릭**(kill metric) | 이 하나가 안 나오면 서비스를 접거나 갈아엎는 '생사 기준' 지표. 핏팅은 **추천 사이즈 정확도 동의율 ≥ 65%**. |
| **North Star Metric**(북극성 지표) | 팀이 장기적으로 키우려는 단 하나의 핵심 숫자. 핏팅은 "주간 유료 추천 채택 수". |
| **Aha 모먼트** | 사용자가 "오, 좋다!"를 처음 느끼는 순간. 핏팅은 "안 입어본 브랜드인데 이 사이즈면 맞겠다"는 확신이 드는 순간. |
| **페르소나** | 대표 사용자 한 명을 구체적 인물로 그린 것. |
| **JTBD**(Jobs To Be Done) | 그 사람이 "이걸 왜 쓰는가"를 상황·목적으로 적은 문장. |
| **MVP**(Minimum Viable Product) | 최소한으로 만들어 가설을 검증하는 첫 버전. |
| **피벗**(pivot) | 사업 방향을 크게 바꾸는 것. 핏팅은 "전문 쇼퍼 연결(구 핏메이트)" → "사이즈 번역"으로 피벗함. |
| **페이크도어**(fake door) | 실제 기능은 안 만들고 버튼만 두어 "얼마나 누르나"로 수요를 떠보는 방법. |
| **위저드 오브 오즈**(wizard of oz) | 자동인 척하지만 뒤에서 사람이 손으로 처리하는 방법. |
| **전환신호**(conversion signal) | 사용자가 관심을 실제 행동으로 보이는 비율. 핏팅 보조지표 ≥ 25%. |
| **해자**(moat) | 경쟁자가 쉽게 못 따라오는 방어벽. 핏팅은 미표기 부위 검열추정 + 브랜드 교차 데이터. |
| **lazy 가입**(lazy registration) | 회원가입을 초반에 강요하지 않고, 가치를 느낀 뒤(저장·매칭 시점)로 미루는 것. |

---

## 2. 진단 · 엔진

| 용어 | 뜻 |
|---|---|
| **역산**(逆算) | 결과에서 원인을 거꾸로 계산하기. 착용 경험(옷이 어땠는지)에서 몸 치수·체형을 추정. |
| **여유**(ease) | 옷이 몸보다 얼마나 큰가(cm). `여유 = 옷 치수 − 몸 치수`. 엔진의 핵심 개념. |
| **A축 / B축** | A축 = 브랜드가 파는 옷의 실제 치수(물건 쪽). B축 = 착용경험으로 역산한 사용자 신체 치수(몸 쪽). |
| **핏라인**(FitLine) | 옷의 여유 스타일. skinny·slim·regular·loose·oversize 5단계. "이 옷이 의도한 여유량". |
| **기반 / 파생 카테고리** | 기반 = 상의+하의(실착으로 체형 확정). 파생 = 아우터·원피스·치마(선호핏만). |
| **앵커브랜드**(anchor brand) | 착용경험을 **물어볼 때** 기준으로 삼는 대표 브랜드 7종. 입력용 기준 목록이지 추천 결과가 아님. |
| **둘레 / 너비 / 길이**(Comparison) | 부위 재는 방식. 둘레=단면×2로 환산, 너비=그대로, 길이=여유개념 없음(기장감). |
| **δ(델타)** | "한 칸 조정폭". "가슴이 꼈다" → 가슴이 옷보다 δ만큼 크다. 실측으로 맞춰가는 튜닝값. |
| **EASE_BANDS**(느낌↔센티 환산표) | "끼임/딱맞음/여유/큼" 같은 말을 여유 cm 구간으로 바꾸는 표. 부위별로 폭이 다름. |
| **병목**(bottleneck) | 부위마다 요구가 엇갈릴 때 가장 크게 모자란 부위. 그 부위에 맞춰 사이즈를 정함. |
| **숨은 치수** | 맞춤옷은 재는데 기성복 사이즈표엔 없는 치수(겨드랑이·앞뒤품 등). 불편의 원천이자 해자 구간. |
| **병목 플래그**(PAIN_FLAGS) | 표에 잘 안 적히지만 불편을 만드는 부위(팔·목·종아리). 역산 대신 브랜드 치수 역추정에 씀. |
| **프로버넌스**(Provenance, 출처메타) | "이 숫자 어디서 언제 어떻게 가져왔나". 출처·날짜·방식·신뢰도. |
| **대리지표**(proxy) | 비공개 판매량 대신 쓰는 리뷰 수·인기순 등. "이건 대리지표"라고 표시. |
| **스냅샷** | 찍은 뒤 안 바뀌는 사진 같은 기록. 진단 결과는 시점별 스냅샷으로 저장(덮어쓰지 않음). |
| **8유형 / 핏 타입** | 결과 카드에 그리는 스타일링 체형 8종(STR/TRI/INV/HRG/BAL/DIA/RND/TUB). 표현용 캐릭터. |
| **아키타입**(archetypes) | 역산 결과를 맞대볼 실측 부위벡터 70종(표준38+비만32). 8유형 카드와 **다른 층**. |

## 3. 매칭 도메인 (쇼퍼찾기)

| 용어 | 뜻 |
|---|---|
| **마켓플레이스**(marketplace) | 파는 사람과 사는 사람을 연결하는 장터. 핏팅 매칭은 사용자·전문가·운영자 3면. |
| **핸드오프**(handoff) | 앞 단계 정보를 다음 단계로 그대로 넘기는 것. 진단 결과카드가 전문가 화면(E5)으로 넘어감. |
| **따뜻한 리드 / 차가운 리드**(warm/cold lead) | warm = 진단까지 마치고 온 전환 가능성 높은 사용자. cold = 진단 없이 바로 온 사용자. |
| **콜드스타트**(cold start) | 양쪽(수요·공급)이 다 없어 서비스가 안 도는 초기 상황. |
| **노쇼**(no-show) | 예약해 놓고 안 나타남. |
| **입찰(역경매)** | 사용자 요청에 전문가들이 가격·제안으로 입찰 → 사용자가 낙찰. 지명 요청과 병행. |

| 용어 | 뜻 |
|---|---|
| **토큰**(token) | 색·크기 같은 디자인 값을 이름표로 정해둔 것(`--green` 등). 정본은 `web/css/tokens.css`. |
| **잉크블랙** | 새까만 검정 대신 살짝 부드러운 검정(`#16140F`). |
| **딥그린** | 핏팅의 단일 포인트색(`#2E4A3B`). 강조·활성에만 씀. |
| **요체** | 말끝을 `~해요·~예요`로 맺는 부드러운 문체. 핏팅 UX 라이팅 기본. |
| **핏(fit)** | 브랜드 언어. 핏 진단·핏 타입·핏 카드·핏 번역 등 핵심 개념에 일관되게 붙임. |

## 5. 거래 · 금액 (요청~정산)

> 금액 라벨은 **거래 단계마다 하나씩** 고정한다. **고객·쇼퍼 화면 동일 표기.** (2026-07-18 통일)

| 단계 | 정본 라벨 | 뜻 |
|---|---|---|
| **오픈 요청** | **예산** | 여러 스타일리스트에 뿌린 요청에 고객이 적은 예산 범위(예: 5~10만). |
| **지명 요청** | **예상 가격** | 특정 스타일리스트 지명 시 서비스 기준가로 안내되는 예상 금액(항상 "예상 가격", 축약 금지). |
| **수락 후** | **확정 금액** | 수락으로 확정된 거래 금액. |
| **상담중(쇼퍼→고객)** | **결제 예정 금액** | 입금 요청 전, 대화로 맞춰 안내할 금액(요청하면 잠금). |
| **결제창 내역** | **서비스 금액 · 수수료 · 결제 금액** | 결제 모달의 금액 분해(기본가·수수료·최종 결제액). |
| **정산** | **결제 금액** | 완료 확인 후 스타일리스트에게 지급되는 보관 결제금. |

- 통일 전 흔들리던 표기: ~~고객 예산~~ → **예산**, ~~안내할 금액~~ → **결제 예정 금액**, ~~예상 98,000원(축약)~~ → **예상 가격 98,000원**.
- **안전결제**(구 에스크로): 완료 확인 전까지 핏팅이 결제금을 보관하고, 확인 후 스타일리스트에게 정산하는 안전결제 방식. UI 라벨은 "안전결제"로 통일(내부 개념명은 에스크로).

# 핏팅(Fitting) — 제품 정의 (PRD + 발표 서사)

> **이 문서는 무엇?** 핏팅을 "왜, 누구를 위해, 무엇부터 만드나"로 설명한 제품 정의서(PRD)입니다. 처음 읽는 사람이 방향을 잡는 문서예요.
> **용어**(킬 메트릭·페르소나·JTBD·North Star·페이크도어·해자 등)는 [0_용어집.md](0_용어집.md)에 한곳에 모여 있습니다.
> **함께 보기:** 정보구조 [2_정보구조.md](2_정보구조.md) · 흐름 [3_사용자플로우.md](3_사용자플로우.md) · 엔진 [6_사이즈엔진.md](6_사이즈엔진.md). 방향을 바꾼 결정의 경위는 [의사결정기록.md](의사결정기록.md).

## 1. 한 줄 요약

새 브랜드 옷을 사고 싶어도 "내 사이즈가 맞을지" 몰라 주저앉는 사람에게, 평소 입던 옷의 착용 경험을 기준으로 **브랜드를 가로질러 내 사이즈를 번역해주는** AI 진단 카드. 진단으로 사용자·사이즈 데이터를 모아, 그 위에 스타일리스트 매칭을 얹어 확장한다.

> 표지 카피: *"브랜드를 가로질러 '내 사이즈'를 번역한다 — 사이즈 고민을 넘어, 새로운 나를 입다."*

## 2. 문제 정의

새 브랜드로 건너가려는 사람은 "이 브랜드에서 내 사이즈가 뭔지"를 몰라 망설인다. 무신사 등은 이미 사이즈 추천을 하지만 *자기 몰 안 + 구매 이력*에 갇혀 있어, 새 몰·새 브랜드로 넘어가는 순간엔 아무도 번역해주지 않는다. 결국 실패가 두려워 늘 사던 브랜드의 비슷한 옷만 다시 사게 된다.

> 차별점이자 해자: ① 몰 교차 ② 구매 이력 불필요(착용경험 기반) ③ 중립성 — 직접 팔지 않으니 건너가게 도울 동기가 있고, 몰을 가로지르는 사이즈 데이터는 개별 플랫폼이 구조적으로 못 만든다(무신사는 자기 울타리 안에 갇힘).

## 3. 가설 — 왜 사이즈를 도구로 푸는가

새 옷 구매가 막히는 이유(설문): **스타일 어울림 40% / 사이즈 적합 38%.** 두 축이 거의 반반이라 하나만 풀면 절반의 사용자만 잡힌다. 성질이 다르니 푸는 주체도 다르게 —

- **스타일**은 정답이 없다 → **전문가**가 푼다 (후속 가설: 스타일리스트 매칭).
- **사이즈**는 정답이 있다 → **도구**가 푼다 (지금의 심장: 번역 엔진).

## 4. 타깃 페르소나 · JTBD

- 김도현 / 33 / 직장인. 소개팅·미팅·발표처럼 잘 보이고 싶은 자리가 생기면 평소와 다른 새 브랜드·스타일을 시도하고 싶지만, 안 입어본 브랜드는 사이즈가 맞을지 두려워 결국 늘 사던 곳에서 비슷한 옷만 산다. 이런 자리엔 기꺼이 지갑을 열 의향이 있는데, 정작 무엇을 어떤 사이즈로 사야 할지 몰라 기회를 흘려보낸다.
- JTBD: *"안 입어보던 브랜드 옷을 사고 싶을 때, 사이즈 실패 걱정 없이 나에게 맞는 걸 골라 새로운 모습에 도전한다."*

## 5. 사용자 여정 (As-is → To-be)

| | As-is · 갇힌 옷장 | To-be · 건너가는 옷장 |
|---|---|---|
| 1 | 새 브랜드에 끌린다 | 새 브랜드에 끌린다 |
| 2 | "근데 사이즈 맞을까?" | 핏팅 — "당신은 이 브랜드 L" |
| 3 | 사이즈표·후기 봐도 확신 없음 | 사이즈 확신이 선다 |
| 4 | 실패가 두려워 포기 | 자신 있게 구매 |
| 5 | 늘 사던 비슷한 옷만 산다 | 처음 보는 옷이 옷장에 걸린다 |

## 6. North Star / Aha

- **North Star Metric:** 주간 유료 추천 채택 수. 본 MVP는 그 입구인 **사이즈 번역 정확도 + 유료 전환신호**를 검증한다.
- **Aha Moment:** 진단 카드에서 *"평소 입던 옷 기준으로, 한 번도 안 입어본 브랜드인데 이 사이즈면 맞겠다"*는 확신이 처음 드는 순간.

## 7. MVP 기능 (2개)

- **AI 체형·사이즈 진단 [LLM + 규칙]** — 입력: 성별·키·몸무게·나이 + *입어본 옷 착용경험 보정* + 선호핏. 출력 카드: ① 체형 프로필(캐릭터) ② 핏 인사이트 ③ **주요 브랜드별 추천 사이즈**.
- **전문가 추천 받기 (페이크도어)** — 버튼 클릭만 로깅해 유료 전환신호 측정(실매칭 X). 수요부터 확인.

## 8. 단계적 범위 · 비즈니스 (Now / Next)

*"데이터 확보 → 수익화 → 데이터 확장"의 사업 단계.*

- **Now(MVP) · 진단:** 진단으로 사용자·사이즈 데이터 확보(주요 브랜드 N개 한정). 수익원 —.
- **v2 · 매칭:** 전문가 실매칭으로 수익화 — 매칭 수수료(B2C)·커머스 제휴 커미션.
- **v3 · 확장:** 축적 데이터를 사이즈 API(B2B, 쇼핑몰 반품 절감)로 확장 + 상황별(소개팅·면접·결혼식·여행 등) 카테고리·오프라인·퍼스널컬러. 상황은 페인·지불 의향이 집중되는 지점이라 매칭의 과금 단위가 된다. 수익원 — 데이터 API·상황별 과금.

## 9. 성공 기준

- ★ **킬 메트릭** — 추천 사이즈가 "내가 실제 입는 사이즈와 맞다" 동의율 **≥ 65%** (아는 브랜드로 검증 → 실구매 없이 엔진 정확도 확인. 미달 시 엔진 교체/중단).
- 보조: "안 사본 브랜드도 사보겠다" 의향 ≥ 50%(페인 해소) / 유료 클릭률 ≥ 25%(전환신호).

## 10. 열린 질문

- 체형·사이즈 추정 로직(규칙 vs LLM vs 혼합) — *이 MVP가 킬 메트릭으로 답할 것.*
- 착용경험 보정 몇 벌·어떤 부위.
- 브랜드 실측 확보·정규화(차별점이자 최대 난관).
- 페이크도어 클릭의 허수 보정.

## 0. 이 IA를 규정하는 핵심 결정

1. **3-사이드 마켓플레이스** — 사용자 · 전문가 · 운영자 + 사이즈 진단 엔진.
2. **매칭 = 입찰(역경매) + 지명 병행**
 - 오픈 요청: 사용자 요청 → 전문가들이 **입찰** → 사용자 **낙찰**
 - 지명 요청: 사용자가 특정 전문가에게 **직접** 요청 → 수락/거절
3. **진단은 동의 없이 이용**(서비스 제공 근거) · **엔진 개선만 opt-in**(결과화면). 진입 동의 게이트 없음 — *구 IA의 G.5 필수 게이트는 폐기.* 만 14세 확인은 opt-in에 접목. (근거·정책 상세는 [5_정책·데이터.md](5_정책·데이터.md))
4. **비회원도 수집**(진단 제공에 필요한 최소) · **lazy registration**(저장·매칭 시점에 가입).
5. **SEO**: 공개 콘텐츠(랜딩·소개·전문가·가이드)만 색인, 진단·결과·매칭·마이·어드민은 noindex.
6. **엔진 정책**: 사이즈 수치는 규칙 기반(검증 가능), 캐릭터·핏 인사이트 서술만 LLM. (상세 [6_사이즈엔진.md](6_사이즈엔진.md))

## 1. 내비게이션 구조 (사용자 앱)

사용자 앱은 화면 **맨 아래에 항상 떠 있는 탭 4개**로 이동합니다. 그 위에 상황에 따라 잠깐 뜨는 요소(로그인창·약관)와, 사용자 앱과 완전히 분리된 **별도 앱 2개**(전문가 앱·운영 어드민)가 있습니다.

| 탭 | 이름 | 한 줄 설명 | MVP |
|---|---|---|---|
| 탭1 | 🏠 홈 | 첫 화면(=랜딩). "이게 뭐 하는 서비스"를 3초에 보여주고 진단을 시작시킴 | ● |
| 탭2 | 🔍 체형진단 | **핏팅의 심장.** 무료로 사이즈를 진단해 주는 핵심 화면들 | ● |
| 탭3 | 👔 쇼퍼찾기 | 전문가(쇼퍼) 연결. MVP(api)에서는 **'준비 중·오픈 알림(이메일)' 웨이트리스트** — 수요만 수집(목업 목록/견적 미노출) | ●(페이크도어) |
| 탭4 | 👤 마이 | 내 진단 기록·저장·로그인 | ◐ |

> 탭에 보이는 이름은 "쇼퍼찾기", 내부 용어·코드에서는 "전문가(expert)"로 통일합니다.
>
> **MVP(api) 인증 정책:** 인증은 측정 대상이 아니고 소비자 로그인도 목업이라, **api 모드에선 인증 표면 전체를 숨긴다**(로그인·회원가입·My·알림·프로필). 상단=홈+쇼퍼찾기만, 진단·수요 수집 모두 로그인 불필요. proto(데모)는 로그인·마이·거래 목업 전부 유지. 전문가 앱(pro*)은 MVP 미배포 — 수요는 소비자 웨이트리스트로만 측정.

## 4. 운영 어드민 (Admin) — MVP 실배선 · `/admin/*` 🔒 (Supabase Auth Google + RLS)

> **MVP admin 메뉴 = 4개**: `3.A 사이즈·데이터` · `3.C.2 진단·정확도` · `3.C.4 엔진 강화` · `3.C.3 전문가 수요`. 측정 2축(진단 정확도=킬메트릭 / 매칭 수요)을 보고, 엔진 데이터를 직접 관리한다. **v2 섹션(3.B 회원·거래 / 3.C.1 사업현황 / 3.D B2B API / 3.E 내부운영)은 admin-common.js가 네비 숨김 + gen-app 미배포** — 화면은 구현돼 있으나 MVP 밖. 인증은 Google OAuth 실연결(`is_admin` = admin_user 멤버십), 데이터는 RLS(admin 전용).

- **■ 3.A 사이즈·데이터** — *해자의 실행 도구* · **DB 실배선**
 - ■ 3.A.1 브랜드·상품 사이즈 = **`garment` 테이블(DB·RLS)** — 실측표 뷰어 + **직접 CRUD**(cm 편집·행 추가/삭제, 변경 시 `rev`↑ → 진단 즉시 반영). 대량 수집은 CSV→build-sizespec.py→import. 브랜드 관리에 **진단 노출 순서 편집**(brand 테이블·실착 접근성 기본순).
 - ■ 3.A.2 수집/커버리지 모니터링 — 브랜드×카테고리 커버리지·갭. (정확도 모니터링은 3.C.2로, 미표기 부위는 3.C.4로 이관)
 - ■ 3.A.3 번역 규칙/파라미터(EASE_BANDS·역산 튜닝) — 엔진 시뮬레이터. 신체 사이즈(body-*)는 공개 기준이라 JSON 유지.
- **■ 3.C.2 진단·정확도(킬메트릭)** — 실 DB(feedback+diagnosis·RLS). 정확도×신뢰도 캘리브레이션·8유형/앵커/페인 분해 + **정확도 추세**(날짜별·엔진버전별 맞음율 → 강화 확인).
- **■ 3.C.3 전문가 수요(페이크도어 측정축)** — `lead` 테이블(RLS). 웨이트리스트 오픈알림(이메일)·견적요청 수요 + **진단→수요 전환**(session 조인) + 서비스·상황별.
- **■ 3.C.4 엔진 강화(성장구조)** — 진단 로그(painFlags·openNote+feedback) → 개선 작업목록: ① 미표기∩페인→A축 역산 실측보정 ② 새 페인→PAIN_FLAGS 승격 ③ 확신 틀림→규칙 튜닝 ④ 수요 대비 데이터 부족→수집. (docs/6 §1.1·자동학습 아님, 사람 액션 우선순위)
- *(v2 · MVP 미노출)* **▢ 3.B 회원·거래** — 심사·회원·매칭 모니터링·분쟁/환불·정산·리뷰·CS. **▢ 3.C.1 사업현황**(GMV·정산). **▢ 3.D B2B API**(v3·미표기 검열추정 해자). **○ 3.E 내부운영**(RBAC·감사로그·쿠폰).

# 핏팅 — 사용자 플로우 (User Flow)

> **이 문서는 무엇?** 사용자가 화면 사이를 **어떤 순서로, 어디서 갈라지고, 어디서 되돌아오는지**를 그린 흐름도입니다. 화면 목록·URL은 [2_정보구조.md](2_정보구조.md), 화면별 상세 요소·상태는 [4_화면정의.md](4_화면정의.md), 용어는 [0_용어집.md](0_용어집.md).

## 1. 흐름을 짤 때 지키는 3원칙

세 원칙 모두 "사용자를 중간에 놓치지 않으려는" 목적에서 나옵니다.

1. **가입은 나중에 (lazy 가입)** — 비회원 그대로 진단~결과~피드백까지 다 하게 두면 이탈이 줄고 측정 표본도 커집니다. 가입은 딱 **두 순간**에만 요청: ① 결과를 저장할 때(2-4), ② 전문가 매칭을 실제로 쓸 때(3-1). (상세 §3-2, 정책은 [5_정책·데이터.md](5_정책·데이터.md))
2. **진단은 동의 없이 시작** — 진단은 서비스 제공에 필요한 최소 수집이라 **진입 동의 게이트 없이** 시작합니다(구 G.5 필수 게이트 폐기). 대신 **엔진 개선 목적의 데이터 활용만** 결과화면(2-5)에서 **opt-in**으로 받고, 이때 만 14세 확인을 접목합니다.
3. **막다른 길 금지** — 실패하거나 비어 있는 화면에도 항상 되돌아갈 길을 둡니다(추정 실패 → 옷 추가, 신뢰도 낮음 → 재진단, 링크 만료 → 홈).

### 3-2. 가입은 정확히 언제 요구하나

본선(핵심 흐름)은 **비회원 그대로** 끝까지 갑니다. 가입은 아래 두 지점에서만 *옆으로* 잠깐 갈라집니다.

> 매칭 쪽(전문가 앱·운영자)의 흐름은 [7_전문가매칭.md](7_전문가매칭.md) §2~4.

### 2-2 착용경험 — 자세히

> **왜 옷 종류(카테고리)별로 나눠서 묻나요?** 계산 방식 때문입니다. 상의 경험으로는 상체(어깨·가슴)만, 하의로는 하체(허리·엉덩이)만 알 수 있습니다. 그래서 질문·계산·결과를 모두 옷 종류 단위로 나눕니다.

묻는 것:
- **어떤 옷 종류를 진단할지 선택** (상의/하의 등)
- **그 종류의 선호핏** (스키니·슬림·레귤러·루즈·오버 중 택1)
- **같은 종류로 입어본 옷** `[브랜드 + 핏 + 사이즈]` 를 **1~3벌**
- **부위별 느낌** → 큼 / 여유 / 딱맞음 / 끼임
  - 상의 부위: 어깨·가슴·소매·배·총장
  - 하의 부위: 허리·엉덩이·허벅지·밑위·기장

**상태(state)별 처리** — 같은 화면이 상황에 따라 다르게 보이는 경우:

| 상황(state) | 어떻게 처리하나 |
|---|---|
| 입력이 길어짐 | 진행 단계 표시 + 뒤로가서 수정 가능 → 중간 이탈 방지 |
| 입어본 옷이 0벌 | "건너뛰기" 허용(대신 결과 신뢰도는 낮게 표시) |
| 1벌만 기억남 | "1벌로 진단" vs "다른 핏 옷 더 넣기" 중 선택 + 신뢰도 안내 |
| 목록에 그 브랜드가 없음 | "직접 입력" / "해당 없음" 선택 (MVP는 브랜드가 몇 개뿐이라 자주 생김) |

**인터랙션(디자인 개편):**

- 상단 **위상 스텝퍼(1 기본정보 · 2 착용경험 · 3 진단중)** — 점 사이 연결선이 질문마다 채워짐(헤더는 로고+닫기만)
- **다음 버튼은 선택해야 활성**(첫 진입 = 비활성 회색). 착용감은 **주부위(4지선다: 끼임/딱맞음/여유/큼)만 필수**, 허리밴드·기장·걸린 곳은 선택
- 진단 대상(상의/하의)은 각 질문 제목 위 '상의 진단' 미니 라벨로 표시 · '더 자세한 착용감'은 접힘(펼침 시 높이 애니메이션)

### 2-4 결과 카드 — 상태별 처리

**화면 분기 — 진단 범위에 따라 카드 유무·제목이 달라짐** (엔진: 상의=상체 / 하의=하체 역산):

| 진단 범위 | 결과 카드 | 제목 |
|---|---|---|
| 기본진단(0벌·건너뛰기) | **나옴** — 키·몸무게 회귀 추정(저신뢰) | 내 핏 타입이 나왔어요 |
| 상의만 | 안 나옴 — 상체만 잠금(8유형 미확정) | 상체 부분 진단이 나왔어요 |
| 하의만 | 안 나옴 — 하체만 잠금 | 하체 부분 진단이 나왔어요 |
| 상의+하의(순서 무관) | **나옴** — 8유형 확정 | 내 핏 타입이 나왔어요 |

> 구현: `result.js` — `cardReady = 상의&&하의 완료` · `noneDone = 0벌` · `showCard = cardReady || noneDone`. 부분(상의만/하의만)은 카드 잠금 + '상체/하체 부분 진단이 나왔어요'.

**세부 상태:**

| 상황(state) | 언제 | 어떻게 보이나 |
|---|---|---|
| **신뢰도 3단계** | 입력한 옷 수에 따라 | **0벌 = 낮음**(주의 배너) / **1벌 = 보통**("한 벌 더 넣으면 정확해져요") / **2~3벌 = 정확**(배너 없음) |
| 추정 실패 | 계산이 확신을 못 할 때 | "옷을 더 추가해 주세요" → 2-2로 되돌림 |
| 재진단 | 결과가 마음에 안 들 때 | 입력을 고쳐 다시 → 2-2 |
| 결과 저장 | 저장 버튼 | 비회원이면 임시 링크로 잠깐 보관 / 가입하면 영구 보관 = **가입 유도 지점 ①** |
| 옷장 / 이어서 진단 | 계속 오게 만드는 장치 | 종류별 완료 현황(옷장)을 보여주고, 한 번 누르면 다음 종류 진단으로 이어짐. 기본정보·체형은 재사용하므로 두 번째부터는 옷만 새로 입력 |

## 5. 진단 카테고리: "기반"과 "파생"

> **왜 나누나요?** 옷 종류마다 알 수 있는 정보가 다르기 때문. 상·하의는 몸을 직접 재는 "기반", 아우터·원피스·치마는 취향(선호핏)만 물으면 되는 "파생".

```iatree
★ | | 기반(基盤) | 몸(체형)을 실제로 확정하는 옷
  · 상의 + 하의 둘 다 끝나야 체형 카드 완성 (= 8유형 중 하나로 확정)
  · 상의만 끝나면 상체만 나온 "부분 카드" (8유형은 아직 미확정)
  ★ | | 상의 | 상체 역산 — 어깨·가슴·소매·배·총장
  ★ | | 하의 | 하체 역산 — 허리·엉덩이·허벅지·밑위·기장
○ | | 파생(派生) | 선호핏(취향)만 물음 · 기반이 끝나야 열림
  ○ | | 아우터 | 선호핏만
  ○ | | 원피스 | 선호핏만
  ○ | | 치마 | 선호핏만
```

- **기반 = 상의 + 하의 둘 다.** 둘 다 끝나야 체형 카드가 완성되고 8유형 중 하나로 확정. 상의만 끝나면 상체만 나온 부분 카드(8유형 미확정).
- **파생(아우터·원피스·치마)은 선호핏만** 받고, 기반이 끝나 체형이 확정된 뒤 열립니다.
- 실제 구현은 상의부터 시작(브랜드 종류와 옷 종류를 동시에 벌리지 않기 위한 좁히기).

> **지금 남은 일(엔진 쪽):** 현재 시제품은 상의만 되어 있어 **하의 진단 흐름 추가** + 하의 계산 규칙 **정식화** 필요. 상세 [6_사이즈엔진.md](6_사이즈엔진.md).

## 6. 8유형과 엔진을 잇는 문제 (결과화면 만들기 전에 별도 설계)

> **왜 미리 못박아 두나요?** 결과 카드를 그리는 방식(8유형 그림 1개)과 엔진이 계산하는 방식(상·하체 따로)이 서로 어긋나기 때문. 지금 답을 정하진 않되, "이 연결 작업이 반드시 필요하다"를 명시.

- **8유형(카드 그림)** = 몸 전체 실루엣 1개(STR / TRI / INV / HRG / BAL / DIA / RND / TUB).
- **엔진(계산)** = 상체·하체를 **따로** 계산. 상의 진단이면 상체 라인만, 하의면 하체 라인만.
- **그래서 필요한 것:** `엔진 상체 결과 × 하체 결과 → 8유형 코드` **매핑 표**. 그리고 상의만 끝났을 때 **부분 카드**를 어떻게 보여줄지 규칙.
- 이 작업은 [6_사이즈엔진.md](6_사이즈엔진.md)의 체형 결과 구조와 아래 §7의 8유형 데이터를 잇는 일. **결과화면 착수 전 별도 항목으로 설계.**

### 겹치던 부분을 어떻게 정리했나 (확정)

| 겹치던 지점 | 정리 결과 |
|---|---|
| 결과 화면 | 그림(카드)은 8유형 디자인, 그 안 **숫자·값은 엔진이 공급**. 배치는 좌측 카드 / 우측 브랜드 사이즈표·검증 |
| 진단 질문 항목 | **엔진 스키마를 기준**으로 맞춤([6_사이즈엔진.md](6_사이즈엔진.md)) |

## 7. 8유형 데이터는 딱 한 곳에서만 온다

> **왜 한 곳으로?** 8유형의 이름·색·설명이 여러 화면 코드에 흩어지면 하나 바뀔 때 전부 찾아 고쳐야 하고 실수가 납니다.

**`web/data/bodytypes.json`** 이 8유형 정보의 유일 원본(카드 표시용).

- 8유형의 **코드·이름·색·프로필·핏 설명·궁합·실루엣 좌표**는 오직 이 파일에서 읽음. 화면 코드에 다시 적지 않음.
- 8유형 코드(STR/HRG…)와 실루엣 모양 연결은 이 파일의 `silhouette` 값으로만.
- 이 파일은 "보여주기"용. 엔진 계산 결과를 8유형 코드로 바꾸는 매핑 표는 §6이 담당.
- 결과 카드는 예외적으로 어두운 배경 + 유형별 시그니처색(디자인 예외, [8_디자인가이드.md](8_디자인가이드.md) §4).

## 0. 저장소 키 계약 (전 화면 공통 · SSOT)

데이터 계약은 **두 모드**입니다(D-15 어댑터 스왑 · `web/js/data.js` seam). **proto**(로컬 데모)=브라우저 저장소 `fitting.*`. **api**(app/ 배포)=서버 라우트 `/api/*`→**Supabase(RLS)**. 아래 `fitting.*` 표는 proto 계약, api 계약은 그 아래 DB 표.

| 키 | 저장소 | 쓰기(소유) | 읽기 | 내용(shape) |
|---|---|---|---|---|
| `fitting.basic` | session | diag-basic | diag-fit · result | `{gender, age, height, weight}` |
| `fitting.dx` | session | diag-fit | result | `{basic, prefs{cat:fitLine}, experiences[]}` |
| `fitting.consent` | session | result | result | `{engineImprove, ageAttested, at}` |
| `fitting.feedback` | **local** | result | *(admin-diagnostics)* | `[{ts, bodyType, verdict, confidenceTier, engineImprove, ageAttested}]` |
| `fitting.auth` | local | index | index | 로그인 상태(lazy) |
| `fitting.favs` | local | index | index | 찜한 쇼퍼 목록 |
| `fitting.reqs` | local | index | index · *(admin-members)* | 코디 요청 = **매칭 수요 신호** |
| `fitting.reqsVer` | local | index | index | 데모 시드 마이그레이션 버전 |
| `fitting.pro.profile` | local | pro-signup · pro | pro · pro-quote | 쇼퍼 프로필 `{registered, name, services[], tagline, bio, specialties[], portfolio[]}` |
| `fitting.pro.reqs` | local | pro · pro-quote | pro · pro-quote | 쇼퍼가 받은 요청 `{cust, type, bodytype, cm, kg, occ, budget, status, offer?, review?}` |
| `fitting.pro.proposed` | local | pro | pro | "먼저 제안" 발송 목록 |
| `fitting.admin` | session | admin-login | admin-common(가드) | 관리자 세션 `{email}` |
| `fitting.session` | local | data.js | data.js | 익명 세션 id(진단↔수요 조인키) |

**api 모드 = Supabase 테이블(RLS admin·서버 service_role):**

| 테이블 | 쓰기 | 읽기 | 내용 | 마이그레이션 |
|---|---|---|---|---|
| `diagnosis` | `/api/diagnose` | admin-diagnostics·improve(RLS) | `{session_id, category, input(basic·prefs·experiences), result(card·recs·tier), engine_version}` | db/00 |
| `feedback` | `/api/feedback` | admin-diagnostics·improve(RLS) | `{diagnosis_id, verdict(맞음·애매·틀림), aware_brand, engine_improve_consent, age_attested}` → **킬메트릭** | db/00 |
| `lead` | `/api/lead` | admin-leads(RLS) | `{session_id, kind(notify·quote), service, occasion, contact(이메일)}` → **수요** | db/02 |
| `garment` / `garment_meta` | admin-garments·import(RLS) | `/api/diagnose`(service_role)·admin(RLS) | 실측표 spec(jsonb)·`rev`(캐시 무효화) → **진단 런타임 소스** | db/03·05 |
| `brand` | admin-brands(RLS) | `/api/diagnose`·admin | `{brand_id, display_order, active}` → 진단 노출순서 | db/04 |
| `admin_user` | (수동) | is_admin() | 관리자 멤버십 | db/00 |

> **계약 상태(빈틈→해소):** ✅ 진단 응답·피드백은 이제 **Supabase에 실적재 + admin 실 DB 읽기**(RLS). ✅ 실측표는 `garment` 테이블(admin CRUD·진단 소스). 🔸 사용자 `fitting.reqs`↔쇼퍼 `fitting.pro.reqs` 연결은 **v2**(api는 매칭 미배선, 수요만 lead로). 🔸 사용자/전문가 계정계는 v2(MVP는 인증 표면 제거).

## 1. 사용자 앱 — 탭1~4 (`index.html` SPA + 진단 플로우)

> 탭 전환은 `go(id)`(#home/#shop/#my `.on` 토글) · `goMy(panel)`. 로드 시 `location.hash`와 `?from=CODE`(초대 배너)를 읽어 자동 진입. 진단 플로우(basic·fit·loading·result)는 **별도 페이지**.

### 탭1 · 🏠 홈 (`index.html#home`) ★ 🔍

- **목적:** 히어로 줄자 애니메이션으로 3초 안에 "쓸모"를 전달하고 진단을 시작시키는 랜딩.

```
┌───────────────────────────────────────────┐
│ Fitting▪   홈 쇼퍼찾기 마이     👤 쇼퍼지원 │  ← .menu / .navr
├───────────────────────────────────────────┤
│  [줄자 히어로]  #hMarker #hCm #hKg #hMtag   │
│  "브랜드마다 다른 내 사이즈, 한 번에"        │
│        [ 내 사이즈 진단 시작 ] → diag-basic │
│                                           │
│  작동 방식 3스텝  (.reveal/.hcount)         │
│  결과 미리보기  #hTypes .ty (card iframe)   │
│  상황별 쇼퍼 매칭 데모  #hOccRow #hShopNode │
└───────────────────────────────────────────┘
```

| 요소 | 표시 | 동작 |
|---|---|---|
| 히어로 CTA | [내 사이즈 진단 시작] | `startDiag()` → `fitting.dx/basic/consent` 삭제 후 `diag-basic.html` |
| 헤더 쇼퍼 지원 | 링크 | → `pro-signup.html` |
| 결과 미리보기 | 8유형 카드 iframe | `card.html?type=..&g=..` |
| 쇼퍼 매칭 데모 | 하드코딩 `SH`/`FLOW` | 시연용(비상호작용) |
| 초대 배너 `#inviteBanner` | `?from=CODE` 있을 때 | 친구 초대 유입 표시 |

- **데이터:** R `fitting.auth`·`fitting.favs`·`fitting.reqs` / fetch `data/bodytypes.json`(아바타 색)
- **상태:** `prefers-reduced-motion` → 애니메이션 건너뛰고 종료상태 / `?from` → 초대 배너
- **이탈:** diag-basic · `go('shop')` · pro-signup · about/terms/privacy(푸터)

### 탭2 · 🔍 체형진단 — 서비스의 심장

진단은 **동의 게이트 없이** 바로 시작(서비스 제공 최소 수집). 위저드: 2-1 → 2-2 → 2-3 → 2-4 → (2-5 피드백/2-6 전환/2-7 공유).

#### 2-1 · 기본 정보 (`diag-basic.html`) ★ 🔒

- **목적:** 성별·나이·키·몸무게 수집. 성별 선택 시 평균값 프리필.

```
┌──────────────────────────────┐
│  기본 정보                    │
│  성별  ( 남성 ) ( 여성 )       │  radio
│  나이  [20대 ▾]               │
│  키    [173cm ▾]              │
│  몸무게 [72kg ▾]              │
│              [ 다음 ]         │ → diag-fit
└──────────────────────────────┘
```

| 요소 | 입력 | 검증·동작 |
|---|---|---|
| 성별 | radio(필수) | 선택 시 나이·키·몸무게 평균 프리필 |
| 나이/키/몸무게 | select | 원문자열 저장(`'20대'`,`'173cm'`,`'72kg'`) |
| [다음] | 주 버튼 | `saveBasic()` → **W `fitting.basic`** `{gender,age,height,weight}` → diag-fit |

- **진입:** 홈/about CTA(진입 시 이전 세션 진단키 초기화) · **이탈:** diag-fit

#### 2-2 · 착용경험 보정 (`diag-fit.html`) ★ 🟢실연결 🔒

> **입력 옵션 소스 = `size-catalog.json`**(cm-free 공개 카탈로그 — 브랜드·사이즈 라벨만, `gen-catalog`가 garments에서 실측치 제거해 생성). 실측 cm는 클라 미노출(해자). 부위별 `fits`(체형역산)·`painFlags`(미표기∩페인)·`openNote`(자유서술)를 수집 → 엔진 강화 원천(admin 3.C.4).

- **목적:** 정확도의 핵심. 대상 카테고리·선호핏 + 입어본 옷(브랜드·핏·사이즈)×1~3 + 부위별 느낌. **질문 정본은 엔진**([6_사이즈엔진.md](6_사이즈엔진.md)).

```
┌────────────────────────────────────────┐
│ 무엇을 진단할까요?                        │
│ [상의][하의] [아우터][치마][원피스]        │  카테고리
│ 선호핏  #prefseg (스키니…오버)            │
│ ── 입어본 옷 1 ──                         │
│ 브랜드[유니클로▾] 핏/품목[▾] 사이즈[M▾]   │  앵커(#brand1/item1/size1)
│ 부위별 느낌: 어깨[딱맞음] 가슴[여유]…      │  fits/painFlags/lengthPrefs
│ 자유메모 [………]         (+ 옷 더하기)     │
│              [ 진단하기 ]                │ → diag-loading
└────────────────────────────────────────┘
```

| 요소 | 입력 | 동작 |
|---|---|---|
| 진단 대상 | 카테고리 택1 | 기반(상·하의)=실측 역산 / 파생=선호핏만 |
| 선호핏 `#prefseg` | 세그먼트 | 카테고리별 `prefs`에 저장 |
| 앵커 옷 ×1~3 | 브랜드+핏+사이즈 | 브랜드는 앵커 6종 datalist |
| 부위별 느낌 | fits/pain/length | `SNUG/RELAXED…`, `OK/TIGHT`, `GOOD/LONG…` |
| 하의 밴드 | 토글 | `waistband:'none'|'banded'` |
| [진단하기] | 주 버튼 | **R `fitting.basic`, R/W `fitting.dx`** → diag-loading |

- **데이터:** R `fitting.basic`(성별→사이즈/브랜드 렌더) · R/W `fitting.dx` `{basic, prefs, experiences[]}`
- **상태:** 0벌=건너뛰기(신뢰도↓) / 1벌=보통 안내 / 브랜드 없음=직접입력 / 파생 카테고리=선호핏만
- **experiences[] shape:** `{category, brandId, brandName, fitLine, item, sizeLabel, subtype, gender, silhouette?, waistband?, fits{}, painFlags{}, lengthPrefs{}, openNote}`

#### 2-3 · 진단 로딩 (`diag-loading.html`) ★ 🔒

- **목적:** 역산+매칭 계산 대기(줄자 로딩 애니메이션). URL 파라미터(`skip/g/derived/cat`)만 읽고 result로 리다이렉트. **저장소 미접근.**
- **이탈:** result.html

#### 2-4 · 결과 카드 (`result.html`) ★ 🟢실연결 🔒

> **api(배포):** 추천 계산을 **서버(`/api/diagnose`)에서** — garment 테이블 실측표로 역산·추천(garments 클라 미노출=해자), 브랜드 노출순서 반영, `diagnosis` 저장 + 피드백 `/api/feedback`(킬메트릭)→Supabase. 인증 표면 제거(계정 저장 숨김, '스타일리스트 찾기'만). **proto:** 클라 엔진(garments.json). `diagnoseSpecs()`가 모드 분기.

- **목적:** 제품의 얼굴. ① 8유형 체형 프로필 ② 핏 인사이트 ③ 브랜드별 추천 사이즈 ④ 옷장(진단 현황). 상의만 실계산, 파생은 선호핏 폴백/게이트.

```
┌───────────────────────┬───────────────────┐
│  8유형 카드(어두운 배경) │  브랜드별 추천 사이즈 │
│   실루엣 + 시그니처색   │  핏지수% · 병목부위  │
│   핏 인사이트           │  체형 측정 스펙트럼  │
├───────────────────────┴───────────────────┤
│ 이 추천 맞아요?  ✅맞아요 ➖애매 ❌틀려요    │ ← 정확도 검증(킬 메트릭)
│ ☐ 익명 엔진개선 동의(만14세)                │
│ [옷장: 상의✓ 하의○]  [전문가에게 받기 →]    │
└─────────────────────────────────────────────┘
```

| 요소 | 표시 | 동작 |
|---|---|---|
| 8유형 카드 | `bodytypes.json`(성별 축) | `btResolve(t,g)` |
| 브랜드 추천표 | 엔진 계산(FitEngine) | 핏스코어·병목 |
| **정확도 검증** `.rseg` | 맞음/애매/틀림 | `fb()` → **W `fitting.feedback`**(local) = 킬 메트릭 원천 |
| 엔진개선 동의 `#eiConsent` | 체크박스(선택) | **W `fitting.consent`** `{engineImprove,ageAttested,at}` |
| 전문가 전환 | CTA | → `index.html#shop` |
| 재시작 `resetDiag()` | — | `fitting.dx/basic/consent`(session)+`feedback`(local) 삭제 |

- **데이터:** R `fitting.dx`·`fitting.basic`·`fitting.consent` / W `fitting.consent`·`fitting.feedback` / fetch `bodytypes.json`
- **상태(신뢰도 3단계):** 0벌=낮음(주의 배너)·회귀 추정 / 1벌=보통 / 2~3벌=정확 · 데이터 없음→`renderNoData()` · 로드실패→`renderLoadError()` · 8유형 상세는 상·하의 완료(cardReady) 시에만
- **이탈:** `index.html#shop`(전문가) · `index.html`(저장) · card(iframe) · diag-fit(재진단)

#### 2-7 · 결과 공유 카드 (`card.html`) ◐ 🔒

- **목적:** OG 공유 카드(PNG 저장 + 친구 초대 링크). result 안에 iframe으로도 임베드.
- **데이터:** URL `type/g/compact`만 · fetch `bodytypes.json` · **저장 안 함**

### 탭3 · 👔 쇼퍼찾기 (`index.html#shop`) ★(페이크도어) 🔍

> **api(배포) = 웨이트리스트로 통일:** 아래 목록·상세·요청·입찰(proto 데모)은 api 모드에서 미노출. 진입 시 "스타일리스트 매칭, 곧 만나요 · **이메일 입력→오픈 알림 신청**"만 → `saveLead({kind:'notify', contact})`→`lead`. 로그인 불필요. 진단→수요 전환은 `session_id` 조인(admin 3.C.3).

- **목적:** 쇼퍼 목록 탐색(검색·정렬·필터) → 상세 → 견적 요청. **실매칭은 v2**, MVP는 수요 신호만 수집.
- **서브뷰:** `#listView` · `#detailView` · `#requestView` · `#bidsOverlay` (`showOnly` 토글)

```
[목록] 서비스탭 온라인/동행/이미지 · 상황▾ 예산▾ 스타일▾ · 검색 · 정렬
 → 쇼퍼 카드 그리드 #grid (EX 7명: match/rating/tags/services)
[상세] 히어로 · 제공서비스 · 후기 · 포트폴리오 · [요청하기]
[요청] 서비스·상황(max2)·예산·일정·스타일(max3)·첨부 → [견적 요청]
```

| 목록 필터 | `curSvc/curOcc/curBudget/curStyles/query` → `render()` | EX 배열(하드코딩) |

| 오픈알림 `notifySignup` | 미출시 서비스 수요 | `{kind:'notify',svc,status:'대기'}` |

## 3. 운영 어드민 — MVP 실배선 ★ 🔒

> **Google OAuth 로그인**([admin-login](../web/admin-login.html), Supabase Auth + `is_admin`=admin_user 멤버십) 뒤에서 도는 **실배선**. 데이터는 **Supabase(RLS admin 전용)**. 로그아웃은 Supabase 세션까지 종료. 전 화면 검색 차단(robots + `X-Robots-Tag`).
>
> **MVP 메뉴 = 4개**: `사이즈·데이터` · `진단·정확도` · `엔진 강화` · `전문가 수요`. **v2(3.B 회원·거래 / 3.C.1 사업현황 / 3.D B2B API / 3.E 내부운영)는 `admin-common.js`가 네비 숨김 + `gen-app` 미배포** — 화면은 구현돼 있으나 MVP 밖. 측정 2축(진단 정확도=킬메트릭 / 매칭 수요)을 보고 엔진 데이터를 직접 관리한다.

**공통 셸:** 상단 `.anav`(MVP 4메뉴 — admin-common.js가 v2 숨김·진단정확도/엔진강화/전문가수요 주입) · `admin-common.js`(세션 가드 `fitting.admin` + 네비 스코프 + 로그아웃) · `admin-auth.js`(Supabase 읽기/쓰기 헬퍼) · 표=`table.dt` · KPI=`.kpi`.

### 3.A 사이즈·데이터 — 해자의 실행 도구 · **DB 실배선** (MVP)

| 화면 | 목적 | 주요 섹션 | 데이터 소스 |
|---|---|---|---|
| **admin** (3.A) | 데이터 콘솔 | 탭① 브랜드 실측 커버리지·필터(**진단 노출 순서 정렬·뱃지**) · 탭② 신체 사이즈(회귀 r²/RMSE·분포) | **`garment` 테이블(DB·RLS)** · body-*.json(공개기준 유지) |
| **admin-garments** (3.A.1) | 실측표 **CRUD** | 제품별 사이즈×부위 cm — **인라인 편집·행 추가/삭제·저장**(현재 뷰 insert→기존 id 삭제 교체). 변경 시 `rev`↑ → **진단 즉시 반영** | `garment` 테이블(`ADMINAUTH.garmentRows/insertGarment/deleteGarment`) |
| **admin-collect** (3.A.1) | 이미지→CSV 수집 | 붙여넣기/드롭 → 수동전사·OCR(베타)·AI 브릿지·CSV | 산출 CSV → build-sizespec.py → import(대량 시드) |
| **admin-engine** (3.A.3) | 엔진 시뮬·튜닝 | 몸→사이즈 파이프라인 분해·목표여유 what-if·파라미터 | BodyModel·FitEngine + `garment` 테이블(로컬 폴백 garments.json) |
| **admin-brands** (3.A.1) | 브랜드 관리·**노출순서** | 커버리지·앵커·갭 + **진단 노출 순서 편집**(순서 숫자·노출 토글 저장) | `garment`+`brand` 테이블(`ADMINAUTH.brandOrder/saveBrand`) |

- **진단 런타임 소스 전환:** `/api/diagnose`가 번들 garments.json 대신 **`garment` 테이블에서 실측표 로드**(`getSpecs` — `garment_meta.rev` 캐시로 편집 즉시 반영·성능 유지, 실패 시 파일 폴백). garments.json은 클라 미노출(해자). [db/03·05 · D-16/17]

### 3.C.2 진단·정확도(킬메트릭) — `admin-diagnostics` ★ MVP

- **정확도×신뢰도 캘리브레이션 히트맵**(high-confidence 틀림=튜닝 1순위) · 8유형/앵커브랜드/페인 분해 · 응답 로그 · **정확도 추세**(날짜별·엔진버전별 맞음율 → 엔진이 강해지는지 확인).
- **소스:** 실 DB(Supabase `feedback`+`diagnosis` 임베드·RLS admin) ↔ 로컬 `fitting.feedback` ↔ 샘플 토글. 킬 메트릭(맞음율 ≥65%) 실측.

### 3.C.3 전문가 수요(페이크도어) — `admin-leads` ★ MVP

- 스타일리스트 매칭 수요(웨이트리스트 오픈알림 이메일·견적요청) 집계. KPI(총 수요·오픈알림·견적요청·**이메일 확보**) · **진단→수요 전환**(`lead.session_id`↔`diagnosis.session_id` 조인) · 서비스·상황별 · 수요 목록(이메일·유입 진단후/직접).
- **소스:** `lead` 테이블(db/02·RLS admin). 페이크도어 측정축.

### 3.C.4 엔진 강화(성장구조) — `admin-improve` ★ MVP

- 진단 로그(`diagnosis.input` painFlags·openNote + `feedback`)를 **개선 작업목록**으로(docs/6 §1.1·자동학습 아님·사람 액션 우선순위): ① **미표기∩페인**(브랜드×병목부위 끼임)→A축 역산 실측보정 ② **새 페인**(자유서술)→PAIN_FLAGS 승격 ③ **확신 틀림**→규칙 튜닝 ④ **수요 대비 데이터 부족**→수집. 각 행이 실측표·수집으로 연결.
- **소스:** `ADMINAUTH.diagnoses/feedbackJoin/garments`(RLS admin).

### (v2 · MVP 미노출) 3.B 회원·거래 / 3.C.1 사업현황 / 3.D B2B API / 3.E 내부운영

- 화면은 프로토타입으로 구현돼 있으나 **네비 숨김 + gen-app 미배포**. 3.B(회원·심사·매칭모니터·분쟁/환불·정산·리뷰·CS) · 3.C.1(운영 대시보드·GMV) · 3.D(B2B API·기술지원·v3) · 3.E(RBAC·감사·플래그). 승격 시 노출.

파생 카테고리 엔진(아우터·치마·원피스) => 실측 데이터 확보 후. 현재 상의·하의(TOP/BOTTOM)
8유형 캐릭터·핏 서술(LLM) => 자리만, 규칙 기반 예시. 자동 학습 루프·A축 검열추정은 "규모 후"
```

> 상세 배선 순서는 [마일스톤1-측정가능MVP.md](마일스톤1-측정가능MVP.md), 데이터 계약은 §0 저장소 키 표 + [의사결정기록.md](의사결정기록.md) D-16/17.

# 핏팅 — 정책 · 데이터 정의서

> **이 문서는 무엇?** 동의·가입·시점 관리 같은 **정책**과, 서비스가 저장하는 **데이터 모델**을 정의합니다. 엔진이 다루는 스키마(A축·B축)는 [6_사이즈엔진.md](6_사이즈엔진.md), 매칭 도메인 데이터는 [7_전문가매칭.md](7_전문가매칭.md) §9. 용어는 [0_용어집.md](0_용어집.md).

## 1. 동의 · 수집 정책

> **한 줄 원칙:** 진단은 동의 없이, 엔진 개선만 동의(opt-in). 게이트로 막지 않는다.

| 항목 | 정책 | 근거 |
|---|---|---|
| **진단 이용** | **동의 게이트 없이 시작.** 진단(체형·사이즈 계산)은 서비스 제공에 필요한 최소 처리라 별도 동의 없이 제공. | 구 G.5 필수 진입 게이트 **폐기** ([의사결정기록.md](의사결정기록.md)) |
| **엔진 개선 활용** | 진단 데이터를 **엔진 학습·개선에 쓰는 것만** 결과화면(2-5)에서 **opt-in**으로 받음. 선택 안 해도 진단·결과는 그대로 이용 가능. | 서비스 제공 근거와 개선 목적을 분리 |
| **만 14세 확인** | 별도 게이트가 아니라 **엔진 개선 opt-in에 접목**해 확인. | 게이트 최소화 |
| **비회원 수집** | 비회원도 진단 제공에 **필요한 최소**를 수집(성별·키·몸무게·착용경험 등). 비로그인이 곧 익명은 아님. | 표본 극대화 |
| **민감정보 고지** | 체형·신체치수는 민감정보임을 개인정보 처리방침(G.4)에 명시. | 한국 서비스 법적 필수 |

> ⚠️ 결제·정산·법적 문구는 실제 정책/법률 검토가 선결. 위는 프로토타입 기준 설계.

## 2. 가입 시점 정책 (lazy registration)

본선(핵심 흐름)은 **비회원 그대로** 끝까지 갑니다. 가입은 아래 두 지점에서만 요청합니다.

| 가입 지점 | 트리거 | 비회원은 | 가입하면 |
|---|---|---|---|
| **① 결과 저장** (2-4) | "결과 저장하기" | 임시 링크로 잠깐 보관(만료) | 계정에 **영구 보관** |
| **② 전문가 매칭 실제 이용** (3-1) | "요청/알림신청" | 구경·유형 선택까지 | **가입 관문** 통과 후 진행 |

- 소셜(카카오·네이버·구글) + 이메일. 가입 시 약관·만14세 동의.
- 화면 흐름상 위치는 [3_사용자플로우.md](3_사용자플로우.md) §3-2.

## 3. 시점 버저닝 (재진단·체형 변화)

> **왜 필요한가요?** 사람 몸은 변합니다(체중 등). 재진단할 때 과거 기록을 덮어쓰면 "예전 결과"와 "정확도 학습용 데이터"가 사라집니다.

- 진단은 **덮어쓰지 않고 계속 쌓습니다**(append-only). 체형은 "언제 기준"인지 날짜를 붙여 버전으로 둡니다.
- 그래서 ① 과거 결과 보존 ② 정확도 학습 데이터 무오염 ③ 체형 변화 추이를 자산으로 축적 — 세 가지를 동시에 얻습니다.
- 결과 화면에 "어느 시점(몸무게·날짜) 기준"인지 표시하고, 체중이 바뀌면 "새로 진단(과거는 보존)" 경로를 엽니다. 옷장(카테고리) 재사용은 체형이 같을 때만 유효.
- 엔진 쪽 시점 처리는 [6_사이즈엔진.md](6_사이즈엔진.md) §3-[8].

## 4. 데이터 모델 (진단 코어)

> **왜 처음부터 깔끔히?** 여기 쌓이는 데이터가 곧 "브랜드 교차 사이즈 데이터셋"이고, 이것이 나중에 회사의 가장 큰 자산(B2B API, 어드민 D)이 됩니다.

```
user                누구 · 성별 · 나이 · 키 · 몸무게 · 선호핏(옷 종류별)

garment_experience  누구 · 브랜드 · 옷종류 · 입은사이즈 ·

                          : 큼|여유|딱맞음|끼임 }           ← 핏팅만의 핵심 데이터

result_card         누구 · 체형(8유형 코드, 아직 미확정일 수 있음) ·

validation          누구 · 브랜드 · 판정(맞음|애매|틀림) ·

fakedoor_event      누구 · 관심서비스 · 누른시각 ·

- `result_card`의 체형은 상의+하의를 다 하면 8유형으로 확정, 상의만 하면 미확정(상체 부분).
- `garment_experience`는 §3대로 덮어쓰지 않고 시점별로 쌓입니다.

# 핏팅 — 엔진 명세서 (기술 스펙 · 정본)

> **무엇인가:** 사용자가 "평소 입던 옷이 어땠는지"를 답하면 → 그 사람의 체형을 거꾸로 계산하고 → 다른 브랜드에서 맞을 사이즈를 추천하고 → 주의할 점을 경고하는, **사이즈 번역 엔진**의 모든 규칙·데이터·약속을 담은 **하나의 정본 명세**.
> **읽는 사람:** 개발·통계를 몰라도 이해할 수 있게 썼다. 용어는 [0_용어집.md](0_용어집.md)에도 정리돼 있다.
> **한 문장 원칙:** 이 서비스의 심장은 사이즈 번역 엔진이고, 그 정확도가 검증 안 되면 나머지는 전부 무의미하다.
> **코드와의 관계(중요):** 이 문서가 **규칙 명세의 정본**이고, 유일 구현은 **`web/js/engine.js`**(브라우저·node 공용), 데이터 계약 타입은 **`engine/schema/*.ts`**(참조용), 회귀 안전망은 **`engine/test.js`**(`npm test`)다. 규칙을 바꾸면 engine.js와 이 문서를 함께 고친다.
> **연결:** 화면은 [4_화면정의.md](4_화면정의.md), 흐름은 [3_사용자플로우.md](3_사용자플로우.md), 디자인은 [8_디자인가이드.md](8_디자인가이드.md).

---

## 0. 원칙 (모든 판단의 뿌리)

> **왜 필요한가:** 엔진을 만들다 보면 "이건 AI한테 시킬까? 사람이 정할까? 상의만 받아도 될까?" 같은 갈림길이 계속 나온다. 아래 6개는 그때마다 흔들리지 않기 위한 고정 규칙이다.

1. **숫자는 규칙으로, 말은 AI로.** 추천 사이즈·여유 계산 같은 **숫자는 정해진 규칙(정해진 공식으로 계산해 언제나 같은 답이 나오는 방식)** 으로 낸다. 검증할 수 있어야 하기 때문이다. 반대로 "당신은 어깨가 넓은 편이에요" 같은 **자연스러운 문장 설명만 AI(Claude)** 가 쓴다. 추천 숫자를 AI에 맡기지 않는다 — 맞았는지 확인할 방법이 없어서다.
2. **진단은 옷 종류(카테고리) 하나씩.** 상의로 알아낸 정보로 상의 사이즈를, 하의로 알아낸 정보로 하의 사이즈를 낸다. 상의 답으로 하의를 추측하지 않는다. 몸의 부위가 다르기 때문이다(상의=어깨·가슴, 하의=허리·엉덩이).
3. **상의+하의 둘 다 있어야 체형이 완성된다.** 상의 하나만으론 상체만 아는 "반쪽 체형". 둘 다 채워야 상체+하체가 잠기고, 그때 파생 종류(아우터·원피스·치마)가 열린다. 파생은 실제 착용으로 체형을 다시 알아내지 않고, 선호하는 핏·레이어링 여유만 묻는다.
4. **진단 결과는 그때그때의 스냅샷으로 남긴다(덮어쓰지 않음).** 체중이 바뀌어 다시 진단하면, 예전 결과를 고치지 말고 **날짜를 붙인 새 결과를 하나 더 추가**한다. 과거 기록을 살려야 "이 추천이 맞았나"라는 성적표(뒤의 킬 메트릭)가 오염되지 않는다.
5. **배움은 양쪽으로.** 사용자의 착용경험은 그 사람의 체형만 알려주는 게 아니라, **그 브랜드 옷이 실제로 어떻게 나오는지**도 알려준다. 그래서 데이터를 한 방향으로만 고정하지 않는다.
6. **소재는 묻지 않고 알려준다.** 비침·무게·수축·신축은 옷 자체의 속성이라, 사용자에게 묻지 않고 브랜드 데이터에서 찾아 **결과 화면에서 경고**만 한다. 사용자에겐 "몸으로 느낀 것"만 묻는다.

**★ 킬 메트릭(성패를 가르는 단 하나의 성적표):** 사용자가 **이미 잘 아는 브랜드**로 추천을 돌렸을 때 "실제로 내가 입는 사이즈랑 맞네" 하고 동의하는 비율이 **65% 이상**이어야 한다(옷 종류별로 측정, MVP는 상의 기준). 이 숫자가 모든 우선순위와 튜닝의 기준이다. 미달이면 엔진을 다시 설계하거나 멈춘다.

---

## 1. 데이터 모델 / 스키마 (엔진이 다루는 정보의 형태)

> **왜 필요한가:** 엔진은 결국 두 종류의 정보를 맞대 본다 — ①브랜드 옷의 실제 치수, ②사용자가 입어보고 느낀 것. 이 정보들을 **어떤 칸에 어떻게 담을지**를 처음에 정확히 정해두지 않으면 나중에 못 고친다. 여기서 그 "칸의 모양"(스키마)을 정의한다.

두 개의 축을 기억하면 된다:
- **A축 = 브랜드가 파는 옷의 실제 치수** (물건 쪽. 예: "이 셔츠 M은 가슴 단면 52cm")
- **B축 = 착용경험으로 거꾸로 알아낸 사용자 신체 치수** (몸 쪽. 예: "이 사람 가슴둘레는 약 96cm")

이 둘의 차이가 엔진의 핵심 개념인 **여유(ease)** = 옷이 몸보다 얼마나 큰가(단위 cm). 데이터 계약 타입은 `engine/schema/*.ts`(참조용), 규칙 구현은 `web/js/engine.js`에 있다.

### 1.1 카테고리와 부위 (category.ts) — 옷 종류가 모든 것의 1급 기준

> 옷 종류마다 신경 쓰는 몸 부위가 다르다. 그래서 "옷 종류(카테고리)"를 가장 위의 기준 축으로 둔다.

- 옷 종류는 5가지: 상의·하의·아우터·원피스·치마. 다 표현하되 **실제 작동은 상의부터** 시작한다.
- 부위마다 **재는 방식(Comparison)** 이 다르고, 이게 계산법을 가른다:

| 재는 방식 | 뜻 | 계산 |
|---|---|---|
| 둘레(circumference) | 가슴·허리처럼 빙 두르는 치수 | 브랜드 표는 보통 '단면'(반으로 접어 한쪽만 잰 값)으로 적으니 **×2 해서 둘레로** 만든 뒤 몸 둘레와 비교 |
| 너비(width) | 어깨처럼 평평한 가로 폭 | ×2 안 함. 옷 폭과 몸 폭을 그대로 비교 |
| 길이(length) | 소매·총장·기장 | 끼임식 여유는 없지만 **총장·기장·밑위는 몸 세로 치수 기준으로 소프트 판정**한다(§3-[2] 세로축). 취향은 보조 신호. 소매는 아직 기장감(취향)만 |

- 각 부위는 **어떤 몸 치수와 맞댈지**(BodyDimension: 어깨너비·가슴둘레·허리둘레·엉덩이둘레·허벅지둘레·팔길이·키·밑위기준)를 지정한다.
- **부위 집합:** 상의 = 어깨·가슴·배·소매·총장 / 하의 = 허리·엉덩이·허벅지·밑위·기장. 파생 3종은 자리만 잡아둠(작동은 나중).
- 부위를 쓰임새로 3분류한다:
  - **역산 대상 부위(accuracyParts):** 둘레·너비 부위. 여기서 체형을 거꾸로 알아낸다.
  - **기장 선호 부위(lengthParts):** 길이 부위. 체형이 아니라 취향·키의 문제라 역산에서 뺀다.
  - **병목 플래그 부위(PAIN_FLAGS):** 브랜드가 사이즈표에 잘 안 적지만 실제로 불편을 만드는 부위(상의=팔·목, 하의=종아리). 표에 숫자가 없으니 체형 역산은 못 하고, 대신 "꼈다/안 꼈다" 경험을 모아 **브랜드 치수를 거꾸로 추정**하는 데 쓴다. 사용자들이 자유서술에서 반복해서 말하는 새 페인은 이 목록으로 승격된다(엔진이 스스로 커짐).

### 1.2 브랜드 실측 (sizespec.ts) — A축 데이터

> 엔진의 "연료". 브랜드 옷이 실제 몇 cm인지를 담는다.

한 칸 = `{ 브랜드, 카테고리, 핏라인, 사이즈, 부위별 치수, 출처메타 }`.
- **핏라인(FitLine):** 옷의 여유 스타일. skinny(꽉)·slim·regular·loose·oversize(헐렁) 5단계. 핏라인의 정체가 곧 "이 옷이 의도한 여유량"이다.
- **부위별 치수(garmentCm):** 브랜드 표에 적힌 **원본 그대로** 저장한다(단면이면 단면 값 그대로). ×2 환산·여유 계산은 필요할 때 규칙 코드가 하지, 미리 가공해 박아두지 않는다.
- **출처메타(Provenance, "이 숫자 어디서 언제 어떻게 가져왔나"):** 출처 URL · 수집 날짜 · 방식(수기/HTML/OCR) · 신뢰도(0~1)를 함께 붙인다. 브랜드는 시즌마다 실측을 바꾸므로, 날짜가 없으면 낡은 값으로 잘못 추천하게 된다. 판매량은 비공개라 리뷰 수·인기순 같은 **대리지표**로 대신하고 "이건 대리지표"라고 표시한다(isProxy).

### 1.3 착용경험 (wearexperience.ts) — B축 입력, 4개 층

> 사용자가 입어보고 답한 것. 이걸 재료로 체형을 거꾸로 계산한다. 답을 성격별 4개 층으로 나눠 담는다(섞으면 계산이 꼬임).

앞부분(브랜드·핏라인·사이즈)은 "어떤 옷인지" 특정하는 열쇠고, 답변은 4층:

| 층 | 담는 것 | 쓰임 |
|---|---|---|
| ① 착용감(fits) | 부위별 "꽉/딱/여유/큼" | 체형 역산의 핵심 신호 |
| ② 병목 플래그(painFlags) | "팔 꼈다/괜찮다" 같은 걸림 | 체형 역산엔 안 씀. 브랜드 치수 거꾸로 추정에만 씀 |
| ③ 기장 선호(lengthPrefs) | "짧음/딱/긺" | 취향·키 → 추천 보조에만 |
| ④ 자유서술(openNote) | 예상 못 한 불편 한 줄 | 반복되면 ②로 승격 |

- **소매·다리 길이 구분(facet):** 긴팔/반팔/민소매, 긴바지/반바지. **긴팔·긴바지를 기본 권장** — 신호가 가장 많고, 팔 경험을 항상 같은 부위(이두)에서 받아 브랜드 비교가 뒤섞이지 않는다. 이 값은 질문을 켜고 끄는 데 쓰고, 체형 역산 자체엔 영향 없다.
- 시점·체중은 옷 한 벌마다가 아니라 **진단 전체(스냅샷)에 한 번** 붙인다(최근 입은 옷으로 유도하므로).
- **설문 자동 생성:** `buildCategorySurvey`(카테고리를 주면 그에 맞는 질문 묶음을 만들어 주는 함수)가 층별 질문 그룹을 만든다. 부위를 코드에 일일이 박지 않고 카테고리에서 자동으로 뽑는다. 민소매면 팔 질문, 반바지면 종아리 질문, 반팔이면 소매기장 질문을 자동으로 뺀다. 화면은 이 결과를 그대로 그리기만 한다.

### 1.4 응답 어휘 (fitrating.ts) — 설문과 엔진이 같은 단어를 쓰게

> 사용자가 고른 보기와 엔진이 계산에 쓰는 값이 어긋나면 안 된다. 그래서 어휘를 한 곳에 정의한다.

- ① 착용감 4단계: 끼임 / 딱맞음 / 여유 / 큼.
- ② 병목 판정 2단계: 꼈어요 / 괜찮았어요. — **"괜찮았어요"(문제없음)도 꼭 받는다.** 불평만 모으면 "어디까지가 괜찮은 선인지"를 못 찾기 때문이다.
- ③ 기장 선호 3단계: 짧음 / 딱 좋음 / 긺. 취향이라 역산엔 안 넣는다.

### 1.5 핏라인지도 · 브랜드순위 · 앵커브랜드 (보조 데이터)

- **핏라인지도(fitlinemap):** 브랜드가 쓰는 원본 핏 이름("오버사이즈", "511 Slim")을 우리 표준 5단계로 잇는 사전. ⚠️ **이름과 실제 여유는 다르다** — 폴로 'Classic Fit'은 이름과 달리 그 브랜드에서 제일 넉넉하다. 그래서 사람이 검수한 신뢰도를 함께 붙인다. 치마·원피스는 핏라인이 아니라 실루엣(A라인 등)이 1차 정보다.
- **브랜드순위(brandranking):** 판매량 대신 쓰는 대리지표(리뷰·인기순) 순위. 어떤 상품부터 수집할지 우선순위에만 쓰고, 추천 숫자의 근거로는 쓰지 않는다.
- **앵커브랜드(anchorbrands):** 착용경험을 **물어볼 때** 기준으로 삼는 대표 브랜드 7종. 뽑는 최우선 기준은 **오프라인 매장에서 입어보기 쉬운가**(실측 없이도 경험을 만들 수 있는 가장 넓은 입구라서). 이건 **입력용 기준 목록**이지, 추천 결과로 내놓는 브랜드 목록이 아니다(혼동 금지).

### 1.6 인체 데이터 시드 (사이즈코리아 8차) — 0벌 출발점 + 체형 라벨

> **왜 필요한가:** 착용경험이 **한 벌도 없을 때도** 출발점이 있어야 한다. "성별·키·몸무게·나이"만으로 몸 치수를 대충 깔아두고, 착용경험이 들어오면 그 위를 덮어써 좁힌다. 이 출발점을 **국가 인체치수 데이터(사이즈코리아 제8차, 2020~24)** 를 정규화해 만든다. (원천 clean CSV는 `data/body/clean/`, 정규화 산출물 JSON은 `web/data/`. 단위 cm/kg 통일·결측 제거. **출처표기 의무** — 국가기술표준원 사이즈코리아.)

세 개의 시드 파일이 있다:

**① 기초신체 추정기 (body-base-model) — 0벌 디폴트**
성별별 **회귀식**으로 몸을 추정한다:
```
부위 cm = a·키(cm) + b·몸무게(kg) + c·나이 + 기본값(intercept)
```
- 11부위: 젖가슴·윗가슴·허리·엉덩이·**허벅지** **둘레**, **어깨너비**, **팔길이**, **위팔둘레**(둘레·너비 8종) + **세로축 3종**(총장·기장·밑위 판정의 몸쪽 기준):
  - **허벅지둘레**(넙다리둘레) — 엔진이 하의 판정 부위로 쓰는데 회귀가 없어 0벌 사용자에게 빠지던 구멍을 메움. r² 0.81(남)·0.72(여).
  - **등길이**(뒷목~허리) — 상의 총장 기준. r² 낮음(≈0.28, ±2cm).
  - **다리가쪽길이**(허리옆~바닥) — 하의 기장(총장/outseam) 기준. r² 높음(≈0.85, ±1.8cm) — 다리길이는 키로 잘 예측됨.
  - **몸밑위**(허리높이−샅높이, 파생) — 하의 밑위 기준. r² 낮음(≈0.27, ±1.7cm).
- 세로축 r²이 낮은 부위(등길이·몸밑위)는 밴드가 넓어 대개 괜찮지만 경계에선 '아슬'로 표시하고, 밑위는 아예 등급 점수화하지 않는다(아래 §3-[2]).
- 각 부위에 **정확도 지표**(r²·오차 rmse·표본수 n)를 붙여 "이 추정이 얼마나 믿을 만한지"를 안다.
- 경향: **둘레는 몸무게가 좌우**(r²≈0.8로 잘 맞음) · **어깨는 키가 좌우**(r²≈0.4로 느슨) · **나이는 특히 허리**에 유효(10년당 +1.7cm).
- 이게 **0벌 기본값**(부위당 ±2~3.5cm). 착용경험 역산(§3-[2])이 그 위를 덮어써 **±2cm로 좁히는 게 목표**.

**② 분포 (body-distribution) — 신뢰도·위치 표시**
성별×부위의 평균·표준편차·백분위(p5·p50·p95). 추정치가 **모집단 어디쯤인지(P##)** 를 알려줘 신뢰도 배너·스펙트럼 막대의 위치 표기에 쓴다.

**③ 체형 라벨 (archetypes) — 숫자를 캐릭터로**
표준체형 38 + 비만체형 32 = **70종**의 실측 부위벡터(비만 32종엔 설명문 — AI 캐릭터 서술의 근거). **역산이 끝난 뒤** 사용자의 부위벡터를 가장 가까운 아키타입으로 **스냅**해 결정론적 체형 라벨을 붙인다.
- ⚠️ **8유형 카드(`web/data/bodytypes.json`)와는 다른 층이다** — 저건 스타일링 표현용 캐릭터 8종, 이건 역산 결과를 맞대볼 실측 라벨 70종.
- ⚠️ **0벌 단계 분류엔 못 쓴다**(체형이 키·몸무게만으론 안 갈린다). 반드시 역산 뒤에.
- ⚠️ 체형명("역삼각/삼각")은 어깨↔엉덩이 실루엣이 아니라 **드롭·부피·신장체중 비례** 분류다 → 이름을 곧이곧대로 실루엣에 매핑 금지(어깨/엉덩이 비율은 38종 전부 0.37~0.43로 거의 일정).

## 2. 입력 스펙 — 무엇을 어떻게 묻나

> **왜 필요한가:** 좋은 역산은 좋은 질문에서 나온다. 자유서술을 받으면 계산할 수 없으니, 전부 **보기에서 고르는 형태**로 받고, 몸을 위에서 아래로 훑으며 묻는다. 질문이 많아 보이지 않게 티어(단계)로 나눈다.

**3티어:** T1=모두 답(필수) · T2=신경 쓰인 부위만 더 답(정확도) · T3=원하면 더(심화, "답하면 정확도 +N%").

- **Step 0 — 옷 종류 선택:** 여기서 고른 카테고리가 이후 질문·부위·추천을 전부 좁힌다.
- **Step 1 — 기준옷 특정 + 기본값:** 브랜드(앵커 7종) · 핏라인 · 하위타입(긴팔/반팔/민소매, 긴바지/반바지/크롭) · 사이즈 · 전체 느낌(작음/딱/큼) · 키(기장·이상치 판단 전용, 둘레 판단엔 안 씀) · 체중(선택, 재진단 판단용) · 착용시점(자동, 안 물음).
- **Step 2 — 위→아래 몸 스캔:**
  - **상의:** 목 → **어깨(필수)** → **팔·겨드랑이(필수)** → (낀 곳이면) 팔뚝/겨드랑이 → 소매길이(긴팔만) → 가슴 → 앞뒤품 → 배 → 밑단.
  - **하의:** **허리↔엉덩이(필수)** → 앞주머니 벌어짐 → 뒤밑위(앉을 때 파임) → 앞밑위 → 허벅지 → 밑단(긴바지만).
  - 하위타입에 안 맞는 질문은 자동으로 건너뛴다(반팔이면 소매길이 skip). 덤으로 브랜드 실측 해석도 정확해진다(반팔 소매 스펙 ≠ 긴팔).
- **Step 3 — 선호핏:** 원하는 전체 핏(타이트/정핏/루즈/오버) · 원하는 기장.
- **Step 4 — 결과:** 부위별 번역(추천 사이즈+예상 핏) · 옷속성 경고 · **"맞았나?" 피드백**(킬 메트릭 수집). 질문이 많아 보이지 않도록: "전체 편했어요" 한 번으로 통과하는 지름길, 원탭 보기, 답할 때마다 작은 인사이트 보상, 앵커 재사용으로 반복 제거(불편 없던 사용자는 4번 탭이면 끝).

## 3. 역산·추천·경고 규칙 (엔진의 두뇌)

> **왜 필요한가:** 여기가 엔진의 심장이다. "이 옷이 이렇게 느껴졌다"는 신호를 → 체형 숫자로 바꾸고 → 다른 옷 사이즈로 번역하고 → 위험을 경고하기까지의 **정해진 계산 절차**다. 전부 규칙(정해진 공식), 자연어 한 줄만 AI다.

전체 흐름을 말로 풀면: **①안 맞는 질문 걸러내기 → ②부위마다 신체 추정 → ③체형 카드 조립 → ④충돌 부위 정리(병목) → ⑤목표 옷에 맞는 사이즈 찾기 → ⑦옷 속성 경고**, 옆에서 **⑥브랜드 치수 보정 · ⑧시점 관리**가 돕는다.

**모든 계산의 기본 공식(말로):** 여유 = 옷 치수 − 몸 치수. 뒤집으면, 옷 치수를 알고 "얼마나 여유 있었는지"를 경험으로 알면 → **몸 치수 = 옷 치수 − 경험한 여유**로 몸을 거꾸로 알아낼 수 있다. 이게 **역산(逆算, 결과에서 원인을 거꾸로 계산하기)** 이다.

### [1] 하위타입 걸러내기 (subtype 게이팅, "안 맞는 질문은 계산에서 뺀다")
성립 안 하는 신호는 역산에서 빼고, 대신 **§1.6 기초 추정기(성별·키·몸무게·나이 → 부위 cm)로 채운다**(prior). 착용경험이 0벌이면 이 prior만으로 카드를 만들고 신뢰도를 "낮음"으로 표시한다.

| 하위타입 | 무시할 신호 | 대체 |
|---|---|---|
| 반팔 | 소매길이 | 팔길이 ← 키로 추정 |
| 민소매 | 소매길이·팔뚝 걸림 | 겨드랑이(암홀)만 유효 |
| 반바지 | 밑단 상태 | 기장 ← 키로 추정 |

### [2] 부위별 역산 규칙 (신호 → 신체 추정)

> **δ(델타)는 "한 칸 조정폭"이다.** 예를 들어 "가슴이 꼈다"면 그 사람 가슴이 옷보다 δ만큼 크다고 본다. δ의 정확한 값은 초기엔 모르니, 실제 데이터로 맞춰가는 **튜닝 값**이다.

말로 읽는 예: "어깨 봉제선이 어깨 끝을 넘어갔다"= 옷 어깨가 내 어깨보다 크다 → 내 어깨너비 = 옷 어깨 − δ. "겨드랑이가 자주 꼈다"= 필요한 겨드랑이 공간이 실제보다 크다(자주=2칸, 가끔=1칸).

| 신호 | 규칙(말풀이) | 알아내는 값 |
|---|---|---|
| 전체 느낌 | 작았으면 몸 +δ, 컸으면 −δ | 전역 기준선 |
| 어깨 봉제선 | 넘어감→내 어깨 = 옷−δ / 안쪽→+δ / 딱→같음 | 어깨너비 |
| 겨드랑이 걸림 | 가끔=1·자주=2 → 필요 공간 = 옷+계수k×정도 | 겨드랑이(암홀) 요구치 |
| 가슴 | 꼈으면 가슴 = 옷+δ, 남으면 −δ | 가슴둘레 |
| 배 | 같은 방식 | 배둘레 |
| 소매길이(긴팔) | 짧았으면 팔 김(+δ), 길었으면 −δ | 팔길이 |
| 앞뒤품 당김 | 당겼으면 품 부족 표시 | 앞뒤품 |
| 허리↔엉덩이 | 엉덩이 꼈으면 엉덩이가 표준보다 큼 / 허리 남으면 낙차 큼(반대) | 허리-엉덩이 낙차 |
| 앞주머니 벌어짐 | 벌어졌으면 하이힙 볼륨 큼 | 앞판 여유 요구 |
| 밑위(앉을 때 파임/처짐) | 파임·처짐→밑위 요구 큼 | 앞·뒤밑위 |
| 허벅지 | 꼈으면 +δ, 남으면 −δ | 허벅지둘레 |
| 밑단(긴바지) | 끌리면 기장 김, 짧으면 짧음 | 총장 보정 |

**가슴과 배 조합으로 체형 유형 읽기(말로):** 가슴은 맞는데 배만 꼈으면 → 중동(윗배) 볼륨형. 가슴만 꼈으면 → 상체 발달형. 둘 다 남으면 → 마른형/루즈 선호. 둘 다 맞으면 → 표준.

**"꽉/딱/여유/큼"을 cm로 바꾸는 표 (EASE_BANDS, "느낌↔센티 환산표"):**
사용자는 cm를 모르니 "딱맞음" 같은 말로 답한다. 이 표는 그 말을 **여유 cm 구간**으로 바꿔준다. 예를 들어 상의 가슴은 여유 2cm 이하면 "끼임", 8cm까지 "딱맞음", 16cm까지 "여유", 그 이상은 "큼"으로 본다. 반대로 사용자가 "딱맞음"이라 답하면 "여유가 2~8cm였구나"로 되짚어 몸을 계산한다.
- **부위마다 폭이 다른 이유:** 둘레 부위(가슴·배)는 몸을 빙 둘러서 숫자가 커 폭이 넓고, 어깨(너비)는 절반 스케일이라 폭이 좁다. 그래서 표의 키가 `(옷종류:부위)`다.
- ⚠️ **이 숫자들은 전부 초기 짐작값이다.** 사용자 피드백이 쌓이면 고친다(킬 메트릭이 판정관). 길이 부위는 여유 개념이 없어 이 표에서 뺀다.
- 현재 짐작값(참고): 상의 가슴 2/8/16 · 배 0/8/18 · 어깨 0/1.5/4 / 하의 허리 0/4/10 · 엉덩이 0/6/14 · 허벅지 0/5/12 (하의는 아직 검증 안 된 임시값).

**세로축(총장·기장·밑위) 판정 — 신설:** 둘레와 성격이 다르다. 끼임/딱맞음 대신 길이감으로 보고, **핏 점수(judgeScore)엔 넣지 않고** 별도 정보 라인(칩·안내 문장)으로만 보여준다. 경계값은 모두 가설값(garments 실측 분포 보정).

경계는 **아래쪽 열림·위쪽 닫힘**(`e <= 경계`)으로 구현돼 있어 구간이 겹치지 않는다:

- **상의 총장** (`LEN_BANDS.TOP`): 여유 = 옷 총장 − 몸 등길이 = "허리 아래로 내려오는 길이".
  **크롭 `e≤15` · 적절 `15<e≤36` · 롱 `36<e≤44` · 많이 긺 `e>44`**.
- **하의 기장** (`LEN_BANDS.BOTTOM`): 여유 = 옷 총장(outseam) − 다리가쪽길이.
  **짧음 `e≤−14` · 적절 `−14<e≤3` · 긺 `3<e≤9` · 끌림 `e>9`**. (다리길이 prior r² 0.85로 신뢰 높음.)
- **하의 밑위** (`judgeRise`, 소프트만): 여유 = 옷 밑위 − 몸밑위(허리높이−샅높이).
  **로우 `e≤−3` · 미드 `−3<e<5` · 하이 `e≥5`** 표시 + 짧으면 낌 경고(`e≤−6`). 취향 지배적 + 옷 앞밑위(곡선)와 몸 밑위(수직)의 프레임 차 때문에 **절대 등급을 매기지 않는다.**
  몸밑위는 r²가 가장 낮아, 오차구간이 경고선에 걸치면 **'확실히 짧음(short)'이 아니라 '그럴 수 있음(shortMaybe)'** 으로 완화해 말한다.

세로축 추정 오차가 등급 경계를 물면 '아슬'로 표시. 향후 진단의 기장 취향(`lengthPrefs`)과 교차 예정.

### [3] 체형진단 카드 조립 (상·하의 결과를 한 장에)

상의 진단 결과(어깨·가슴·배·겨드랑이 등)와 하의 결과(허리-엉덩이 낙차·허벅지·밑위 등)를 한 카드에 모은다. 카드엔 이런 게 들어간다:
- **효력일자(effective_date):** 이 진단이 언제 것인지. 체중 바뀌면 고치지 말고 **새 날짜로 한 장 더** 만든다.
- **체중 버전(weight_version):** 체중이 바뀔 때마다 올라가는 번호.
- **upper/lower:** 상·하체 부위별 판정과 각 신뢰도.
- **completeness:** 상·하의가 각각 완료됐는지 → 파생 종류를 열지 판단하는 문.
- **체형 라벨:** 역산된 부위벡터를 §1.6 아키타입(70종)에 **스냅**해 결정론적 라벨을 얻는다. `character` 한 줄은 이 라벨(+비만군 설명문)을 **근거로만** AI가 쓴다 — 숫자를 지어내지 않게.
- **character:** "어깨 넓고 하체 볼륨형" 같은 **한 줄 설명. 여기만 AI가 쓴다.** 나머지 숫자는 전부 규칙.
- 상의만 끝났으면 상체 칸만 채우고, 상체 계열 파생(아우터)만 부분적으로 열린다.

### [4] 병목 판정 (충돌하는 부위 정리)

> **왜 필요한가:** 어깨는 딱 맞는데 겨드랑이가 부족한 옷처럼, 부위마다 요구가 엇갈릴 때가 많다. 다 만족시키는 사이즈는 없으니 결정이 필요하다.

**규칙(말로):** 각 부위에서 "필요한 치수 − 그 사이즈의 실제 치수"를 계산해 **가장 크게 모자란 부위(=병목)** 를 찾는다(argmax = 값이 가장 큰 걸 고른다는 뜻). 그 병목 부위를 만족시키는 **가장 작은 사이즈**를 추천하고, 나머지 부위는 "여기는 여유/부족"이라고 경고로 알린다. 이건 사람들이 실제로 쓰는 요령("제일 걸리는 데 맞추고 허리는 벨트로")과 같다.

**단일 상품 판정(judge)에서 지키는 두 가지:**

- **근거 없으면 긍정하지 않는다(`UNKNOWN`).** 핵심 부위(상의 가슴 / 하의 허리) 측정이 없으면 — 표에 치수가 없든 내 몸 값이 없든 — `판정할 수 없어요`로 끝낸다. 예전엔 잰 부위가 하나도 없어도 "잘 맞아요"로 귀결됐다. 단 **끼임·아슬 같은 부정 신호는 측정된 부위만으로도 유효한 경고**라 그대로 낸다. 화면은 `anyJudged=false`(판정 불가)와 `anyFit=false`(어느 사이즈도 안 맞음)를 **다른 문구로** 구분한다.
- **밴딩(신축) 허리는 판정에서도 완화한다.** 추천(`recommendBottom`)만 `waistRating`으로 −4cm까지 봐주고 판정은 뻣뻣한 허리와 같은 기준을 쓰던 불일치를 없앴다. 표 행의 `waistband`(또는 `opts.waistband`)가 있으면 판정도 같은 완화 기준·같은 끼임 경계를 쓴다.

### [5] 목표 옷 추천

사고 싶은 옷 T의 실측을 놓고: 부위별 **목표 = 내 몸 + 원하는 여유**를 잡는다. 겨드랑이 같은 **꼭 지켜야 할 제약**을 만족하는 사이즈만 후보로 남기고, 그중 목표에 가장 가까운 걸(병목 우선) 고른다. 출력은 추천 사이즈 + 부위별 예상 핏 + 경고. **추천은 항상 같은 옷 종류 안에서만** 한다(상의 입력→상의 사이즈).

### [6] 브랜드 치수 거꾸로 보정 (양방향 학습)

> **왜 필요한가:** 브랜드 사이즈표가 틀리거나 빠진 경우가 많다. 사용자 경험으로 그걸 고칠 수 있다.

스펙상 정사이즈인데 "겨드랑이가 자주 꼈다"는 사람이 여럿이면 → 그 브랜드·핏라인의 **표에 없는 부위(겨드랑이·앞뒤품) 치수를 거꾸로 추정해 갱신**한다. 즉 사람 체형(B)만이 아니라 브랜드 실측(A)도 배운다. 이게 쌓이면 §4의 "숨은 치수" 칸이 데이터로 채워지고, 이게 경쟁자가 못 따라오는 **해자(방어벽)** 가 된다.

### [7] 옷속성 경고 (묻지 않고 알려줌)

옷의 속성에서 자동으로 경고를 띄운다:

| 속성 | 경고 조건 | 문구 예 |
|---|---|---|
| 비침 | 밝은색·얇은 원단 | "비침 있음 — 이너 권장" |
| 신축 없음 | 스판 없고 타이트 추천 | "스판 없어 여유 빠듯할 수 있음" |
| 무게·부피 | 롱패딩 등 | "무게로 활동성 제약 가능" |
| 수축 | 면100%·생지 | "세탁 후 수축 가능 — 재진단 권장" |

기준옷 소재도 데이터에 있으면 조회하고, 없을 때만 묻는다.

### [8] 시점·재사용 관리

착용 시점은 자동으로 지금 시각. 체형 카드는 **체중이 그대로일 때만** 재사용하고, 바뀌면 끊고 새 버전을 만든다. 단 브랜드 치수 보정(A)에는 과거 입력도 계속 쓴다(옷 치수는 내 체중과 무관하니까).

### 튜닝 파라미터 (실측정으로 맞춰가는 값들)
δ(부위별 조정폭)·k(겨드랑이 요구 계수)·원하는 여유 기본값·병목 임계값. 시드 3브랜드 × 상·하의로 "신호→추천"이 서는지 보며 조정한다. **조정의 기준은 항상 킬 메트릭(≥65%).**

## 4. 숨은 치수 레지스트리 (거꾸로 추정해야 할 부위 목록)

> **왜 필요한가:** 브랜드 사이즈표에 없어서 "입어보기 전엔 모르는" 부위가 있다. 바로 여기서 불편이 생긴다. 이 목록이 엔진이 공략할 진짜 기회이자 방어벽이다.

**핵심 정의:** 맞춤옷은 재는데 기성복 사이즈표엔 없는 치수 = 숨은 치수. 표에 없으니 여유를 계산할 수 없고 → 예상 못 한 불편이 생긴다. (표에 있는 숫자의 "크다/작다"는 이미 풀린 문제라 제외.)

**추정 난이도 3등급:**
- **(A) 사용자가 직접 답할 수 있는 것** — 온라인 맞춤 폼도 받는 것(소매통·목둘레). → 바로 MVP 입력에 넣을 수 있음.
- **(B) 전문 재단사만 아는 것** — 겨드랑이·화장·앞뒤품·중동·어깨경사·자세. → 브랜드 치수를 **거꾸로 추정해야 하는 진짜 해자 구간.**
- **(C) 아무도 안 재는 것** — 무릎·종아리둘레. → 불편은 실재하나 어디서도 못 구해 추정 난이도 최상.

**상의 우선순위:** ①겨드랑이(암홀) ②어깨경사·봉제선 ③원단 두께·비침·신축. 배둘레는 맞춤 폼은 받는데 기성복이 거의 항상 빼는 항목이라 **가성비 좋은 1급 후보**.
**하의 핵심:** ①앞뒤 밑위 분리 ②허리-엉덩이 낙차·밴드 곡률 ③스판·소재.

코드에서는 이 목록이 §1.1의 **병목 플래그(PAIN_FLAGS)** 로 표현되고, 자유서술에서 반복되는 페인이 정식 부위로 승격된다(엔진이 스스로 커지는 성장 구조).

**이게 왜 방어벽인가:** 기성복 사이즈표는 신뢰도 자체가 낮다(표기 73cm인데 실측 67cm 같은 사례, 법적 기준도 없음). 그래서 브랜드 표만 믿으면 위험하고, 착용경험 역산(B축)이 꼭 필요하다. 사용자들은 이미 실측을 못 믿고 "나는 어깨가 있으니 한 치수 크게" 식으로 체형 번역을 하고 있다 — 우리 서비스 논리와 같다. (상세 후기·출처 근거는 프로젝트 리서치 아카이브에 있음.)

### 4.1 미표기 부위의 몸쪽 회귀 토대 — '측정 축' 승격

숨은 치수를 A축(브랜드 실측)으로 **거꾸로 추정하려면**, 먼저 그 부위의 **몸쪽 기준**이 신뢰 가능해야 한다. "이 브랜드 M이 소매통에서 꼈다" + **내 위팔둘레 추정** → 그 옷의 소매통 실측 ≈ 내 위팔둘레 + 여유. 몸쪽 추정이 부정확하면 역추정한 A축도 부정확하다.

그래서 사이즈코리아 8차에서 **회귀 r²이 높은 미표기 부위**를 골라 몸쪽 회귀를 붙였다(브랜드 사이즈표엔 없지만 키·몸무게로 잘 잡히는 것):

| 부위(body key) | r²(남/여) | 대응 flag | 착용 관련 |
|---|---|---|---|
| **배(belly)** | 0.84 / 0.85 | fit '배' | 로우라이즈·턱인 (엔진 `TOP:belly` 밴드 이미 있음) |
| **가슴아래(underbust)** | — / 0.83 | (재인 입력) | **여성 전용** 브라 밴드둘레 — 프레임/컵 분리(§4.3) |
| **위팔둘레(upperArm)** | 0.72 / 0.79 | 팔(소매통) | 슬림 상의 소매 끼임 |
| **종아리(calf)** | 0.71 / 0.73 | 종아리 | 스키니·앵클부츠 |
| **겨드랑(armhole)** | 0.69 / 0.74 | 암홀 | 암홀 끼임·민소매 |
| **목(neck)** | 0.68 / 0.68 | 목/칼라 | 칼라·터틀넥 |

(가슴아래둘레는 사이즈코리아에 **여성 컬럼만** 존재 → build가 남성은 자동 스킵. 남성 base-model엔 `underbust` 키가 없다.)

이로써 지금까지 **'꼈다/괜찮다' 이진 페인 플래그로만 수집**하던 부위가, 몸쪽 측정 축을 갖게 됐다(= '측정 축' 승격). r²이 낮은 목(0.68)은 밴드를 넓게, 높은 배(0.85)는 좁게 쓴다.

**⚠️ 알려진 매핑 불일치:** `diag-fit.js`의 `LABELKEY`가 `'팔(소매통)'→'arm'(팔길이)`로 매핑한다. 소매통 끼임은 **위팔둘레(upperArm, 둘레)** 문제이지 팔길이가 아니다. A축 추정을 켤 때 `'팔(소매통)'→'upperArm'`으로 바로잡아야 한다(현재는 페인 플래그가 엔진 역산에 안 쓰여 무해).

### 4.2 A축 추정 설계 (검열추정) — ⏳ 규모 이후 활성화

**목표:** 브랜드가 안 적는 부위의 garment 실측을, 여러 사용자의 (페인 플래그 + 몸쪽 추정)으로 **집단 추정**해 A축을 채운다.

**한 사용자 신호:** (브랜드·핏·사이즈 셀) × 부위 → `꼈다(TIGHT) / 괜찮다(OK)`. 이건 **검열관측(censored)** 이다 — 정확한 여유가 아니라 "여유가 임계 이하/이상"만 안다.

**추정 뼈대(설계):**
1. 각 사용자에 대해 몸쪽 부위 cm를 회귀로 추정(§4.1).
2. `꼈다` = garment_부위 < body + tight경계, `괜찮다` = garment_부위 ≥ body + tight경계 → **셀(브랜드·핏·사이즈)별로 garment 실측의 구간을 검열추정**(생존분석/구간회귀류).
3. 표본이 쌓이면 셀별 garment 부위 실측이 좁은 구간으로 수렴 → **미표기 A축을 우리가 보유**(표준 장악·해자).

**왜 지금 엔진을 안 짓나:** 표본이 얇으면 검열추정이 불안정하고, 잘못 채운 A축이 추천·판정을 오염시킨다. 그래서 **회귀 토대·수집만 지금(§4.1), 추정 활성화는 규모 이후.** (전략 기록: 미표기 A축 추정 = 해자, 단 규모 후.)

### 4.3 가슴아래둘레(underbust) — 브라 사이즈 '재인' 입력 설계

**왜 여성에게 중요한가:** 젖가슴둘레(full bust) 하나로는 "갈비뼈(프레임)가 큰 건지, 가슴 볼륨이 큰 건지" 구분이 안 된다. 같은 젖가슴 90cm라도 프레임 큰 사람(가슴아래 82)과 볼륨 큰 사람(가슴아래 72)은 완전히 다른 몸이고, 상의가 끼는 원인도 다르다(프레임 → 한 치수 업 / 볼륨 → 다트·여유 컷). 랩·뷔스티에·엠파이어·핏 니트는 가슴 정점이 아니라 **가슴 바로 아래**에 얹혀 핏이 잡힌다.

**어떻게 묻나 — '재라'가 아니라 '아는 걸 고르라'.** 가슴아래둘레는 여성이 **줄자 없이 숫자로 아는 거의 유일한 치수**다 — **브라 사이즈**. 그래서 재측정이 아니라 재인(recognition) 질문으로 받는다:

> "브래지어 사이즈 아세요? (예: **75B**)"  → 밴드 `75` = 가슴아래둘레, 컵 `B` = 낙차

한 번의 재인으로 **두 축을 동시에** 얻는다(`engine.js braToBody`):

| 입력 | 얻는 것 | 산식 |
|---|---|---|
| 밴드 75 | **가슴아래(underbust)** 확정 | 밴드 ≈ 가슴아래둘레(cm, 한국/JIS) |
| 컵 B | **컵 볼륨**(젖가슴−가슴아래) | 낙차 = AA 7.5 / A 10 / B 12.5 … (2.5cm 스텝) |
| 75 + B | **젖가슴(bustFull)** 교차검증 | 밴드 + 낙차 = 87.5 |

- **회귀와의 관계:** §4.1 회귀 추정(r²0.83)은 **사전확률(폴백)** — 브라 사이즈를 모르거나 밝히기 싫으면 그대로 쓴다. 브라 사이즈를 주면 그 값이 회귀 추정을 **덮어쓴다**(anchor 역산이 부위 추정을 덮어쓰는 것과 동일 원리).
- **범위:** 한국/JIS cm 밴드(55~120)만 인식. 인치 밴드(US·EU 30~44)는 범위 밖 → `null` → 회귀 폴백(오해석 방지).
- **성별 분기:** 여성 전용 축. 남성 base-model엔 `underbust` 키가 없어 자연히 비활성. 진단 플로우에서 이 재인 질문 층은 **여성 카테고리에서만** 노출.

**현재 구현 범위(이 커밋):** ① 여성 회귀(폴백) ② `braToBody` 변환 함수(재인 → 몸축, 테스트됨) ③ 본 설계. **아직 안 한 것:** `diag-fit`에 재인 질문 UI 층 추가(디자이너 마크업 협의), 여성 상의 판정에서 컵 볼륨 프록시 소비 — 소비처(여성 상의 핏 정밀화)를 붙일 때 함께 배선한다.

---

## 5. 엔진 계약 (엔진과 화면 사이의 약속)

> **왜 필요한가:** 엔진 속을 몰라도 화면이 엔진을 쓸 수 있으려면, "이렇게 넣으면 이렇게 나온다"는 **딱 하나의 약속(계약)** 이 필요하다. 이 약속만 지키면 안쪽 엔진을 나중에 통째로 바꿔도 화면은 그대로 돌아간다.

**진단 함수(diagnose)의 약속(말로):**
- **넣는 것:** ①기본정보(성별·나이·키·체중) ②카테고리별 선호핏 ③착용경험 목록.
- **나오는 것:** ①체형 카드(§3-[3]) ②추천 목록(브랜드·사이즈·병목·경고, §3-[4~5]) ③신뢰도 등급(입은 옷 0벌=낮음 / 1벌=보통 / 2벌 이상=높음).
- **철칙:** 숫자·판정은 규칙, `character` 한 줄만 AI. **화면은 이 약속만 알고, 엔진 내부(느낌↔센티 환산표·δ 같은 튜닝값)는 들여다보지 않는다.**

**피드백 로그(킬 메트릭 수집기):** 결과 화면에 항상 붙는다 — "실제 내 사이즈랑 맞나?(맞음/애매/틀림)" + "안 사본 브랜드도 사보겠나?" + 자유 의견. 이게 없으면 65%를 잴 수 없으므로 처음부터 심는다.

**엔진 출력 → 화면 대응** (화면 상세는 [4_화면정의.md](4_화면정의.md)):

| 엔진 출력 | 화면 |
|---|---|
| 상체 판정 × 하체 판정 | 8가지 체형 유형 코드 → 체형 카드 |
| 추천 목록 | 브랜드별 추천 사이즈표 + 경고 문구 |
| 신뢰도 등급 | 신뢰도 배너(0벌 낮음/1벌 보통/2+ 높음) |
| 부위별 수치 | 4축 스펙트럼 막대 |
| 완료 여부 | 진단현황(옷장)·파생 해금 표시 |

상의만 끝났으면 8유형은 아직 미확정 → "상체 부분"으로 표시한다.

**구현 현황(프로토타입):** 추천·역산·핏지수 계산은 **`web/js/engine.js`가 실제로 수행**한다(위 약속과 같은 모양). 아직 목업으로 남은 건 **`character` 한 줄 서술과 8유형 라벨**뿐(`web/js/engine-mock.js`, LLM 자리). 화면은 진짜 엔진과 똑같이 호출하므로, 남은 목업만 갈아끼우면 된다.

## 6. 빌드 순서 / 현재 상태

> **왜 이 순서인가:** UI를 먼저 예쁘게 만들고 싶은 유혹을 눌러야 한다. 엔진이 틀리면 아무리 예쁜 화면도 소용없다. 그래서 **데이터 → 엔진 → 화면** 순으로, 가설의 심장부터 친다.
> 비유: A(브랜드 실측)=연료, B(번역 엔진)=심장, C(프론트)=엔진이 맞는지 재는 계기판.

| 단계 | 만드는 것 | 통과 조건 |
|---|---|---|
| Phase 0 | 타당성 실험(간단 스크립트, 상의 1종 × 브랜드 3) | 역산 정확도(±1 사이즈)가 의미 있게 나오나 |
| Phase 1 | 스키마 + 시드 데이터 + 변환규칙 | 브랜드 3~5개 정규화 완료 |
| Phase 2 | 번역 엔진 + 자동 테스트 | Phase 0 사례가 계속 통과 |
| Phase 3 | MVP 화면 + 검증 루프 | 킬 메트릭을 실제로 잴 수 있음 |

**데이터 파이프라인(A축 채우기, 브랜드 치수 모으기):** 진짜 어려운 건 "모으기"가 아니라 **"제각각인 표들을 하나의 통일된 형태로 정리하기"**(작업의 80%). 순서: 수집(브랜드별 맞춤 수집기 + robots.txt 확인) → 추출(이미지면 OCR로 글자 인식) → 정규화(명칭·단위 통일 + 여유 계산) → 검증(이상치·사람 눈검수) → 저장(신뢰도·시점 함께) → 분석(표준체형과 비교). "완전 자동 크롤러"는 환상이고, 표적은 봇 차단이 심한 플랫폼(무신사 등)이 아니라 **브랜드 자사몰**이다. 유니클로 상의 하나만 끝까지 뚫어본 뒤 넓힌다(브랜드와 옷 종류를 동시에 벌리지 않는다).

**현재 성숙도(솔직한 상태):**
- ✅ 단면↔둘레 환산, 여유 계산, 느낌↔센티 변환의 **기본 산수는 동작한다.**
- ✅ **인체 데이터 시드(§1.6) 정규화 완료 + web에 0벌 실계산 연결됨** — 사이즈코리아 8차 → 회귀 추정기·분포·아키타입 70종(`web/data/`로 복사). `web/js/body-model.js`가 basic(성별·키·몸무게·나이)→부위 cm + 백분위를 **실제로 계산**해 결과화면 "추정 신체 치수" 패널에 표시(garmentCm 없이 동작하는 첫 실엔진 조각). 44M/174/96 검증 시 실측 하위집단 평균과 ±1cm 일치.
- ✅ **추천(recommend)·핏지수·착용경험 역산이 실계산으로 붙음** — `web/js/engine.js`가 규칙①②③ + `garments.json`(garmentCm 648종)으로 몸·선호핏별 실제 다른 사이즈를 결정론적으로 낸다("고정 추천" 해소). 골든테스트(`engine/test.js`, `npm test`)가 밴드·정렬 계약을 잠근다.
- ⚠️ **`character` 서술·8유형 라벨은 아직 목업** — 8유형 스냅은 착용경험 역산 뒤라야(§1.6 경고), 서술은 LLM 자리(`engine-mock.js`).
- ⚠️ **규칙④~⑧(착용경험 역산 심화)은 일부만 구현** — 현재 0벌 prior + chest·shoulder 역산 위주. δ·병목·양방향 보정 정식화는 남음.
- ⚠️ **garmentCm 시드가 아직 좁다**(상의 위주) → 커버리지 확장 필요. 유니클로 상의부터 넓힌다.
- ⚠️ **하의 설문·느낌↔센티 표는 아직 검증 안 된 임시값** → 하의 정식화는 별도 작업.
- 정확도 분석은 체형 버전(체중)별로 나눠서 본다 — 체중 변화가 정확도 신호를 오염시키지 않게.

**아직 못 정한 질문:** 옷 몇 벌·어느 부위까지 받아야 오차가 실용 수준(±2cm)에 드나 / 실착 보정을 언제부터 섞나 / 느낌↔센티 표 초기값을 어떻게 잡나 / 페이크도어 클릭의 허수 보정.

## 0. 왜 "3면"으로 나뉘는가

**배경:** 무료 진단은 사용자 한 명만 상대하면 되는 **단순한 도구**다. 하지만 전문가 매칭은 사용자와 전문가를 서로 연결하고, 그 사이에서 문제가 안 생기게 관리까지 해야 한다. 그래서 관련된 사람이 세 종류로 늘어난다(**마켓플레이스**).

**[수요] 사용자 측**(프로필·요청·결제) ──요청──▶ **[엔진/중개]**(매칭·정산·분쟁) ──전달──▶ **[공급] 전문가 측**(수신·작성·정산). 이 중개를 다시 **[운영 어드민]**(승인·중재·정산집행)이 받친다.

| 면 | 누구 | 무엇을 하나 | 어디서 |
| --- | --- | --- | --- |
| 수요(사려는 쪽) | 사용자 | 서비스 고르기·요청·상담·결제·후기 | 사용자 앱 탭3 쇼퍼찾기 |
| 공급(팔려는 쪽) | 전문가 | 요청 받기·수락·상담·결과 작성·정산 받기 | 따로 있는 전문가 앱 |
| 중개(관리하는 쪽) | 운영 어드민 | 전문가 심사·분쟁 해결·돈 정산·수수료 정하기 | 따로 있는 관리자 화면 |

**우리만의 강점(§5):** 무료 진단에서 나온 "이 사람은 이 브랜드에서 몇 사이즈"라는 결과가, 전문가에게 요청이 갈 때 **자동으로 같이 딸려간다.** 그래서 전문가는 사용자를 직접 안 만나도 옷 사이즈를 정확히 고를 수 있다. 다른 스타일링 매칭 서비스에는 없는 무기다.

    ○ | E0~E3 | 랜딩 → 지원/등록 → 심사 → 정산계좌·세금 |
    ○ | E4 | 대시보드 | 가능/마감 스위치
    ★ | E5 | 매칭 요청 상세 | 강점 — 사이즈 결과 받는 화면 · 수락/거절
    ○ | E6~E7 | 상담 → 추천/결과 작성 | 유형별
    ○ | E8~E11 | 상품관리 · 프로필/포트폴리오 · 리뷰 · 수익/정산 |
  ○ | O | 운영 어드민 (중개) |
    ○ | O1 | 전문가 승인/심사 대기줄 |
    ○ | O2 | 분쟁·환불·신고 처리 |
    ○ | O3 | 정산 집행·수수료 정책 |
    ○ | O4 | 리뷰 관리 |
    ○ | O5 | 매칭 성사율·거래액 대시보드 |
```

## 2. 사용자 측 플로우 S1~S8

**배경:** 사용자가 "전문가에게 스타일링 받고 싶다"고 마음먹은 순간부터 후기까지의 순서다. 두 가지 길로 들어온다.

- 🔥 **따뜻한 리드(warm lead)** — 진단 결과카드를 다 보고 "스타일까지 전문가에게" 버튼을 눌러 들어온 사람. 이미 자기 사이즈 정보가 있다.
- ❄️ **차가운 리드(cold lead)** — 진단 없이 홈/탭에서 바로 들어온 사람. 사이즈 정보가 없으니 "진단부터 하세요"로 안내.

**순서:** S1 진입·유형선택 → S2 목록 → S3 프로필 → S4 요청 → S5 상담 → S6 결과 → S7 결제 → S8 후기. **MVP는 S1까지**(알림 신청받고 끝), S2~S8은 v2.

| # | 화면 | 무엇을 하나 | 구분 |
| --- | --- | --- | --- |
| **S1** | 매칭 진입·유형 선택 | 서비스 유형 3종 중 고르기 · 상황(소개팅·면접·결혼식·여행) 고르기 · **(지금은)"열리면 알려주세요" 신청 + 1기 전문가 모집** · 회원가입 요구(가입 게이트②) | ★MVP |
| **S2** | 전문가 목록 | 정렬(잘 맞는 순·평점·후기·가격) · 필터(유형·상황·예산·지역·일정) · 전문가 카드(작업 결과물·전문분야·평점·가격·**매칭도 뱃지**) | v2 |
| **S3** | 전문가 프로필 | **작업 결과물 갤러리** · 후기·평점 · 경력·전문분야·상황 태그 · 제공 서비스/가격/소요시간 · 예약 가능 일정 (얼굴·팔로워 ❌, 결과물·후기 ✅) | v2 |
| **S4** | 매칭 요청 | **공통:** 내 체형·사이즈 정보 자동 첨부(§5) + 상황·날짜 / **유형별로 묻는 항목이 다름**(§6) | v2 |
| **S5** | 상담 / 메시지 | 전문가와 1:1 채팅 · 예산·취향 세부 파악 | v2 |
| **S6** | 추천 / 예약 결과 | 유형별 결과물(§6) — 온라인=코디·상품·구매링크, 오프라인=예약 확정·세션 안내 | v2 |
| **S7** | 결제 / 예약 | 온라인=매칭 수수료·패키지, 오프라인=예약금·세션비. 상황(면접·결혼식 등)이 과금 단위 | v2 |
| **S8** | 완료·후기 | 만족도·후기·평점·"또 부르고 싶다" 의향 → 다음 사용자의 S2 목록 정렬에 반영 | v2 |

## 3. 전문가 측 E0~E11 (전문가 앱)

**배경:** 전문가는 사용자와 다른 별도 앱을 쓴다. 일감을 받고, 일하고, 돈을 받는 흐름. 홈 상단 '전문가 지원'으로 E0 진입. (지금은 전문가가 적어 운영자가 직접 손으로 모집.)

**온보딩:** E0 랜딩 → E1 지원/등록 → E2 심사/승인 → E3 정산계좌·세금. **일감:** E4 대시보드 → **E5 요청상세 ★**(사이즈 결과 받음) → 수락 → E6 상담 → E7 결과작성. **언제든:** E8 상품관리 · E9 프로필/포트폴리오 · E10 리뷰 · E11 수익/정산.

| # | 화면 | 무엇을 하나 |
| --- | --- | --- |
| E0 | 전문가 랜딩 | 수수료·정산·기대 수익 안내 · '1기 지원' 버튼 |
| E1 | 지원/등록 | 경력·전문분야·잘하는 상황·포트폴리오 제출 |
| E2 | 심사/승인 대기 | 플랫폼이 품질을 거른다(운영자 O1과 짝). 승인 전엔 사용자에게 안 보임 |
| E3 | 정산계좌·세금 | 돈 받을 계좌·사업자/원천징수 정보 등록 |
| E4 | 대시보드 | 들어온 요청·진행 중인 일 · **"일 받을 수 있음/마감" 스위치** |
| **E5** | **매칭 요청 상세 ★강점** | 사용자 체형 정보 + **★사이즈 번역 결과를 받는 화면** · 수락/거절. 숨고·크몽 같은 단순 매칭과 갈리는 지점 |
| E6 | 상담/메시지 | 추천 전에 사용자와 대화로 취향 파악 |
| E7 | 추천/결과 작성 | 유형별(§6) — 온라인: 상품·코디·링크 / 오프라인: 예약·세션 노트 |
| **E8** | **서비스 상품 관리** | 내가 파는 서비스를 진열(메뉴판) · 유형별 범위·소요시간·가격. 사용자 S3에 이대로 보임 |
| E9 | 프로필/포트폴리오 | 사용자에게 보일 내 소개 편집(= S3의 원본) |
| E10 | 리뷰/평점 | 받은 리뷰 보기·답하기 (평판이 곧 다음 일감) |
| E11 | 수익/정산 | 정산 내역 · 어떤 유형·상황이 돈이 되는지 통계 |

**전문가 앱 중 지금(MVP) 만드는 것은 E8(상품관리)뿐이다.** 사용자에게 보일 메뉴판이라 가벼워서다. 나머지는 목업.

## 4. 운영 어드민 O1~O5 (중개)

**배경:** 사용자와 전문가만 있으면 사고가 난다(자격 미달, 노쇼, 환불 분쟁). 운영자가 중간에서 관리한다. 지금은 다 v2, 초기엔 스프레드시트로 손수(§8).

| # | 화면 | 무엇을 하나 |
| --- | --- | --- |
| O1 | 전문가 승인/심사 대기줄 | E2의 운영자 쪽 · 승인·반려로 품질을 거른다 |
| O2 | 분쟁·환불·신고 처리 | 노쇼·불만족 환불 · 신고 대응 → **믿고 쓸 수 있는 장터의 핵심** |
| O3 | 정산 집행·수수료 정책 | 전문가별 지급 · 수수료율·유형별 요금 결정 = **돈 버는 조절 손잡이** |
| O4 | 리뷰 관리 | 가짜·악성 리뷰 정리 |
| O5 | 매칭 성사율·거래액 대시보드 | 거래액·성사율·활동 중인 전문가 수 |

---

## 5. 핵심 다리 — 진단 결과가 전문가에게 자동으로 넘어간다 ★

**배경:** 이게 우리 서비스가 다른 스타일링 매칭과 다른 **딱 하나의 진짜 차별점**이다. 사람만 연결하는 게 아니라 "이 사람 사이즈 데이터"를 함께 넘긴다(**핸드오프**). 진단에서 만든 체형카드가 전문가 화면(E5)으로 그대로 넘어간다.

| 진단이 넘겨주는 것 (결과카드) | ──넘겨줌──▶ 전문가가 받는 것 (E5 요청상세) |
|---|---|
| 체형 프로필(캐릭터) · 핏 인사이트(주의할 부위) · 브랜드별 추천 사이즈 | 고객 체형·핏 인사이트 · **★ 브랜드별 추천 사이즈** → "안 만나도 정확히 고를 수 있다" |

- **사용자에게:** 요청할 때 키·몸무게를 다시 안 적어도 됨(귀찮음↓) → 전환↑.
- **전문가에게:** 줄자 없이 사이즈 확신 → 비대면(온라인)인데도 반품↓. 도구가 실력을 올려줌.
- **플랫폼에게:** 데이터가 쌓일수록 매칭이 정확해지고, 나중엔 B2B 사이즈 API(v3) 자산.

기술적으로 요청 데이터에 `body_profile_ref`(진단 결과 참조)가 붙는다. 진단은 **불변 스냅샷**으로 저장되므로, 요청한 시점의 체형이 그대로 고정돼 넘어간다.

---

## 6. 서비스 유형 3종과 유형별 분기

**배경:** 전문가가 파는 서비스는 3종류인데, 종류마다 **요청 항목(S4)·결과물(S6)·과금(S7)이 다르다.** ("퍼스널 쇼퍼"는 서비스 이름이 아니라 전문가 직함.)

| 항목 | 💻 온라인 스타일링 | 🛍️ 동행 쇼핑 | ✨ 이미지 컨설팅 |
| --- | --- | --- | --- |
| **요청 폼(S4)** | 취향·예산·좋아하는 브랜드 | 일정·지역·만날 장소 | 목적(면접 등)·일정·지역 |
| **진행 방식(S5·S6)** | 안 만나고 채팅으로 큐레이션 | 오프라인에서 같이 쇼핑 | 오프라인 세션 |
| **결과물(S6)** | 코디·상품·**구매링크** | 현장 구매·세션 노트 | 이미지 가이드·세션 노트 |
| **과금(S7)** | 매칭 수수료/패키지 | 예약금 + 세션비 | 세션비 |
| **사이즈 결과 중요도** | ★가장 중요(원격 구매) | 보조(현장 시착) | 보조(체형 이해용) |

흐름: 전문가가 E8에서 유형별로 진열·가격 → 사용자가 S1에서 관심 유형 선택(인기 유형 측정) → S2 유형 탭 탐색 → S4에서 유형에 맞는 폼.

---

## 7. 상태(state)와 예외 상황

**배경:** 행복한 경우만 설계하면 안 된다. 무응답·후보 0명·노쇼도 미리 정해 사용자가 막다른 길에 안 갇히게.

- **요청 상태 흐름:** 대기 → `수락` → 진행 → 완료 / 중간 `거절`(→ 다른 전문가 자동 추천) / `만료`(무응답)
  - *프로토타입(web) 구현:* 두 진입 경로 — **받은 견적**(오픈·역경매 `견적중`→낙찰) · **보낸 요청**(지명 `대기`→수락) — 가 공통 꼬리 `진행중`→`완료`→`후기완료`로 수렴(흐름 통일). 취소는 `취소함`. 후기 등록 시 해당 쇼퍼 프로필 후기에 반영. 콜드스타트 시 `오픈 알림 신청`(쇼퍼 모이면 알림)은 요청 내역에 별도 그룹으로 기록.
- **매칭 실패:** 조건 맞는 전문가 0명 → "열리면 알림" 등록 · "예산·지역 넓혀 보세요"
- **취소/노쇼:** 취소 시점에 따라 환불 규칙 → O2에서 운영자 조정
- **분쟁:** 신고 → 운영자 중재 → 환불/제재
- **품질 게이트:** 심사(E2) 통과 전 전문가는 사용자에게 안 보임
- **콜드스타트(전문가 0명):** S1/홈에 "오픈 예정·1기 모집". 같은 화면이 사용자에겐 "수요 측정", 전문가에겐 "모집 공고"로 동시 작동 — 닭·달걀 문제를 한 화면으로 푼다.

### 7-1. 견적 요청 확인 → 완료 모달 (프로토타입 UX · **확정 · 변경 금지**)

> 사용자(디자이너)가 직접 확정한 인터랙션. **임의로 바꾸지 말 것.** 오픈(여러 쇼퍼)·지명(지정 쇼퍼) 요청이 같은 요청서 폼(`reqFormHTML`)을 공유하며, 아래 흐름도 공통이다.

1. 요청서에서 **`요청하기`** → 화면 **중앙 확인 모달**(미니멀 명세 · 초록 헤더바/점선 금지)이 뜬다.
2. **확인 화면** = eyebrow `요청 내용 확인` + 제목 + 부제 + 요청 항목 리스트(서비스·상황·예산 또는 예상가격·일정·선호스타일·메모) + 첨부 칩 + 버튼 **`[돌아가기] [요청하기]`**(둘 다 4글자 · 좌우 대칭).
   - 지명: `OO 쇼퍼에게 / 견적을 요청할까요?` · 부제 `쇼퍼가 검토 후 제안을 보내드려요`
   - 오픈: `이 조건으로 / 견적을 요청할까요?` · 부제 `조건에 맞는 여러 쇼퍼가 견적을 보내드려요`
3. **`돌아가기` = 모달만 닫히고 작성하던 요청서 화면으로 복귀**(입력 내용 유지). → **상세·목록으로 이동 금지.**
4. **확인 화면에서 바깥(스크림) 클릭 = 모달 닫힘**(= 요청서로 복귀). 수정 가능.
5. **`요청하기` = 모달을 닫지 않고 그 자리에서 ✓ 완료 화면으로 전환**(별도 전체화면으로 점프 **금지**).
6. **완료 화면** = ✓ + `견적 요청을 보냈어요` + `마이에서 (여러 쇼퍼|OO 쇼퍼)의 견적을 기다려보세요`(**1줄** · 오픈은 '여러 쇼퍼' 초록 강조) + 버튼 **`[목록으로] [마이로 이동]`**.
7. **완료 화면은 바깥 클릭으로 닫히지 않는다 — 두 버튼으로만 이동.** (이미 보낸 요청서 폼이 다시 노출돼 "또 보내야 하나?" 혼란을 막기 위함. ★핵심 이유)

---

## 8. 지금(MVP) vs 나중(v2)

**배경:** 처음부터 매칭을 다 만들면 돈·시간이 크게 든다. 먼저 "수요가 있는지"만 싸게 확인한다(**페이크도어** + **위저드 오브 오즈**).

| | 지금 (MVP) | 나중 (v2, 진짜 작동) |
| --- | --- | --- |
| 사용자 측 | **S1 진입+유형선택 → 페이크도어 알림신청** | S2~S8 전체 흐름 |
| 전문가 측 | 없음(운영자 손으로 1기 모집), E8만 진열용 | 전문가 앱 E0~E11 |
| 운영 | 스프레드시트로 손수 | 어드민 O1~O5 |
| 매칭 | **위저드 오브 오즈:** 알림 신청자 ↔ 1기 전문가를 사람이 카톡으로 연결 | 자동 매칭·결제·정산 |

**MVP에서 확인하려는 것:**
1. **유형별 전환신호 ≥25%** — 어떤 유형에 진짜 수요가 있는지.
2. **전문가 수락률** — 손으로 연결해 보며, 핵심 가정 *"따뜻한 리드(사이즈 정보까지 딸려오는 좋은 고객)라면 수수료가 낮아도 전문가가 들어올까?"* 를 코드 없이 확인.

---

## 9. 데이터 모델 (매칭 부분)

```
expert            id · 전문분야 · 상황태그[] · 평점 · 가능상태 · 심사상태
service_offering  expert_id · type(online|shopping|image) · 범위 · 소요 · price
match_request     user_id · expert_id · service_type · occasion · date
                  · body_profile_ref(진단 결과 참조 = 핸드오프) · form{유형별} · status
consultation      request_id · messages[]
result            request_id · type · items[](구매링크) | booking(예약·세션노트)
review            request_id · rating · text · 재호출의향
settlement        expert_id · request_id · amount · fee · status
```

- `match_request.body_profile_ref` = §5 핸드오프가 실제로 구현되는 지점(진단 결과를 가리켜 요청 시점에 고정). `form`은 §6 유형별 입력.
- 진단 코어 데이터 모델은 [5_정책·데이터.md](5_정책·데이터.md) §4.

# 디자인 언어 — 핏팅

> **이 문서는 무엇?** 핏팅의 화면을 만들 때 지켜야 할 **색·글꼴·모양·말투 규칙**을 모았습니다. 디자이너가 아니어도 이 규칙만 따르면 화면이 한 덩어리처럼 보입니다.
>
> **용어 한 줄 풀이**
> - **토큰(token)**: 색·크기 같은 디자인 값을 이름표로 정해둔 것(예: "메인 초록 = `--green`"). 값을 한 곳에서 바꾸면 전체에 반영됩니다.
> - **잉크블랙**: 새까만 검정 대신 살짝 부드러운 검정(`#16140F`).
> - 실제 토큰 값은 **`web/css/tokens.css`** 한 파일에 있습니다(이게 정본). 화면은 이 값만 가져다 씁니다.

---

## 1. 한 줄 철학
**오프화이트 배경 + 딥그린 포인트 1가지 + 잉크블랙.** 차분하고 신뢰감 있게.

**왜 이렇게?** 우리 서비스의 핵심 가치는 "사이즈를 정확히 번역"하는 신뢰입니다. 화면이 화려하면 오히려 "AI가 대충 만든 느낌"이 나서 신뢰를 깎습니다. 그래서 **색을 아끼고, 글자 굵기와 여백으로 위계를 만듭니다.**

## 2. 5가지 원칙 (바꾸지 말 것)
1. **색은 딥그린 하나만.** 배경·글자·선은 무채색(회색 계열), 강조만 딥그린. 여러 색 섞지 않기.
2. **버튼은 검정(잉크블랙).** 주요 버튼은 초록이 아니라 검정. 초록은 '포인트'로만 써서 흔해지지 않게.
3. **글꼴은 Pretendard 하나.** 굵기(300~800)·자간·여백으로만 강약. (예외: 숫자는 §5)
4. **넓고 여유 있게.** 간격 넉넉히, 답답하지 않게.
5. **결과 카드만 예외** (아래 §4).

## 3. 색 (무엇을 어디에)
배경·표면·글자·선은 무채색으로, **딥그린은 "의미 있는 강조"에만** 씁니다.

```swatch
#F6F6F5 | 기본 배경 (오프화이트) | --bg
#FFFFFF | 카드 표면 (흰색) | --surface
#16140F | 본문·버튼 (잉크블랙) | --ink
#6E6B63 | 보조 텍스트 | --sub
#E6E5E1 | 경계선 | --line
#2E4A3B | 강조·활성·매칭도 (딥그린) | --green
#E7EFEA | 활성 배경 (연한 초록) | --green-soft
#B0553F | 경고·오류 | --warn
```

- 버튼 주요 = 검정 채움/흰 글자, 보조 = 흰 배경 + 얇은 테두리.
- 활성 상태(선택한 칩·탭·토글) = 딥그린.
- "맞음/성공" 신호도 딥그린 겸용(초록을 따로 안 만듦). "애매" = 회색, "틀림" = 경고색.

## 4. 결과 카드는 예외
체형진단 **결과 카드**만 **어두운 배경 + 8유형별 포인트색 1개**를 씁니다(카드가 유형마다 색이 달라지는 게 핵심이라). 여기엔 위의 딥그린 규칙을 적용하지 않습니다. — 8유형 색·데이터는 `web/data/bodytypes.json` 한 곳에서만 가져옵니다.

```swatch
#9DB8FF | STR · 시크 스트레이트 |
#76D6C6 | TRI · 소프트 A라인 |
#C2C7D0 | INV · 모던 V라인 |
#CF9BFF | HRG · 엘레강스 X라인 |
#8FD6A8 | BAL · 이지 밸런스 |
#FF9EC5 | DIA · 소프트 다이아 |
#FF9D7A | RND · 코지 라운드 |
#B6A8FF | TUB · 슬릭 라인 |
```

## 5. 글꼴(타이포)
- **본문·한글 = Pretendard.** 세리프(장식 있는 글꼴) 안 씀.
- **숫자(사이즈·cm·매칭도 %) = SUIT** 글꼴(`.num` 클래스). "정밀·측정"이 우리 정체성이라 숫자만 전용 글꼴로 또렷하게. (둘 다 한글 지원)
- 위계 예시: 큰 제목 44/37px·800, 소제목 24px·800, 본문 16px·450, 라벨 13px·800(영문 대문자). 큰 제목은 자간을 좁게(−.045em).

### 5-1. 글씨 크기 스케일 (중요 · 2026-07-10 전면 통일)

화면마다 크기가 제각각(12.5·13.5·14.5…)이던 것을 **정수 스케일로 통일**했습니다. **새 화면·컴포넌트도 반드시 이 규칙을 따르세요.**

- **정수 px만 사용** — `12.5px`·`13.5px` 같은 **소수점 금지**.
- **본문 텍스트 최소 `13px`** (그보다 작게 쓰지 않기).
- 계열별 스케일에서만 고르기:
  - 본문·보조: **13 · 14 · 15 · 16 · 17px** (읽는 텍스트)
  - 소제목: **18 · 19 · 20 · 21px** / 제목: **22px 이상**
- 가능하면 하드코딩 대신 토큰 참조: 본문 `--fs-body`(16) · 보조 `--fs-sm`(14) · 라벨 `--fs-label`(13) · 소제목 `--fs-h3`(19) · 제목 `--fs-h2`/`--fs-h1`/`--fs-display`.
- 애매하면 **한 단계 키우는 쪽**으로 (작아서 답답한 것보다 낫다).

## 6. 모양(형태 토큰)
- 라운드: 버튼·입력 12px · 칩 20px · 카드 18px · 결과카드 24~30px.
- 테두리: 카드/선 `1px`(연회색), 입력/옵션 `1.5px`.
- 그림자는 아주 옅게. 컨테이너 폭은 앱 기준 넓게, 폼 화면은 읽기 편한 폭으로 중앙 정렬.

## 7. 컴포넌트 규칙 (빠른 참조)
| 컴포넌트 | 기본 | 선택/활성 |
|---|---|---|
| 버튼(주요) | 검정 채움·흰 글자 | hover 더 진한 검정 / 비활성 회색 |
| 버튼(보조) | 흰 배경·얇은 테두리 | hover 연한 회색 |
| 칩(필터) | 흰 배경·회색 | **딥그린 채움**·흰 글자 |
| 탭 | 회색 글자 | **딥그린** 글자 + 밑줄 |
| 토글 | 회색 | **딥그린** ON |
| 매칭도/정확도 뱃지 | — | **딥그린 pill**(연초록 배경) |
| 진행 표시(진단) | 상단 위상 스텝퍼(1 기본 · 2 경험 · 3 진단중) — 점+라벨, 점 사이 연결선 | 완료=초록 채움 / 현재=초록 링. 연결선이 질문마다 스르륵 채워짐 |
| 아이콘 | **인라인 SVG 라인 아이콘**(stroke=currentColor · 24×24) — 이모지 금지 | 글자 크기·색 자동 상속(`.ricon` = 1em) |

> **아이콘 = 이모지 대신 SVG 라인으로 통일.** 결과·마이 화면의 체크·X·자물쇠·경고·줄자 등은 stroke 아이콘. `.ricon{width:1em;height:1em}` + `stroke=currentColor` 라 글자 크기·색을 따라가요(피드백 아이콘 색 구분: 맞음=초록·애매=회색·틀림=빨강). 근거는 §8-4.

## 8. 말투(UX 라이팅)

> 핏팅의 말은 **친절한 스타일 친구**처럼 — 어렵지 않게, 판단하지 않게, 그리고 **일관되게**. 기본은 요체(~해요), 브랜드 언어는 '핏(fit)', 문장 속 이모지는 지양해요.

### 8-1. 세 가지 목소리
- **친근함** — 전문 용어 대신 누구나 아는 쉬운 말. 옆에서 골라주는 친구처럼.
- **명확함** — 한 문장에 한 메시지. 짧고 담백하게, 애매하지 않게.
- **신뢰** — 과장·호들갑 없이. 근거 있게 차분히 말해 믿음을 줘요.

### 8-2. 기본은 요체 (~해요)
격식체(~합니다)는 딱딱하고 반말은 가벼워요. 말끝은 **~해요 · ~예요 · ~드려요**, 명령은 **~해주세요** 처럼 부드럽게. 버튼은 짧은 동사구도 괜찮아요.
- **한 문장, 한 메시지** — 길면 끊어요.
- **문장 끝 온점(.)은 생략** — 마이크로카피는 마침표 없이 더 가볍고 친근해요.
- **호칭은 가볍게** — '고객님/회원님'보다 ~님 또는 생략. 우리를 낮춰 부르지 않아도 돼요.
- **버튼·라벨은 '~하기'로 통일** — *진단 시작하기·결과 저장하기·전문가에게 받기*. 같은 동작은 항상 같은 단어.

### 8-3. 브랜드 언어 '핏(fit)'
서비스 이름이 fitting인 만큼, 핵심 개념엔 **'핏'을** 일관되게 붙여 브랜드 자산으로 만들어요. (남용 금지 — 사이즈·체형·스타일 진짜 관련에만)

| 용어 | 뜻 | 예문 |
|---|---|---|
| **핏 진단** | 체형진단 (fit check) | "핏 진단 시작하기" |
| **핏 타입** | 8체형 유형 | "내 핏 타입은 시크 스트레이트예요" |
| **내 핏** | 내 체형·사이즈 프로필 | "내 핏 저장하기" |
| **핏 카드** | 결과 카드 | "핏 카드를 공유해보세요" |
| **핏 번역** | 브랜드 교차 사이즈 번역 | "브랜드별 핏 번역" |
| **핏 매칭 / 핏 매칭도** | 전문가 매칭 / 매칭 점수 | "핏 매칭도 98%" |
| **핏 인사이트** | 스타일 팁 (카드 내) | 카드 섹션 라벨 |
| **잘맞 핏 / 피할 핏** | 어울리는 / 피할 스타일 | 카드 내 섹션 |

- **한글 '핏'이 기본** — 본문·버튼은 한글 *핏*, 영문 **FIT** 표기는 결과 카드 같은 디자인 요소에만(카드 라벨은 MY FIT·FIT INSIGHT·잘맞/피할 FIT).
- **한 개념, 한 이름** — 같은 걸 여기선 '진단', 저기선 '분석'처럼 섞지 않기.
- **'핏메이트'(구 브랜드명) 지양** — 혼동돼요. 전문가는 *전문가* 또는 *쇼퍼*로.
- 결과 카드의 '잘맞/피할 FIT'은 각 1줄·쉬운 말. 방향 팁은 'FIT INSIGHT'로 몰아 씁니다.

### 8-4. 문장 속 이모지는 지양
이모지를 카피에 섞으면 통일감이 깨지고 톤이 들쭉날쭉해져요. **감정은 이모지가 아니라 글로** 전해요. 아이콘은 **기능 자리**(버튼·메뉴·상태 뱃지)에서만, 프로젝트에서 정해둔 세트로 통일해요. 카드 속 고정 심볼(예: 궁합 표시)은 카피가 아니라 디자인 컴포넌트 규칙으로 별도 관리.

**좋은 예 / 나쁜 예** (왼쪽처럼 쓰지 말고 오른쪽처럼)

```compare
당신의 체형은 역삼각형입니다 => 어깨가 넓은 편이라, 위는 여유 있게 입는 게 좋아요
Fit Type: STRAIGHT (사각) => 시크 스트레이트
사이즈 오류가 발생했습니다 => 사이즈를 못 찾았어요. 옷을 하나만 더 알려주실래요?
✨진단 완료! 지금 바로 확인하세요 🎉 => 진단이 끝났어요. 결과를 확인해 보세요
로우라이즈·크롭 기장 추천 => 밑위가 낮고 짧은 기장이 잘 어울려요
```

### 8-5. 상황별 마이크로카피 (권장 예문)

| 상황 | 이렇게 (권장) |
|---|---|
| 진단 시작 | "3분이면 내 핏 타입을 알 수 있어요" |
| 로딩 | "내 핏을 분석하고 있어요" |
| 결과 도착 | "내 핏 타입이 나왔어요" |
| 저장 유도 | "핏 카드를 저장하면 언제든 다시 볼 수 있어요" |
| 빈 상태 | "아직 맞는 전문가가 없어요. 1기 전문가를 모으고 있어요" |
| 에러 | "잠깐 문제가 생겼어요. 다시 시도해 주세요" |
| 성공 토스트 | "저장했어요" |

### 8-6. 쓰기 전 5초 체크
- [ ] **요체로 썼나요?** ~합니다·반말이 아니라 ~해요.
- [ ] **한 문장에 한 메시지인가요?** 길면 끊어요.
- [ ] **'핏' 용어를 일관되게 썼나요?** 같은 개념은 같은 이름.
- [ ] **문장에 이모지를 섞지 않았나요?** 감정은 글로.
- [ ] **판단·전문용어 없이 편안한가요?** 테일러드·박시 대신 쉬운 말.
- [ ] **문장 끝에 온점 없나요?** 마이크로카피는 마침표 없이.

## 9. 토큰은 어디에?
- 실제 값 = **`web/css/tokens.css`** (라이브에서 쓰는 정본). 색을 바꾸려면 이 파일의 변수만 고치면 전체 반영됩니다.

> **이 문서는 무엇?** 방향을 바꾼 **주요 결정과 그 이유**를 시간순으로 남깁니다. 정본 문서(1~8) 본문에는 "지금 확정된 상태"만 두고, "왜 이렇게 바뀌었나"는 여기로 모읍니다. 그래야 정본이 changelog로 지저분해지지 않고, 새로 온 사람이 맥락을 한 번에 잡습니다.

## D-1. 서비스 피벗 — 쇼퍼 연결 → 사이즈 번역 *(초기)*

- **전:** 전문 쇼퍼를 연결해 주는 서비스(구 브랜드명 *핏메이트*).
- **후:** "평소 입던 옷 기준으로 브랜드를 가로질러 내 사이즈를 번역"하는 진단 서비스. 쇼퍼 매칭은 후속(v2)으로 밀림.
- **이유:** 새 옷 구매가 막히는 이유가 스타일 40% / 사이즈 38%로 반반인데, **사이즈는 정답이 있어 도구로 풀 수 있다**(검증 가능). 스타일은 전문가(후속)로.
- **영향:** [1_제품정의.md](1_제품정의.md) 전체, [2_정보구조.md](2_정보구조.md) §0.

## D-2. 체형 분류 6종 캐릭터 → 8체형(사이즈코리아 근거) *(초기)*

- **전:** 단순 성격 캐릭터 6종.
- **후:** 국가 인체치수(사이즈코리아 8차) 근거 8체형.
- **이유:** 피벗으로 "정확도"가 핵심 가치가 되면서, 표현용 캐릭터도 실측 근거 위에 얹어야 신뢰가 선다.
- **영향:** [4_화면정의.md](4_화면정의.md) §6·§7, [6_사이즈엔진.md](6_사이즈엔진.md) §1.6.

## D-3. 성공 기준 = 킬 메트릭 하나(사이즈 정확도 ≥65%) *(초기)*

- **전:** 만족도 등 여러 지표.
- **후:** **추천 사이즈 정확도 동의율 ≥ 65%** 단일 킬 메트릭. 미달 시 엔진 교체/중단.
- **이유:** 판정 기준이 여럿이면 흔들린다. "생사 기준" 하나로 우선순위·튜닝을 통일.
- **영향:** [1_제품정의.md](1_제품정의.md) §9, [6_사이즈엔진.md](6_사이즈엔진.md) §0.

## D-4. 엔진 정책 — 숫자는 규칙, 말은 LLM *(초기)*

- **결정:** 추천 사이즈·여유 같은 **숫자는 결정론적 규칙**으로, "어깨가 넓은 편"같은 **자연어 서술만 LLM**으로.
- **이유:** 추천 숫자를 LLM에 맡기면 맞았는지 검증할 방법이 없다.
- **영향:** [2_정보구조.md](2_정보구조.md) §0-6, [6_사이즈엔진.md](6_사이즈엔진.md) §0.

## D-5. 진단 = 옷 종류(카테고리) 단위, 기반 = 상의+하의 *(초기)*

- **결정:** 상의 경험으로 상체만, 하의로 하체만 역산. 상의+하의 둘 다 끝나야 8유형 확정. 파생(아우터·원피스·치마)은 선호핏만.
- **이유:** 옷 종류마다 알 수 있는 몸 부위가 다르다. 실측 데이터 없는 카테고리는 구조적 예외로 선호핏만.
- **영향:** [4_화면정의.md](4_화면정의.md) §5, [6_사이즈엔진.md](6_사이즈엔진.md) §0.

## D-6. 매칭 = 입찰(역경매) + 지명 병행

- **결정:** 오픈 요청(전문가들이 입찰 → 사용자 낙찰) + 지명 요청(특정 전문가에게 직접) 병행.
- **이유:** 초기 공급이 얇을 때 입찰이 매칭률을 높이고, 지명은 재구매를 받친다.
- **영향:** [2_정보구조.md](2_정보구조.md) §0, [7_전문가매칭.md](7_전문가매칭.md) 전반. (3면 화면에 반영: 사용자 1.3.8 · 전문가 2.1.1 · 운영 3.B.3)

## D-7. 진입 동의 게이트(구 G.5) 폐기 → 진단은 동의 없이, 엔진 개선만 opt-in

- **전:** 진단 진입 전 개인정보 수집·이용 **필수 동의 게이트(G.5)**.
- **후:** 진단은 서비스 제공 근거로 **동의 없이** 시작. **엔진 개선 활용만** 결과화면에서 **opt-in**, 만 14세 확인을 여기에 접목.
- **이유:** 필수 게이트는 진입 이탈을 키우고 표본을 깎는다. 서비스 제공(진단)과 개선 목적(학습)을 분리해, 막지 않되 개선 활용만 동의받는다.
- **영향:** [2_정보구조.md](2_정보구조.md) §0·§G, [3_사용자플로우.md](3_사용자플로우.md) §1, [5_정책·데이터.md](5_정책·데이터.md) §1. **주의:** 구 2_화면과흐름 문서가 이 게이트를 필수로 서술했던 드리프트를 재편 때 정정함.

## D-8. lazy registration + 비회원 수집 *(초기)*

- **결정:** 비회원 그대로 진단~결과~피드백까지. 가입은 ① 결과 저장 ② 매칭 실이용 두 지점에서만.
- **이유:** 초반 가입 강요는 이탈·표본 손실. 가치를 느낀 뒤로 미룬다.
- **영향:** [5_정책·데이터.md](5_정책·데이터.md) §2, [3_사용자플로우.md](3_사용자플로우.md) §3-2.

## D-9. 8유형 데이터 단일 출처 = `web/data/bodytypes.json` *(초기)*

- **결정:** 8유형의 이름·색·프로필·핏·궁합·실루엣은 오직 이 파일에서. 화면 코드에 재기입 금지.
- **이유:** 여러 화면에 흩어지면 하나 바뀔 때 전부 고쳐야 하고 실수가 난다.
- **영향:** [4_화면정의.md](4_화면정의.md) §7.

## D-10. 8유형 ↔ 엔진 매핑은 결과화면 착수 전 별도 설계 *(초기, 미완)*

- **결정:** 카드(8유형 실루엣 1개)와 엔진(상·하체 따로 계산)이 어긋나므로, `상체×하체 → 8유형 코드` 매핑 표 + 부분 카드 규칙을 **따로** 설계한다.
- **상태:** 미완(스텁). 결과화면 정식 구현 전 필요.
- **영향:** [4_화면정의.md](4_화면정의.md) §6.

## D-11. 엔진 정본 단일화 — engine.js 유일 구현 + 골든테스트 · 2026-07-06

- **전:** 규칙이 `engine/rules/*.ts`(부분 명세)와 `web/js/engine.js`(실행 코드) **두 곳**에 갈라져 수동 동기화(드리프트 커밋 470d72f 발생).
- **후:** **`web/js/engine.js`가 유일 규칙 구현**, 규칙 명세 정본은 [6_사이즈엔진.md](6_사이즈엔진.md), 데이터 계약 타입만 `engine/schema/*.ts`로 남김. 중복 `engine/rules/*.ts` 제거. **무의존성 골든테스트 `engine/test.js`(`npm test`)로 밴드 값을 잠금.**
- **이유:** 정본이 둘이면 반드시 드리프트. 빌드 없는 정적 사이트라 JS를 정본으로 두고, 테스트로 회귀를 막는 게 최소비용.
- **영향:** [6_사이즈엔진.md](6_사이즈엔진.md) 헤더·§5·§6, `engine/README.md`, `package.json`, `engine/test.js`.

## D-12. 기획 문서를 표준 산출물 형태로 재편 · 2026-07-06

- **전:** 5개 문서를 "읽는 순서"로 자름. 특히 2_화면과흐름 한 파일이 IA·화면정의·플로우·데이터·매칭도메인 6종을 겸업, IA 정본이 IA.md와 이중.
- **후:** **한 파일 = 한 산출물**로 재편(용어집·제품정의·정보구조·플로우·화면정의·정책데이터·엔진·매칭·디자인 + 이 결정기록). IA 정본을 [2_정보구조.md](2_정보구조.md)로 단일화, 드리프트(G.5·엔진 경로·목업) 정정.
- **이유:** 데모→협업 전환에는 "반복 판단"(매주 뭐가 정본이고 뭐가 됐나)을 받치는 구조가 필요. 정본 이중화·수동 상태표가 협업의 병목이었다.
- **영향:** `docs/` 전체 + 뷰어 `build.py`.

## D-13. 정식 서비스 스택 = Next.js + TS + Supabase(무료) · 2026-07-06

- **전:** 정적 사이트(vanilla JS) + sessionStorage/localStorage — 백엔드 없음. 검증 결과 **킬 메트릭조차 측정 불가**(피드백이 브라우저에만 남음).
- **후:** **Next.js(App Router)+TypeScript on Vercel Hobby + Supabase(Postgres)** 로 정식 개발. 엔진은 TS로 졸업해 **서버(API)에서 실행**(클라이언트 노출 X = 해자 보호).
- **이유:** ① 학원 팀플이라 **운영비 $0**(Vercel Hobby·Supabase Free·GH Actions 전부 무료) ② Vercel 기배포·문서가 예고한 경로 ③ Supabase 대시보드로 팀장이 킬 메트릭 SQL을 직접 소유 ④ lazy 가입·RLS가 다음 슬라이스로 이어짐.
- **첫 마일스톤:** "측정 가능한 MVP"(1b 본선) — 진단→서버엔진→결과→**피드백 DB 저장**→집계. 계획은 [마일스톤1-측정가능MVP.md](마일스톤1-측정가능MVP.md).
- **영향:** 레포 구조 전반(web/ 정적 → Next 앱), 엔진 TS 이관(D-11의 연장 — 단일 정본 유지).

## D-14. "환상의 궁합" 산정 기준 = 정반대 실루엣(상보성) · 2026-07-13

- **배경:** 결과 카드 맨 아래의 `🩷 환상의 궁합`(소희 설계, 카드 구조 고정 요소)은 `web/data/bodytypes.json`의 `gender.*.match` 값으로 하드코딩돼 있었으나 **왜 그 짝인지 산정 근거가 어디에도 없었다.** 바이럴 요소라 근거가 필요.
- **결정:** **환상의 궁합 = 나와 실루엣이 가장 상반된(정반대) 체형.** 8유형을 두 축 ① **상하 균형**(어깨−힙 볼륨) ② **허리 굴곡·중앙 볼륨**에 놓고, 내 좌표에서 **가장 먼 유형**을 궁합으로 본다. 서사는 *"서로에게 없는 라인을 채워주는 정반대 체형 → 정반대라서 끌린다."*
- **현재 값이 이 기준과 일치**(4쌍 모두 대칭 반대):
  - STR(직선·굴곡0) ↔ HRG(잘록한 굴곡) — 허리 굴곡 축 양극단
  - TRI(하체 볼륨) ↔ INV(상체 볼륨) — 상하 균형 축 양극단
  - BAL(표준·슬림) ↔ RND(둥근 볼륨) — 전체 볼륨 축 양극단
  - DIA(중앙 볼륨) ↔ TUB(일자 컬럼) — 중앙 볼륨 축 양극단
- **이유:** ① 근거 없는 매칭은 "왜?"에 답 못 해 바이럴 신뢰도가 떨어짐 ② 상보성(정반대) 프레임은 재미·공유 동기가 크고 실루엣 정의와도 자연 정합 ③ 4쌍이 이미 대칭이라 데이터 변경 없이 기준만 명문화하면 됨.
- **범위:** **기준 명문화까지만.** 데이터(`bodytypes.json`)·카드 마크업은 미변경. 카드에 근거 한 줄 노출(미세카피)은 마크업이 디자이너 소유라 소희와 상의 후 별건으로.
- **영향:** [4_화면정의.md](4_화면정의.md) §7(8유형 데이터), `web/data/bodytypes.json`(`match` 필드 해석 근거), `web/js/card.js`(렌더 위치).

## D-15. MVP 구현 = web/ 단일 소스 → app/ 생성 산출물(데이터 어댑터 스왑) · 2026-07-15

- **배경:** MVP는 **킬 메트릭 검증용 구현체**라 디자인·화면이 아직 미확정 → 수정이 계속 발생. 이 상태에서 `web/`(정적 프로토타입)를 `app/`(Next)로 **수기 이식하면 dual-source 드리프트**(D-11이 경계) + 흔들릴 때마다 재이식.
- **결정:** `web/`를 **단일 소스로 유지**, `app/`는 **생성 산출물(손 안 댐)**. 단 UI를 React로 **트랜스파일하지 않고**, **데이터 접근 층(어댑터)만 스왑**한다 — 프로토타입=`localStorage`/로컬 엔진 / 프로덕션=`/api/*`(서버 엔진·Supabase). 즉 `app/` = `web/` + prod 어댑터 + Next API 라우트를 생성·번들.
- **이유:** ① 디자인 미확정이라 **UI 이식은 시기상조**(트랜스파일은 컴파일러급 과잉·취약) ② 킬 메트릭 측정은 **정적 web/ + 실 백엔드면 충분**(픽셀 완성 불요) ③ **계약 3종**(DB 스키마·API shape·`tokens.css`)만 잠그면 UI가 흔들려도 재작업 최소 ④ 리포의 생성기 철학(`gen-screens`·`통합문서`)과 정합.
- **순서:** (1) `web/`에 **데이터 어댑터 심** 추출(`localStorage`·엔진 호출 → `web/js/data.js` 한 곳) (2) 얇은 백엔드 `/api/diagnose`·`/api/feedback` (3) 생성 스크립트로 `app/` 출력 (4) React 정식 이식은 **디자인 잠긴 뒤**(마일스톤1 §6 E). 엔진은 D-11/D-13대로 **TS 단일 정본**.
- **범위:** DB 스키마는 `db/00_mvp.sql`(PG15 실행 검증 완료)·`db/01`(정규화 목표, MVP 아님). MVP DB = diagnosis·feedback·kill_metric + admin(로그인·대시보드 실배선).
- **영향:** [마일스톤1-측정가능MVP.md](마일스톤1-측정가능MVP.md) §5(이관 전략)의 구체화 — "web→app 수기 이식" 대신 **"어댑터 스왑 생성"**. `web/js/**` 어댑터 리팩터, `db/`, `docs/5_정책·데이터.md`(API 계약).

## D-16. 단계 D — 진단 엔진 서버 이식(해자 보호) + 페이크도어 = 수요 수집만 · 2026-07-16

- **배경:** `app/` 배포 시 두 문제. ① `garments.json`(브랜드 실측표=해자, 공개 금지)을 클라 엔진이 진단 계산에 직접 로드 → 배포하면 실측표가 공개 다운로드 가능. ② 스타일리스트찾기·전문가 포털은 **화면만 있는 목업**이라 노출 시 "빈 껍데기" 인상.
- **결정(엔진):** garments(specs) 의존 계산만 **서버(`/api/diagnose`)로 이식**. 클라는 체형 추정(`BodyModel.estimate`)·8유형 분류(`FitBodyType`)·렌더 유지, 추정 cm+착용경험만 서버로 보내고 서버가 **역산(`bodyFromExperiences`)+추천(`recommend`)**을 계산해 `{eb, topRecs, botRecs}` 반환. `garments.json`은 **서버 번들 전용**(`api`가 require, `app/` 미배포). 입력 화면(diag-fit)은 cm-free **`size-catalog.json`**(브랜드·사이즈 라벨만, `scripts/gen-catalog.js` 생성)만 사용. `engine.js`가 이미 node 호환이라 이식 저비용.
- **결정(페이크도어=B):** 스타일리스트찾기는 **수요 수집만**. api 모드에서 견적요청·오픈알림 → `/api/lead`(`lead` 테이블, `db/02`) 저장 + "접수·오픈 시 알림"으로 종료, **목업 downstream(가짜 견적·결제·진행) 미개방**. 전문가 포털(`pro*`)·개발유틸(`_reset`)은 `app/` 화이트리스트에서 제외. admin은 숨기지 않고 **로그인+noindex 뒤 유지**.
- **결정(스타일리스트 = '준비 중 · 알림' 웨이트리스트로 통일):** api에서 스타일리스트찾기는 목업 목록/견적을 안 보이고 **모든 진입(상단 탭·홈 CTA·결과 페이지 `goExpert`→`#shop`)이 "오픈 준비 중 · 오픈 알림 신청" 웨이트리스트**로 감(`showOnly('stylistWaitlist')`). 탭은 **유지**(빼면 매칭 기대가 사라져 리텐션 손해) — 클릭 시 웨이트리스트. 수요 = **알림 신청**(`saveLead` kind=notify). 진단 후 전환은 `lead.session_id`↔`diagnosis.session_id` 조인으로 측정(같은 브라우저 세션). 인증(로그인·회원가입·My)은 측정 대상 아니라 api에서 **표면 전체 숨김** — 진단·수요 모두 로그인 불필요.
- **이유:** ① 저장된 원칙 "실측표 공개 금지" 준수하면서 킬 메트릭(진단) 유지 ② 페이크도어 본질(수요만 측정, 실제 미연결) ③ 목업 노출 제거로 배포 신뢰도.
- **배선:** `scripts/gen-app.js`(web/→app/ 큐레이트: 화이트리스트 복사·`garments.json` 제외·`FITTING_MODE='api'` 주입·pro 링크 중화·유출 가드), `scripts/gen-catalog.js`(cm-free 카탈로그), `vercel.json`(buildCommand=`gen-app`, outputDirectory=`app`). `app/`는 gitignore(빌드 재생성). `db/02_lead.sql`는 Supabase에 1회 적용 필요.
- **남은 것:** ① `db/02_lead.sql` Supabase 적용 ② `vercel dev`로 api 모드 E2E(진단→저장→피드백→lead) 확인 ③ 배포에서 Vercel nft가 `api`의 `../web/js`·`../web/data/garments.json` require를 함수에 번들하는지 검증. React 정식 이식은 여전히 디자인 잠긴 뒤(마일스톤1 §6 E).

## D-17. admin 실배선 = DB 콘솔 + 측정 2축 · MVP 메뉴 스코프 · 2026-07-16

- **배경:** D-16으로 측정 경로가 서버·DB로 옮겨지며, admin이 실데이터를 관리·측정하는 콘솔이 필요해짐. 기존 admin은 목업 뷰어(파일·샘플)였다.
- **결정(데이터 소스 = DB):** 실측표를 **`garment`/`garment_meta` 테이블**로 이관(`db/03`, RLS admin) → admin 5개 페이지가 DB 조회, **`/api/diagnose`도 garment 테이블에서 실측표 로드**(`rev` 버전 캐시로 편집 즉시 반영·`db/05`). admin-garments는 **직접 CRUD**(cm 편집·행 추가/삭제). 브랜드 **노출 순서**를 `brand` 테이블로 관리(`db/04`, 기본=실착 접근성 순), 진단 추천이 "잘 맞는 브랜드 안에서 순서대로" 반영. body 모델은 공개 기준이라 JSON 유지.
- **결정(측정 2축 = admin 뷰):** ① **진단·정확도**(킬메트릭, feedback+diagnosis RLS) + **정확도 추세**(날짜·엔진버전별). ② **전문가 수요**(`lead`, 웨이트리스트 이메일·진단→수요 전환). + **엔진 강화**(진단 로그 painFlags·openNote → 개선 작업목록, docs/6 §1.1 성장구조·자동학습 아님).
- **결정(MVP 메뉴 스코프):** admin 노출 = **사이즈·데이터 / 진단·정확도 / 엔진 강화 / 전문가 수요** 4개. v2(회원·거래·사업현황·B2B API·내부운영)는 `admin-common.js`가 네비 숨김 + `gen-app` 미배포. 인증은 Google OAuth(`is_admin`=admin_user), admin 로그아웃은 Supabase 세션까지 종료.
- **영향:** `db/03·04·05`, `web/js/admin-*`, `api/diagnose.js`(DB 소스+rev), `web/js/admin-auth.js`(garment/brand/lead/diagnoses 헬퍼), `scripts/import-garments.js`(garment·brand 시드). 자동 학습 루프·A축 검열추정은 여전히 "규모 후"(미구현) — 현재는 데이터 수집 + 수동 강화 우선순위.

## D-18. 거래 금액 라벨 = 단계별 정본 1개 · 고객·쇼퍼 동일 표기 · 2026-07-18

- **배경:** 요청~정산 흐름에서 금액 라벨이 화면마다 흔들렸다 — 같은 오픈 예산을 고객은 `예산`·쇼퍼는 `고객 예산`, 같은 지명 예상가를 `예상 가격`·`예상 98,000원`(축약) 혼용, 상담중 안내가는 `안내할 금액`. 사용자가 "금액 라이팅이 다 다르다"고 지적.
- **결정:** 금액 라벨을 **거래 단계마다 정본 하나로 고정**하고 **고객·쇼퍼 화면 동일 표기**. 오픈 요청=**예산**, 지명 요청=**예상 가격**(축약 금지), 수락 후=**확정 금액**, 상담중(쇼퍼→고객)=**결제 예정 금액**, 결제창 내역=**서비스 금액·수수료·결제 금액**, 정산=**결제 금액**. 안전결제(구 에스크로)는 UI 라벨을 **"안전결제"**로 통일(내부 개념명만 에스크로). 정본 표는 [0_용어집.md](0_용어집.md) §5.
- **이유:** ① 같은 개념을 다르게 부르면 신뢰·이해도 저하 ② 단계별로 개념이 실제 다르므로(예산 범위 vs 예상가 vs 확정가) 단계당 1개로 고정하면 충돌 없음 ③ 고객·쇼퍼가 같은 거래를 양쪽에서 보므로 동일 표기라야 거울로 맞음.
- **범위:** 라벨 문구 통일만. 금액 계산·수수료 정책은 미변경.
- **영향:** `web/js/index.js`(고객), `web/js/pro-quote.js`·`web/js/pro.js`(쇼퍼 — 개발자 소유, 알림 필요), [0_용어집.md](0_용어집.md) §5 신설.
