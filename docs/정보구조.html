<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 · 화면 지도 (IA 전체 맵)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#F6F6F5; --surface:#FFFFFF; --ink:#16140F; --ink-soft:#3A382F;
    --sub:#6E6B63; --sub2:#A6A29A; --line:#E6E5E1; --line2:#DAD8D2; --soft:#EDEDEA;
    --green:#2E4A3B; --green-mid:#5A7A68; --green-soft:#E7EFEA; --warn:#B0553F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--ink); letter-spacing:-.02em; -webkit-font-smoothing:antialiased; padding:40px 20px 100px;}
  .wrap{max-width:1000px; margin:0 auto;}
  .logo{font-size:21px; font-weight:800; letter-spacing:-.06em;}
  h1{font-size:30px; font-weight:800; letter-spacing:-.045em; margin-top:10px;}
  .lead{font-size:14.5px; color:var(--sub); margin-top:9px; line-height:1.65;}
  .lead b{color:var(--ink); font-weight:700;}

  .note{margin-top:14px; background:var(--green-soft); border:1px solid #d3e3d9; border-radius:14px; padding:13px 16px; font-size:12.5px; color:var(--ink-soft); line-height:1.65;}
  .note b{color:var(--green); font-weight:800;}

  .bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:22px 0 6px; position:sticky; top:0; background:var(--bg); padding:12px 0; z-index:10;}
  .fbtn{border:1.5px solid var(--line2); background:var(--surface); color:var(--sub); font-family:inherit; font-size:13px; font-weight:700; padding:8px 14px; border-radius:30px; cursor:pointer;}
  .fbtn.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .sp{flex:1;}
  .tbtn{border:none; background:transparent; color:var(--green); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; padding:8px 6px;}

  .legend{display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--sub); margin-bottom:16px;}
  .legend span{display:inline-flex; align-items:center; gap:6px;}

  .b{display:inline-block; font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:20px; white-space:nowrap; letter-spacing:.01em;}
  .b.mvp{background:var(--green); color:#fff;}
  .b.mvpp{background:var(--green-soft); color:var(--green); border:1px solid #cadfd2;}
  .b.v2{background:var(--soft); color:var(--sub);}
  .b.mock{background:#F3E9E5; color:var(--warn); border:1px solid #e7d5cd;}

  /* 그룹 섹션 */
  .grp{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px 18px; margin-bottom:14px;}
  .gh{display:flex; align-items:center; gap:10px; font-size:17px; font-weight:800; letter-spacing:-.03em; cursor:pointer;}
  .gh .cnt{font-size:12px; color:var(--sub2); font-weight:700;}
  .gh .gnote{font-size:11.5px; color:var(--warn); font-weight:700; background:#F3E9E5; padding:2px 8px; border-radius:20px;}
  .gbody{margin-top:12px;}

  /* 노드 */
  .kids{margin-left:15px; border-left:1.5px solid var(--line); padding-left:13px; margin-top:2px;}
  .kids.hide{display:none;} .acts.hide{display:none;}
  .row{display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:9px; cursor:default;}
  .row:hover{background:var(--bg);}
  .row.has{cursor:pointer;}
  .tw{width:12px; font-size:11px; color:var(--sub2); flex:none; transition:.15s;}
  .node.open>.row>.tw{transform:rotate(90deg);}
  .no{font-size:11px; color:var(--sub2); font-weight:700; font-variant-numeric:tabular-nums; min-width:52px;}
  .nm{font-size:14px; font-weight:700;}
  .nt{font-size:11.5px; color:var(--sub); font-weight:500;}
  .acts{margin:2px 0 8px 40px; display:flex; flex-direction:column; gap:3px;}
  .act{font-size:12px; color:var(--ink-soft); padding-left:12px; position:relative; line-height:1.5;}
  .act::before{content:"·"; position:absolute; left:2px; color:var(--sub2);}

  /* 필터 dim */
  body.f-mvp .node[data-pri="v2"], body.f-mvp .node[data-pri="mock"]{opacity:.22;}
  body.f-later .node[data-pri="mvp"], body.f-later .node[data-pri="mvpp"]{opacity:.22;}
</style>
</head>
<body>
<div class="wrap">
  <span class="logo">fitting</span>
  <h1>화면 지도 — IA 전체 맵</h1>
  <p class="lead">앱에 <b>어떤 화면이 있고</b> 우선순위가 어떤지 한눈에. <b>MVP만</b> 필터로 지금 만들 범위가, <b>v2·이후</b>로 미래 범위가 드러나요. 노드를 클릭하면 세부 요소가 펼쳐집니다.</p>

  <div class="note">이 지도는 <b>2_화면과흐름.md</b>(확정 IA)를 그대로 반영합니다. 번호는 <b>탭 기준</b> — 홈=탭1, 체형진단=탭2(2-1~2-7), 쇼퍼찾기=탭3(3-1~), 마이=탭4 · 공통 <b>G.*</b> · 별도 앱 전문가 <b>E.*</b> / 어드민 <b>A~D</b>.</div>

  <div class="bar">
    <button class="fbtn on" data-f="all" onclick="flt(this)">전체</button>
    <button class="fbtn" data-f="mvp" onclick="flt(this)">MVP만</button>
    <button class="fbtn" data-f="later" onclick="flt(this)">v2·이후</button>
    <span class="sp"></span>
    <button class="tbtn" onclick="allNodes(true)">모두 펼치기</button>
    <button class="tbtn" onclick="allNodes(false)">모두 접기</button>
  </div>

  <div class="legend">
    <span><span class="b mvp">★ MVP</span> 지금 만든다</span>
    <span><span class="b mvpp">◐ MVP최소</span> 최소만</span>
    <span><span class="b v2">○ v2</span> 다음</span>
    <span><span class="b mock">목업</span> 껍데기(화면만)</span>
  </div>

  <div id="tree"></div>
</div>

<script>
  var IA = [
    { id:'t1', title:'탭1 🏠 홈', nodes:[
      { no:'홈', name:'히어로', pri:'mvp', note:'서비스의 입구 · 3초 전달', actions:['서비스 한 줄 소개 + 큰 버튼 [내 사이즈 진단 시작] → 탭2로'] },
      { no:'홈', name:'상황별 쇼퍼 리스트', pri:'mvp', note:'전문가 0명 시 오픈예정/1기 모집', actions:['소개팅·면접·결혼식·여행 등 상황별 전문가 목록','전문가 0명이면 손님=오픈알림 신청 / 전문가=1기 지원 공고로 동시 작동(콜드스타트 해소)'] },
      { no:'홈', name:'작동 방식 3스텝', pri:'mvp', note:'신뢰 형성', actions:['"이렇게 씁니다" 3단계 설명'] },
      { no:'홈', name:'헤더', pri:'mvp', actions:['로그인','전문가 지원 → 전문가 앱(E.*)로 이동'] }
    ] },

    { id:'t2', title:'탭2 🔍 체형진단', gnote:'서비스의 심장 · 킬 메트릭 결정', nodes:[
      { no:'2-1', name:'기본 정보 입력', pri:'mvp', note:'진단 1단계', actions:['성별 · 나이 · 키 · 몸무게','성별을 고르면 평균값을 미리 채워 줌','선호핏은 2-2에서 물음'] },
      { no:'2-2', name:'착용경험 보정', pri:'mvp', note:'정확도의 핵심 · 질문 정본은 엔진(3_사이즈엔진.md)', actions:[
        '진단할 옷 종류 선택 — 기반=상의+하의 둘 다 / 파생(아우터·원피스·치마)=선호핏만',
        '그 종류의 선호핏 택1(스키니·슬림·레귤러·루즈·오버)',
        '같은 종류로 입어본 옷 [브랜드 + 핏 + 사이즈] × 1~3벌',
        '부위별 느낌 → 큼 / 여유 / 딱맞음 / 끼임 (상의: 어깨·가슴·소매·배·총장 / 하의: 허리·엉덩이·허벅지·밑위·기장)',
        '[state] 입력 길어짐 → 진행단계 표시 + 뒤로 수정 가능(이탈 방지)',
        '[state] 0벌 → 건너뛰기 허용(신뢰도 낮게)',
        '[state] 1벌만 → "1벌로 진단" vs "다른 핏 더 넣기"',
        '[state] 목록에 없음 → 직접 입력 / 해당 없음'
      ] },
      { no:'2-3', name:'진단 로딩', pri:'mvp', note:'몇 초 걸릴 수 있음', actions:['계산 대기 화면 — 역산 + 매칭 + AI 설명 문장'] },
      { no:'2-4', name:'결과 카드', pri:'mvp', note:'제품의 얼굴 · 전환 트리거①', actions:[
        '① 체형 프로필(8유형 캐릭터) — 8유형 데이터는 web/data/bodytypes.json 한 곳에서만',
        '② 핏 인사이트',
        '③ 브랜드별 추천 사이즈 · 옷장(카테고리별 진단 현황)',
        '[state] 신뢰도 3단계 — 0벌=낮음(주의 배너) / 1벌=보통 / 2~3벌=정확',
        '[state] 추정 실패 → "옷을 더 추가" → 2-2로 되돌림',
        '[state] 재진단 → 입력 수정 → 2-2',
        '[state] 결과 저장 → 비회원 임시링크 / 가입 시 영구 = 가입 유도 지점①',
        '옷장 → 한 번 누르면 다음 종류 진단으로 이어짐(기본정보·체형 재사용)',
        '※ 8유형(카드 그림) ↔ 엔진(상·하체 계산) 매핑은 결과화면 구현 전 별도 설계(2_화면과흐름.md §6)'
      ] },
      { no:'2-5', name:'피드백 수집', pri:'mvp', note:'★ 킬 메트릭 측정 — 사이즈 정확도 ≥65%', actions:['"실제 내 사이즈와 맞나요?" 동의/비동의','"안 사본 브랜드도 사보겠어요?" 의향'] },
      { no:'2-6', name:'전문가 전환', pri:'mvp', note:'무료 진단 → 유료 상담으로 넘어가는 다리', actions:['"스타일까지 전문가에게 받기" 버튼 → 탭3'] },
      { no:'2-7', name:'결과 공유', pri:'v2', note:'입소문 유도, 나중에', actions:['카드 이미지 / 링크 공유'] }
    ] },

    { id:'t3', title:'탭3 👔 쇼퍼찾기 (전문가 매칭 · 수요 측)', gnote:'MVP는 페이크도어(3-1)만', nodes:[
      { no:'3-1', name:'매칭 진입 · 유형 선택 (페이크도어)', pri:'mvp', note:'S1 · 전환신호 ≥25% 측정 · 가입 유도②', actions:[
        '관심 서비스 선택 — 온라인 스타일링 / 동행 쇼핑 / 이미지 컨설팅',
        '상황 선택 — 소개팅·면접·결혼식·여행',
        '"열리면 알려주세요" 알림 신청 + 1기 전문가 모집',
        '누른 것을 기록(어떤 유형에 수요가 있는지)',
        '[state] 실제 이용(알림신청) → 가입 관문②'
      ] },
      { no:'3-2', name:'알림 완료 / 준비중', pri:'mvp', note:'여기까지가 MVP 흐름의 끝(도착점)', actions:['"오픈하면 알려드릴게요" 확인'] },
      { no:'3-3', name:'전문가 목록', pri:'v2', note:'S2', actions:['정렬(잘 맞는 순·평점·후기·가격) · 필터(유형·상황·예산·지역·일정)','전문가 카드 + 매칭도 뱃지(체형·상황 적합도)'] },
      { no:'3-4', name:'전문가 프로필', pri:'v2', note:'S3', actions:['작업 결과물 갤러리 · 후기·평점 · 경력·전문분야·상황 태그','제공 서비스/가격/소요시간 · 예약 가능 일정'] },
      { no:'3-5', name:'매칭 요청', pri:'v2', note:'S4 · 핸드오프(차별점)', actions:['내 체형·사이즈 정보가 자동 첨부(body_profile_ref) + 상황·날짜','유형별로 묻는 항목이 다름'] },
      { no:'3-6', name:'상담 / 메시지', pri:'v2', note:'S5', actions:['전문가와 1:1 채팅으로 예산·취향 파악'] },
      { no:'3-7', name:'추천 / 예약 결과', pri:'v2', note:'S6', actions:['온라인: 코디·상품·구매링크 / 오프라인: 예약 확정·세션 안내'] },
      { no:'3-8', name:'결제 / 예약', pri:'v2', note:'S7', actions:['온라인: 매칭 수수료·패키지 / 오프라인: 예약금·세션비'] },
      { no:'3-9', name:'완료 · 후기 · 평점', pri:'v2', note:'S8', actions:['만족도·후기·재호출 의향 → 다음 사용자 목록 정렬에 반영'] }
    ] },

    { id:'t4', title:'탭4 👤 마이', gnote:'MVP는 최소만', nodes:[
      { no:'마이', name:'로그인 / 회원가입', pri:'mvpp', note:'lazy 가입 — 저장·매칭 시점에만 창으로', actions:['가입은 꼭 필요한 순간에만 요구(트리거 ①②)','비회원 진단 결과(임시링크)를 계정에 영구 연결'] },
      { no:'마이', name:'진단 이력', pri:'v2', note:'append-only(덮어쓰지 않음)', actions:['시점별로 지우지 않고 쌓아 둔 기록'] },
      { no:'마이', name:'체형 변화 추이', pri:'v2', actions:['체중·버전에 따른 변화'] },
      { no:'마이', name:'카테고리별 최신 결과 (옷장)', pri:'v2', actions:['"옷장"이 영구히 사는 곳'] },
      { no:'마이', name:'받은 추천 · 알림', pri:'v2', actions:['매칭·소식 알림'] }
    ] },

    { id:'G', title:'G. 공통 페이지 (탭 밖 어디서나)', nodes:[
      { no:'G.1', name:'서비스 소개 / 작동 원리', pri:'mvp', note:'신뢰 형성 · 정확도 근거', actions:['How it works 3스텝 · 정확도 근거 제시'] },
      { no:'G.3', name:'이용약관', pri:'mvp', note:'한국 서비스 법적 필수', actions:['이용 조건·책임·분쟁'] },
      { no:'G.4', name:'개인정보 처리방침', pri:'mvp', note:'체형·신체치수 = 민감정보 명시', actions:['수집·목적·보유·제3자·파기'] },
      { no:'G.5', name:'개인정보 수집·이용 동의', pri:'mvp', note:'진단 시작(2-1) 직전 동의창', actions:['진단 전 동의 체크 · 필수/선택 구분'] },
      { no:'G.2', name:'FAQ', pri:'v2', actions:['자주 묻는 질문'] },
      { no:'G.6', name:'알림', pri:'v2', note:'사용자·전문가 공용', actions:['매칭 오픈·결과 알림'] },
      { no:'G.7', name:'404 / 에러', pri:'v2', actions:['공유 링크 만료 · 네트워크 오류'] }
    ] },

    { id:'E', title:'전문가 앱 (별도 진입 · 공급 측)', gnote:'전부 목업 (E8만 진열용 제작)', nodes:[
      { no:'E0', name:'전문가 랜딩', pri:'mock', actions:['수수료·정산·기대 수익 안내 · "1기 지원" 버튼(홈 모집 링크가 여기로)'] },
      { no:'E1', name:'지원 / 등록', pri:'mock', actions:['경력·전문분야·잘하는 상황·포트폴리오 제출'] },
      { no:'E2', name:'심사 / 승인 대기', pri:'mock', note:'운영자 O1과 짝', actions:['플랫폼이 품질을 거름 · 승인 전엔 사용자에게 안 보임'] },
      { no:'E3', name:'정산계좌 · 세금', pri:'mock', actions:['입금 계좌 · 사업자/원천징수 정보 등록'] },
      { no:'E4', name:'대시보드', pri:'mock', actions:['들어온 요청·진행 중인 일 · "일 받을 수 있음/마감" 스위치'] },
      { no:'E5', name:'매칭 요청 상세', pri:'mock', note:'★ 우리만의 강점(핸드오프) — 사이즈 번역 결과 수신', actions:['사용자 체형 정보 + 브랜드별 추천 사이즈 수신 · 수락/거절','안 만나도 정확히 고를 수 있게 하는 곳(숨고·크몽과 갈리는 지점)'] },
      { no:'E6', name:'상담 / 메시지', pri:'mock', actions:['추천 전 사용자와 대화로 취향 파악'] },
      { no:'E7', name:'추천 / 결과 작성', pri:'mock', actions:['온라인: 상품·코디·링크 / 오프라인: 예약·세션 노트'] },
      { no:'E8', name:'서비스 상품 관리', pri:'mock', note:'MVP에서 유일하게 진열용으로 제작 (사용자 S3에 그대로 보임)', actions:['내가 파는 서비스를 진열(메뉴판) · 유형별 범위·소요시간·가격'] },
      { no:'E9', name:'프로필 / 포트폴리오', pri:'mock', actions:['사용자에게 보일 내 소개 편집(= 프로필 원본)'] },
      { no:'E10', name:'리뷰 / 평점', pri:'mock', actions:['받은 리뷰 보기·답하기'] },
      { no:'E11', name:'수익 / 정산', pri:'mock', actions:['정산 내역 · 유형·상황별 수익 통계'] }
    ] },

    { id:'A', title:'운영 어드민 (별도 진입 · 중개 측)', gnote:'목업', nodes:[
      { no:'A', name:'[A] 사이즈 엔진 / 데이터', pri:'mock', note:'핏팅의 심장 · 엔진의 연료', kids:[
        { no:'', name:'브랜드 사이즈 DB', pri:'mock', actions:['브랜드×핏×사이즈 실측 · 출처·신뢰도 메타'] },
        { no:'', name:'엔진 정확도 모니터링', pri:'mock', actions:['피드백 로그 오차 분석 · 자주 틀리는 지점'] },
        { no:'', name:'번역 규칙 관리', pri:'mock', actions:['여유분·주관평가↔cm 매핑 튜닝'] },
        { no:'', name:'수집 파이프라인', pri:'mock', actions:['크롤링 상태 · 신규 브랜드 커버리지'] }
      ] },
      { no:'B', name:'[B] 회원 · 거래 운영', pri:'mock', note:'마켓 신뢰·수익 조절', kids:[
        { no:'O1', name:'전문가 승인 / 심사 대기줄', pri:'mock', actions:['승인·반려로 품질 게이트(E2와 짝)'] },
        { no:'', name:'회원 관리', pri:'mock', actions:['조회 · 정지/차단 · CS'] },
        { no:'O2', name:'분쟁 · 환불 · 신고', pri:'mock', actions:['노쇼·불만족 환불 · 신고 대응 = 믿는 장터의 핵심'] },
        { no:'O3', name:'정산 집행 · 수수료 정책', pri:'mock', actions:['전문가별 지급 · 수수료율·유형별 요금 = 돈 버는 손잡이'] },
        { no:'O4', name:'리뷰 관리', pri:'mock', actions:['가짜·악성 리뷰 정리'] }
      ] },

        { no:'O5', name:'운영 대시보드', pri:'mock', actions:['거래액(GMV)·매칭 성사율·활동 전문가 수'] },
        { no:'', name:'제품 지표 대시보드', pri:'mock', actions:['진단 완료율 · 전환신호 · 킬 메트릭(정확도)'] }

    ] }
  ];

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function node(n, depth){
    var has = n.kids && n.kids.length;
    var open = depth < 1; // 최상위만 기본 펼침
    var h = '<div class="node'+(open?' open':'')+'" data-pri="'+n.pri+'">';
    h += '<div class="row'+(has||n.actions?' has':'')+'"'+((has||n.actions)?' onclick="tog(this)"':'')+'>';
    h += '<span class="tw">'+((has||n.actions)?'▸':'')+'</span>';
    h += '<span class="b '+n.pri+'">'+({mvp:'★',mvpp:'◐',v2:'○',mock:'목업'}[n.pri])+'</span>';
    if(n.no) h += '<span class="no">'+esc(n.no)+'</span>';
    h += '<span class="nm">'+esc(n.name)+'</span>';
    if(n.note) h += '<span class="nt">'+esc(n.note)+'</span>';
    h += '</div>';
    if(n.actions) h += '<div class="acts'+(open?'':' hide')+'">'+n.actions.map(function(a){return '<div class="act">'+esc(a)+'</div>';}).join('')+'</div>';
    if(has) h += '<div class="kids'+(open?'':' hide')+'">'+n.kids.map(function(k){return node(k,depth+1);}).join('')+'</div>';
    h += '</div>';
    return h;
  }
  function count(nodes){ var c=0; nodes.forEach(function(n){ c++; if(n.kids) c+=count(n.kids); }); return c; }

  var tree = document.getElementById('tree');
  tree.innerHTML = IA.map(function(g){
    return '<div class="grp"><div class="gh" onclick="togGrp(this)"><span class="tw" style="font-size:13px">▾</span>'+esc(g.title)+' <span class="cnt">('+count(g.nodes)+'개 화면)</span>'+(g.gnote?'<span class="gnote">'+esc(g.gnote)+'</span>':'')+'</div><div class="gbody">'+g.nodes.map(function(n){return node(n,0);}).join('')+'</div></div>';
  }).join('');

  function tog(row){
    var nd = row.parentNode; nd.classList.toggle('open');
    var opened = nd.classList.contains('open');
    [].forEach.call(nd.children, function(c){ if(c.classList.contains('kids')||c.classList.contains('acts')) c.classList.toggle('hide', !opened); });
  }
  function togGrp(gh){ var b=gh.nextElementSibling; b.style.display = b.style.display==='none'?'':'none'; gh.querySelector('.tw').textContent = b.style.display==='none'?'▸':'▾'; }
  function allNodes(open){
    document.querySelectorAll('.node').forEach(function(nd){
      nd.classList.toggle('open', open);
      [].forEach.call(nd.children, function(c){ if(c.classList.contains('kids')||c.classList.contains('acts')) c.classList.toggle('hide', !open); });
    });
  }
  function flt(btn){
    document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on');}); btn.classList.add('on');
    document.body.classList.remove('f-mvp','f-later');
    if(btn.dataset.f==='mvp') document.body.classList.add('f-mvp');
    if(btn.dataset.f==='later') document.body.classList.add('f-later');
  }
</script>
