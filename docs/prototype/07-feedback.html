<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 — 피드백</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css">
<link rel="stylesheet" href="fitting.css">
</head>
<body>

<div class="protobar">
  <span class="id">1.1.1.3</span><span class="nm">피드백 수집</span><span class="star">★</span> <span class="small" style="color:#facc15">킬 메트릭 측정 ≥65%</span>
  <div class="links">
    <a href="index.html">◇ 전체 흐름</a>
    <a href="06-result.html">← 결과</a>
    <a href="08-expert-bridge.html">다음: 전문가 →</a>
  </div>
</div>

<div class="flow">
  <a href="06-result.html" class="backlink">← 결과로</a>

  <span class="kicker mt-16">One more thing</span>
  <h2 class="step-h">결과, 맞았나요?</h2>
  <p class="lead mb-24">딱 두 가지만요. 이 응답이 번역 엔진을 더 정확하게 만들고, 다음 사람의 진단을 개선합니다.</p>

  <div class="card pad-lg">
    <div class="fb-q">
      <div class="q">추천 사이즈가 <strong>실제 내가 입는 사이즈와 맞다</strong>고 느끼시나요?</div>
      <div class="seg">
        <div class="opt" onclick="pick(this)">매우 그렇다</div>
        <div class="opt" onclick="pick(this)">그렇다</div>
        <div class="opt" onclick="pick(this)">아니다</div>
        <div class="opt" onclick="pick(this)">전혀 아니다</div>
      </div>
    </div>

    <div class="fb-q">
      <div class="q">이 결과를 보고, <strong>안 사본 브랜드도 사보겠다</strong>는 생각이 드나요?</div>
      <div class="seg">
        <div class="opt" onclick="pick(this)">그렇다</div>
        <div class="opt" onclick="pick(this)">보통</div>
        <div class="opt" onclick="pick(this)">아니다</div>
      </div>
    </div>

    <div class="fb-q">
      <div class="q">덧붙일 말 <span class="hint">선택</span></div>
      <input type="text" placeholder="예: 어깨는 맞는데 소매가 길었어요">
    </div>
  </div>

  <div class="mt-24 mb-24">
    <a href="08-expert-bridge.html" class="btn-primary btn-block">제출하고 계속</a>
    <p class="cta-note center">응답은 익명 통계로만 쓰여요.</p>
  </div>
</div>

<script>
  function pick(el){[...el.parentElement.children].forEach(c=>c.classList.remove('on'));el.classList.add('on')}
</script>
</body>
</html>
