<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 기획 문서</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css">
<style>
  :root{--bg:#F6F6F5;--surface:#FFFFFF;--ink:#16140F;--ink-soft:#3A382F;--sub:#6E6B63;--sub2:#A6A29A;--line:#E6E5E1;--line2:#DAD8D2;--green:#2E4A3B;--green-soft:#E7EFEA;--warn:#B0553F;--sans:'Pretendard','Apple SD Gothic Neo',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:15px 30px;display:flex;align-items:center;gap:12px}
  .top .logo{font-size:20px;font-weight:800;letter-spacing:-.05em;color:var(--green);text-decoration:none}
  .top .logo i{display:inline-block;width:6px;height:6px;background:var(--green);margin-left:1px;vertical-align:baseline}
  .top .crumb{font-size:13.5px;color:var(--sub)}
  .top .hint{margin-left:auto;font-size:12px;color:var(--sub2)}
  .layout{display:grid;grid-template-columns:270px 1fr;max-width:1220px;margin:0 auto}
  .side{position:sticky;top:59px;align-self:start;height:calc(100vh - 59px);overflow-y:auto;padding:26px 16px 60px;border-right:1px solid var(--line)}
  .side .tl{font-size:11px;font-weight:800;letter-spacing:.11em;color:var(--sub2);text-transform:uppercase;margin:22px 8px 9px}
  .side .tl:first-child{margin-top:0}
  .side a{display:block;font-size:14px;color:var(--sub);text-decoration:none;padding:8px 10px;border-radius:8px;line-height:1.45}
  .side a:hover{background:var(--green-soft);color:var(--green)}
  .side #docnav a.active{background:var(--green);color:#fff;font-weight:700}
  .side .viz a::after{content:"↗";margin-left:6px;font-size:11px;color:var(--sub2)}
  .side .toc a{font-size:13px;color:var(--sub);padding:5px 10px}
  .side .toc a.lv3{padding-left:22px;font-size:12.5px;color:var(--sub2)}
  .side .toc a.active{background:var(--green-soft);color:var(--green);font-weight:700}

  .content{padding:48px 56px 160px;max-width:820px;min-width:0;word-break:keep-all;overflow-wrap:break-word;letter-spacing:-.002em;line-height:1.9;}
  .content h1{font-size:38px;font-weight:800;letter-spacing:-.04em;line-height:1.25;margin:6px 0 20px}
  .content h2{font-size:27px;font-weight:800;letter-spacing:-.03em;line-height:1.3;margin:52px 0 16px;padding-top:20px;border-top:1px solid var(--line);scroll-margin-top:76px}
  .content h3{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:34px 0 10px;scroll-margin-top:76px}
  .content h4{font-size:16px;font-weight:800;margin:22px 0 8px;color:var(--ink-soft)}
  .content p{margin:15px 0;font-size:17px;line-height:1.92}
  .content ul,.content ol{margin:14px 0 16px 24px}
  .content li{margin:9px 0;font-size:16.5px;line-height:1.85}
  .content a{color:var(--green);font-weight:600;text-underline-offset:2px}
  .content strong{font-weight:800}
  .content code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;background:#EDEFEB;border:1px solid var(--line);border-radius:6px;padding:1.5px 6px;letter-spacing:0}
  .content pre{background:#16171b;color:#e8e8e6;border-radius:12px;padding:18px 20px;overflow:auto;margin:18px 0;line-height:1.7}
  .content pre code{background:none;border:none;color:inherit;font-size:13px;padding:0}
  .content blockquote{border-left:3px solid var(--green);background:var(--green-soft);border-radius:0 12px 12px 0;padding:14px 18px;margin:18px 0}
  .content blockquote p{margin:6px 0;font-size:16px;line-height:1.8;color:var(--ink-soft)}
  .content table{border-collapse:collapse;width:100%;margin:20px 0;font-size:14.5px;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;line-height:1.6}
  .content th,.content td{text-align:left;padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:top}
  .content th{font-size:11.5px;color:var(--sub2);font-weight:800;letter-spacing:.03em;text-transform:uppercase;background:#F0F1ED;white-space:nowrap}
  .content tbody tr:last-child td{border-bottom:none}
  .content td strong{font-weight:800}
  .content hr{border:none;border-top:1px solid var(--line);margin:34px 0}
  .content>*:first-child{margin-top:0}

  /* iatree */
  .iatree{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:20px 0;background:#fff;letter-spacing:-.01em;line-height:1.5}
  .iatree .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .iatree .fb{border:1.5px solid var(--line2);background:#fff;color:var(--sub);font:inherit;font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:20px;cursor:pointer}
  .iatree .fb.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .iatree .tbtn{border:none;background:transparent;color:var(--green);font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;padding:6px 4px}
  .iatree .lg{margin-left:auto;font-size:11.5px;color:var(--sub2)}
  .ianode>.row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:8px}
  .ianode>.row.has{cursor:pointer}
  .ianode>.row:hover{background:var(--green-soft)}
  .ianode>.row>.tw{width:12px;flex:none;color:var(--sub2);font-size:11px;transition:.15s}
  .ianode.open>.row>.tw{transform:rotate(90deg)}
  .ia-b{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;flex:none}
  .ia-b.mvp{background:var(--green);color:#fff}.ia-b.mvpp{background:var(--green-soft);color:var(--green)}
  .ia-b.v2{background:#ECEEF1;color:#6b7280}.ia-b.mock{background:#F1EEE9;color:#9a8f7f}
  .ianode .no{font-size:11px;color:var(--sub2);font-weight:700;min-width:38px;font-family:ui-monospace,Menlo,monospace}
  .ianode .nm{font-size:14.5px;font-weight:700}
  .ianode .nt{font-size:12px;color:var(--sub)}
  .iakids{margin-left:14px;border-left:1.5px solid var(--line);padding-left:12px;margin-top:1px}
  .iakids.hide,.iaacts.hide{display:none}
  .iaacts{margin:1px 0 7px 32px}
  .iaact{font-size:12.5px;color:var(--ink-soft);padding-left:12px;position:relative;line-height:1.6}
  .iaact::before{content:"·";position:absolute;left:2px;color:var(--sub2)}
  .iatree.f-mvp .ianode[data-pri="v2"],.iatree.f-mvp .ianode[data-pri="mock"]{opacity:.24}
  .iatree.f-later .ianode[data-pri="mvp"],.iatree.f-later .ianode[data-pri="mvpp"]{opacity:.24}

  /* swatch */
  .swatch{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;margin:20px 0}
  .sw{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  .sw .chip{height:66px}
  .sw .m{padding:9px 12px}
  .sw .m .u{font-size:12.5px;font-weight:700;letter-spacing:-.01em}
  .sw .m .h{font-size:11.5px;color:var(--sub);font-family:ui-monospace,Menlo,monospace;margin-top:3px}
  .sw .m .t{font-size:11px;color:var(--sub2);font-family:ui-monospace,Menlo,monospace;margin-top:1px}

  /* compare */
  .compare{display:flex;flex-direction:column;gap:10px;margin:20px 0}
  .cmp{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .cmp .bad,.cmp .good{padding:12px 15px;font-size:14.5px;line-height:1.6}
  .cmp .bad{background:#FBEEEA;color:#8a4a3a}
  .cmp .good{background:var(--green-soft);color:var(--ink)}
  .cmp .bad::before{content:"✗ ";font-weight:800;color:var(--warn)}
  .cmp .good::before{content:"✓ ";font-weight:800;color:var(--green)}

  .num{font-family:'SUIT Variable',var(--sans);font-feature-settings:'tnum'}
  @media(max-width:860px){.layout{grid-template-columns:1fr}.side{display:none}.content{padding:28px 22px 90px}.content p{font-size:16.5px}.cmp{grid-template-columns:1fr}.content table{display:block;overflow-x:auto}}
</style>
</head>
<body>
<header class="top">
  <a class="logo" href="#README">Fitting<i></i></a>
  <span class="crumb" id="crumb">기획 문서</span>
  <span class="hint">md 단일 소스를 렌더 · 내용은 .md에서만 관리</span>
</header>
<div class="layout">
  <nav class="side">
    <div class="tl">문서</div>
    <div id="docnav"></div>
    <div class="tl">그림으로 보기</div>
    <div class="viz">
      <a href="유저플로우.html" target="_blank">유저플로우 (흐름도)</a>
    </div>
    <div class="tl">이 문서 목차</div>
    <div class="toc" id="toc-list"></div>
  </nav>
  <main class="content" id="content"></main>
</div>

__DOCS__
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  marked.setOptions({ gfm:true, breaks:false });
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  var srcs=[].slice.call(document.querySelectorAll('script[data-doc]'));
  var fileToId={}; srcs.forEach(function(s){ fileToId[s.dataset.file]=s.dataset.doc; });
  var docnav=document.getElementById('docnav'), toc=document.getElementById('toc-list'), content=document.getElementById('content');
  srcs.forEach(function(s){ var a=document.createElement('a'); a.href='#'+s.dataset.doc; a.textContent=s.dataset.label; a.dataset.doc=s.dataset.doc; docnav.appendChild(a); });

  function codeBlocks(lang){ return [].slice.call(content.querySelectorAll('pre > code')).filter(function(c){ return new RegExp('(^|\\s)language-'+lang+'(\\s|$)').test(c.className); }); }

  /* iatree */
  var PRI={'★':'mvp','◐':'mvpp','○':'v2','목업':'mock','■':'mock'}, BADGE={mvp:'★',mvpp:'◐',v2:'○',mock:'목업'};
  function parseIA(text){
    var lines=text.split('\n').filter(function(l){return l.trim().length;});
    var root=[], stack=[{depth:-1,kids:root,node:null}];
    lines.forEach(function(raw){
      var indent=(raw.match(/^ */)[0].length), depth=Math.floor(indent/2), c=raw.trim();
      if(c.charAt(0)==='·'){ var host=stack[stack.length-1].node; if(host){(host.actions=host.actions||[]).push(c.slice(1).trim());} return; }
      var p=c.split('|').map(function(x){return x.trim();});
      var node={pri:(PRI[p[0]]||'v2'), no:p[1]||'', name:p[2]||'', note:p[3]||'', kids:[]};
      while(stack.length && stack[stack.length-1].depth>=depth) stack.pop();
      stack[stack.length-1].kids.push(node); stack.push({depth:depth, kids:node.kids, node:node});
    });
    return root;
  }
  function iaNode(n, depth){
    var has=n.kids.length||(n.actions&&n.actions.length), open=depth<1;
    var h='<div class="ianode'+(open?' open':'')+'" data-pri="'+n.pri+'"><div class="row'+(has?' has':'')+'"'+(has?' data-tog="1"':'')+'>';
    h+='<span class="tw">'+(has?'▸':'')+'</span><span class="ia-b '+n.pri+'">'+BADGE[n.pri]+'</span>';
    if(n.no) h+='<span class="no">'+esc(n.no)+'</span>';
    h+='<span class="nm">'+esc(n.name)+'</span>'+(n.note?'<span class="nt">'+esc(n.note)+'</span>':'')+'</div>';
    if(n.actions&&n.actions.length) h+='<div class="iaacts'+(open?'':' hide')+'">'+n.actions.map(function(a){return '<div class="iaact">'+esc(a)+'</div>';}).join('')+'</div>';
    if(n.kids.length) h+='<div class="iakids'+(open?'':' hide')+'">'+n.kids.map(function(k){return iaNode(k,depth+1);}).join('')+'</div>';
    return h+'</div>';
  }
  function upgradeTrees(){
    codeBlocks('iatree').forEach(function(code){
      var el=document.createElement('div'); el.className='iatree';
      el.innerHTML='<div class="bar"><button class="fb on" data-f="all">전체</button><button class="fb" data-f="mvp">MVP만</button><button class="fb" data-f="later">v2·이후</button><button class="tbtn" data-all="1">모두 펼치기</button><button class="tbtn" data-all="0">모두 접기</button><span class="lg">★ MVP · ◐ 최소 · ○ v2 · 목업</span></div>'+parseIA(code.textContent).map(function(n){return iaNode(n,0);}).join('');
      code.parentNode.parentNode.replaceChild(el, code.parentNode);
      el.addEventListener('click', function(e){
        var f=e.target.closest('.fb'); if(f){ el.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');}); f.classList.add('on'); el.classList.remove('f-mvp','f-later'); if(f.dataset.f==='mvp')el.classList.add('f-mvp'); if(f.dataset.f==='later')el.classList.add('f-later'); return; }
        var t=e.target.closest('.tbtn'); if(t){ var op=t.dataset.all==='1'; el.querySelectorAll('.ianode').forEach(function(nd){ nd.classList.toggle('open',op); [].forEach.call(nd.children,function(c){ if(c.classList.contains('iakids')||c.classList.contains('iaacts')) c.classList.toggle('hide',!op); }); }); return; }
        var row=e.target.closest('.row.has'); if(row){ var nd=row.parentNode; nd.classList.toggle('open'); var o=nd.classList.contains('open'); [].forEach.call(nd.children,function(c){ if(c.classList.contains('iakids')||c.classList.contains('iaacts')) c.classList.toggle('hide',!o); }); }
      });
    });
  }
  /* swatch */
  function upgradeSwatch(){
    codeBlocks('swatch').forEach(function(code){
      var rows=code.textContent.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      var el=document.createElement('div'); el.className='swatch';
      el.innerHTML=rows.map(function(r){ var p=r.split('|').map(function(x){return x.trim();}); var hex=p[0]||'',u=p[1]||'',t=p[2]||'';
        var b=/#f{2}f{2}f{2}/i.test(hex.replace(/[^#0-9a-f]/gi,''))||/#fff/i.test(hex)?';border-bottom:1px solid var(--line)':'';
        return '<div class="sw"><div class="chip" style="background:'+esc(hex)+b+'"></div><div class="m"><div class="u">'+esc(u)+'</div><div class="h">'+esc(hex)+'</div>'+(t?'<div class="t">'+esc(t)+'</div>':'')+'</div></div>';
      }).join('');
      code.parentNode.parentNode.replaceChild(el, code.parentNode);
    });
  }
  /* compare */
  function upgradeCompare(){
    codeBlocks('compare').forEach(function(code){
      var rows=code.textContent.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      var el=document.createElement('div'); el.className='compare';
      el.innerHTML=rows.map(function(r){ var i=r.indexOf('=>'); if(i<0) return ''; return '<div class="cmp"><div class="bad">'+esc(r.slice(0,i).trim())+'</div><div class="good">'+esc(r.slice(i+2).trim())+'</div></div>'; }).join('');
      code.parentNode.parentNode.replaceChild(el, code.parentNode);
    });
  }

  var io=null;
  function buildTOC(){
    toc.innerHTML=''; var heads=content.querySelectorAll('h2, h3');
    heads.forEach(function(h,i){ var id='s'+i; h.id=id; var a=document.createElement('a'); a.href='#'+id; a.textContent=h.textContent.replace(/^\s+/,''); if(h.tagName==='H3') a.className='lv3'; toc.appendChild(a); });
    if(io) io.disconnect();
    io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ var id=e.target.id; [].forEach.call(toc.children,function(l){ l.classList.toggle('active', l.getAttribute('href')==='#'+id); }); } }); },{rootMargin:'-72px 0px -78% 0px'});
    heads.forEach(function(h){ io.observe(h); });
  }
  function wireLinks(){
    [].forEach.call(content.querySelectorAll('a'),function(a){
      var href=a.getAttribute('href')||'', file=href.replace(/^\.\//,'');
      if(fileToId[file]){ a.addEventListener('click',function(e){ e.preventDefault(); location.hash='#'+fileToId[file]; }); }
      else if(href.indexOf('http')===0){ a.target='_blank'; }
      else if(/\.html($|[?#])/.test(href)){ a.target='_blank'; }
    });
  }
  function render(id){
    var s=document.querySelector('script[data-doc="'+id+'"]'); if(!s){ s=srcs[0]; id=s.dataset.doc; }
    content.innerHTML=marked.parse(s.textContent);
    upgradeTrees(); upgradeSwatch(); upgradeCompare();
    [].forEach.call(docnav.children,function(a){ a.classList.toggle('active', a.dataset.doc===id); });
    var h1=content.querySelector('h1'); document.getElementById('crumb').textContent=h1?h1.textContent.replace(/^\s+/,''):s.dataset.label;
    buildTOC(); wireLinks(); window.scrollTo(0,0);
  }
  window.addEventListener('hashchange',function(){ var id=location.hash.slice(1); if(document.querySelector('script[data-doc="'+id+'"]')) render(id); });
  var start=location.hash.slice(1);
  render(document.querySelector('script[data-doc="'+start+'"]')?start:srcs[0].dataset.doc);
</script>
</body>
</html>
