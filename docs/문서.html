# 핏팅(Fitting) 기획 문서

> **처음 오셨나요?** 이 폴더의 문서 **5개만** 순서대로 읽으면 핏팅이 뭘 하는 서비스이고, 어떻게 만들지 파악됩니다. 신입 기획자 기준으로 쉽게 풀어 썼어요.

**핏팅 한 줄 소개** — 안 입어본 브랜드에서도 "내 사이즈가 뭔지" 몰라 망설이는 사람에게, **평소 잘 맞는 옷의 착용 경험**을 기준으로 브랜드를 가로질러 **내 사이즈를 번역**해 주는 AI 진단 서비스. 이후 전문가(스타일리스트) 매칭으로 확장.

라이브 프로토타입 👉 **https://fitting-kr.vercel.app**

📖 **한 곳에서 편하게 읽기 👉 [문서.html](문서.html)** — 아래 md 문서 전부를 딥그린 스타일로 렌더(좌측 목차·문서 전환·시각자료 링크). 더블클릭해서 브라우저로 여세요. (내용은 .md가 원본이고, 이 뷰어는 렌더용입니다.)

---

## 읽는 순서

| # | 문서 | 무엇을 답하나 |
|---|---|---|
| 1 | **[1_제품정의.md](1_제품정의.md)** | **왜 만드나** — 문제·타깃 사용자·MVP·성공 기준(킬 메트릭 ≥65%) |
| 2 | **[2_화면과흐름.md](2_화면과흐름.md)** | **무슨 화면이 있고 어떻게 흐르나** — 4탭 구조·진단 퍼널·화면별 상태·전환 흐름. (§13에 쇼퍼찾기/전문가 매칭 도메인 포함) |
| 3 | **[3_사이즈엔진.md](3_사이즈엔진.md)** | **사이즈를 어떻게 계산하나** — 데이터 모델·착용경험 입력·역산/추천/경고 규칙·엔진 계약 |
| 4 | **[4_디자인가이드.md](4_디자인가이드.md)** | **어떤 색·글꼴·모양·말투로 만드나** — 딥그린 디자인 언어(실제 토큰은 `web/tokens.css`) |

## 그림으로 보기
IA·색·UX 라이팅·**사용자 흐름도**까지 모두 [문서.html](문서.html) 뷰어가 md에서 직접 리치하게 렌더합니다 — 정보구조=IA 트리(2_화면과흐름), 색 스와치·말투 Before/After(4_디자인가이드), 사용자 흐름도(2_화면과흐름 §9). 별도 정적 HTML은 두지 않습니다.

## 핵심만 빠르게
- **문제**: 무신사 같은 몰은 자기 안 + 구매이력으로만 사이즈를 추천해서, **새 브랜드로 넘어가는 순간** 아무도 번역해주지 않는다.
- **해결**: "평소 잘 맞는 옷"의 착용감을 거꾸로 풀어 체형을 추정하고, 다른 브랜드에서 맞을 사이즈로 번역.
- **원칙**: 사이즈 계산은 **규칙 기반**(검증 가능), 자연어 서술만 LLM. 진단은 **옷 종류(카테고리) 단위**(기반=상의+하의). 성공/실패는 **킬 메트릭 ≥65%** 하나로 판단.
- **디자인**: 오프화이트 + 딥그린 1포인트 + 잉크블랙. 결과 카드만 예외(다크+8유형색).
- **분담(참고)**: 디자인·결과카드·마이·전문가 화면 / 엔진·나머지 진단 플로우 로 나눠 만든 뒤 하나로 통합.

## 문서를 고칠 때 (기여자·AI용)
내용은 `.md`가 원본, [문서.html](문서.html)은 자동 생성 뷰어입니다. 색·Before/After·IA는 전용 블록(`swatch`/`compare`/`iatree`)으로, 대비·매핑은 표로 쓰면 리치하게 렌더됩니다. **작성 규칙과 블록 문법은 👉 [문서작성규칙.md](문서작성규칙.md)**. 고친 뒤엔 `python3 docs/문서생성.py`로 재생성하세요.

## 지금 상태 (2026-07 기준)
- 통합 프로토타입은 **`web/`** 에 있고 Vercel로 배포됨. 단, 엔진은 아직 **목업**(`web/js/engine-mock.js`) — 실제 사이즈 계산·역산은 후속(엔진 문서 §6 로드맵 참고).
- 이 문서 세트가 **정본**입니다. 구버전(핏메이트 시절 기획서)·통합 과정 메모·원본 소스(html·xlsx 등)는 정리했고, 필요하면 git 히스토리나 각 작업자 원본에서 볼 수 있습니다.

# 핏팅(Fitting) — 제품 정의 (PRD + 발표 서사)

> **이 문서는 무엇?** 핏팅을 "왜, 누구를 위해, 무엇부터 만드나"로 설명한 제품 정의서입니다. 처음 읽는 사람이 방향을 잡는 문서예요.
>
> **자주 나오는 용어 한 줄 풀이**
> - **킬 메트릭(kill metric)**: 이 숫자가 안 나오면 서비스를 접거나 갈아엎는 '생사 기준' 지표. 우리는 "추천 사이즈가 맞다" 동의율 **≥ 65%**.
> - **페르소나**: 대표 사용자 한 명을 구체적 인물로 그린 것. **JTBD**: 그 사람이 "이걸 왜 쓰는가"를 상황·목적으로 적은 문장.
> - **North Star(북극성) 지표**: 팀이 장기적으로 키우려는 단 하나의 핵심 숫자. **Aha 모먼트**: 사용자가 "오, 좋다!"를 처음 느끼는 순간.
> - **페이크도어(fake door)**: 실제 기능은 안 만들고 버튼만 두어 "얼마나 누르나"로 수요를 떠보는 방법. **해자(moat)**: 경쟁자가 쉽게 못 따라오는 방어벽.

## 1. 한 줄 요약

새 브랜드 옷을 사고 싶어도 "내 사이즈가 맞을지" 몰라 주저앉는 사람에게, 평소 입던 옷의 착용 경험을 기준으로 **브랜드를 가로질러 내 사이즈를 번역해주는** AI 진단 카드. 진단으로 사용자·사이즈 데이터를 모아, 그 위에 스타일리스트 매칭을 얹어 확장한다.

> 표지 카피: *"브랜드를 가로질러 '내 사이즈'를 번역한다 — 사이즈 고민을 넘어, 새로운 나를 입다."*

## 2. 문제 정의

새 브랜드로 건너가려는 사람은 "이 브랜드에서 내 사이즈가 뭔지"를 몰라 망설인다. 무신사 등은 이미 사이즈 추천을 하지만 *자기 몰 안 + 구매 이력*에 갇혀 있어, 새 몰·새 브랜드로 넘어가는 순간엔 아무도 번역해주지 않는다. 결국 실패가 두려워 늘 사던 브랜드의 비슷한 옷만 다시 사게 된다.

> 차별점이자 해자: ① 몰 교차 ② 구매 이력 불필요(착용경험 기반) ③ 중립성 — 직접 팔지 않으니 건너가게 도울 동기가 있고, 몰을 가로지르는 사이즈 데이터는 개별 플랫폼이 구조적으로 못 만든다(무신사는 자기 울타리 안에 갇힘).

## 3. 가설 — 왜 사이즈를 도구로 푸는가

새 옷 구매가 막히는 이유(설문): **스타일 어울림 40% / 사이즈 적합 38%.** 두 축이 거의 반반이라 하나만 풀면 절반의 사용자만 잡힌다. 성질이 다르니 푸는 주체도 다르게 —

- **스타일**은 정답이 없다 → **전문가**가 푼다 (후속 가설: 스타일리스트 매칭).
- **사이즈**는 정답이 있다 → **도구**가 푼다 (지금의 심장: 번역 엔진).

## 4. 타깃 페르소나 · JTBD

- 김도현 / 33 / 직장인. 소개팅·미팅·발표처럼 잘 보이고 싶은 자리가 생기면 평소와 다른 새 브랜드·스타일을 시도하고 싶지만, 안 입어본 브랜드는 사이즈가 맞을지 두려워 결국 늘 사던 곳에서 비슷한 옷만 산다. 이런 자리엔 기꺼이 지갑을 열 의향이 있는데, 정작 무엇을 어떤 사이즈로 사야 할지 몰라 기회를 흘려보낸다.
- JTBD: *"안 입어보던 브랜드 옷을 사고 싶을 때, 사이즈 실패 걱정 없이 나에게 맞는 걸 골라 새로운 모습에 도전한다."*

## 5. 사용자 여정 (As-is → To-be)

| | As-is · 갇힌 옷장 | To-be · 건너가는 옷장 |
|---|---|---|
| 1 | 새 브랜드에 끌린다 | 새 브랜드에 끌린다 |
| 2 | "근데 사이즈 맞을까?" | 핏팅 — "당신은 이 브랜드 L" |
| 3 | 사이즈표·후기 봐도 확신 없음 | 사이즈 확신이 선다 |
| 4 | 실패가 두려워 포기 | 자신 있게 구매 |
| 5 | 늘 사던 비슷한 옷만 산다 | 처음 보는 옷이 옷장에 걸린다 |

## 6. North Star / Aha

- **North Star Metric:** 주간 유료 추천 채택 수. 본 MVP는 그 입구인 **사이즈 번역 정확도 + 유료 전환신호**를 검증한다.
- **Aha Moment:** 진단 카드에서 *"평소 입던 옷 기준으로, 한 번도 안 입어본 브랜드인데 이 사이즈면 맞겠다"*는 확신이 처음 드는 순간.

## 7. MVP 기능 (2개)

- **AI 체형·사이즈 진단 [LLM + 규칙]** — 입력: 성별·키·몸무게·나이 + *입어본 옷 착용경험 보정* + 선호핏. 출력 카드: ① 체형 프로필(캐릭터) ② 핏 인사이트 ③ **주요 브랜드별 추천 사이즈**.
- **전문가 추천 받기 (페이크도어)** — 버튼 클릭만 로깅해 유료 전환신호 측정(실매칭 X). 수요부터 확인.

## 8. 단계적 범위 · 비즈니스 (Now / Next)

*"데이터 확보 → 수익화 → 데이터 확장"의 사업 단계.*

- **Now(MVP) · 진단:** 진단으로 사용자·사이즈 데이터 확보(주요 브랜드 N개 한정). 수익원 —.
- **v2 · 매칭:** 전문가 실매칭으로 수익화 — 매칭 수수료(B2C)·커머스 제휴 커미션.
- **v3 · 확장:** 축적 데이터를 사이즈 API(B2B, 쇼핑몰 반품 절감)로 확장 + 상황별(소개팅·면접·결혼식·여행 등) 카테고리·오프라인·퍼스널컬러. 상황은 페인·지불 의향이 집중되는 지점이라 매칭의 과금 단위가 된다. 수익원 — 데이터 API·상황별 과금.

## 9. 성공 기준

- ★ **킬 메트릭** — 추천 사이즈가 "내가 실제 입는 사이즈와 맞다" 동의율 **≥ 65%** (아는 브랜드로 검증 → 실구매 없이 엔진 정확도 확인. 미달 시 엔진 교체/중단).
- 보조: "안 사본 브랜드도 사보겠다" 의향 ≥ 50%(페인 해소) / 유료 클릭률 ≥ 25%(전환신호).

## 10. 열린 질문

- 체형·사이즈 추정 로직(규칙 vs LLM vs 혼합) — *이 MVP가 킬 메트릭으로 답할 것.*
- 착용경험 보정 몇 벌·어떤 부위.
- 브랜드 실측 확보·정규화(차별점이자 최대 난관).
- 페이크도어 클릭의 허수 보정.

# 핏팅(Fitting) — 정보구조 · 화면 · 흐름

> **이 문서는 무엇인가요?**
> 핏팅 앱에 **어떤 화면이 있고, 사용자가 어떤 순서로 이동하는지**를 한곳에 모은 설계 지도입니다. 이런 문서를 흔히 **IA(Information Architecture, 정보구조)** 라고 부릅니다 — "정보와 화면을 어떻게 배치하고 연결하는가"의 설계도라는 뜻입니다.
> 처음 읽는 사람도 이 문서만으로 앱 전체 그림을 그릴 수 있도록 썼습니다.
>
> **함께 보는 문서(여기서 중복하지 않음):**
> - 색·글꼴·버튼 같은 디자인 규칙 → `4_디자인가이드.md`
> - 사이즈를 계산하는 엔진과 데이터 구조 → `3_사이즈엔진.md`
> - 쇼퍼찾기(전문가 매칭)의 자세한 내용 → §13(쇼퍼찾기 상세)

## 0. 핏팅은 어떤 서비스이고, 무엇으로 성공을 판단하나요?

**핏팅은 "브랜드마다 다른 옷 사이즈를 번역해 주는" 서비스입니다.**
예를 들어 A브랜드에서 M을 입는 사람이 처음 사는 B브랜드에서는 몇 사이즈를 골라야 할지 알려줍니다. 사용자가 **입어본 옷의 경험**(브랜드 + 핏 + 사이즈 + "어깨가 꼈다/배가 남았다" 같은 느낌)을 입력하면, 그걸 거꾸로 계산해(=**역산**, 결과에서 원인을 되짚어 몸의 치수·체형을 추정하는 것) 체형을 파악하고, 안 입어본 브랜드의 내 사이즈를 알려 줍니다.

**성공을 재는 핵심 숫자(킬 메트릭)**
- **킬 메트릭**(kill metric) = "이 하나가 안 되면 서비스가 죽는다"고 볼 만큼 가장 중요한 지표를 뜻합니다.
- 핏팅의 킬 메트릭 = **사이즈 정확도 ≥ 65%**. 즉, 진단 뒤 "실제 내 사이즈와 맞다"고 동의한 사람이 65% 이상이어야 합니다. (2-5 피드백 화면에서 측정)
- 보조 지표 = **전환신호 ≥ 25%** (쇼퍼찾기 진입을 눌러 본 사람 비율. 3-1 화면에서 측정)

> **왜 쇼퍼 매칭이 아니라 사이즈 번역인가요? (피벗 이야기)**
> 핏팅은 원래 "전문 쇼퍼를 연결해 주는" 서비스(옛 이름 핏메이트)로 시작했다가, **"내 사이즈를 정확히 번역해 주는" 서비스로 방향을 크게 틀었습니다**(이렇게 사업 방향을 크게 바꾸는 것을 **피벗**pivot이라 합니다). 그래서 체형 분류도 단순 성격 캐릭터 6종에서 **8체형(국가 인체 치수 자료인 '사이즈코리아' 근거)** 으로, 성공 기준도 만족도에서 **사이즈 정확도 ≥65%** 로 바뀌었습니다. 이 문서는 피벗 이후의 확정 상태만 담습니다.

**이 문서에서 쓰는 표시 약속**
- 우선순위: ★ MVP에서 실제로 만드는 것 · ◐ MVP에서 최소만 · ○ 목업(껍데기만)·나중(v2 이후)
  - **MVP**(Minimum Viable Product) = "최소한으로 만들어 가설을 검증하는 첫 버전"을 뜻합니다.
- 화면 번호: **탭 기준**으로 붙입니다. 홈=탭1, 체형진단=탭2(2-1, 2-2…), 쇼퍼찾기=탭3(3-1…), 마이=탭4. 공통 페이지는 G.*, 별도 앱은 전문가=E.* / 어드민=A~D.

## 1. 화면은 크게 어떻게 나뉘나요? (내비게이션 구조)

> **왜 4탭인가요?** 사용자가 앱 어디에 있든 손가락으로 바로 옮겨 다닐 수 있는 큰 방 4개를 화면 아래에 고정해 둔 것입니다. "지금 내가 어디 있는지" 헷갈리지 않게 하는 가장 단순한 구조입니다.

사용자 앱은 화면 **맨 아래에 항상 떠 있는 탭 4개**(🏠 홈 · 🔍 체형진단 · 👔 쇼퍼찾기 · 👤 마이)로 이동합니다. 그 위에 상황에 따라 잠깐 뜨는 요소(개인정보 동의창·로그인창·약관)와, 사용자 앱과는 완전히 분리된 **별도 앱 2개**(② 전문가 앱·③ 운영 어드민, 둘 다 껍데기)가 있습니다.

| 탭 | 이름 | 한 줄 설명 | MVP |
|---|---|---|---|
| 탭1 | 🏠 홈 | 첫 화면. "이게 뭐 하는 서비스"를 3초에 보여주고 진단을 시작시킴 | ★ |
| 탭2 | 🔍 체형진단 | **핏팅의 심장.** 무료로 사이즈를 진단해 주는 핵심 화면들 | ★ |
| 탭3 | 👔 쇼퍼찾기 | 전문가(쇼퍼) 연결. MVP에서는 "수요만 떠보는" 껍데기 | ★(껍데기만) |
| 탭4 | 👤 마이 | 내 진단 기록·저장·로그인 | ◐ |

> **홈 탭이 곧 첫 화면(랜딩)입니다.** 별도의 소개 페이지를 따로 두지 않고, 탭1 자체가 서비스를 소개하는 첫 화면 역할을 합니다.

## 2. 탭마다 무슨 화면이 있나요?

### 탭1 🏠 홈 ★

> **왜 이렇게?** 처음 온 사람이 3초 안에 "이게 나한테 쓸모 있겠다"고 느끼고 곧장 진단을 시작하게 만드는 게 목표입니다.

| 노드 | 무엇을 보여주나 | 참고 |
|---|---|---|
| 히어로 ★ | 서비스 한 줄 소개 + 큰 버튼 **[내 사이즈 진단 시작]** → 탭2로 | 서비스의 입구 |
| 상황별 쇼퍼 리스트 ★ | 소개팅·면접·결혼식·여행 등 상황별 전문가 목록 | **전문가가 아직 0명이면 "오픈예정/1기 모집"으로 표시** — 손님에겐 "관심 있으면 알림 신청", 전문가에겐 "지원하세요" 공고로 동시에 작동(양쪽을 동시에 모으는 방법) |
| 작동 방식 3스텝 ★ | "이렇게 씁니다" 3단계 설명 | 신뢰를 줌 |
| 헤더 | 로그인 · **전문가 지원**(→ 전문가 앱으로) | |

### 탭2 🔍 체형진단 ★ — 서비스의 심장

> **왜 여기에 힘을 쏟나요?** 핏팅의 성공 여부(킬 메트릭)가 여기서 결정되기 때문입니다. 사용자가 실제로 "내 사이즈 맞네!"라고 느끼는 곳이 바로 이 진단 결과입니다.

탭에 들어오면 먼저 **개인정보 수집·이용 동의(G.5)** 를 받고, 그다음 질문을 차례로 묻는 **위저드**(wizard, 여러 단계를 한 걸음씩 안내하는 입력 방식)가 시작됩니다.

> **위저드 순서:** 동의 → 기본정보(2-1) → 착용경험(2-2) → 로딩(2-3) → **결과카드(2-4)** → 피드백(2-5) → 전문가전환(2-6) → 탭3. 결과카드에서 결과공유(2-7 ○)로도 갈라집니다. (전체 흐름은 아래 §9의 그림 참고)

| # | 화면 | MVP | 무엇을 하나 | 참고 |
|---|---|:--:|---|---|
| 2-1 | 기본 정보 입력 | ★ | 성별·나이·키·몸무게 | 성별을 고르면 평균값을 미리 채워 줌. 선호핏은 2-2에서 물음 |
| 2-2 | 착용경험 보정 | ★ | ↓ 아래 상세 참고. **질문 항목의 정본(기준)은 엔진 쪽**(`3_사이즈엔진.md`) | 정확도의 핵심 |
| 2-3 | 진단 로딩 | ★ | 계산이 도는 대기 화면(역산 + 매칭 + AI 설명 문장) | 몇 초 걸릴 수 있음 |
| 2-4 | 결과 카드 | ★ | ① 체형 프로필(8유형 캐릭터) ② 핏 인사이트 ③ 브랜드별 추천 사이즈 · 옷장(진단 현황) | 제품의 얼굴. 링크로 공유 가능 |
| 2-5 | 피드백 수집 | ★ | "실제 내 사이즈와 맞나요?" · "안 사본 브랜드도 사보겠어요?" | **여기서 킬 메트릭(정확도 ≥65%) 측정** |
| 2-6 | 전문가 전환 | ★ | "스타일까지 전문가에게 받기" 버튼 → 탭3 | 무료 진단 → 유료 상담으로 넘어가는 다리 |
| 2-7 | 결과 공유 | ○ | 카드 이미지/링크 공유 | 입소문 유도, 나중에 |

#### 2-2 착용경험 — 자세히

> **왜 옷 종류(카테고리)별로 나눠서 묻나요?** 화면 편의가 아니라 계산 방식 때문입니다. 상의를 입어본 경험으로는 상체(어깨·가슴)만 알 수 있고, 하체(허리·엉덩이)는 알 수 없습니다. 그래서 질문·계산·결과를 모두 옷 종류 단위로 나눕니다.

묻는 것:
- **어떤 옷 종류를 진단할지 선택** (상의/하의 등)
- **그 종류의 선호핏** (스키니·슬림·레귤러·루즈·오버 중 택1)
- **같은 종류로 입어본 옷** `[브랜드 + 핏 + 사이즈]` 을 **1~3벌**(원하는 만큼)
- **부위별 느낌** → 큼 / 여유 / 딱맞음 / 끼임
  - 상의 부위: 어깨·가슴·소매·배·총장
  - 하의 부위: 허리·엉덩이·허벅지·밑위·기장

이 화면의 상태(state)별 처리 — **state**란 "같은 화면이 상황에 따라 다르게 보이는 경우"를 말합니다:

| 상황(state) | 어떻게 처리하나 |
|---|---|
| 입력이 길어짐 | 진행 단계 표시(몇 번째인지) + 뒤로가서 수정 가능 → 중간 이탈 방지 |
| 입어본 옷이 0벌 | "건너뛰기" 허용(대신 결과 신뢰도는 낮게 표시) |
| 1벌만 기억남 | "1벌로 진단" vs "다른 핏 옷 더 넣기" 중 선택 + 신뢰도 안내 |
| 목록에 그 브랜드가 없음 | "직접 입력" / "해당 없음" 선택 (MVP는 브랜드가 몇 개뿐이라 자주 생김) |

#### 2-4 결과 카드 — 상태별 처리

| 상황(state) | 언제 | 어떻게 보이나 |
|---|---|---|
| **신뢰도 3단계** | 입력한 옷 수에 따라 | **0벌 = 낮음**(주의 배너) / **1벌 = 보통**("한 벌 더 넣으면 정확해져요") / **2~3벌 = 정확**(배너 없음) |
| 추정 실패 | 계산이 확신을 못 할 때 | "옷을 더 추가해 주세요" → 2-2로 되돌림 |
| 재진단 | 결과가 마음에 안 들 때 | 입력을 고쳐 다시 → 2-2 |
| 결과 저장 | 저장 버튼 | 비회원이면 임시 링크로 잠깐 보관 / 가입하면 영구 보관 = **가입 유도 지점 ①**(아래 §8 참고) |
| 옷장 / 이어서 진단 | 계속 오게 만드는 장치 | 종류별 완료 현황(옷장)을 보여주고, 한 번 누르면 다음 종류 진단으로 이어짐. 기본정보·체형은 재사용하므로 두 번째부터는 옷만 새로 입력 |

### 탭3 👔 쇼퍼찾기 — 전문가 매칭

> **왜 껍데기(페이크도어)만 만드나요?** 실제 전문가 매칭 시스템은 크고 비쌉니다. 그래서 먼저 **버튼만 진짜처럼 만들어 두고 "얼마나 많은 사람이 누르는지"만 측정**합니다. 이렇게 "수요를 먼저 떠보는 가짜 문"을 **페이크도어**(fake door)라고 합니다. 자세한 내용은 §13(쇼퍼찾기 상세).

> 탭에 보이는 이름은 "쇼퍼찾기", 내부 용어·코드에서는 "전문가(expert)"로 통일합니다.

| # | 화면 | MVP | 요약 |
|---|---|:--:|---|
| 3-1 | 매칭 진입(페이크도어) | ★ | 관심 서비스 선택(온라인 스타일링 / 동행 쇼핑 / 이미지 컨설팅) → 누른 것을 기록. **전환신호 ≥25% 측정** · **가입 유도 지점 ②** |
| 3-2 | 알림 완료 / 준비중 | ★ | "오픈하면 알려드릴게요" 확인 = **여기까지가 MVP 흐름의 끝** |
| 3-3~3-7 | 목록·프로필·요청·추천결과·결제 | ○ | 실제 매칭. 나중(v2). 자세히는 §13(쇼퍼찾기 상세) |

**핵심 차별점:** 진단 결과(체형·사이즈)가 전문가 요청에 **자동으로 첨부**되어, 전문가가 더 정확히 추천할 수 있습니다. 다른 매칭 서비스와 갈리는 지점입니다(상세: §13(쇼퍼찾기 상세)).

### 탭4 👤 마이 ◐

> **왜 최소만 만드나요?** MVP 단계에서는 "결과를 저장하려는 사람"만 붙잡으면 충분합니다. 전체 마이페이지는 나중에.

| 노드 | MVP | 내용 |
|---|:--:|---|
| 로그인 / 회원가입 | ◐ | **가입은 꼭 필요한 순간에만** 요구(아래 §8). 저장·매칭 시 창으로 뜸 |
| 진단 이력 | ○ | 시점별로 지우지 않고 쌓아 둔 기록 |
| 체형 변화 추이 | ○ | 체중·버전에 따른 변화 |
| 카테고리별 최신 결과 | ○ | "옷장"이 영구히 사는 곳 |
| 받은 추천 · 알림 | ○ | |

## 4. 별도 앱 2개 (지금은 껍데기)

> **왜 별도인가요?** 사용자용 앱과 화면·로그인이 완전히 다르기 때문입니다. 지금은 "이런 게 있을 것"이라는 껍데기(목업)만 두고, 실제 개발은 나중입니다.

### ② 전문가 앱 ○ (전문가가 쓰는 앱)

홈 헤더의 "전문가 지원"을 누르면 여기로 옵니다. 자세히는 §13(쇼퍼찾기 상세).

**흐름:** 안내/혜택 → 지원/등록 → 심사/승인 → 정산계좌·세금 등록 → 대시보드(요청·진행 상태). 대시보드의 **E5 매칭요청 상세**에서 사이즈 번역 결과를 받아(= 차별점) 고객 상담 → 추천 작성으로 이어집니다. 상품 관리 ★·프로필/포트폴리오·리뷰·정산은 상시 접근.

- MVP에서 유일하게 만드는 것 = **상품 관리**(사용자에게 보일 "메뉴판"이라 가벼워서 먼저).
- **E5**에서 전문가가 사용자의 사이즈 번역 결과를 받는 것이 핵심 차별점입니다(도구가 전문가의 정확도를 높여 줌).

### ③ 운영 어드민 ○ (운영자가 쓰는 관리 화면)

| 영역 | 화면 | 핵심 |
|---|---|---|
| **A 사이즈 엔진/데이터**(핏팅의 심장) | 브랜드 사이즈 DB · 엔진 정확도 모니터링 · 번역 규칙 관리 · 수집 파이프라인 | 엔진의 연료. 정확도가 낮을 때 "어디를 고칠지" 파악 |
| **B 회원·거래 운영** | 전문가 승인 · 회원 관리 · 분쟁/환불/신고 · 정산·수수료 정책 · 리뷰 관리 | 마켓 신뢰와 수익 조절 |
| **C 사업 현황** | 운영 대시보드(거래액·성사율) · 제품 지표(진단완료율·전환신호·킬메트릭) | 사업/제품 지표를 나눠서 봄 |
| **D B2B API (v3)** | 고객(쇼핑몰) 관리 · API 키 · 사용량/과금 · 소개 | 모아 둔 데이터를 팔아 돈으로 만드는 경로 |

## 5. 진단 카테고리: "기반"과 "파생"

> **왜 나누나요?** 옷 종류마다 알 수 있는 정보가 다르기 때문입니다. 상·하의는 몸을 직접 재는 "기반"이 되고, 아우터·원피스·치마는 취향(선호핏)만 물으면 되는 "파생"입니다.

```iatree
★ | | 기반(基盤) | 몸(체형)을 실제로 확정하는 옷
  · 상의 + 하의 둘 다 끝나야 체형 카드 완성 (= 8유형 중 하나로 확정)
  · 상의만 끝나면 상체만 나온 "부분 카드" (8유형은 아직 미확정)
  ★ | | 상의 | 상체 역산 — 어깨·가슴·소매·배·총장
  ★ | | 하의 | 하체 역산 — 허리·엉덩이·허벅지·밑위·기장
○ | | 파생(派生) | 선호핏(취향)만 물음 · 기반이 끝나야 열림
  ○ | | 아우터 | 선호핏만
  ○ | | 원피스 | 선호핏만
  ○ | | 치마 | 선호핏만
```

- **기반 = 상의 + 하의 둘 다.** 둘 다 끝나야 체형 카드가 완성되고 8유형 중 하나로 확정됩니다. 상의만 끝나면 상체만 나온 부분 카드이고 8유형은 미확정입니다.
- **파생(아우터·원피스·치마)은 선호핏만** 받고, 기반이 끝나 체형이 확정된 뒤 열립니다.
- 실제 구현은 상의부터 시작합니다(브랜드 종류와 옷 종류를 동시에 벌리지 않기 위한 좁히기).

> **지금 남은 일(엔진 쪽):** 현재 시제품은 상의만 되어 있어 **하의 진단 흐름을 추가**해야 하고, 하의 계산 규칙도 아직 임시라 **정식화**가 필요합니다. 상세는 `3_사이즈엔진.md`.

## 6. 8유형과 엔진을 잇는 문제 (결과화면 만들기 전에 따로 설계)

> **왜 미리 못박아 두나요?** 결과 카드를 그리는 방식(8유형 그림 1개)과 엔진이 계산하는 방식(상·하체 따로)이 서로 어긋나기 때문입니다. 지금 답을 정하진 않되, "이 연결 작업이 반드시 필요하다"는 것을 명시해 둡니다.

- **8유형(카드에 그리는 그림)** = 몸 전체 실루엣 1개(사각 STR / 삼각 TRI / 역삼각 INV / 모래시계 HRG / BAL / DIA / RND / TUB).
- **엔진(계산)** = 상체·하체를 **따로** 계산합니다. 상의 진단이면 상체 라인만, 하의 진단이면 하체 라인만 나옵니다.
- **그래서 필요한 것:** `엔진의 상체 결과 × 하체 결과 → 8유형 코드` 로 바꾸는 **매핑 표**. 그리고 상의만 끝났을 때는 8유형을 아직 못 정하므로 **"부분 카드"를 어떻게 보여줄지** 규칙도 필요합니다.
- 이 작업은 `3_사이즈엔진.md`의 체형 결과 구조와 아래 §7의 8유형 데이터를 잇는 일입니다. **결과화면 구현에 착수하기 전 별도 항목으로 설계합니다.**

### 겹치던 부분을 어떻게 정리했나 (확정)

| 겹치던 지점 | 정리 결과 |
|---|---|
| 결과 화면 | 그림(카드)은 8유형 디자인, 그 안에 들어가는 **숫자·값은 엔진이 공급**. 배치는 좌측 카드 / 우측 브랜드 사이즈표·검증 |
| 진단 질문 항목 | **엔진 스키마(데이터 구조)를 기준**으로 맞춤. `3_사이즈엔진.md` |
| 전문가 영역 | 사용자 쪽 연결(2-6 전환·3-1 페이크도어)은 진단 쪽에서 / 전문가 마켓·전문가 앱은 §13(쇼퍼찾기 상세)에서 |

## 7. 8유형 데이터는 딱 한 곳에서만 온다

> **왜 한 곳으로 모으나요?** 8유형의 이름·색·설명이 여러 화면 코드에 각각 적혀 있으면, 하나 바뀔 때 전부 찾아 고쳐야 하고 실수가 납니다. 그래서 원본을 파일 하나로 정합니다.

**`web/data/bodytypes.json`** 이 8유형 정보의 유일한 원본입니다(카드 표시용).

- 8유형의 **코드·이름·색·프로필·핏 설명·궁합·실루엣 좌표**는 오직 이 파일에서 읽습니다. 화면 코드에 다시 적지 않습니다.
- 8유형 코드(STR/HRG…)와 실루엣 모양의 연결은 이 파일의 `silhouette` 값으로만 합니다.
- 이 파일은 "보여주기"용입니다. 엔진 계산 결과를 8유형 코드로 바꾸는 매핑 표는 §6이 담당합니다.
- 결과 카드는 예외적으로 어두운 배경 + 유형별 시그니처색을 씁니다(디자인 예외). 상세는 `4_디자인가이드.md`.

## 8. 흐름을 짤 때 지키는 3가지 원칙

> 세 원칙 모두 "사용자를 중간에 놓치지 않으려는" 목적에서 나옵니다.

1. **가입은 나중에 (lazy 가입)** — **lazy 가입**이란 "회원가입을 서비스 초반에 강요하지 않고, 사용자가 가치를 느낀 뒤로 미루는 것"입니다. 비회원 그대로 진단~결과~피드백까지 다 하게 두면 이탈이 줄고 측정 표본도 커집니다. 가입은 딱 **두 순간**에만 요청합니다: ① 결과를 저장할 때(2-4), ② 전문가 매칭을 실제로 쓸 때(3-1).
2. **동의는 입력 바로 직전에** — 체형·치수 같은 민감정보를 받기 직전(2-1 들어갈 때)에 동의(G.5)를 받습니다. 첫 화면에서 미리 받으면 부담스러워 나가 버립니다.
3. **막다른 길 금지** — 실패하거나 비어 있는 화면에도 항상 되돌아갈 길을 둡니다(추정 실패 → 옷 추가, 신뢰도 낮음 → 재진단, 링크 만료 → 홈).

## 10. MVP에서 정확히 무엇을 만들고, 무엇을 재나요?

> **왜 이만큼만?** 가장 검증이 급한 것(사이즈 정확도)부터 확인하기 위해서입니다. 전체를 설계하되, 검증에 꼭 필요한 곳만 먼저 만듭니다.

**MVP에서 실제로 만드는 것(★)**
- 탭1 홈
- 탭2 진단 전체(2-1 ~ 2-6)
- 탭3 페이크도어(3-1 · 3-2)
- 공통 G.1 / G.3 / G.4 / G.5

**측정 지점 2곳**
- **2-5 피드백 → 킬 메트릭: 사이즈 정확도 ≥ 65%** (안 되면 서비스 자체를 재검토)
- **3-1 페이크도어 → 전환신호: 클릭/알림신청 ≥ 25%**

**안 만드는 것(껍데기/나중)**: 3-3~3-7 실제 매칭 · 마이페이지 전체 · 전문가 앱 · 어드민 · 결과 공유(2-7, 여유 되면).

> **꿀팁 — 처음엔 코드 없이도 시작 가능.** 2-4의 추천 사이즈는 초기엔 사람이 직접 브랜드 사이즈표를 보고 손으로 번역해도 됩니다. 정확도(킬 메트릭)부터 확인한 뒤 엔진을 자동화합니다. 상세는 `3_사이즈엔진.md`.

## 11. 나중에 다시 와도, 몸이 변해도 (시점 버저닝)

> **왜 필요한가요?** 사람 몸은 변합니다(체중 등). 재진단할 때 과거 기록을 덮어써 버리면, "예전 결과"와 "정확도 학습용 데이터"가 사라집니다. 그래서 기록을 지우지 않고 쌓습니다. 이렇게 시점별로 판을 나눠 관리하는 것을 **버저닝**(versioning)이라 합니다.

- 진단은 **덮어쓰지 않고 계속 쌓습니다**(append-only, 추가만 함). 체형은 "언제 기준"인지 날짜를 붙여 버전으로 둡니다.
- 그래서 ① 과거 결과 보존 ② 정확도 학습 데이터가 오염되지 않음 ③ 체형 변화 추이를 자산으로 쌓음 — 세 가지를 동시에 얻습니다.
- 결과 화면에는 "어느 시점(몸무게·날짜) 기준"인지 표시하고, 체중이 바뀌면 "새로 진단(과거는 보존)" 경로를 엽니다. 옷장(카테고리) 재사용은 체형이 같을 때만 유효합니다.

                    추천[{ 브랜드 · 옷종류 · 추천사이즈 · 신뢰도 · 근거 }]

validation          누구 · 브랜드 · 판정(맞음|애매|틀림) ·
                    실제사이즈 · 다른브랜드도전의향(예/아니오)   ← 킬 메트릭의 원천

fakedoor_event      누구 · 관심서비스 · 누른시각 ·
                    알림신청여부 · 연락처                       ← 전환신호의 원천
```

- `result_card`의 체형은 상의+하의를 다 하면 8유형으로 확정, 상의만 하면 미확정(상체 부분)입니다.
- `garment_experience`는 §11대로 덮어쓰지 않고 시점별로 쌓입니다.
- 데이터 구조의 1순위 축은 "옷 종류(category)"입니다. 자세한 스키마는 `3_사이즈엔진.md`.

## 13. 쇼퍼찾기(전문가 매칭) 도메인 상세

> MVP에서 실제로 만드는 건 **페이크도어(3-1) 하나**뿐이고, 아래 마켓·전문가앱·어드민은 대부분 **v2 확장**입니다. 사용자앱과 한 서비스로 묶여 있어 이 문서에 함께 둡니다.

### 0. 왜 "3면"으로 나뉘는가

**배경:** 무료 진단은 사용자 한 명만 상대하면 되는 **단순한 도구**다. 하지만 전문가 매칭은 사용자와 전문가를 서로 연결하고, 그 사이에서 문제가 안 생기게 관리까지 해야 한다. 그래서 관련된 사람이 세 종류로 늘어난다.

이런 서비스를 **마켓플레이스(marketplace, 파는 사람과 사는 사람을 연결해 주는 장터. 예: 배달앱은 손님·가게·배달앱 운영을 잇는다)** 라고 부른다. 우리 쇼퍼찾기도 똑같이 세 무리가 얽힌다.

**[수요] 사용자 측**(프로필·요청·결제) ──요청──▶ **[엔진/중개]**(매칭·정산·분쟁) ──전달──▶ **[공급] 전문가 측**(수신·작성·정산). 이 중개를 다시 **[운영 어드민]**(승인·중재·정산집행)이 받칩니다.

세 무리를 정리하면:

| 면 | 누구 | 무엇을 하나 | 어디서 |
| --- | --- | --- | --- |
| 수요(사려는 쪽) | 사용자 | 서비스 고르기·요청·상담·결제·후기 | 사용자 앱 탭3 쇼퍼찾기 |
| 공급(팔려는 쪽) | 전문가 | 요청 받기·수락·상담·결과 작성·정산 받기 | 따로 있는 전문가 앱 |
| 중개(관리하는 쪽) | 운영 어드민 | 전문가 심사·분쟁 해결·돈 정산·수수료 정하기 | 따로 있는 관리자 화면 |

**우리만의 강점(§5에서 자세히):** 무료 진단에서 나온 "이 사람은 이 브랜드에서 몇 사이즈"라는 결과가, 전문가에게 요청이 갈 때 **자동으로 같이 딸려간다.** 그래서 전문가는 사용자를 직접 안 만나도 옷 사이즈를 정확히 고를 수 있다. 이게 다른 스타일링 매칭 서비스에는 없는 우리만의 무기다.

---

### 1. 도메인 사이트맵 (전체 화면 지도)

**배경:** 위 3면이 각각 어떤 화면들로 이뤄지는지 한눈에 보는 지도다. `★MVP`는 지금 실제로 만드는 것, `v2`는 나중에 만들 것.

```iatree
○ | | 쇼퍼찾기 (매칭) | 전문가 매칭 도메인 전체 지도 · ★=지금 만드는 것, ○=v2
  ○ | A | 사용자 측 (수요) | 탭3 쇼퍼찾기
    ★ | S1 | 매칭 진입·서비스 유형 선택 | 지금 만드는 유일한 사용자 화면
    ○ | S2 | 전문가 목록 | 정렬·필터
    ○ | S3 | 전문가 프로필 | 결과물·후기 확인
    ○ | S4 | 매칭 요청 | 유형별 폼 분기
    ○ | S5 | 상담 / 메시지 |
    ○ | S6 | 추천 / 예약 결과 | 유형별
    ○ | S7 | 결제 / 예약 |
    ○ | S8 | 완료 · 후기 · 평점 |
  ○ | E | 전문가 측 (공급) | 전문가 앱
    ○ | E0~E3 | 랜딩 → 지원/등록 → 심사 → 정산계좌·세금 |
    ○ | E4 | 대시보드 | 가능/마감 스위치
    ★ | E5 | 매칭 요청 상세 | 강점 — 사이즈 결과 받는 화면 · 수락/거절
    ○ | E6~E7 | 상담 → 추천/결과 작성 | 유형별
    ○ | E8~E11 | 상품관리 · 프로필/포트폴리오 · 리뷰 · 수익/정산 |
  ○ | O | 운영 어드민 (중개) |
    ○ | O1 | 전문가 승인/심사 대기줄 |
    ○ | O2 | 분쟁·환불·신고 처리 |
    ○ | O3 | 정산 집행·수수료 정책 |
    ○ | O4 | 리뷰 관리 |
    ○ | O5 | 매칭 성사율·거래액 대시보드 |
```

---

### 2. 사용자 측 플로우 S1~S8

**배경:** 사용자가 "전문가에게 스타일링 받고 싶다"고 마음먹은 순간부터 후기를 남기기까지의 순서다. 사용자는 두 가지 길로 들어온다.

- 🔥 **따뜻한 리드(warm lead — 이미 우리에게 관심을 보인, 전환 가능성 높은 사용자)** — 진단 결과카드를 다 보고 "스타일까지 전문가에게" 버튼을 눌러 들어온 사람. 이미 자기 사이즈 정보가 있다.
- ❄️ **차가운 리드(cold lead — 아직 우리를 잘 모르는 사용자)** — 진단 없이 홈/탭에서 바로 들어온 사람. 사이즈 정보가 없으니 "진단부터 하세요"로 안내한다.

**순서:** S1 진입·유형선택 → S2 목록 → S3 프로필 → S4 요청 → S5 상담 → S6 결과 → S7 결제 → S8 후기. **MVP는 S1까지**(알림 신청받고 끝), S2~S8은 v2에서 실제 작동합니다. (각 화면 상세는 아래 표)

| # | 화면 | 무엇을 하나 | 구분 |
| --- | --- | --- | --- |
| **S1** | 매칭 진입·유형 선택 | 서비스 유형 3종 중 고르기 · 상황(소개팅·면접·결혼식·여행) 고르기 · **(지금은)"열리면 알려주세요" 신청 + 1기 전문가 모집** · 여기서 회원가입 요구(가입 게이트②) | ★MVP |
| **S2** | 전문가 목록 | 정렬(잘 맞는 순·평점·후기·가격) · 필터(유형·상황·예산·지역·일정) · 전문가 카드(작업 결과물·전문분야·평점·가격·**매칭도 뱃지**=체형·상황이 얼마나 맞는지) | v2 |
| **S3** | 전문가 프로필 | **작업 결과물 갤러리** · 후기·평점 · 경력·전문분야·상황 태그 · 제공 서비스/가격/소요시간 · 예약 가능 일정. (얼굴·팔로워 수 ❌, 실제 결과물·후기 ✅ 로 신뢰를 준다) | v2 |
| **S4** | 매칭 요청 | **공통:** 내 체형·사이즈 정보가 자동으로 붙음(§5) + 상황·날짜 / **유형별로 묻는 항목이 다름**(§6) | v2 |
| **S5** | 상담 / 메시지 | 전문가와 1:1 채팅 · 예산·취향 등 세부 파악. (스타일링의 핵심은 결국 대화다) | v2 |
| **S6** | 추천 / 예약 결과 | 유형별 결과물(§6) — 온라인이면 코디·상품·구매링크, 오프라인이면 예약 확정·세션 안내 | v2 |
| **S7** | 결제 / 예약 | 온라인이면 매칭 수수료·패키지, 오프라인이면 예약금·세션비. 상황(면접·결혼식 등)이 과금 단위 | v2 |
| **S8** | 완료·후기 | 만족도·후기·평점·"또 부르고 싶다" 의향 → 이 점수가 다음 사용자의 S2 목록 정렬에 반영됨(후기가 좋은 전문가가 위로) | v2 |

**지금(MVP) 만드는 것은 S1까지.** S1에서 "알림 신청"을 받고 끝난다. S2~S8은 나중(v2)에 실제로 작동하게 만든다.

---

### 3. 전문가 측 E0~E11 (전문가 앱)

**배경:** 전문가는 사용자와 다른 별도 앱을 쓴다. 일감을 받고, 일하고, 돈을 받는 흐름이다. 사용자 앱 상단의 '전문가 지원' 버튼을 누르면 E0으로 온다. (지금은 전문가가 적어서 운영자가 직접 손으로 모집한다.)

**온보딩:** E0 랜딩 → E1 지원/등록 → E2 심사/승인 → E3 정산계좌·세금. **일감:** E4 대시보드(가능/마감 스위치) → **E5 요청상세 ★**(사이즈 결과 받음) → 수락 → E6 상담 → E7 결과작성. **언제든:** E8 상품관리 · E9 프로필/포트폴리오 · E10 리뷰 · E11 수익/정산. (각 화면 상세는 아래 표)

| # | 화면 | 무엇을 하나 |
| --- | --- | --- |
| E0 | 전문가 랜딩 | 수수료·정산·기대 수익 안내 · '1기 지원' 버튼 (사용자 앱 모집 링크가 여기로 옴) |
| E1 | 지원/등록 | 경력·전문분야·잘하는 상황·포트폴리오 제출 |
| E2 | 심사/승인 대기 | 플랫폼이 품질을 거른다(운영자 쪽 O1과 짝). 승인 전에는 사용자에게 안 보임 |
| E3 | 정산계좌·세금 | 돈 받을 계좌·사업자/원천징수 정보 등록 |
| E4 | 대시보드 | 들어온 요청·진행 중인 일 · **"지금 일 받을 수 있음/마감" 스위치** |
| **E5** | **매칭 요청 상세 ★우리만의 강점** | 사용자 체형 정보 + **★사이즈 번역 결과를 받는 화면** · 수락/거절. 전문가가 안 만나도 정확히 고를 수 있게 하는 곳. 숨고·크몽 같은 단순 매칭과 갈리는 지점 |
| E6 | 상담/메시지 | 추천 전에 사용자와 대화로 취향 파악 |
| E7 | 추천/결과 작성 | 유형별(§6) — 온라인: 상품·코디·링크 / 오프라인: 예약·세션 노트 |
| **E8** | **서비스 상품 관리** | 내가 파는 서비스를 진열(메뉴판처럼) · 유형별 범위·소요시간·가격 정하기. 사용자 S3에 이대로 보임 |
| E9 | 프로필/포트폴리오 | 사용자에게 보일 내 소개 편집(= S3의 원본) |
| E10 | 리뷰/평점 | 받은 리뷰 보기·답하기 (평판이 곧 다음 일감) |
| E11 | 수익/정산 | 정산 내역 · 어떤 유형·상황이 돈이 되는지 통계 |

**전문가 앱 중 지금(MVP) 만드는 것은 E8(상품관리)뿐이다.** 사용자에게 보일 메뉴판이라 가볍게 만들 수 있어서다. 나머지는 흉내만 낸 화면(목업)이다.

---

### 4. 운영 어드민 O1~O5 (중개)

**배경:** 사용자와 전문가만 있으면 사고가 난다(전문가 자격 미달, 노쇼, 환불 분쟁 등). 운영자가 중간에서 관리하는 화면들이다. 지금은 다 나중(v2)에 만들고, 초기엔 스프레드시트로 손수 처리한다(§8).

| # | 화면 | 무엇을 하나 |
| --- | --- | --- |
| O1 | 전문가 승인/심사 대기줄 | E2의 운영자 쪽 · 승인·반려로 품질을 거른다 |
| O2 | 분쟁·환불·신고 처리 | 노쇼·불만족 환불 · 신고 대응 → **믿고 쓸 수 있는 장터의 핵심** |
| O3 | 정산 집행·수수료 정책 | 전문가별 지급 · 수수료율·유형별 요금 결정 = **돈 버는 조절 손잡이** |
| O4 | 리뷰 관리 | 가짜·악성 리뷰 정리 |
| O5 | 매칭 성사율·거래액 대시보드 | 거래액·성사율·활동 중인 전문가 수 |

---

### 5. 핵심 다리 — 진단 결과가 전문가에게 자동으로 넘어간다 ★

**배경:** 이게 우리 서비스가 다른 스타일링 매칭과 다른 **딱 하나의 진짜 차별점**이다. 그냥 사람만 연결해 주는 게 아니라, "이 사람 사이즈 데이터"를 함께 넘겨준다.

**핸드오프(handoff — 앞 단계에서 만든 정보를 다음 단계로 그대로 넘겨주는 것. 예: 병원에서 검사 결과지가 다음 진료실로 넘어가듯)** 라고 부른다. 진단에서 만든 체형카드가 전문가 화면(E5)으로 그대로 넘어간다.

| 진단이 넘겨주는 것 (결과카드) | ──넘겨줌──▶ 전문가가 받는 것 (E5 요청상세) |
|---|---|
| 체형 프로필(캐릭터) · 핏 인사이트(주의할 부위) · 브랜드별 추천 사이즈 | 고객 체형·핏 인사이트 · **★ 브랜드별 추천 사이즈** → "안 만나도 정확히 고를 수 있다" |

이게 왜 세 쪽 모두에게 좋은가:

- **사용자에게:** 요청할 때 키·몸무게를 다시 안 적어도 됨(귀찮음↓). 그래서 전환이 잘 된다.
- **전문가에게:** 줄자 없이도 사이즈를 확신 → 비대면(온라인) 스타일링인데도 반품이 준다. 도구가 전문가 실력을 올려준다.
- **플랫폼에게:** 이 데이터가 쌓일수록 매칭이 정확해지고, 나중엔 B2B 사이즈 API(v3) 자산이 된다.

기술적으로는 요청 데이터에 `body_profile_ref`(진단 결과를 가리키는 참조 값)가 붙는다. 진단은 **불변 스냅샷(찍은 뒤 안 바뀌는 사진 같은 기록)** 으로 저장되므로, 요청한 그 시점의 체형이 그대로 고정돼서 넘어간다(나중에 살이 쪄도 그때 요청은 안 바뀜).

---

### 6. 서비스 유형 3종과 유형별 분기

**배경:** 전문가가 파는 서비스는 3종류인데, 종류마다 **요청할 때 묻는 것(S4)·받는 결과물(S6)·돈 내는 방식(S7)이 다르다.** 그래서 한 흐름 안에 세 갈래가 생긴다. 참고로 "퍼스널 쇼퍼"는 서비스 이름이 아니라 전문가의 직함이다.

| 항목 | 💻 온라인 스타일링 | 🛍️ 동행 쇼핑 | ✨ 이미지 컨설팅 |
| --- | --- | --- | --- |
| **요청 폼(S4)에서 묻는 것** | 취향·예산·좋아하는 브랜드 | 일정·지역·만날 장소 | 목적(면접 등)·일정·지역 |
| **진행 방식(S5·S6)** | 안 만나고 채팅으로 큐레이션 | 오프라인에서 같이 쇼핑 | 오프라인 세션 |
| **결과물(S6)** | 코디·상품·**구매링크** | 현장 구매·세션 노트 | 이미지 가이드·세션 노트 |
| **과금(S7)** | 매칭 수수료/패키지 | 예약금 + 세션비 | 세션비 |
| **사이즈 결과가 얼마나 중요한가** | ★가장 중요(안 보고 원격 구매) | 보조(현장에서 입어봄) | 보조(체형 이해용) |

흐름: 전문가가 E8에서 유형별로 진열·가격을 정함 → 사용자가 S1에서 관심 유형을 고름(이때 어떤 유형이 인기인지 측정) → S2 목록에서 유형 탭으로 탐색 → S4에서 유형에 맞는 폼을 채운다.

---

### 7. 상태(state)와 예외 상황

**배경:** 행복한 경우만 설계하면 안 된다. 전문가가 응답을 안 하거나, 후보가 아무도 없거나, 노쇼가 나는 상황도 미리 정해 둬야 사용자가 막다른 길에 갇히지 않는다.

- **요청 상태 흐름:** 대기 → `수락` → 진행 → 완료 / 중간에 `거절`(→ 다른 전문가 자동 추천) / `만료`(전문가가 무응답)
- **매칭 실패:** 조건에 맞는 전문가가 0명이면 → "열리면 알림" 등록 · "예산·지역을 넓혀 보세요" 제안
- **취소/노쇼(no-show — 예약해 놓고 안 나타남):** 취소 시점에 따라 환불 규칙이 갈림 → O2에서 운영자가 조정
- **분쟁:** 신고 → 운영자 중재 → 환불/제재
- **품질 게이트:** 심사(E2) 통과 전 전문가는 사용자에게 안 보임
- **전문가가 아직 0명일 때(콜드스타트 — 양쪽이 다 없어 서비스가 안 도는 초기 상황):** S1/홈에 "오픈 예정·1기 모집"으로 보여준다. 같은 화면이 사용자에겐 "수요 측정(알림 신청받기)", 전문가에겐 "모집 공고"로 동시에 작동한다. 닭이 먼저냐 달걀이 먼저냐 문제를 한 화면으로 푸는 방법.

---

### 8. 지금(MVP) vs 나중(v2) — 어디까지 진짜로 만드나

**배경:** 처음부터 매칭 시스템을 다 만들면 돈·시간이 크게 든다. 그래서 먼저 "이 서비스에 수요가 있는지"만 싸게 확인한다. 이때 쓰는 방법이 두 가지다.

- **페이크도어(fake door — 아직 없는 기능의 '문'만 만들어 두고, 사람들이 문을 두드리는지(클릭하는지)로 수요를 재는 방법. 문을 열면 "준비 중이에요"가 뜬다)**
- **위저드 오브 오즈(wizard of oz — 자동인 척하지만 실제로는 뒤에서 사람이 손으로 처리하는 방법. 오즈의 마법사에서 커튼 뒤 사람이 조종하듯)**

| | 지금 (MVP) | 나중 (v2, 진짜 작동) |
| --- | --- | --- |
| 사용자 측 | **S1 진입+유형선택 → 페이크도어 알림신청** | S2~S8 전체 흐름 |
| 전문가 측 | 없음(운영자가 손으로 1기 모집), E8만 진열용으로 | 전문가 앱 E0~E11 |
| 운영 | 스프레드시트로 손수 | 어드민 O1~O5 |
| 매칭 | **위저드 오브 오즈:** 알림 신청자 ↔ 1기 전문가를 사람이 카톡으로 연결 | 자동 매칭·결제·정산 |

**MVP에서 확인하려는 것 두 가지:**
1. **유형별 전환신호(conversion signal — 사용자가 실제로 관심을 행동으로 보이는 비율. 여기선 S1에서 유형을 고르고 알림 신청하는 비율) ≥25%** — 어떤 유형에 진짜 수요가 있는지.
2. **전문가 수락률** — 손으로 연결해 보며, 우리 회사의 가장 큰 가정인 *"따뜻한 리드(사이즈 정보까지 딸려오는 좋은 고객)라면, 수수료가 낮아도 전문가가 들어올까?"* 를 코드 한 줄 없이 확인한다.

---

### 9. 데이터 모델 (매칭 부분에서 저장하는 정보)

**배경:** v2에서 실제로 작동시키려면 아래 정보들을 저장해야 한다. 각 상자(테이블)가 무엇을 담는지 본다.

```
expert            id · 전문분야 · 상황태그[] · 평점 · 가능상태 · 심사상태
service_offering  expert_id · type(online|shopping|image) · 범위 · 소요 · price
match_request     user_id · expert_id · service_type · occasion · date
                  · body_profile_ref(진단 결과 참조 = 핸드오프) · form{유형별} · status
consultation      request_id · messages[]
result            request_id · type · items[](구매링크) | booking(예약·세션노트)
review            request_id · rating · text · 재호출의향
settlement        expert_id · request_id · amount · fee · status
```

읽는 법:
- `expert` = 전문가 한 명의 정보.
- `service_offering` = 전문가가 파는 서비스 하나. `type`이 §6의 3종(online/shopping/image).
- `match_request` = 사용자가 넣은 요청 하나. `body_profile_ref`가 §5 핸드오프가 실제로 구현되는 지점(진단 결과를 가리켜 요청 시점에 고정). `form`은 §6 유형별로 다른 입력 내용을 담는다.
- `consultation` = 요청에 딸린 대화 기록.
- `result` = 결과물. 온라인이면 `items[]`(상품·링크), 오프라인이면 `booking`(예약·노트)으로 갈린다.
- `review` = 후기·평점. `settlement` = 전문가에게 얼마 주고 수수료 얼마 뗐는지 정산 기록.

## 0. 원칙 (모든 판단의 뿌리)

> **왜 필요한가:** 엔진을 만들다 보면 "이건 AI한테 시킬까? 사람이 정할까? 상의만 받아도 될까?" 같은 갈림길이 계속 나온다. 아래 6개는 그때마다 흔들리지 않기 위한 고정 규칙이다.

1. **숫자는 규칙으로, 말은 AI로.** 추천 사이즈·여유 계산 같은 **숫자는 정해진 규칙(정해진 공식으로 계산해 언제나 같은 답이 나오는 방식)** 으로 낸다. 검증할 수 있어야 하기 때문이다. 반대로 "당신은 어깨가 넓은 편이에요" 같은 **자연스러운 문장 설명만 AI(Claude)** 가 쓴다. 추천 숫자를 AI에 맡기지 않는다 — 맞았는지 확인할 방법이 없어서다.
2. **진단은 옷 종류(카테고리) 하나씩.** 상의로 알아낸 정보로 상의 사이즈를, 하의로 알아낸 정보로 하의 사이즈를 낸다. 상의 답으로 하의를 추측하지 않는다. 몸의 부위가 다르기 때문이다(상의=어깨·가슴, 하의=허리·엉덩이).
3. **상의+하의 둘 다 있어야 체형이 완성된다.** 상의 하나만으론 상체만 아는 "반쪽 체형". 둘 다 채워야 상체+하체가 잠기고, 그때 파생 종류(아우터·원피스·치마)가 열린다. 파생은 실제 착용으로 체형을 다시 알아내지 않고, 선호하는 핏·레이어링 여유만 묻는다.
4. **진단 결과는 그때그때의 스냅샷으로 남긴다(덮어쓰지 않음).** 체중이 바뀌어 다시 진단하면, 예전 결과를 고치지 말고 **날짜를 붙인 새 결과를 하나 더 추가**한다. 과거 기록을 살려야 "이 추천이 맞았나"라는 성적표(뒤의 킬 메트릭)가 오염되지 않는다.
5. **배움은 양쪽으로.** 사용자의 착용경험은 그 사람의 체형만 알려주는 게 아니라, **그 브랜드 옷이 실제로 어떻게 나오는지**도 알려준다. 그래서 데이터를 한 방향으로만 고정하지 않는다.
6. **소재는 묻지 않고 알려준다.** 비침·무게·수축·신축은 옷 자체의 속성이라, 사용자에게 묻지 않고 브랜드 데이터에서 찾아 **결과 화면에서 경고**만 한다. 사용자에겐 "몸으로 느낀 것"만 묻는다.

**★ 킬 메트릭(성패를 가르는 단 하나의 성적표):** 사용자가 **이미 잘 아는 브랜드**로 추천을 돌렸을 때 "실제로 내가 입는 사이즈랑 맞네" 하고 동의하는 비율이 **65% 이상**이어야 한다(옷 종류별로 측정, MVP는 상의 기준). 이 숫자가 모든 우선순위와 튜닝의 기준이다. 미달이면 엔진을 다시 설계하거나 멈춘다.

## 1. 데이터 모델 / 스키마 (엔진이 다루는 정보의 형태)

> **왜 필요한가:** 엔진은 결국 두 종류의 정보를 맞대 본다 — ①브랜드 옷의 실제 치수, ②사용자가 입어보고 느낀 것. 이 정보들을 **어떤 칸에 어떻게 담을지**를 처음에 정확히 정해두지 않으면 나중에 못 고친다. 여기서 그 "칸의 모양"(스키마)을 정의한다.

두 개의 축을 기억하면 된다:
- **A축 = 브랜드가 파는 옷의 실제 치수** (물건 쪽. 예: "이 셔츠 M은 가슴 단면 52cm")
- **B축 = 착용경험으로 거꾸로 알아낸 사용자 신체 치수** (몸 쪽. 예: "이 사람 가슴둘레는 약 96cm")

이 둘의 차이가 엔진의 핵심 개념인 **여유(ease)** = 옷이 몸보다 얼마나 큰가(단위 cm). 코드는 `src/lib/schema/*`에 있다.

### 1.1 카테고리와 부위 (category.ts) — 옷 종류가 모든 것의 1급 기준

> 옷 종류마다 신경 쓰는 몸 부위가 다르다. 그래서 "옷 종류(카테고리)"를 가장 위의 기준 축으로 둔다.

- 옷 종류는 5가지: 상의·하의·아우터·원피스·치마. 다 표현하되 **실제 작동은 상의부터** 시작한다.
- 부위마다 **재는 방식(Comparison)** 이 다르고, 이게 계산법을 가른다:

| 재는 방식 | 뜻 | 계산 |
|---|---|---|
| 둘레(circumference) | 가슴·허리처럼 빙 두르는 치수 | 브랜드 표는 보통 '단면'(반으로 접어 한쪽만 잰 값)으로 적으니 **×2 해서 둘레로** 만든 뒤 몸 둘레와 비교 |
| 너비(width) | 어깨처럼 평평한 가로 폭 | ×2 안 함. 옷 폭과 몸 폭을 그대로 비교 |
| 길이(length) | 소매·총장·기장 | 여유 개념이 없다. "짧다/길다"라는 기장감으로만 본다 |

- 각 부위는 **어떤 몸 치수와 맞댈지**(BodyDimension: 어깨너비·가슴둘레·허리둘레·엉덩이둘레·허벅지둘레·팔길이·키·밑위기준)를 지정한다.
- **부위 집합:** 상의 = 어깨·가슴·배·소매·총장 / 하의 = 허리·엉덩이·허벅지·밑위·기장. 파생 3종은 자리만 잡아둠(작동은 나중).
- 부위를 쓰임새로 3분류한다:
  - **역산 대상 부위(accuracyParts):** 둘레·너비 부위. 여기서 체형을 거꾸로 알아낸다.
  - **기장 선호 부위(lengthParts):** 길이 부위. 체형이 아니라 취향·키의 문제라 역산에서 뺀다.
  - **병목 플래그 부위(PAIN_FLAGS):** 브랜드가 사이즈표에 잘 안 적지만 실제로 불편을 만드는 부위(상의=팔·목, 하의=종아리). 표에 숫자가 없으니 체형 역산은 못 하고, 대신 "꼈다/안 꼈다" 경험을 모아 **브랜드 치수를 거꾸로 추정**하는 데 쓴다. 사용자들이 자유서술에서 반복해서 말하는 새 페인은 이 목록으로 승격된다(엔진이 스스로 커짐).

### 1.2 브랜드 실측 (sizespec.ts) — A축 데이터

> 엔진의 "연료". 브랜드 옷이 실제 몇 cm인지를 담는다.

한 칸 = `{ 브랜드, 카테고리, 핏라인, 사이즈, 부위별 치수, 출처메타 }`.
- **핏라인(FitLine):** 옷의 여유 스타일. skinny(꽉)·slim·regular·loose·oversize(헐렁) 5단계. 핏라인의 정체가 곧 "이 옷이 의도한 여유량"이다.
- **부위별 치수(garmentCm):** 브랜드 표에 적힌 **원본 그대로** 저장한다(단면이면 단면 값 그대로). ×2 환산·여유 계산은 필요할 때 규칙 코드가 하지, 미리 가공해 박아두지 않는다.
- **출처메타(Provenance, "이 숫자 어디서 언제 어떻게 가져왔나"):** 출처 URL · 수집 날짜 · 방식(수기/HTML/OCR) · 신뢰도(0~1)를 함께 붙인다. 브랜드는 시즌마다 실측을 바꾸므로, 날짜가 없으면 낡은 값으로 잘못 추천하게 된다. 판매량은 비공개라 리뷰 수·인기순 같은 **대리지표**로 대신하고 "이건 대리지표"라고 표시한다(isProxy).

### 1.3 착용경험 (wearexperience.ts) — B축 입력, 4개 층

> 사용자가 입어보고 답한 것. 이걸 재료로 체형을 거꾸로 계산한다. 답을 성격별 4개 층으로 나눠 담는다(섞으면 계산이 꼬임).

앞부분(브랜드·핏라인·사이즈)은 "어떤 옷인지" 특정하는 열쇠고, 답변은 4층:

| 층 | 담는 것 | 쓰임 |
|---|---|---|
| ① 착용감(fits) | 부위별 "꽉/딱/여유/큼" | 체형 역산의 핵심 신호 |
| ② 병목 플래그(painFlags) | "팔 꼈다/괜찮다" 같은 걸림 | 체형 역산엔 안 씀. 브랜드 치수 거꾸로 추정에만 씀 |
| ③ 기장 선호(lengthPrefs) | "짧음/딱/긺" | 취향·키 → 추천 보조에만 |
| ④ 자유서술(openNote) | 예상 못 한 불편 한 줄 | 반복되면 ②로 승격 |

- **소매·다리 길이 구분(facet):** 긴팔/반팔/민소매, 긴바지/반바지. **긴팔·긴바지를 기본 권장** — 신호가 가장 많고, 팔 경험을 항상 같은 부위(이두)에서 받아 브랜드 비교가 뒤섞이지 않는다. 이 값은 질문을 켜고 끄는 데 쓰고, 체형 역산 자체엔 영향 없다.
- 시점·체중은 옷 한 벌마다가 아니라 **진단 전체(스냅샷)에 한 번** 붙인다(최근 입은 옷으로 유도하므로).
- **설문 자동 생성:** `buildCategorySurvey`(카테고리를 주면 그에 맞는 질문 묶음을 만들어 주는 함수)가 층별 질문 그룹을 만든다. 부위를 코드에 일일이 박지 않고 카테고리에서 자동으로 뽑는다. 민소매면 팔 질문, 반바지면 종아리 질문, 반팔이면 소매기장 질문을 자동으로 뺀다. 화면은 이 결과를 그대로 그리기만 한다.

### 1.4 응답 어휘 (fitrating.ts) — 설문과 엔진이 같은 단어를 쓰게

> 사용자가 고른 보기와 엔진이 계산에 쓰는 값이 어긋나면 안 된다. 그래서 어휘를 한 곳에 정의한다.

- ① 착용감 4단계: 끼임 / 딱맞음 / 여유 / 큼.
- ② 병목 판정 2단계: 꼈어요 / 괜찮았어요. — **"괜찮았어요"(문제없음)도 꼭 받는다.** 불평만 모으면 "어디까지가 괜찮은 선인지"를 못 찾기 때문이다.
- ③ 기장 선호 3단계: 짧음 / 딱 좋음 / 긺. 취향이라 역산엔 안 넣는다.

### 1.5 핏라인지도 · 브랜드순위 · 앵커브랜드 (보조 데이터)

- **핏라인지도(fitlinemap):** 브랜드가 쓰는 원본 핏 이름("오버사이즈", "511 Slim")을 우리 표준 5단계로 잇는 사전. ⚠️ **이름과 실제 여유는 다르다** — 폴로 'Classic Fit'은 이름과 달리 그 브랜드에서 제일 넉넉하다. 그래서 사람이 검수한 신뢰도를 함께 붙인다. 치마·원피스는 핏라인이 아니라 실루엣(A라인 등)이 1차 정보다.
- **브랜드순위(brandranking):** 판매량 대신 쓰는 대리지표(리뷰·인기순) 순위. 어떤 상품부터 수집할지 우선순위에만 쓰고, 추천 숫자의 근거로는 쓰지 않는다.
- **앵커브랜드(anchorbrands):** 착용경험을 **물어볼 때** 기준으로 삼는 대표 브랜드 7종. 뽑는 최우선 기준은 **오프라인 매장에서 입어보기 쉬운가**(실측 없이도 경험을 만들 수 있는 가장 넓은 입구라서). 이건 **입력용 기준 목록**이지, 추천 결과로 내놓는 브랜드 목록이 아니다(혼동 금지).

## 2. 입력 스펙 — 무엇을 어떻게 묻나

> **왜 필요한가:** 좋은 역산은 좋은 질문에서 나온다. 자유서술을 받으면 계산할 수 없으니, 전부 **보기에서 고르는 형태**로 받고, 몸을 위에서 아래로 훑으며 묻는다. 질문이 많아 보이지 않게 티어(단계)로 나눈다.

**3티어:** T1=모두 답(필수) · T2=신경 쓰인 부위만 더 답(정확도) · T3=원하면 더(심화, "답하면 정확도 +N%").

- **Step 0 — 옷 종류 선택:** 여기서 고른 카테고리가 이후 질문·부위·추천을 전부 좁힌다.
- **Step 1 — 기준옷 특정 + 기본값:** 브랜드(앵커 7종) · 핏라인 · 하위타입(긴팔/반팔/민소매, 긴바지/반바지/크롭) · 사이즈 · 전체 느낌(작음/딱/큼) · 키(기장·이상치 판단 전용, 둘레 판단엔 안 씀) · 체중(선택, 재진단 판단용) · 착용시점(자동, 안 물음).
- **Step 2 — 위→아래 몸 스캔:**
  - **상의:** 목 → **어깨(필수)** → **팔·겨드랑이(필수)** → (낀 곳이면) 팔뚝/겨드랑이 → 소매길이(긴팔만) → 가슴 → 앞뒤품 → 배 → 밑단.
  - **하의:** **허리↔엉덩이(필수)** → 앞주머니 벌어짐 → 뒤밑위(앉을 때 파임) → 앞밑위 → 허벅지 → 밑단(긴바지만).
  - 하위타입에 안 맞는 질문은 자동으로 건너뛴다(반팔이면 소매길이 skip). 덤으로 브랜드 실측 해석도 정확해진다(반팔 소매 스펙 ≠ 긴팔).
- **Step 3 — 선호핏:** 원하는 전체 핏(타이트/정핏/루즈/오버) · 원하는 기장.
- **Step 4 — 결과:** 부위별 번역(추천 사이즈+예상 핏) · 옷속성 경고 · **"맞았나?" 피드백**(킬 메트릭 수집). 질문이 많아 보이지 않도록: "전체 편했어요" 한 번으로 통과하는 지름길, 원탭 보기, 답할 때마다 작은 인사이트 보상, 앵커 재사용으로 반복 제거(불편 없던 사용자는 4번 탭이면 끝).

## 3. 역산·추천·경고 규칙 (엔진의 두뇌)

> **왜 필요한가:** 여기가 엔진의 심장이다. "이 옷이 이렇게 느껴졌다"는 신호를 → 체형 숫자로 바꾸고 → 다른 옷 사이즈로 번역하고 → 위험을 경고하기까지의 **정해진 계산 절차**다. 전부 규칙(정해진 공식), 자연어 한 줄만 AI다.

전체 흐름을 말로 풀면: **①안 맞는 질문 걸러내기 → ②부위마다 신체 추정 → ③체형 카드 조립 → ④충돌 부위 정리(병목) → ⑤목표 옷에 맞는 사이즈 찾기 → ⑦옷 속성 경고**, 옆에서 **⑥브랜드 치수 보정 · ⑧시점 관리**가 돕는다.

**모든 계산의 기본 공식(말로):** 여유 = 옷 치수 − 몸 치수. 뒤집으면, 옷 치수를 알고 "얼마나 여유 있었는지"를 경험으로 알면 → **몸 치수 = 옷 치수 − 경험한 여유**로 몸을 거꾸로 알아낼 수 있다. 이게 **역산(逆算, 결과에서 원인을 거꾸로 계산하기)** 이다.

### [1] 하위타입 걸러내기 (subtype 게이팅, "안 맞는 질문은 계산에서 뺀다")
성립 안 하는 신호는 역산에서 빼고, 대신 키 등으로 대충 채운다(prior).

| 하위타입 | 무시할 신호 | 대체 |
|---|---|---|
| 반팔 | 소매길이 | 팔길이 ← 키로 추정 |
| 민소매 | 소매길이·팔뚝 걸림 | 겨드랑이(암홀)만 유효 |
| 반바지 | 밑단 상태 | 기장 ← 키로 추정 |

### [2] 부위별 역산 규칙 (신호 → 신체 추정)

> **δ(델타)는 "한 칸 조정폭"이다.** 예를 들어 "가슴이 꼈다"면 그 사람 가슴이 옷보다 δ만큼 크다고 본다. δ의 정확한 값은 초기엔 모르니, 실제 데이터로 맞춰가는 **튜닝 값**이다.

말로 읽는 예: "어깨 봉제선이 어깨 끝을 넘어갔다"= 옷 어깨가 내 어깨보다 크다 → 내 어깨너비 = 옷 어깨 − δ. "겨드랑이가 자주 꼈다"= 필요한 겨드랑이 공간이 실제보다 크다(자주=2칸, 가끔=1칸).

| 신호 | 규칙(말풀이) | 알아내는 값 |
|---|---|---|
| 전체 느낌 | 작았으면 몸 +δ, 컸으면 −δ | 전역 기준선 |
| 어깨 봉제선 | 넘어감→내 어깨 = 옷−δ / 안쪽→+δ / 딱→같음 | 어깨너비 |
| 겨드랑이 걸림 | 가끔=1·자주=2 → 필요 공간 = 옷+계수k×정도 | 겨드랑이(암홀) 요구치 |
| 가슴 | 꼈으면 가슴 = 옷+δ, 남으면 −δ | 가슴둘레 |
| 배 | 같은 방식 | 배둘레 |
| 소매길이(긴팔) | 짧았으면 팔 김(+δ), 길었으면 −δ | 팔길이 |
| 앞뒤품 당김 | 당겼으면 품 부족 표시 | 앞뒤품 |
| 허리↔엉덩이 | 엉덩이 꼈으면 엉덩이가 표준보다 큼 / 허리 남으면 낙차 큼(반대) | 허리-엉덩이 낙차 |
| 앞주머니 벌어짐 | 벌어졌으면 하이힙 볼륨 큼 | 앞판 여유 요구 |
| 밑위(앉을 때 파임/처짐) | 파임·처짐→밑위 요구 큼 | 앞·뒤밑위 |
| 허벅지 | 꼈으면 +δ, 남으면 −δ | 허벅지둘레 |
| 밑단(긴바지) | 끌리면 기장 김, 짧으면 짧음 | 총장 보정 |

**가슴과 배 조합으로 체형 유형 읽기(말로):** 가슴은 맞는데 배만 꼈으면 → 중동(윗배) 볼륨형. 가슴만 꼈으면 → 상체 발달형. 둘 다 남으면 → 마른형/루즈 선호. 둘 다 맞으면 → 표준.

**"꽉/딱/여유/큼"을 cm로 바꾸는 표 (EASE_BANDS, "느낌↔센티 환산표"):**
사용자는 cm를 모르니 "딱맞음" 같은 말로 답한다. 이 표는 그 말을 **여유 cm 구간**으로 바꿔준다. 예를 들어 상의 가슴은 여유 2cm 이하면 "끼임", 8cm까지 "딱맞음", 16cm까지 "여유", 그 이상은 "큼"으로 본다. 반대로 사용자가 "딱맞음"이라 답하면 "여유가 2~8cm였구나"로 되짚어 몸을 계산한다.
- **부위마다 폭이 다른 이유:** 둘레 부위(가슴·배)는 몸을 빙 둘러서 숫자가 커 폭이 넓고, 어깨(너비)는 절반 스케일이라 폭이 좁다. 그래서 표의 키가 `(옷종류:부위)`다.
- ⚠️ **이 숫자들은 전부 초기 짐작값이다.** 사용자 피드백이 쌓이면 고친다(킬 메트릭이 판정관). 길이 부위는 여유 개념이 없어 이 표에서 뺀다.
- 현재 짐작값(참고): 상의 가슴 2/8/16 · 배 0/8/18 · 어깨 0/1.5/4 / 하의 허리 0/4/10 · 엉덩이 0/6/14 · 허벅지 0/5/12 (하의는 아직 검증 안 된 임시값).

### [3] 체형진단 카드 조립 (상·하의 결과를 한 장에)

상의 진단 결과(어깨·가슴·배·겨드랑이 등)와 하의 결과(허리-엉덩이 낙차·허벅지·밑위 등)를 한 카드에 모은다. 카드엔 이런 게 들어간다:
- **효력일자(effective_date):** 이 진단이 언제 것인지. 체중 바뀌면 고치지 말고 **새 날짜로 한 장 더** 만든다.
- **체중 버전(weight_version):** 체중이 바뀔 때마다 올라가는 번호.
- **upper/lower:** 상·하체 부위별 판정과 각 신뢰도.
- **completeness:** 상·하의가 각각 완료됐는지 → 파생 종류를 열지 판단하는 문.
- **character:** "어깨 넓고 하체 볼륨형" 같은 **한 줄 설명. 여기만 AI가 쓴다.** 나머지 숫자는 전부 규칙.
- 상의만 끝났으면 상체 칸만 채우고, 상체 계열 파생(아우터)만 부분적으로 열린다.

### [4] 병목 판정 (충돌하는 부위 정리)

> **왜 필요한가:** 어깨는 딱 맞는데 겨드랑이가 부족한 옷처럼, 부위마다 요구가 엇갈릴 때가 많다. 다 만족시키는 사이즈는 없으니 결정이 필요하다.

**규칙(말로):** 각 부위에서 "필요한 치수 − 그 사이즈의 실제 치수"를 계산해 **가장 크게 모자란 부위(=병목)** 를 찾는다(argmax = 값이 가장 큰 걸 고른다는 뜻). 그 병목 부위를 만족시키는 **가장 작은 사이즈**를 추천하고, 나머지 부위는 "여기는 여유/부족"이라고 경고로 알린다. 이건 사람들이 실제로 쓰는 요령("제일 걸리는 데 맞추고 허리는 벨트로")과 같다.

### [5] 목표 옷 추천

사고 싶은 옷 T의 실측을 놓고: 부위별 **목표 = 내 몸 + 원하는 여유**를 잡는다. 겨드랑이 같은 **꼭 지켜야 할 제약**을 만족하는 사이즈만 후보로 남기고, 그중 목표에 가장 가까운 걸(병목 우선) 고른다. 출력은 추천 사이즈 + 부위별 예상 핏 + 경고. **추천은 항상 같은 옷 종류 안에서만** 한다(상의 입력→상의 사이즈).

### [6] 브랜드 치수 거꾸로 보정 (양방향 학습)

> **왜 필요한가:** 브랜드 사이즈표가 틀리거나 빠진 경우가 많다. 사용자 경험으로 그걸 고칠 수 있다.

스펙상 정사이즈인데 "겨드랑이가 자주 꼈다"는 사람이 여럿이면 → 그 브랜드·핏라인의 **표에 없는 부위(겨드랑이·앞뒤품) 치수를 거꾸로 추정해 갱신**한다. 즉 사람 체형(B)만이 아니라 브랜드 실측(A)도 배운다. 이게 쌓이면 §4의 "숨은 치수" 칸이 데이터로 채워지고, 이게 경쟁자가 못 따라오는 **해자(방어벽)** 가 된다.

### [7] 옷속성 경고 (묻지 않고 알려줌)

옷의 속성에서 자동으로 경고를 띄운다:

| 속성 | 경고 조건 | 문구 예 |
|---|---|---|
| 비침 | 밝은색·얇은 원단 | "비침 있음 — 이너 권장" |
| 신축 없음 | 스판 없고 타이트 추천 | "스판 없어 여유 빠듯할 수 있음" |
| 무게·부피 | 롱패딩 등 | "무게로 활동성 제약 가능" |
| 수축 | 면100%·생지 | "세탁 후 수축 가능 — 재진단 권장" |

기준옷 소재도 데이터에 있으면 조회하고, 없을 때만 묻는다.

### [8] 시점·재사용 관리

착용 시점은 자동으로 지금 시각. 체형 카드는 **체중이 그대로일 때만** 재사용하고, 바뀌면 끊고 새 버전을 만든다. 단 브랜드 치수 보정(A)에는 과거 입력도 계속 쓴다(옷 치수는 내 체중과 무관하니까).

### 튜닝 파라미터 (실측정으로 맞춰가는 값들)
δ(부위별 조정폭)·k(겨드랑이 요구 계수)·원하는 여유 기본값·병목 임계값. 시드 3브랜드 × 상·하의로 "신호→추천"이 서는지 보며 조정한다. **조정의 기준은 항상 킬 메트릭(≥65%).**

---

## 4. 숨은 치수 레지스트리 (거꾸로 추정해야 할 부위 목록)

> **왜 필요한가:** 브랜드 사이즈표에 없어서 "입어보기 전엔 모르는" 부위가 있다. 바로 여기서 불편이 생긴다. 이 목록이 엔진이 공략할 진짜 기회이자 방어벽이다.

**핵심 정의:** 맞춤옷은 재는데 기성복 사이즈표엔 없는 치수 = 숨은 치수. 표에 없으니 여유를 계산할 수 없고 → 예상 못 한 불편이 생긴다. (표에 있는 숫자의 "크다/작다"는 이미 풀린 문제라 제외.)

**추정 난이도 3등급:**
- **(A) 사용자가 직접 답할 수 있는 것** — 온라인 맞춤 폼도 받는 것(소매통·목둘레). → 바로 MVP 입력에 넣을 수 있음.
- **(B) 전문 재단사만 아는 것** — 겨드랑이·화장·앞뒤품·중동·어깨경사·자세. → 브랜드 치수를 **거꾸로 추정해야 하는 진짜 해자 구간.**
- **(C) 아무도 안 재는 것** — 무릎·종아리둘레. → 불편은 실재하나 어디서도 못 구해 추정 난이도 최상.

**상의 우선순위:** ①겨드랑이(암홀) ②어깨경사·봉제선 ③원단 두께·비침·신축. 배둘레는 맞춤 폼은 받는데 기성복이 거의 항상 빼는 항목이라 **가성비 좋은 1급 후보**.
**하의 핵심:** ①앞뒤 밑위 분리 ②허리-엉덩이 낙차·밴드 곡률 ③스판·소재.

코드에서는 이 목록이 §1.1의 **병목 플래그(PAIN_FLAGS)** 로 표현되고, 자유서술에서 반복되는 페인이 정식 부위로 승격된다(엔진이 스스로 커지는 성장 구조).

**이게 왜 방어벽인가:** 기성복 사이즈표는 신뢰도 자체가 낮다(표기 73cm인데 실측 67cm 같은 사례, 법적 기준도 없음). 그래서 브랜드 표만 믿으면 위험하고, 착용경험 역산(B축)이 꼭 필요하다. 사용자들은 이미 실측을 못 믿고 "나는 어깨가 있으니 한 치수 크게" 식으로 체형 번역을 하고 있다 — 우리 서비스 논리와 같다. (상세 후기·출처 근거는 프로젝트 리서치 아카이브에 있음.)

---

## 5. 엔진 계약 (엔진과 화면 사이의 약속)

> **왜 필요한가:** 엔진 속을 몰라도 화면이 엔진을 쓸 수 있으려면, "이렇게 넣으면 이렇게 나온다"는 **딱 하나의 약속(계약)** 이 필요하다. 이 약속만 지키면 안쪽 엔진을 나중에 통째로 바꿔도 화면은 그대로 돌아간다.

**진단 함수(diagnose)의 약속(말로):**
- **넣는 것:** ①기본정보(성별·나이·키·체중) ②카테고리별 선호핏 ③착용경험 목록.
- **나오는 것:** ①체형 카드(§3-[3]) ②추천 목록(브랜드·사이즈·병목·경고, §3-[4~5]) ③신뢰도 등급(입은 옷 0벌=낮음 / 1벌=보통 / 2벌 이상=높음).
- **철칙:** 숫자·판정은 규칙, `character` 한 줄만 AI. **화면은 이 약속만 알고, 엔진 내부(느낌↔센티 환산표·δ 같은 튜닝값)는 들여다보지 않는다.**

**피드백 로그(킬 메트릭 수집기):** 결과 화면에 항상 붙는다 — "실제 내 사이즈랑 맞나?(맞음/애매/틀림)" + "안 사본 브랜드도 사보겠나?" + 자유 의견. 이게 없으면 65%를 잴 수 없으므로 처음부터 심는다.

**엔진 출력 → 화면 대응** (화면 상세는 [2_화면과흐름.md](2_화면과흐름.md)):

| 엔진 출력 | 화면 |
|---|---|
| 상체 판정 × 하체 판정 | 8가지 체형 유형 코드 → 체형 카드 |
| 추천 목록 | 브랜드별 추천 사이즈표 + 경고 문구 |
| 신뢰도 등급 | 신뢰도 배너(0벌 낮음/1벌 보통/2+ 높음) |
| 부위별 수치 | 4축 스펙트럼 막대 |
| 완료 여부 | 진단현황(옷장)·파생 해금 표시 |

상의만 끝났으면 8유형은 아직 미확정 → "상체 부분"으로 표시한다.

**프로토타입에서의 임시 대체:** 지금은 HTML 프로토타입이라 엔진 계산을 **목업 어댑터(가짜 엔진, `app/js/engine-mock.js`)** 가 대신한다 — 위 약속과 똑같은 모양으로 미리 정해둔 카드·추천·신뢰도를 돌려준다. 화면은 진짜 엔진과 똑같이 호출하므로, 나중에 이 어댑터만 진짜 엔진으로 갈아끼우면 된다.

---

## 6. 빌드 순서 / 현재 상태

> **왜 이 순서인가:** UI를 먼저 예쁘게 만들고 싶은 유혹을 눌러야 한다. 엔진이 틀리면 아무리 예쁜 화면도 소용없다. 그래서 **데이터 → 엔진 → 화면** 순으로, 가설의 심장부터 친다.
> 비유: A(브랜드 실측)=연료, B(번역 엔진)=심장, C(프론트)=엔진이 맞는지 재는 계기판.

| 단계 | 만드는 것 | 통과 조건 |
|---|---|---|
| Phase 0 | 타당성 실험(간단 스크립트, 상의 1종 × 브랜드 3) | 역산 정확도(±1 사이즈)가 의미 있게 나오나 |
| Phase 1 | 스키마 + 시드 데이터 + 변환규칙 | 브랜드 3~5개 정규화 완료 |
| Phase 2 | 번역 엔진 + 자동 테스트 | Phase 0 사례가 계속 통과 |
| Phase 3 | MVP 화면 + 검증 루프 | 킬 메트릭을 실제로 잴 수 있음 |

**데이터 파이프라인(A축 채우기, 브랜드 치수 모으기):** 진짜 어려운 건 "모으기"가 아니라 **"제각각인 표들을 하나의 통일된 형태로 정리하기"**(작업의 80%). 순서: 수집(브랜드별 맞춤 수집기 + robots.txt 확인) → 추출(이미지면 OCR로 글자 인식) → 정규화(명칭·단위 통일 + 여유 계산) → 검증(이상치·사람 눈검수) → 저장(신뢰도·시점 함께) → 분석(표준체형과 비교). "완전 자동 크롤러"는 환상이고, 표적은 봇 차단이 심한 플랫폼(무신사 등)이 아니라 **브랜드 자사몰**이다. 유니클로 상의 하나만 끝까지 뚫어본 뒤 넓힌다(브랜드와 옷 종류를 동시에 벌리지 않는다).

**현재 성숙도(솔직한 상태):**
- ✅ 단면↔둘레 환산, 여유 계산, 느낌↔센티 변환의 **기본 산수는 동작한다.**
- ⚠️ §3-[1~8]의 역산·추천 절차는 **문서 설계만 됐고 아직 구현 안 됨** → 진짜 연결은 Next.js 단계에서.
- ⚠️ **브랜드 부위 실측(garmentCm)이 아직 안 모였다** → 추천 실계산 불가(그래서 지금은 목업). 실계산 전 유니클로 상의부터 수집.
- ⚠️ **하의 설문·느낌↔센티 표는 아직 검증 안 된 임시값** → 하의 정식화는 별도 작업.
- 정확도 분석은 체형 버전(체중)별로 나눠서 본다 — 체중 변화가 정확도 신호를 오염시키지 않게.

**아직 못 정한 질문:** 옷 몇 벌·어느 부위까지 받아야 오차가 실용 수준(±2cm)에 드나 / 실착 보정을 언제부터 섞나 / 느낌↔센티 표 초기값을 어떻게 잡나 / 페이크도어 클릭의 허수 보정.

# 디자인 언어 — 핏팅

> **이 문서는 무엇?** 핏팅의 화면을 만들 때 지켜야 할 **색·글꼴·모양·말투 규칙**을 모았습니다. 디자이너가 아니어도 이 규칙만 따르면 화면이 한 덩어리처럼 보입니다.
>
> **용어 한 줄 풀이**
> - **토큰(token)**: 색·크기 같은 디자인 값을 이름표로 정해둔 것(예: "메인 초록 = `--green`"). 값을 한 곳에서 바꾸면 전체에 반영됩니다.
> - **잉크블랙**: 새까만 검정 대신 살짝 부드러운 검정(`#16140F`).
> - 실제 토큰 값은 **`web/tokens.css`** 한 파일에 있습니다(이게 정본). 화면은 이 값만 가져다 씁니다.

---

## 1. 한 줄 철학
**오프화이트 배경 + 딥그린 포인트 1가지 + 잉크블랙.** 차분하고 신뢰감 있게.

**왜 이렇게?** 우리 서비스의 핵심 가치는 "사이즈를 정확히 번역"하는 신뢰입니다. 화면이 화려하면 오히려 "AI가 대충 만든 느낌"이 나서 신뢰를 깎습니다. 그래서 **색을 아끼고, 글자 굵기와 여백으로 위계를 만듭니다.**

## 2. 5가지 원칙 (바꾸지 말 것)
1. **색은 딥그린 하나만.** 배경·글자·선은 무채색(회색 계열), 강조만 딥그린. 여러 색 섞지 않기.
2. **버튼은 검정(잉크블랙).** 주요 버튼은 초록이 아니라 검정. 초록은 '포인트'로만 써서 흔해지지 않게.
3. **글꼴은 Pretendard 하나.** 굵기(300~800)·자간·여백으로만 강약. (예외: 숫자는 §5)
4. **넓고 여유 있게.** 간격 넉넉히, 답답하지 않게.
5. **결과 카드만 예외** (아래 §4).

## 3. 색 (무엇을 어디에)
배경·표면·글자·선은 무채색으로, **딥그린은 "의미 있는 강조"에만** 씁니다.

```swatch
#F6F6F5 | 기본 배경 (오프화이트) | --bg
#FFFFFF | 카드 표면 (흰색) | --surface
#16140F | 본문·버튼 (잉크블랙) | --ink
#6E6B63 | 보조 텍스트 | --sub
#E6E5E1 | 경계선 | --line
#2E4A3B | 강조·활성·매칭도 (딥그린) | --green
#E7EFEA | 활성 배경 (연한 초록) | --green-soft
#B0553F | 경고·오류 | --warn
```

- 버튼 주요 = 검정 채움/흰 글자, 보조 = 흰 배경 + 얇은 테두리.
- 활성 상태(선택한 칩·탭·토글) = 딥그린.
- "맞음/성공" 신호도 딥그린 겸용(초록을 따로 안 만듦). "애매" = 회색, "틀림" = 경고색.

## 4. 결과 카드는 예외
체형진단 **결과 카드**만 **어두운 배경 + 8유형별 포인트색 1개**를 씁니다(카드가 유형마다 색이 달라지는 게 핵심이라). 여기엔 위의 딥그린 규칙을 적용하지 않습니다. — 8유형 색·데이터는 `web/data/bodytypes.json` 한 곳에서만 가져옵니다.

```swatch
#9DB8FF | STR · 시크 스트레이트 |
#76D6C6 | TRI · 소프트 A라인 |
#C2C7D0 | INV · 모던 V라인 |
#CF9BFF | HRG · 엘레강스 X라인 |
#8FD6A8 | BAL · 이지 밸런스 |
#FF9EC5 | DIA · 소프트 다이아 |
#FF9D7A | RND · 코지 라운드 |
#B6A8FF | TUB · 슬릭 라인 |
```

## 5. 글꼴(타이포)
- **본문·한글 = Pretendard.** 세리프(장식 있는 글꼴) 안 씀.
- **숫자(사이즈·cm·매칭도 %) = SUIT** 글꼴(`.num` 클래스). "정밀·측정"이 우리 정체성이라 숫자만 전용 글꼴로 또렷하게. (둘 다 한글 지원)
- 위계 예시: 큰 제목 44/37px·800, 소제목 24px·800, 본문 16px·450, 라벨 12px·800(영문 대문자). 큰 제목은 자간을 좁게(−.045em).

## 6. 모양(형태 토큰)
- 라운드: 버튼·입력 12px · 칩 20px · 카드 18px · 결과카드 24~30px.
- 테두리: 카드/선 `1px`(연회색), 입력/옵션 `1.5px`.
- 그림자는 아주 옅게. 컨테이너 폭은 앱 기준 넓게, 폼 화면은 읽기 편한 폭으로 중앙 정렬.

## 7. 컴포넌트 규칙 (빠른 참조)
| 컴포넌트 | 기본 | 선택/활성 |
|---|---|---|
| 버튼(주요) | 검정 채움·흰 글자 | hover 더 진한 검정 / 비활성 회색 |
| 버튼(보조) | 흰 배경·얇은 테두리 | hover 연한 회색 |
| 칩(필터) | 흰 배경·회색 | **딥그린 채움**·흰 글자 |
| 탭 | 회색 글자 | **딥그린** 글자 + 밑줄 |
| 토글 | 회색 | **딥그린** ON |
| 매칭도/정확도 뱃지 | — | **딥그린 pill**(연초록 배경) |

## 8. 말투(UX 라이팅)
- **친절한 스타일 친구** 톤. 기본 **요체(~해요)**.
- 브랜드 단어는 **'핏(fit)'**.
- **문장 속 이모지 지양**, 어려운 패션 전문용어 금지(테일러드·박시 등 → 누구나 아는 쉬운 말).
- 결과 카드의 '잘맞/피할 FIT'은 각 1줄·쉬운 말. 방향 팁은 'FIT INSIGHT'로.

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  marked.setOptions({ gfm:true, breaks:false });
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  var srcs=[].slice.call(document.querySelectorAll('script[data-doc]'));
  var fileToId={}; srcs.forEach(function(s){ fileToId[s.dataset.file]=s.dataset.doc; });
  var docnav=document.getElementById('docnav'), toc=document.getElementById('toc-list'), content=document.getElementById('content');
  srcs.forEach(function(s){ var a=document.createElement('a'); a.href='#'+s.dataset.doc; a.textContent=s.dataset.label; a.dataset.doc=s.dataset.doc; docnav.appendChild(a); });

  function codeBlocks(lang){ return [].slice.call(content.querySelectorAll('pre > code')).filter(function(c){ return new RegExp('(^|\\s)language-'+lang+'(\\s|$)').test(c.className); }); }

  /* iatree */
  var PRI={'★':'mvp','◐':'mvpp','○':'v2','목업':'mock','■':'mock'}, BADGE={mvp:'★',mvpp:'◐',v2:'○',mock:'목업'};
  function parseIA(text){
    var lines=text.split('\n').filter(function(l){return l.trim().length;});
    var root=[], stack=[{depth:-1,kids:root,node:null}];
    lines.forEach(function(raw){
      var indent=(raw.match(/^ */)[0].length), depth=Math.floor(indent/2), c=raw.trim();
      if(c.charAt(0)==='·'){ var host=stack[stack.length-1].node; if(host){(host.actions=host.actions||[]).push(c.slice(1).trim());} return; }
      var p=c.split('|').map(function(x){return x.trim();});
      var node={pri:(PRI[p[0]]||'v2'), no:p[1]||'', name:p[2]||'', note:p[3]||'', kids:[]};
      while(stack.length && stack[stack.length-1].depth>=depth) stack.pop();
      stack[stack.length-1].kids.push(node); stack.push({depth:depth, kids:node.kids, node:node});
    });
    return root;
  }
  function iaNode(n, depth){
    var has=n.kids.length||(n.actions&&n.actions.length), open=depth<1;
    var h='<div class="ianode'+(open?' open':'')+'" data-pri="'+n.pri+'"><div class="row'+(has?' has':'')+'"'+(has?' data-tog="1"':'')+'>';
    h+='<span class="tw">'+(has?'▸':'')+'</span><span class="ia-b '+n.pri+'">'+BADGE[n.pri]+'</span>';
    if(n.no) h+='<span class="no">'+esc(n.no)+'</span>';
    h+='<span class="nm">'+esc(n.name)+'</span>'+(n.note?'<span class="nt">'+esc(n.note)+'</span>':'')+'</div>';
    if(n.actions&&n.actions.length) h+='<div class="iaacts'+(open?'':' hide')+'">'+n.actions.map(function(a){return '<div class="iaact">'+esc(a)+'</div>';}).join('')+'</div>';
    if(n.kids.length) h+='<div class="iakids'+(open?'':' hide')+'">'+n.kids.map(function(k){return iaNode(k,depth+1);}).join('')+'</div>';
    return h+'</div>';
  }
  function upgradeTrees(){
    codeBlocks('iatree').forEach(function(code){
      var el=document.createElement('div'); el.className='iatree';
      el.innerHTML='<div class="bar"><button class="fb on" data-f="all">전체</button><button class="fb" data-f="mvp">MVP만</button><button class="fb" data-f="later">v2·이후</button><button class="tbtn" data-all="1">모두 펼치기</button><button class="tbtn" data-all="0">모두 접기</button><span class="lg">★ MVP · ◐ 최소 · ○ v2 · 목업</span></div>'+parseIA(code.textContent).map(function(n){return iaNode(n,0);}).join('');
      code.parentNode.parentNode.replaceChild(el, code.parentNode);
      el.addEventListener('click', function(e){
        var f=e.target.closest('.fb'); if(f){ el.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');}); f.classList.add('on'); el.classList.remove('f-mvp','f-later'); if(f.dataset.f==='mvp')el.classList.add('f-mvp'); if(f.dataset.f==='later')el.classList.add('f-later'); return; }
        var t=e.target.closest('.tbtn'); if(t){ var op=t.dataset.all==='1'; el.querySelectorAll('.ianode').forEach(function(nd){ nd.classList.toggle('open',op); [].forEach.call(nd.children,function(c){ if(c.classList.contains('iakids')||c.classList.contains('iaacts')) c.classList.toggle('hide',!op); }); }); return; }
        var row=e.target.closest('.row.has'); if(row){ var nd=row.parentNode; nd.classList.toggle('open'); var o=nd.classList.contains('open'); [].forEach.call(nd.children,function(c){ if(c.classList.contains('iakids')||c.classList.contains('iaacts')) c.classList.toggle('hide',!o); }); }
      });
    });
  }
  /* swatch */
  function upgradeSwatch(){
    codeBlocks('swatch').forEach(function(code){
      var rows=code.textContent.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      var el=document.createElement('div'); el.className='swatch';
      el.innerHTML=rows.map(function(r){ var p=r.split('|').map(function(x){return x.trim();}); var hex=p[0]||'',u=p[1]||'',t=p[2]||'';
        var b=/#f{2}f{2}f{2}/i.test(hex.replace(/[^#0-9a-f]/gi,''))||/#fff/i.test(hex)?';border-bottom:1px solid var(--line)':'';
        return '<div class="sw"><div class="chip" style="background:'+esc(hex)+b+'"></div><div class="m"><div class="u">'+esc(u)+'</div><div class="h">'+esc(hex)+'</div>'+(t?'<div class="t">'+esc(t)+'</div>':'')+'</div></div>';
      }).join('');
      code.parentNode.parentNode.replaceChild(el, code.parentNode);
    });
  }
  /* compare */
  function upgradeCompare(){
    codeBlocks('compare').forEach(function(code){
      var rows=code.textContent.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      var el=document.createElement('div'); el.className='compare';
      el.innerHTML=rows.map(function(r){ var i=r.indexOf('=>'); if(i<0) return ''; return '<div class="cmp"><div class="bad">'+esc(r.slice(0,i).trim())+'</div><div class="good">'+esc(r.slice(i+2).trim())+'</div></div>'; }).join('');
      code.parentNode.parentNode.replaceChild(el, code.parentNode);
    });
  }

  /* flow (사용자 흐름도) */
  var UFC={ac:'var(--green)',shop:'#5A7A68',warn:'var(--warn)',green:'var(--green)',ink:'var(--ink)'};
  function ufTag(t){ if(!t) return ''; var mvp=t.charAt(0)==='★'; return '<span class="uf-tag '+(mvp?'mvp':'soon')+'">'+esc(t)+'</span>'; }
  function ufNode(f,variant){ // f=[step,title,tag,desc], mods extracted
    var mods={}; var pos=[];
    f.forEach(function(x){ if(x.charAt(0)==='@')mods.hl=x.slice(1).trim(); else if(x.indexOf('metric:')===0)mods.metric=x.slice(7).trim(); else if(x==='color:shop')variant=(variant||'')+' shop'; else pos.push(x); });
    var step=pos[0]||'',ttl=pos[1]||'',tag=pos[2]||'',ds=pos[3]||'';
    var gi=(variant&&/gate/.test(variant))?'<div class="gi">🔒</div>':'';
    var h='<div class="uf-node'+(variant?' '+variant:'')+'">'+gi+'<div class="nh">'+(step?'<span class="step">'+esc(step)+'</span>':'')+'<span class="ttl">'+esc(ttl)+'</span>'+ufTag(tag)+'</div>';
    if(ds) h+='<div class="ds">'+esc(ds)+'</div>';
    if(mods.hl) h+='<div class="hl">'+esc(mods.hl)+'</div>';
    if(mods.metric) h+='<span class="uf-metric">'+esc(mods.metric)+'</span>';
    return h+'</div>';
  }
  function ufGate(f){ var t=f[0]||'',d=f[1]||'',trig=f[2]||''; return '<div class="uf-node gate"><div class="gi">🔒</div><span class="ttl">'+esc(t)+'</span>'+(d?'<div class="ds">'+esc(d)+'</div>':'')+(trig?'<span class="trig">'+esc(trig)+'</span>':'')+'</div>'; }
  function ufSplit(rest){ var c=rest.split('::'); var L=c[0].split('|').map(function(x){return x.trim();}), R=(c[1]||'').split('|').map(function(x){return x.trim();});
    return '<div class="uf-split"><div class="uf-snode fail"><div class="st">'+esc(L[0]||'')+'</div>'+(L[1]?'<div class="sp">'+esc(L[1])+'</div>':'')+(L[2]?'<span class="back">'+esc(L[2])+'</span>':'')+'</div><div class="uf-snode"><div class="st">'+esc(R[0]||'')+'</div>'+(R[1]?'<div class="sp">'+esc(R[1])+'</div>':'')+'</div></div>'; }
  function ufBranch(f){ var mods={},pos=[]; f.forEach(function(x){ if(x.indexOf('metric:')===0)mods.metric=x.slice(7).trim(); else if(x.indexOf('arrow:')===0)mods.arrow=x.slice(6).trim(); else if(x==='lead')mods.lead=1; else pos.push(x); });
    var ic=pos[0]||'',ttl=pos[1]||'',tag=pos[2]||'',bp=pos[3]||'',sub=pos[4]||'';
    var h='<div class="uf-bnode'+(mods.lead?' lead':'')+'"><div class="bh">'+(ic?'<span class="ic">'+esc(ic)+'</span>':'')+'<span class="ttl">'+esc(ttl)+'</span>'+ufTag(tag)+'</div>';
    if(bp) h+='<div class="bp">'+esc(bp)+'</div>';
    if(sub) h+='<div class="sub2">'+esc(sub)+'</div>';
    if(mods.metric) h+='<div class="sub2"><span class="uf-metric">'+esc(mods.metric)+'</span></div>';
    if(mods.arrow) h+='<div class="adown">'+esc(mods.arrow)+'</div>';
    return h+'</div>'; }
  function upgradeFlow(){
    codeBlocks('flow').forEach(function(code){
      var lines=code.textContent.split('\n').map(function(l){return l.replace(/\s+$/,'');}).filter(function(l){return l.trim().length;});
      var els=lines.map(function(l){ var i=l.indexOf('|'); var type=(i<0?l:l.slice(0,i)).trim().toLowerCase(); var rest=i<0?'':l.slice(i+1); return {type:type, rest:rest, f:rest.split('|').map(function(x){return x.trim();})}; });
      var out='', last=null, phaseSeen=false, i=0;
      var CARD={node:1,hero:1,gate:1,split:1,branch:1};
      function autoConn(){ if(last==='card'||last==='split'||last==='branches'||last==='loop') out+='<div class="uf-conn short"></div>'; }
      while(i<els.length){
        var e=els[i];
        if(e.type==='legend'){ out+='<div class="uf-legend">'+e.f.map(function(x){ var sp=x.indexOf(' '); var col=x.slice(0,sp), lab=x.slice(sp+1); return '<span><i class="dot" style="background:'+(UFC[col]||col)+'"></i>'+esc(lab)+'</span>'; }).join('')+'</div>'; last='legend'; i++; continue; }
        if(e.type==='phase'){ var col=e.f[0]||'ink'; out+='<div class="uf-phase'+(phaseSeen?'':' first')+'"><i class="pd" style="background:'+(UFC[col]||col)+'"></i>'+esc(e.f[1]||'')+(e.f[2]?' <span class="sub">'+esc(e.f[2])+'</span>':'')+'</div>'; phaseSeen=true; last='phase'; i++; continue; }
        if(e.type==='conn'){ var lb=e.f[0]||''; out+='<div class="uf-conn'+(lb?'':' short')+'">'+(lb?'<span class="lbl">'+esc(lb)+'</span>':'')+'</div>'; last='conn'; i++; continue; }
        if(e.type==='loop'){ out+='<div class="uf-loop">'+esc(e.rest.trim())+'</div>'; last='loop'; i++; continue; }
        if(e.type==='branch'){ autoConn(); var grp=''; while(i<els.length && els[i].type==='branch'){ grp+=ufBranch(els[i].f); i++; } out+='<div class="uf-branches">'+grp+'</div>'; last='branches'; continue; }
        if(CARD[e.type]){ autoConn();
          if(e.type==='node') out+=ufNode(e.f,'');
          else if(e.type==='hero') out+=ufNode(e.f,'hero');
          else if(e.type==='gate') out+=ufGate(e.f);
          else if(e.type==='split') out+=ufSplit(e.rest);
          last='card'; i++; continue; }
        i++; // unknown → skip
      }
      var el=document.createElement('div'); el.className='uflow'; el.innerHTML=out;
      code.parentNode.parentNode.replaceChild(el, code.parentNode);
    });
  }

  var io=null;
  function buildTOC(){
    toc.innerHTML=''; var heads=content.querySelectorAll('h2, h3');
    heads.forEach(function(h,i){ var id='s'+i; h.id=id; var a=document.createElement('a'); a.href='#'+id; a.textContent=h.textContent.replace(/^\s+/,''); if(h.tagName==='H3') a.className='lv3'; toc.appendChild(a); });
    if(io) io.disconnect();
    io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ var id=e.target.id; [].forEach.call(toc.children,function(l){ l.classList.toggle('active', l.getAttribute('href')==='#'+id); }); } }); },{rootMargin:'-72px 0px -78% 0px'});
    heads.forEach(function(h){ io.observe(h); });
  }
  function wireLinks(){
    [].forEach.call(content.querySelectorAll('a'),function(a){
      var href=a.getAttribute('href')||'', file=href.replace(/^\.\//,'');
      if(fileToId[file]){ a.addEventListener('click',function(e){ e.preventDefault(); location.hash='#'+fileToId[file]; }); }
      else if(href.indexOf('http')===0){ a.target='_blank'; }
      else if(/\.html($|[?#])/.test(href)){ a.target='_blank'; }
    });
  }
  function render(id){
    var s=document.querySelector('script[data-doc="'+id+'"]'); if(!s){ s=srcs[0]; id=s.dataset.doc; }
    content.innerHTML=marked.parse(s.textContent);
    upgradeTrees(); upgradeSwatch(); upgradeCompare(); upgradeFlow();
    [].forEach.call(docnav.children,function(a){ a.classList.toggle('active', a.dataset.doc===id); });
    var h1=content.querySelector('h1'); document.getElementById('crumb').textContent=h1?h1.textContent.replace(/^\s+/,''):s.dataset.label;
    buildTOC(); wireLinks(); window.scrollTo(0,0);
  }
  window.addEventListener('hashchange',function(){ var id=location.hash.slice(1); if(document.querySelector('script[data-doc="'+id+'"]')) render(id); });
  var start=location.hash.slice(1);
  render(document.querySelector('script[data-doc="'+start+'"]')?start:srcs[0].dataset.doc);
</script>
