<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fitting · 전문가 목록 (S2/S3)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#ffffff; --bg2:#f7f8fa; --ink:#191a1c; --sub:#71717a; --sub2:#a6a7ae;
    --line:#eeeff1; --line2:#e3e4e8; --soft:#f2f3f5; --brand:#191a1c; --brand-d:#000000; --ac:#2563eb;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; letter-spacing:-.02em; -webkit-font-smoothing:antialiased;}
  a{color:inherit; text-decoration:none; cursor:pointer;}
  header{position:sticky; top:0; z-index:50; background:rgba(255,255,255,.88); backdrop-filter:blur(12px); border-bottom:1px solid var(--line);}
  .nav{max-width:1100px; margin:0 auto; height:68px; display:flex; align-items:center; gap:30px; padding:0 28px;}
  .logo{font-size:22px; font-weight:800; letter-spacing:-.05em; color:var(--brand);}
  .menu{display:flex; gap:4px;}
  .menu a{padding:8px 14px; border-radius:10px; font-weight:600; font-size:15px; color:var(--sub);}
  .menu a.on{color:var(--ink); font-weight:700; background:var(--soft);}
  .right{margin-left:auto; font-size:14px; color:var(--sub);}

  .wrap{max-width:1100px; margin:0 auto; padding:36px 28px 90px;}
  .crumb{font-size:14px; color:var(--sub); font-weight:600; margin-bottom:16px;}
  h1{font-size:34px; font-weight:800; letter-spacing:-.045em;}
  .lead{font-size:16px; color:var(--sub); margin-top:8px;}

  /* 서비스 유형 탭 */
  .tabs{display:flex; gap:8px; margin:26px 0 18px; border-bottom:1px solid var(--line);}
  .tabs .t{padding:13px 20px; font-size:15px; font-weight:700; color:var(--sub); cursor:pointer; border-bottom:2.5px solid transparent; margin-bottom:-1px; transition:.15s; display:flex; align-items:center; gap:7px;}
  .tabs .t:hover{color:var(--ink);}
  .tabs .t.on{color:var(--brand); border-color:var(--brand);}

  /* 필터 줄 */
  .filters{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:24px;}
  .chip{display:inline-block; padding:9px 15px; border:1.5px solid var(--line2); border-radius:30px; cursor:pointer; font-size:14px; font-weight:600; color:var(--sub); transition:.14s; background:#fff;}
  .chip:hover{border-color:var(--sub2); color:var(--ink);}
  .chip.on{background:var(--brand); color:#fff; border-color:var(--brand);}
  .sort{margin-left:auto;}
  .sort select{padding:10px 14px; border:1.5px solid var(--line2); border-radius:12px; font-size:14px; font-weight:600; font-family:inherit; background:#fff; color:var(--ink); cursor:pointer;}
  .count{font-size:14px; color:var(--sub2); font-weight:600; margin-bottom:16px;}

  /* 전문가 카드 그리드 */
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
  .card{background:#fff; border:1px solid var(--line); border-radius:22px; overflow:hidden; cursor:pointer; transition:.18s; position:relative;}
  .card:hover{transform:translateY(-5px); box-shadow:0 20px 44px rgba(11,14,18,.10);}
  .cover{height:172px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; position:relative;}
  .match{position:absolute; top:12px; left:12px; background:var(--ac); color:#fff; font-size:12px; font-weight:800; padding:5px 11px; border-radius:30px; backdrop-filter:blur(4px);}
  .svcbadge{position:absolute; top:12px; right:12px; background:#fff; color:var(--ink); font-size:11px; font-weight:700; padding:5px 10px; border-radius:30px;}
  .body{padding:18px;}
  .body .nm{font-size:17px; font-weight:800; letter-spacing:-.03em;}
  .body .star{font-weight:700; font-size:14px; color:var(--ink);}
  .body .spec{font-size:14px; color:var(--sub); margin:5px 0 12px;}
  .body .tags span{display:inline-block; font-size:12px; background:var(--soft); color:#5b5249; padding:4px 10px; border-radius:20px; margin:0 5px 5px 0; font-weight:600;}
  .body .price{margin-top:10px; font-size:15px; font-weight:800;}
  .body .price small{font-weight:600; color:var(--sub2);}

  .empty{grid-column:1/-1; text-align:center; padding:60px 0; color:var(--sub2); font-weight:600;}
  .secmark{font-size:12px; color:#c4cad0; margin-top:42px; text-align:center;}

  /* 프로필 드로어 (S3) */
  .scrim{position:fixed; inset:0; background:rgba(20,18,15,.45); opacity:0; pointer-events:none; transition:.2s; z-index:60;}
  .scrim.on{opacity:1; pointer-events:auto;}
  .drawer{position:fixed; top:0; right:0; height:100%; width:460px; max-width:92vw; background:#fff; box-shadow:-20px 0 60px rgba(0,0,0,.18); transform:translateX(100%); transition:.28s cubic-bezier(.2,.8,.2,1); z-index:61; overflow-y:auto;}
  .drawer.on{transform:none;}
  .dhead{height:200px; display:flex; align-items:flex-end; padding:20px; color:#fff;}
  .dbody{padding:24px;}
  .dclose{position:absolute; top:16px; right:18px; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.9); display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; border:none; z-index:62;}
  .feat{font-size:13px; color:var(--sub2); font-weight:700; margin:20px 0 8px;}
  .gal{display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
  .gal div{height:84px; border-radius:11px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600;}
  .quote{background:var(--bg2); border-radius:12px; padding:13px 15px; font-size:14px; color:#4b4239; margin-bottom:9px; line-height:1.55;}
  .pricebox{background:var(--bg2); border-radius:16px; padding:18px; margin-top:8px;}
  .pricebox .p{font-size:26px; font-weight:800; letter-spacing:-.03em;}
  .btn{display:block; width:100%; text-align:center; background:var(--brand); color:#fff; border:none; padding:16px; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:14px;}
  .btn:hover{background:var(--brand-d);}

  @media(max-width:880px){ .grid{grid-template-columns:1fr 1fr;} }
  @media(max-width:560px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<header>
  <div class="nav">
    <span class="logo">fitting</span>
    <nav class="menu">
      <a>홈</a><a>체형진단</a><a class="on">쇼퍼찾기</a><a>마이</a>
    </nav>
    <div class="right">김도현 님 · <b style="color:var(--ink)">📏 시크 스트레이트</b></div>
  </div>
</header>

<div class="wrap">
  <div class="crumb">‹ 쇼퍼찾기 · 전문가 목록 <span style="color:var(--sub2)">(S2)</span></div>
  <h1>나에게 맞는 전문가</h1>
  <p class="lead">내 체형·사이즈 프로필 기준 <b style="color:var(--ink)">매칭도 순</b>으로 정렬했어요. 결과물·후기로 검증된 전문가만 보여드려요.</p>

  <!-- 서비스 유형 탭 -->
  <div class="tabs" id="tabs">
    <div class="t on" data-svc="all" onclick="setTab(this)">전체</div>
    <div class="t" data-svc="online" onclick="setTab(this)">💻 온라인 스타일링</div>
    <div class="t" data-svc="shopping" onclick="setTab(this)">🛍️ 동행 쇼핑</div>
    <div class="t" data-svc="image" onclick="setTab(this)">✨ 이미지 컨설팅</div>
  </div>

  <!-- 상황 필터 + 정렬 -->
  <div class="filters" id="occ">
    <span style="font-size:14px; color:var(--sub2); font-weight:700; margin-right:2px">상황</span>
    <span class="chip on" data-occ="all" onclick="setOcc(this)">전체</span>
    <span class="chip" data-occ="date" onclick="setOcc(this)">소개팅</span>
    <span class="chip" data-occ="interview" onclick="setOcc(this)">면접·발표</span>
    <span class="chip" data-occ="wedding" onclick="setOcc(this)">결혼식 하객</span>
    <span class="chip" data-occ="travel" onclick="setOcc(this)">여행</span>
    <span class="sort"><select onchange="render()" id="sortSel">
      <option value="match">정렬: 매칭도순</option>
      <option value="rating">평점순</option>
      <option value="review">후기 많은순</option>
      <option value="priceA">가격 낮은순</option>
    </select></span>
  </div>

  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>

  <div class="secmark">전문가 목록 (S2) · 유형 탭 · 상황 필터 · 매칭도 정렬 · 카드 클릭 → 프로필(S3) · v2 실동작 화면</div>
</div>

<!-- 프로필 드로어 (S3) -->
<div class="scrim" id="scrim" onclick="closeP()"></div>
<aside class="drawer" id="drawer">
  <button class="dclose" onclick="closeP()">✕</button>
  <div class="dhead" id="dhead"></div>
  <div class="dbody" id="dbody"></div>
</aside>

<script>
  var COVERS=['linear-gradient(135deg,#1c1d22,#3c3d45)','linear-gradient(135deg,#2a2b32,#54555f)','linear-gradient(135deg,#3c3d46,#6e6f7a)','linear-gradient(135deg,#232429,#494a54)','linear-gradient(135deg,#33343d,#5e5f6b)','linear-gradient(135deg,#44454f,#7a7b88)'];
  var SVC={online:'온라인 스타일링',shopping:'동행 쇼핑',image:'이미지 컨설팅'};
  var OCC={date:'소개팅',interview:'면접·발표',wedding:'결혼식 하객',travel:'여행'};

  var EXPERTS=[
    {nm:'민지',svc:'online',occ:['date','travel'],spec:'데일리·소개팅룩 시크 스트레이트 전문',rating:4.9,review:128,price:120000,match:98,c:0,
      bio:'온라인 쇼핑몰 MD 7년 → 퍼스널 스타일리스트. 비대면으로 상품·코디·구매링크까지 큐레이션.',tags:['시크 스트레이트','데일리','소개팅']},
    {nm:'서연',svc:'image',occ:['interview'],spec:'면접·오피스 이미지 컨설팅',rating:4.8,review:94,price:200000,match:91,c:1,
      bio:'이미지 컨설턴트 협회 정회원. 면접·발표 등 첫인상이 중요한 자리의 전체 인상을 설계.',tags:['면접','오피스','이미지']},
    {nm:'하늘',svc:'shopping',occ:['wedding','travel'],spec:'하객룩·여행룩 동행 쇼핑',rating:4.7,review:61,price:150000,match:85,c:2,
      bio:'백화점 퍼스널 쇼퍼 출신. 같이 매장을 돌며 체형에 맞는 옷을 현장에서 골라드려요.',tags:['하객룩','여행','동행']},
    {nm:'도윤',svc:'online',occ:['interview','wedding'],spec:'포멀·세미정장 온라인 스타일링',rating:4.9,review:142,price:135000,match:88,c:3,
      bio:'남성 포멀 전문. 결혼식·면접 등 격식 자리의 핏을 비대면으로 잡아드립니다.',tags:['포멀','세미정장','남성']},
    {nm:'채원',svc:'shopping',occ:['date','interview'],spec:'첫인상 동행 쇼핑',rating:4.6,review:38,price:140000,match:80,c:4,
      bio:'소개팅·면접 등 "잘 보여야 하는 날" 전문. 현장에서 시착하며 사이즈를 함께 확정.',tags:['소개팅','면접','첫인상']},
    {nm:'유나',svc:'image',occ:['wedding','date'],spec:'토탈 이미지 컨설팅',rating:4.8,review:76,price:230000,match:83,c:5,
      bio:'헤어·메이크업까지 연계한 토탈 이미지 설계. 인생 사진이 필요한 날을 위한 컨설팅.',tags:['토탈','웨딩','컬러']}
  ];

  var curSvc='all', curOcc='all';
  function setTab(el){ document.querySelectorAll('#tabs .t').forEach(t=>t.classList.remove('on')); el.classList.add('on'); curSvc=el.dataset.svc; render(); }
  function setOcc(el){ document.querySelectorAll('#occ .chip').forEach(c=>c.classList.remove('on')); el.classList.add('on'); curOcc=el.dataset.occ; render(); }

  function render(){
    var list=EXPERTS.filter(e=>(curSvc==='all'||e.svc===curSvc) && (curOcc==='all'||e.occ.indexOf(curOcc)>=0));
    var s=document.getElementById('sortSel').value;
    list.sort((a,b)=> s==='rating'?b.rating-a.rating : s==='review'?b.review-a.review : s==='priceA'?a.price-b.price : b.match-a.match);
    document.getElementById('count').textContent=list.length+'명의 전문가 · '+(curSvc==='all'?'전체 유형':SVC[curSvc])+(curOcc==='all'?'':' · '+OCC[curOcc]);
    var g=document.getElementById('grid');
    if(!list.length){ g.innerHTML='<div class="empty">조건에 맞는 전문가가 아직 없어요.<br>곧 1기 전문가가 합류해요 🔔</div>'; return; }
    g.innerHTML=list.map(function(e,i){
      return '<div class="card" onclick="openP('+EXPERTS.indexOf(e)+')">'+
        '<div class="cover" style="background:'+COVERS[e.c]+'">'+
          '<span class="match">내 매칭도 '+e.match+'%</span>'+
          '<span class="svcbadge">'+SVC[e.svc]+'</span>'+
          e.nm+' 전문가의 결과물'+
        '</div>'+
        '<div class="body">'+
          '<div style="display:flex; justify-content:space-between; align-items:center"><span class="nm">'+e.nm+' 전문가</span><span class="star">★ '+e.rating+'</span></div>'+
          '<div class="spec">'+e.spec+'</div>'+
          '<div class="tags">'+e.tags.map(t=>'<span>'+t+'</span>').join('')+'</div>'+
          '<div class="price">'+e.price.toLocaleString()+'원 <small>· 후기 '+e.review+'</small></div>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  function openP(idx){
    var e=EXPERTS[idx];
    document.getElementById('dhead').style.background=COVERS[e.c];
    document.getElementById('dhead').innerHTML='<div><div style="font-size:12px; background:rgba(255,255,255,.25); display:inline-block; padding:4px 10px; border-radius:20px; font-weight:700; margin-bottom:8px">'+SVC[e.svc]+' · 매칭도 '+e.match+'%</div><div style="font-size:26px; font-weight:800; letter-spacing:-.03em">'+e.nm+' 전문가</div><div style="font-size:14px; opacity:.9">★ '+e.rating+' · 후기 '+e.review+'</div></div>';
    document.getElementById('dbody').innerHTML=
      '<p style="font-size:15px; color:#4b4239; line-height:1.6">'+e.bio+'</p>'+
      '<div class="feat">전문 분야</div><div class="tags">'+e.tags.map(t=>'<span style="display:inline-block; font-size:13px; background:var(--soft); color:#5b5249; padding:6px 12px; border-radius:20px; margin:0 6px 6px 0; font-weight:600">'+t+'</span>').join('')+'</div>'+
      '<div class="feat">결과물 (얼굴·팔로워 ❌ / 결과물·후기 ✅)</div>'+
      '<div class="gal">'+COVERS.slice(0,6).map((c,i)=>'<div style="background:'+c+'">'+(i<5?'결과 '+(i+1):'+24장')+'</div>').join('')+'</div>'+
      '<div class="feat">실사용 후기</div>'+
      '<div class="quote">"비대면인데도 사이즈가 정확해서 반품 없이 한 번에 성공했어요." — 33세</div>'+
      '<div class="quote">"내 체형 설명을 안 해도 이미 알고 골라주셔서 편했어요." — 29세</div>'+
      '<div class="pricebox"><div style="font-size:13px; color:var(--sub2); font-weight:700">'+SVC[e.svc]+' 패키지</div><div class="p">'+e.price.toLocaleString()+'원</div><div style="font-size:13px; color:var(--sub)">내 체형·사이즈 프로필 자동 전달 · 소요 3일</div>'+
      '<button class="btn" onclick="reqMatch(\''+e.nm+'\')">이 전문가에게 요청하기 →</button></div>';
    document.getElementById('scrim').classList.add('on');
    document.getElementById('drawer').classList.add('on');
  }
  function closeP(){ document.getElementById('scrim').classList.remove('on'); document.getElementById('drawer').classList.remove('on'); }
  function reqMatch(nm){ alert('('+nm+' 전문가) 매칭 요청 (S4)\n\n내 체형·사이즈 번역 결과가 자동 첨부돼 전달돼요 → 전문가는 원격으로도 정확히 골라줄 수 있어요. [핸드오프]'); }

  render();
</script>
</body>
</html>
