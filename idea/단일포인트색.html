<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fitting · 단일 포인트 색 후보 (색채심리)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; background:#f4f4f5; color:#1a1a1d; line-height:1.5; letter-spacing:-.02em; -webkit-font-smoothing:antialiased; padding:46px 24px 80px;}
  .head{max-width:1180px; margin:0 auto 30px;}
  .head h1{font-size:29px; font-weight:800; letter-spacing:-.04em;}
  .head p{font-size:15px; color:#6b6b70; margin-top:8px;}
  .grid{max-width:1180px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
  .opt{background:#fff; border-radius:22px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.06); border:1px solid #ececee;}
  .otop{padding:20px 20px 14px; display:flex; align-items:center; gap:12px;}
  .dot{width:38px; height:38px; border-radius:11px; flex:none;}
  .oname{font-size:18px; font-weight:800; letter-spacing:-.03em;}
  .ohex{font-size:11.5px; color:#a3a3aa; font-weight:600;}
  .pv{padding:0 20px 18px;}
  .pv-bar{display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:12px; margin-bottom:12px; background:#fafafa; border:1px solid #f0f0f2;}
  .pv-logo{font-size:17px; font-weight:800; letter-spacing:-.05em;}
  .pv-pill{margin-left:auto; font-size:11px; font-weight:700; padding:5px 10px; border-radius:20px; color:#fff;}
  .pv-card{border-radius:13px; overflow:hidden; border:1px solid #eee;}
  .pv-cover{height:84px; display:flex; align-items:flex-start; justify-content:space-between; padding:10px; color:rgba(255,255,255,.9); font-size:10.5px; font-weight:600; background:linear-gradient(135deg,#2a2a30,#54545c);}
  .pv-match{font-size:10.5px; font-weight:800; padding:4px 8px; border-radius:20px; color:#fff;}
  .pv-svc{font-size:10px; font-weight:700; padding:4px 8px; border-radius:20px; background:#fff; color:#1a1a1d;}
  .pv-cbody{padding:11px 12px;}
  .pv-cbody b{font-size:13.5px;} .pv-cbody .pr{font-size:13px; font-weight:800; margin-top:4px;}
  .pv-row{display:flex; gap:7px; margin-top:12px; align-items:center;}
  .pv-chip{font-size:11.5px; font-weight:700; padding:8px 12px; border-radius:20px; color:#fff;}
  .pv-chip.off{background:#fff; border:1.5px solid #e0e0e4; color:#8a8a90;}
  .pv-btn{font-size:12.5px; font-weight:700; color:#fff; padding:10px 14px; border-radius:11px; flex:1; text-align:center;}
  .pv-ban{margin-top:11px; font-size:11.5px; font-weight:600; color:#fff; padding:9px 12px; border-radius:11px;}
  .psy{font-size:12.5px; color:#6b6b70; line-height:1.55; padding:0 20px 20px;}
  .psy b{color:#1a1a1d;}
  @media(max-width:980px){ .grid{grid-template-columns:1fr 1fr;} }
  @media(max-width:660px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<div class="head">
  <h1>fitting · 단일 포인트 색 후보</h1>
  <p>무채색 베이스(글자 차콜 · 흰 배경)는 고정, <b>포인트 색 하나만</b> 바꿔 같은 미니 UI에 입힌 비교예요. 골드 같은 보조색 없이 1색만 씁니다.</p>
</div>

<div class="grid" id="grid"></div>

<div class="head" style="margin-top:30px">
  <p style="font-size:13.5px; color:#8a8a90">💡 '맞음' 성공 신호(킬메트릭)는 어떤 안을 골라도 그린(#2F9E6F)으로 분리 유지 권장 — 브랜드 포인트와 안 섞이게.</p>
</div>

<script>
  var OPTS=[
    {name:'네이비', pt:'#1B2A4A', psy:'신뢰·전문성·차분. 옷 실패 불안을 가라앉힘. 가장 무난·보수적. (현재)'},
    {name:'딥 틸', pt:'#0F766E', psy:'신뢰 + 청량·정확. 차가운 신뢰에 생기를 더해 모던한 패션테크 느낌. 네이비보다 신선.'},
    {name:'에메랄드', pt:'#1E8E5A', psy:'"맞다"는 안심·균형·성장. 진단 제품과 정서가 맞음. 단, 성공 그린과 톤 분리 필요.'},
    {name:'테라코타', pt:'#D9572E', psy:'따뜻·자신감·행동. 중요한 순간의 용기를 줌. CTA에 강함. 가장 사람 냄새.'},
    {name:'버건디·플럼', pt:'#8E3B5A', psy:'프리미엄·패션·세련. 경쟁앱과 확연히 다른 무드. 감각적이지만 다소 무거움.'},
    {name:'코발트 블루', pt:'#2B59D6', psy:'모던·또렷·테크 신뢰. 네이비보다 활기. 젊고 디지털한 인상.'}
  ];
  function darken(hex){ var n=parseInt(hex.slice(1),16); var r=Math.max(0,(n>>16)-26), g=Math.max(0,((n>>8)&255)-22), b=Math.max(0,(n&255)-22); return '#'+(1<<24|r<<16|g<<8|b).toString(16).slice(1); }
  document.getElementById('grid').innerHTML=OPTS.map(function(o){
    return '<div class="opt">'+
      '<div class="otop"><div class="dot" style="background:'+o.pt+'"></div><div><div class="oname">'+o.name+'</div><div class="ohex">'+o.pt.toUpperCase()+'</div></div></div>'+
      '<div class="pv">'+
        '<div class="pv-bar"><span class="pv-logo" style="color:'+o.pt+'">fitting</span><span class="pv-pill" style="background:'+o.pt+'">📏 시크 스트레이트</span></div>'+
        '<div class="pv-card"><div class="pv-cover"><span class="pv-match" style="background:'+o.pt+'">매칭도 98%</span><span class="pv-svc">온라인 스타일링</span></div>'+
          '<div class="pv-cbody"><b>민지 전문가</b> <span style="color:'+o.pt+'; font-weight:700">★ 4.9</span><div class="pr" style="color:#1a1a1d">120,000원</div></div></div>'+
        '<div class="pv-row"><span class="pv-chip" style="background:'+o.pt+'">소개팅</span><span class="pv-chip off">면접</span><span class="pv-btn" style="background:'+o.pt+'">전문가 매칭하기</span></div>'+
        '<div class="pv-ban" style="background:'+o.pt+'">온라인 스타일링 · 소개팅 · 📏 체형 첨부됨</div>'+
      '</div>'+
      '<div class="psy"><b>심리:</b> '+o.psy+'</div>'+
    '</div>';
  }).join('');
</script>
</body>
</html>
