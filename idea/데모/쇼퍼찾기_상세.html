<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fitting · 쇼퍼찾기 (상세)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#F6F6F5; --surface:#FFFFFF; --ink:#16140F; --ink-soft:#3A382F; --sub:#6E6B63; --sub2:#A6A29A;
    --line:#E6E5E1; --line2:#DAD8D2; --soft:#EDEDEA;
    --accent:#2E4A3B; --accent-ink:#2E4A3B; --accent-soft:#E7EFEA; --green-mid:#5A7A68; --green-light:#9CC1AE;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; letter-spacing:-.02em; -webkit-font-smoothing:antialiased;}
  a{color:inherit; text-decoration:none; cursor:pointer;}

  header{position:sticky; top:0; z-index:50; background:rgba(246,246,245,.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--line);}
  .nav{max-width:1240px; margin:0 auto; height:66px; display:flex; align-items:center; gap:28px; padding:0 30px;}
  .logo{display:inline-block; font-size:22px; font-weight:800; letter-spacing:-.05em; color:var(--accent); line-height:1;}
  .logo .sq{display:inline-block; width:6px; height:6px; background:#4A3216; margin-left:2px; vertical-align:baseline;}
  .menu{display:flex; gap:2px;}
  .menu a{padding:8px 14px; border-radius:10px; font-size:15px; font-weight:600; color:var(--sub);}
  .menu a.on{color:var(--ink); font-weight:800; background:var(--accent-soft);}
  .navr{margin-left:auto; font-size:14px; color:var(--sub); display:flex; align-items:center; gap:16px;}
  .navr .sup{font-weight:700; color:var(--accent-ink);}

  .wrap{max-width:1240px; margin:0 auto; padding:52px 30px 120px;}
  .btn{display:inline-block; background:var(--ink); color:#fff; border:none; padding:13px 22px; border-radius:12px; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit;}
  .btn.ghost{background:var(--surface); color:var(--ink); border:1.5px solid var(--line2);}
  .btn.full{display:block; width:100%; text-align:center;}
  .btn.sm{padding:9px 15px; font-size:13.5px; border-radius:10px;}

  .listhead{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap;}
  .listhead h1{font-size:29px; font-weight:800; letter-spacing:-.045em;}
  .listhead p{font-size:15.5px; color:var(--sub); margin-top:11px; line-height:1.55;} .listhead p b{color:var(--ink);}

  /* 안내 배너 */
  .reqbanner{display:flex; align-items:center; gap:16px; flex-wrap:wrap; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px 26px; margin:26px 0; box-shadow:0 4px 14px rgba(20,18,16,.04);}
  .reqbanner .txt{flex:1; min-width:220px;}
  .reqbanner .txt b{font-size:16.5px; font-weight:800; letter-spacing:-.02em;}
  .reqbanner .txt p{font-size:14px; color:var(--sub); margin-top:6px; line-height:1.5;}
  .reqbanner button{white-space:nowrap;}
  .banner{display:none; align-items:center; gap:14px; flex-wrap:wrap; background:linear-gradient(135deg,#2E4A3B,#22382C); color:#fff; border-radius:16px; padding:18px 20px; margin:20px 0;}
  .banner.on{display:flex;}
  .banner .bt{font-size:14px; font-weight:600; color:rgba(255,255,255,.85);} .banner .bt b{color:#fff;}
  .banner .acts{margin-left:auto; display:flex; gap:8px;}
  .banner .acts a{font-size:13px; font-weight:800; color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:20px; padding:7px 13px;}
  .banner .acts a:hover{background:rgba(255,255,255,.12);}

  /* 서비스 탭 */
  .svctab{display:flex; gap:4px; border-bottom:1px solid var(--line); margin:22px 0 16px; flex-wrap:wrap;}
  .svctab .t{padding:12px 16px; font-size:15px; font-weight:700; color:var(--sub); border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer;}
  .svctab .t:hover{color:var(--ink);} .svctab .t.on{color:var(--accent-ink); border-color:var(--accent);}

  /* 검색 + 정렬 */
  .toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:8px 0 14px; padding-top:18px; border-top:1px solid var(--line);}
  .search{display:flex; align-items:center; gap:8px; border:1.5px solid var(--line2); border-radius:12px; padding:0 14px; background:var(--surface); max-width:340px; flex:1; min-width:220px;}
  .search:focus-within{border-color:var(--accent);}
  .search .mag{color:var(--sub2); font-size:15px;}
  .search input{border:none; padding:12px 0; width:100%; font-size:15px; font-family:inherit; background:none; color:var(--ink);}
  .search input:focus{outline:none;}
  .search .clr{color:var(--sub2); font-size:13px; cursor:pointer; padding:2px;}
  .count a{color:var(--accent-ink); font-weight:800;}
  .sort{margin-left:auto;} .sort select{padding:11px 14px; border:1.5px solid var(--line2); border-radius:12px; font-size:14px; font-weight:600; font-family:inherit; background:var(--surface); color:var(--ink); cursor:pointer;}

  /* 상황 필터 */
  .filters{display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:11px;}
  .filters .lbl{font-size:13px; color:var(--sub2); font-weight:700; width:38px; flex:none;}
  .chip{display:inline-block; padding:9px 15px; border:1.5px solid var(--line2); border-radius:30px; font-size:14px; font-weight:600; color:var(--sub); background:var(--surface); cursor:pointer;}
  .chip:hover{border-color:var(--accent); color:var(--accent-ink);} .chip.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .count{font-size:14.5px; color:var(--sub2); font-weight:700; margin-top:26px; margin-bottom:26px;}

  /* 드롭다운 필터바 (상황·예산) + 검색 + 정렬 */
  .fbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:20px 0 0;}
  .dd{position:relative;}
  .ddbtn{display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:700; padding:11px 15px; border-radius:11px; border:1.5px solid var(--line2); background:var(--surface); color:var(--sub); cursor:pointer; font-family:inherit;}
  .ddbtn:hover{border-color:var(--accent);}
  .ddbtn .ar{font-size:9px; color:var(--sub2);}
  .dd.active .ddbtn{background:var(--accent-soft); color:var(--accent-ink); border-color:var(--accent);}
  .ddmenu{position:absolute; top:calc(100% + 6px); left:0; min-width:174px; background:var(--surface); border:1px solid var(--line); border-radius:12px; box-shadow:0 14px 34px rgba(20,18,16,.14); padding:6px; z-index:40; display:none;}
  .dd.open .ddmenu{display:block;}
  .ddopt{padding:10px 12px; border-radius:9px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:space-between;}
  .ddopt:hover{background:var(--soft);}
  .ddopt.on{color:var(--accent-ink); font-weight:800;} .ddopt.on::after{content:"✓"; color:var(--accent); font-size:12px;}

  /* 그리드 */
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:26px;}
  .ecard{background:var(--surface); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 6px 18px rgba(20,18,16,.07); cursor:pointer; transition:.18s;}
  .ecard:hover{transform:translateY(-3px); box-shadow:0 16px 36px rgba(20,18,16,.12);}
  .ecard .cover{height:170px; position:relative; overflow:hidden; background:#E7E4DD;}
  .ecard .cover img{width:100%; height:100%; object-fit:cover; display:block;}
  .ecard .match{position:absolute; top:12px; left:12px; font-size:12px; font-weight:800; padding:5px 12px; border-radius:30px; background:var(--accent); color:#fff; box-shadow:0 2px 9px rgba(20,30,20,.25);}
  .ecard .svcbadge{position:absolute; top:12px; right:12px; font-size:11px; font-weight:700; padding:5px 10px; border-radius:30px; background:rgba(255,255,255,.94); color:var(--ink); box-shadow:0 2px 8px rgba(0,0,0,.1);}
  .ecard .eb{padding:19px 20px 20px;}
  .ecard .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .ecard .nm{font-size:16.5px; font-weight:800;} .ecard .star{font-size:14px; font-weight:700;} .ecard .star.new{color:var(--green-mid); font-size:12.5px;}
  .ecard .tags{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
  .ecard .tags span{font-size:12px; background:var(--soft); color:#5b584f; padding:4px 9px; border-radius:20px; font-weight:600;}
  .ecard .price{font-size:15px; font-weight:800; margin-top:0;} .ecard .price small{color:var(--sub2); font-weight:600;}
  .empty{grid-column:1/-1; text-align:center; padding:56px 20px; color:var(--sub); background:var(--surface); border:1px solid var(--line); border-radius:18px;}
  .empty b{font-size:16px; font-weight:800; color:var(--ink);} .empty p{font-size:13.5px; margin-top:8px;}
  .empty a{color:var(--accent-ink); font-weight:800;}

  /* 드로어 */
  .scrim{position:fixed; inset:0; background:rgba(22,20,15,.5); opacity:0; pointer-events:none; transition:.22s; z-index:90;} .scrim.on{opacity:1; pointer-events:auto;}
  .drawer{position:fixed; top:0; right:0; height:100%; width:460px; max-width:94vw; background:var(--surface); z-index:100; transform:translateX(100%); transition:.3s cubic-bezier(.2,.8,.2,1); overflow-y:auto; box-shadow:-20px 0 60px rgba(0,0,0,.16);} .drawer.on{transform:none;}
  .xbtn{position:absolute; top:14px; right:14px; z-index:3; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.92); border:none; font-size:17px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.12);}
  .dhead{height:200px; position:relative; overflow:hidden; display:flex; align-items:flex-end;}
  .dhead img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .dhead .dov{position:relative; padding:20px; color:#fff; background:linear-gradient(transparent, rgba(18,16,10,.82)); width:100%;}
  .dhead .dm{font-size:12px; font-weight:800; background:var(--accent); display:inline-block; padding:4px 10px; border-radius:20px;}
  .dhead .dn{font-size:23px; font-weight:800; margin-top:8px; letter-spacing:-.03em;}
  .dbody{padding:22px;} .dbody .bio{font-size:14.5px; color:var(--ink-soft); line-height:1.6;}
  .feat{font-size:12.5px; font-weight:800; color:var(--sub2); margin:24px 0 11px; letter-spacing:.02em;}
  .tagrow span{display:inline-block; font-size:12.5px; background:var(--soft); color:#5b584f; padding:6px 12px; border-radius:20px; margin:0 6px 6px 0; font-weight:600;}
  .pgal{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;} .pgal div{height:82px; border-radius:10px; background-size:cover; background-position:center; background-color:var(--soft); filter:saturate(.6);}
  .rev{border-bottom:1px solid var(--line); padding:11px 0; font-size:13.5px; color:var(--ink-soft); line-height:1.5;} .rev:last-child{border:none;} .rev .who{font-size:12px; color:var(--sub2); margin-top:3px; font-weight:600;}
  .noreview{font-size:13.5px; color:var(--sub2); padding:10px 0;}
  .svcinfo{background:var(--soft); border-radius:14px; padding:14px 16px;} .svcinfo .r{display:flex; justify-content:space-between; padding:6px 0; font-size:14px;} .svcinfo .r span{color:var(--sub);} .svcinfo .r b{font-weight:800;}

  /* 매칭 폼 */
  .fh2{font-size:24px; font-weight:800; letter-spacing:-.04em;} .fsub{font-size:15px; color:var(--sub); margin-top:10px; line-height:1.55;}
  .svc3{display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
  .svc3 .s{border:1.5px solid var(--line2); border-radius:14px; padding:15px 8px; text-align:center; cursor:pointer;} .svc3 .s.on{border-color:var(--accent); background:var(--accent-soft);}
  .svc3 .s.locked{opacity:.38; pointer-events:none;}
  .reqto{display:flex; align-items:center; gap:12px; background:var(--soft); border-radius:14px; padding:12px 14px;}
  .reqto img{width:44px; height:44px; border-radius:50%; object-fit:cover; flex:none;}
  .reqto .rl{font-size:11.5px; font-weight:700; color:var(--sub2);}
  .reqto .rn{font-size:15px; font-weight:800; margin-top:2px; letter-spacing:-.02em;}
  .svc3 .s .i{font-size:21px;} .svc3 .s b{display:block; font-size:12.5px; margin-top:6px;}
  .seg{display:flex; gap:8px; flex-wrap:wrap;} .seg .o{padding:11px 15px; border:1.5px solid var(--line2); border-radius:11px; font-size:13.5px; font-weight:700; color:var(--sub); background:var(--surface); cursor:pointer;} .seg .o.on{background:var(--accent); color:#fff; border-color:var(--accent);} .seg .o.dis{opacity:.35; pointer-events:none;}
  .inp{width:100%; padding:13px 15px; border:1.5px solid var(--line2); border-radius:12px; font-size:15px; font-family:inherit; background:var(--surface); color:var(--ink);} .inp:focus{outline:none; border-color:var(--accent);}
  .attach{display:flex; align-items:center; gap:12px; background:var(--soft); border-radius:14px; padding:14px 16px; margin-top:16px;} .attach .at{flex:1;} .attach b{font-size:14px;} .attach .at div{font-size:12px; color:var(--sub); margin-top:2px;}
  .toggle{width:46px; height:27px; border-radius:20px; background:var(--line2); position:relative; cursor:pointer; flex:none;} .toggle::after{content:""; position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%; background:#fff; transition:.15s;} .toggle.on{background:var(--accent);} .toggle.on::after{left:22px;}

  .toast{position:fixed; left:50%; bottom:32px; transform:translateX(-50%) translateY(16px); background:var(--ink); color:#fff; padding:13px 22px; border-radius:30px; font-size:14px; font-weight:700; opacity:0; pointer-events:none; transition:.25s; z-index:130;} .toast.on{opacity:1; transform:translateX(-50%) translateY(0);}
  .secmark{font-size:12px; color:var(--sub2); margin-top:40px; text-align:center;}

  /* 쇼퍼 상세 페이지 (화면 전환) */
  .back{display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:700; color:var(--sub); cursor:pointer; margin-bottom:22px;}
  .back:hover{color:var(--ink);}
  .dhero{display:grid; grid-template-columns:380px 1fr; gap:38px; align-items:start;}
  .dhero-img{border-radius:20px; overflow:hidden; height:440px; box-shadow:0 12px 32px rgba(20,18,16,.12);}
  .dhero-img img{width:100%; height:100%; object-fit:cover;}
  .dsvc{display:inline-block; font-size:15px; font-weight:800; color:var(--accent); background:var(--accent-soft); padding:8px 16px; border-radius:24px; letter-spacing:-.02em;}
  .dhero-info h1{font-size:36px; font-weight:800; letter-spacing:-.045em; margin-top:16px;}
  .dmeta{font-size:15px; color:var(--sub); font-weight:700; margin-top:12px;} .dmeta b{color:var(--accent-ink);}
  .dnamerow{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin-top:14px;} .dnamerow h1{margin-top:0;} .dnamerow .dmeta{margin-top:0;}
  .dbio{font-size:15.5px; color:var(--ink-soft); line-height:1.7; margin-top:20px; max-width:520px;}
  .dsecs{margin-top:46px; display:flex; flex-direction:column; gap:38px; max-width:840px;}
  .dsec h3{font-size:18px; font-weight:800; letter-spacing:-.03em; margin-bottom:14px;}
  .dgal{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .dgal div{height:150px; border-radius:12px; background-size:cover; background-position:center; background-color:var(--soft);}

  /* 견적 요청 전체 화면 */
  .reqpage{max-width:680px; margin:0 auto;}
  .reqpage h1{font-size:30px; font-weight:800; letter-spacing:-.045em;}
  .reqpage .lead{font-size:16px; color:var(--sub); margin-top:12px; line-height:1.6;}
  .reqdone{max-width:560px; margin:60px auto 0; text-align:center;}
  .reqdone .cc{width:64px; height:64px; border-radius:50%; background:var(--accent-soft); color:var(--accent); font-size:30px; font-weight:800; display:flex; align-items:center; justify-content:center; margin:0 auto;}
  .reqdone h1{font-size:28px; font-weight:800; letter-spacing:-.04em; margin-top:20px;}
  .reqdone p{font-size:15px; color:var(--sub); margin-top:12px; line-height:1.6;}
  .feat em{color:var(--accent); font-style:normal;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .reqhint{font-size:12.5px; color:var(--sub2); text-align:center; margin-top:10px;}

  @media(max-width:900px){ .grid{grid-template-columns:1fr 1fr;} .dhero{grid-template-columns:1fr;} .dhero-img{height:340px;} .dgal div{height:120px;} }
  @media(max-width:560px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<header>
  <div class="nav">
    <span class="logo">Fitting<i class="sq"></i></span>
    <nav class="menu">
      <a href="핏팅_전체화면.html#home">홈</a><a href="핏팅_전체화면.html#diag">체형진단</a>
      <a class="on">쇼퍼찾기</a><a href="핏팅_전체화면.html#my">마이</a>
    </nav>
    <div class="navr"><span class="sup">쇼퍼 지원</span><span>로그인</span></div>
  </div>
</header>

<div class="wrap">

  <div id="listView">
  <div class="listhead">
    <div>
      <h1>나에게 맞는 쇼퍼</h1>
      <p>내 체형·사이즈 기준 <b>매칭도순</b> · 결과물·후기로 검증된 쇼퍼만 찾아드려요</p>
    </div>
  </div>

  <!-- 견적 요청 배너 -->
  <div class="reqbanner">
    <div class="txt"><b>어떤 쇼퍼가 맞을지 모르겠다면?</b><p>견적을 요청해서 직접 쇼퍼에게 제안해보세요</p></div>
    <button class="btn" onclick="openMatch()">견적 요청하기 →</button>
  </div>

  <!-- 서비스 유형 (탭) -->
  <div class="svctab" id="svctab">
    <div class="t on" data-svc="all" onclick="setSvc(this)">전체</div>
    <div class="t" data-svc="online" onclick="setSvc(this)">온라인 스타일링</div>
    <div class="t" data-svc="shopping" onclick="setSvc(this)">동행 쇼핑</div>
    <div class="t" data-svc="image" onclick="setSvc(this)">이미지 컨설팅</div>
  </div>

  <!-- 상황·예산 드롭다운 + 검색 + 정렬 -->
  <div class="fbar">
    <div class="dd" id="ddOcc">
      <button class="ddbtn" onclick="toggleDD(event,'ddOcc')">상황<span class="lab"></span> <span class="ar">▾</span></button>
      <div class="ddmenu">
        <div class="ddopt on" data-occ="all" onclick="setOcc(this)">전체</div>
        <div class="ddopt" data-occ="date" onclick="setOcc(this)">소개팅</div>
        <div class="ddopt" data-occ="interview" onclick="setOcc(this)">면접·발표</div>
        <div class="ddopt" data-occ="wedding" onclick="setOcc(this)">결혼식 하객</div>
        <div class="ddopt" data-occ="travel" onclick="setOcc(this)">여행</div>
        <div class="ddopt" data-occ="daily" onclick="setOcc(this)">일상 코디</div>
      </div>
    </div>
    <div class="dd" id="ddBud">
      <button class="ddbtn" onclick="toggleDD(event,'ddBud')">예산<span class="lab"></span> <span class="ar">▾</span></button>
      <div class="ddmenu">
        <div class="ddopt on" data-bud="all" onclick="setBud(this)">전체</div>
        <div class="ddopt" data-bud="b1" onclick="setBud(this)">~5만원</div>
        <div class="ddopt" data-bud="b2" onclick="setBud(this)">5~10만원</div>
        <div class="ddopt" data-bud="b3" onclick="setBud(this)">10~15만원</div>
        <div class="ddopt" data-bud="b4" onclick="setBud(this)">15만원 이상</div>
      </div>
    </div>
    <div class="search"><span class="mag">⌕</span><input id="q" placeholder="이름·전문분야로 찾기" oninput="toggleClr()" onkeydown="if(event.key==='Enter')doSearch()"><span class="clr" id="clrBtn" onclick="clearSearch()" style="display:none">✕</span></div>
    <button class="btn sm" onclick="doSearch()">찾기</button>
    <div class="sort"><select id="sort" onchange="render()">
      <option value="match">매칭도순</option>
      <option value="rating">평점순</option>
      <option value="priceA">가격 낮은순</option>
      <option value="priceD">가격 높은순</option>
    </select></div>
  </div>

  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>

  <div class="secmark">쇼퍼찾기 상세 · 1.2 둘러보기(검색·정렬·필터) + 1.3 AI 매칭 + 1.3.7 매칭 결과</div>
  </div><!-- /listView -->

  <section id="detailView" style="display:none"></section>
  <section id="requestView" style="display:none"></section>
</div>

<div class="scrim" id="scrim" onclick="closeAll()"></div>
<div class="drawer" id="drawer"><button class="xbtn" onclick="closeAll()">✕</button><div id="drawerBody"></div></div>
<div class="toast" id="toast"></div>

<script>
  var SVC={online:'온라인 스타일링', shopping:'동행 쇼핑', image:'이미지 컨설팅'};
  var SVCI={online:'💻', shopping:'🛍️', image:'✨'};
  var OCC={date:'소개팅', interview:'면접·발표', wedding:'결혼식 하객', travel:'여행', daily:'일상 코디'};
  var BUD={b1:'~5만', b2:'5~10만', b3:'10~15만', b4:'15만+'};
  function budOf(p){ return p<50000?'b1':(p<=100000?'b2':(p<=150000?'b3':'b4')); }
  var FB="this.onerror=null;this.src='https://picsum.photos/seed/fit'+Math.floor(Math.random()*99)+'/480/340'";
  function img(e){ return e.photo || 'https://loremflickr.com/480/340/model,portrait?lock='+e.lock; }

  var EX=[
    {lock:32, nm:'소희', photo:'photos/p1.jpg', svc:'online', occ:['date','daily'], rating:4.9, price:120000, review:96, match:97, tags:['데일리룩','소개팅룩','미니멀'], mode:'온라인(비대면)', dur:'약 3일', bio:'데일리·소개팅룩 전문 스타일리스트<br>온라인 쇼핑몰 MD 출신으로<br>비대면 큐레이션이 강점이에요', reviews:[['비대면인데도 사이즈까지 딱 맞게 골라주셨어요','30세 · 소개팅룩'],['길게 설명 안 해도 취향을 바로 잡아주셔서 편했어요','27세 · 데일리']]},
    {lock:47, nm:'건형', photo:'photos/p2.jpg', svc:'image', occ:['interview'], rating:4.8, price:190000, review:74, match:90, tags:['면접룩','오피스','남성 그루밍'], mode:'오프라인 세션', dur:'세션 1회 · 약 2시간', bio:'남성 이미지 컨설턴트<br>면접·오피스 첫인상을<br>헤어부터 셔츠 핏까지 정돈해드려요', reviews:[['면접관 시선까지 짚어주셔서 자신감이 생겼어요','29세 · 면접']]},
    {lock:15, nm:'상민', photo:'photos/p3.jpg', svc:'shopping', occ:['wedding','interview'], rating:4.7, price:150000, review:58, match:86, tags:['포멀','하객룩','세미정장'], mode:'오프라인 동행', dur:'방문 1회 · 약 3시간', bio:'포멀·하객룩 동행 쇼핑 전문<br>매장을 함께 돌며 체형에 맞는<br>옷을 현장에서 골라드려요', reviews:[['혼자였으면 못 골랐을 옷을 잘 맞게 찾아주셨어요','34세 · 결혼식']]}
  ];

  var curSvc='all', curOcc='all', curBudget='all', matched=false, query='';
  function toggleClr(){ document.getElementById('clrBtn').style.display=document.getElementById('q').value?'inline':'none'; }
  function doSearch(){ query=(document.getElementById('q').value||'').trim(); toggleClr(); render(); }
  function clearSearch(){ document.getElementById('q').value=''; query=''; toggleClr(); render(); }

  function setActive(el){ [].forEach.call(el.parentNode.children, function(c){ c.classList.remove('on'); }); el.classList.add('on'); }
  function setSvc(el){ setActive(el); curSvc=el.dataset.svc; render(); }
  function setOcc(el){ setActive(el); curOcc=el.dataset.occ; updateDD('ddOcc', curOcc==='all'?'':OCC[curOcc]); closeDD(); render(); }
  function setBud(el){ setActive(el); curBudget=el.dataset.bud; updateDD('ddBud', curBudget==='all'?'':BUD[curBudget]); closeDD(); render(); }
  function updateDD(id, val){ var d=document.getElementById(id); d.classList.toggle('active', !!val); d.querySelector('.lab').textContent = val ? ' · '+val : ''; }
  function toggleDD(e, id){ e.stopPropagation(); var d=document.getElementById(id); var open=d.classList.contains('open'); closeDD(); if(!open) d.classList.add('open'); }
  function closeDD(){ [].forEach.call(document.querySelectorAll('.dd.open'), function(d){d.classList.remove('open');}); }
  document.addEventListener('click', closeDD);
  function syncControls(){
    [].forEach.call(document.querySelectorAll('#svctab .t'), function(t){t.classList.toggle('on', t.dataset.svc===curSvc);});
    [].forEach.call(document.querySelectorAll('#ddOcc .ddopt'), function(o){o.classList.toggle('on', o.dataset.occ===curOcc);});
    [].forEach.call(document.querySelectorAll('#ddBud .ddopt'), function(o){o.classList.toggle('on', o.dataset.bud===curBudget);});
    updateDD('ddOcc', curOcc==='all'?'':OCC[curOcc]); updateDD('ddBud', curBudget==='all'?'':BUD[curBudget]);
  }
  function browseAll(){ curSvc='all'; curOcc='all'; curBudget='all'; query=''; document.getElementById('q').value=''; toggleClr(); document.getElementById('sort').value='match'; syncControls(); render(); }

  function render(){
    var q=query;
    var s=document.getElementById('sort').value;
    var list=EX.filter(function(e){
      return (curSvc==='all'||e.svc===curSvc)
        && (curOcc==='all'||e.occ.indexOf(curOcc)>=0)
        && (curBudget==='all'||budOf(e.price)===curBudget)
        && (!q || e.nm.indexOf(q)>=0 || e.tags.join(' ').indexOf(q)>=0);
    });
    list.sort(function(a,b){ return s==='rating'?b.rating-a.rating : s==='priceA'?a.price-b.price : s==='priceD'?b.price-a.price : b.match-a.match; });
    var cond = list.length+'명 · '+(curSvc==='all'?'전체 유형':SVC[curSvc])+(curOcc==='all'?'':' · '+OCC[curOcc])+(curBudget==='all'?'':' · 예산 '+BUD[curBudget])+(q?' · "'+q+'"':'');
    var active = curSvc!=='all'||curOcc!=='all'||curBudget!=='all'||q;
    document.getElementById('count').innerHTML = cond + (active?'  ·  <a onclick="browseAll()">초기화하기</a>':'');
    var g=document.getElementById('grid');
    if(!list.length){ g.innerHTML='<div class="empty"><b>조건에 맞는 쇼퍼가 아직 없어요</b><p>초기라 쇼퍼를 모으는 중이에요 · <a onclick="toast(\'오픈 알림을 신청했어요\')">오픈 알림 신청하기</a> 또는 <a onclick="browseAll()">전체 보기</a></p></div>'; return; }
    g.innerHTML=list.map(function(e){ var idx=EX.indexOf(e); var rt=e.rating>0?'<span class="star">★ '+e.rating+'</span>':'<span class="star new">신규</span>';
      return '<div class="ecard" onclick="openProfile('+idx+')"><div class="cover"><img src="'+img(e)+'" alt="" onerror="'+FB+'"><span class="match">매칭도 '+e.match+'%</span></div>'+
        '<div class="eb"><div class="top"><span class="nm">'+e.nm+' 쇼퍼</span>'+rt+'</div>'+
        '<div class="tags">'+e.tags.map(function(t){return '<span>'+t+'</span>';}).join('')+'</div>'+
        '<div class="price">'+e.price.toLocaleString()+'원 <small>· 후기 '+e.review+'건</small></div></div></div>';
    }).join('');
  }

  /* 공통 */
  function scrim(on){ document.getElementById('scrim').classList.toggle('on', on); }
  function closeAll(){ document.getElementById('drawer').classList.remove('on'); scrim(false); }
  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(window._t); window._t=setTimeout(function(){t.classList.remove('on');},2000); }
  function pickOne(el){ var ch=el.parentNode.children; for(var i=0;i<ch.length;i++) ch[i].classList.remove('on'); el.classList.add('on'); validate(); }
  function pickBud(el){ var was=el.classList.contains('on'); var ch=el.parentNode.children; for(var i=0;i<ch.length;i++) ch[i].classList.remove('on'); if(!was) el.classList.add('on'); validate(); }
  function validate(){
    var btn=document.getElementById('reqBtn'); if(!btn) return;
    var occ=document.querySelectorAll('#mOcc .o.on').length>0;
    var bud=document.querySelectorAll('#mBud .o.on').length>0;
    var d=document.getElementById('reqDate'); var date=d && d.value;
    var ok=occ && bud && !!date;
    btn.disabled=!ok;
    var hint=document.getElementById('reqHint'); if(hint) hint.style.display=ok?'none':'block';
  }

  /* 카드 클릭 → 빠른 보기 드로어 */
  function openProfile(idx){ var e=EX[idx]; var rt=e.rating>0?('★ '+e.rating+' · 후기 '+e.review+'건'):'신규 쇼퍼';
    document.getElementById('drawerBody').innerHTML=
      '<div class="dhead"><img src="'+img(e)+'" onerror="'+FB+'"><div class="dov"><span class="dm">매칭도 '+e.match+'%</span><div class="dn">'+e.nm+' 쇼퍼</div><div style="font-size:13px;opacity:.9;margin-top:2px">'+rt+'</div></div></div>'+
      '<div class="dbody"><p class="bio">'+e.bio+'</p>'+
      '<div class="feat">전문 분야</div><div class="tagrow">'+e.tags.map(function(t){return '<span>'+t+'</span>';}).join('')+'</div>'+
      '<div class="feat">서비스 정보</div><div class="svcinfo"><div class="r"><span>서비스</span><b>'+SVC[e.svc]+'</b></div><div class="r"><span>예상 가격</span><b>'+e.price.toLocaleString()+'원</b></div><div class="r"><span>제공 방식</span><b>'+e.mode+'</b></div></div>'+
      '<button class="btn full" style="margin-top:20px" onclick="openDetail('+idx+')">자세히 보기 →</button>'+
      '<button class="btn ghost full" style="margin-top:9px" onclick="requestFor('+idx+')">견적 요청하기</button></div>';
    document.getElementById('drawer').classList.add('on'); scrim(true);
  }

  /* 자세히 보기 → 쇼퍼 상세 페이지 (화면 전환) */
  function openDetail(idx){ var e=EX[idx]; closeAll();
    var rt=e.rating>0?('★ '+e.rating+' · 후기 '+e.review+'건'):'신규 쇼퍼';
    var revs=e.reviews.length ? e.reviews.map(function(r){return '<div class="rev">"'+r[0]+'"<div class="who">— '+r[1]+'</div></div>';}).join('') : '<div class="noreview">아직 등록된 후기가 없어요</div>';
    document.getElementById('detailView').innerHTML=
      '<a class="back" onclick="closeDetail()">← 목록으로</a>'+
      '<div class="dhero"><div class="dhero-img"><img src="'+img(e)+'" onerror="'+FB+'"></div>'+
      '<div class="dhero-info"><span class="dsvc">'+SVC[e.svc]+'</span>'+
      '<div class="dnamerow"><h1>'+e.nm+' 쇼퍼</h1><div class="dmeta"><b>매칭도 '+e.match+'%</b> · '+rt+'</div></div>'+
      '<div class="tagrow" style="margin-top:16px">'+e.tags.map(function(t){return '<span>'+t+'</span>';}).join('')+'</div>'+
      '<p class="dbio">'+e.bio+'</p>'+
      '<button class="btn" style="margin-top:22px" onclick="requestFor('+idx+')">이 쇼퍼에게 견적 요청하기 →</button></div></div>'+
      '<div class="dsecs">'+
        '<div class="dsec"><h3>서비스 정보</h3><div class="svcinfo"><div class="r"><span>서비스</span><b>'+SVC[e.svc]+'</b></div><div class="r"><span>예상 가격</span><b>'+e.price.toLocaleString()+'원</b></div><div class="r"><span>제공 방식</span><b>'+e.mode+'</b></div><div class="r"><span>예상 기간</span><b>'+e.dur+'</b></div></div></div>'+
        '<div class="dsec"><h3>실제 후기</h3>'+revs+'</div>'+
        '<div class="dsec"><h3>포트폴리오</h3><div class="dgal">'+[1,2,3,4,5,6].map(function(i){return '<div style="background-image:url(\'photos/folio'+i+'.jpg\')"></div>';}).join('')+'</div></div>'+
      '</div>';
    showOnly('detailView');
  }
  function closeDetail(){ showOnly('listView'); }
  function showOnly(id){ ['listView','detailView','requestView'].forEach(function(v){ var el=document.getElementById(v); if(el) el.style.display=(v===id)?'block':'none'; }); window.scrollTo({top:0}); }
  function reqFields(){ return '<div class="feat">상황 · <em>필수</em> · 최대 2개</div><div class="seg" id="mOcc"><span class="o" onclick="toggleOcc(this)">소개팅</span><span class="o" onclick="toggleOcc(this)">면접·발표</span><span class="o" onclick="toggleOcc(this)">결혼식 하객</span><span class="o" onclick="toggleOcc(this)">여행</span><span class="o" onclick="toggleOcc(this)">일상 코디</span></div>'+
    '<div class="feat">예산 · <em>필수</em></div><div class="seg" id="mBud"><span class="o" onclick="pickBud(this)">~5만</span><span class="o" onclick="pickBud(this)">5~10만</span><span class="o" onclick="pickBud(this)">10~15만</span><span class="o" onclick="pickBud(this)">15만+</span></div>'+
    '<div class="feat">일정 · <em>필수</em></div><input class="inp" type="date" id="reqDate" onchange="validate()">'+
    '<div class="feat">한 줄 요청 · 선택</div><input class="inp" maxlength="100" placeholder="예) 과하지 않게 깔끔한 첫인상 원해요">'+
    '<div class="attach"><div class="at"><b>내 체형·사이즈 프로필 첨부</b><div>시크 스트레이트 · 추천 사이즈 카드</div></div><div class="toggle on" onclick="this.classList.toggle(\'on\')"></div></div>'; }
  function requestFor(idx){ var e=EX[idx];
    var SNM={online:'온라인', shopping:'동행 쇼핑', image:'이미지'}, SIC={online:'💻', shopping:'🛍️', image:'✨'};
    var svc3=['online','shopping','image'].map(function(v){ return '<div class="s '+(v===e.svc?'on':'locked')+'"><div class="i">'+SIC[v]+'</div><b>'+SNM[v]+'</b></div>'; }).join('');
    document.getElementById('requestView').innerHTML=
      '<a class="back" onclick="showOnly(\'listView\')">← 목록으로</a>'+
      '<div class="reqpage">'+
      '<div class="reqto"><img src="'+img(e)+'" onerror="'+FB+'"><div><div class="rl">견적 요청 대상</div><div class="rn">'+e.nm+' 쇼퍼</div></div></div>'+
      '<h1 style="margin-top:20px">견적 요청</h1><p class="lead">조건을 남기면 이 쇼퍼가 검토하고 제안(견적)을 보내드려요 · 체형·사이즈 프로필도 함께 전달돼요</p>'+
      '<div class="feat" style="margin-top:26px">서비스 유형 · 이 쇼퍼의 서비스로 고정</div><div class="svc3">'+svc3+'</div>'+
      reqFields()+
      '<button class="btn full" id="reqBtn" disabled style="margin-top:26px" onclick="submitMatch()">견적 요청 보내기</button>'+
      '<p class="reqhint" id="reqHint">상황·예산·일정을 모두 입력하면 보낼 수 있어요</p></div>';
    closeAll(); showOnly('requestView'); validate();
  }

  /* AI 매칭 폼 */
  var reqSvc='online';
  function openMatch(){
    var SNM={online:'온라인',shopping:'동행 쇼핑',image:'이미지'}, SIC={online:'💻',shopping:'🛍️',image:'✨'};
    var svc3=['online','shopping','image'].map(function(v){ return '<div class="s '+(v==='online'?'on':'')+'" data-v="'+v+'" onclick="pickSvc(this)"><div class="i">'+SIC[v]+'</div><b>'+SNM[v]+'</b></div>'; }).join('');
    reqSvc='online';
    document.getElementById('requestView').innerHTML=
      '<a class="back" onclick="showOnly(\'listView\')">← 목록으로</a>'+
      '<div class="reqpage">'+
      '<h1>견적 요청</h1><p class="lead">조건을 남기면 조건에 맞는 쇼퍼가 검토하고 제안(견적)을 보내드려요 · 체형·사이즈 프로필도 함께 전달돼요</p>'+
      '<div class="feat" style="margin-top:26px">서비스 유형 · 필수</div><div class="svc3" id="mSvc">'+svc3+'</div>'+
      reqFields()+
      '<button class="btn full" id="reqBtn" disabled style="margin-top:26px" onclick="submitMatch()">견적 요청 보내기</button>'+
      '<p class="reqhint" id="reqHint">상황·예산·일정을 모두 입력하면 보낼 수 있어요</p></div>';
    closeAll(); showOnly('requestView'); validate();
  }
  function pickSvc(el){ pickOne(el); reqSvc=el.dataset.v; }
  function toggleOcc(el){
    if(el.classList.contains('on')){ el.classList.remove('on'); }
    else { if(document.querySelectorAll('#mOcc .o.on').length>=2) return; el.classList.add('on'); }
    var full=document.querySelectorAll('#mOcc .o.on').length>=2;
    [].forEach.call(document.querySelectorAll('#mOcc .o'), function(o){ if(!o.classList.contains('on')) o.classList.toggle('dis', full); });
    validate();
  }
  function submitMatch(){
    document.getElementById('requestView').innerHTML=
      '<div class="reqdone"><div class="cc">✓</div>'+
      '<h1>견적 요청을 보냈어요</h1>'+
      '<p>조건에 맞는 쇼퍼가 검토하고 제안(견적)을 보내드려요 · 진행 상황은 마이페이지에서 볼 수 있어요</p>'+
      '<button class="btn" style="margin-top:26px" onclick="showOnly(\'listView\')">목록으로 돌아가기</button></div>';
    showOnly('requestView');
  }

  render();
</script>
</body>
</html>
