<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 관리자 — 로그인</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<link rel="stylesheet" href="css/tokens.css?v=8e429c15">
<link rel="stylesheet" href="css/admin.css?v=87eed9c4">
</head>
<body>
<div class="authwrap">
  <div class="authcard">
    <div class="logo">fitting <span style="color:var(--sub);font-weight:700;font-size:15px">관리자</span></div>
    <div class="sub">운영 데이터(브랜드 실측·신체 사이즈) 관리 콘솔</div>
    <div class="protobadge">프로토타입 — 실제 인증 아님 (목업)</div>

    <!-- 1단계: 구글 로그인(목업) -->
    <div class="authstep on" id="step-google">
      <button class="gbtn" onclick="startGoogle()"><span class="g"></span>Google로 계속</button>
      <div class="ahint">실제 서비스에선 Supabase Auth(Google OAuth)로 대체됩니다. 지금은 클릭 시 다음 단계(이메일 2차인증)로 진행돼요.</div>
    </div>

    <!-- 2단계: 이메일 2차 인증(목업 OTP) -->
    <div class="authstep" id="step-otp">
      <div class="sub" style="margin-bottom:4px"><b id="otpEmail" style="color:var(--ink)"></b> 으로 6자리 인증 코드를 보냈어요</div>
      <input class="otpin" id="otp" inputmode="numeric" maxlength="6" placeholder="______" autocomplete="one-time-code" aria-label="인증 코드 6자리">
      <div class="aerr" id="otpErr"></div>
      <button class="abtn" id="verifyBtn" onclick="verifyOtp()" disabled>인증하고 들어가기</button>
      <div class="ahint">프로토타입: 데모 코드는 <b>000000</b> (또는 아무 6자리). 실제로는 이메일 OTP를 서버(Edge Function)가 발송·검증합니다.</div>
      <span class="alink" onclick="backToGoogle()">← 다시 로그인</span>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=53f50277"></script>
<script src="js/admin-auth.js?v=0febbcdd"></script>
<script src="js/admin-login.js?v=f8089d36"></script>
<script src="js/a11y.js?v=1876c5ec"></script>
</body>
</html>
