<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fitting · 스타일리스트 로그인</title>
<meta name="robots" content="noindex">
<!-- 스타일리스트(공급자) 로그인. 가입(pro-signup)이 무비밀번호(이메일·휴대폰 인증)라 로그인도 OTP로 통일.
     인증은 프로토타입 목업 — 승격 시 Supabase Auth(이메일/문자 OTP). -->
<link rel="stylesheet" href="css/tokens.css?v=10fb5117">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css">
<link rel="stylesheet" href="css/pro-signup.css?v=3f275319">
<style>
/* 로그인 인증 UI — pro-signup의 인증 UI와 동일 톤 */
.req{color:#c0392b}
.vrow{display:flex;gap:8px;align-items:stretch}
.vrow input{flex:1}
.vbtn{flex:none;padding:0 16px;border:1.5px solid var(--line2,#d8d4cc);border-radius:11px;background:#fff;color:var(--ink,#1c1a17);font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;white-space:nowrap}
.vbtn:hover{border-color:var(--green,#2E4A3B);color:var(--green,#2E4A3B)}
.vbox{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0 2px;padding:10px 12px;background:var(--soft,#f5f3ee);border-radius:11px}
.vbox input{flex:1;min-width:120px}
.vbox .vbtn{align-self:stretch}   /* '확인'을 '재전송'처럼 입력칸 높이에 맞춤 */
.vok{font-size:13px;font-weight:800;color:var(--green,#2E4A3B)}
.vhint{flex-basis:100%;font-size:12px;color:var(--sub2,#8a857b);margin-top:2px}
.mocknote{font-size:12px;color:var(--sub2,#8a857b);background:var(--soft,#f5f3ee);border-radius:9px;padding:9px 12px;margin-top:14px;text-align:center}
</style>
</head>
<body>
<div class="shell login">
  <div class="card">
    <div class="brandbar cardbar">
      <span class="logo" style="cursor:pointer" onclick="location.href='index.html'">Fitting<i></i></span>
      <span class="closex" onclick="location.href='index.html'">✕ 닫기</span>
    </div>
    <div class="cbody">
      <section class="panel on">
        <div class="hero" style="padding:14px 0 10px">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="10.5" width="15" height="10" rx="2.2"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg></div>
          <div class="eyebrow">스타일리스트 로그인</div>
          <p>가입에 사용한 이메일 또는 휴대폰 번호로 로그인하세요.</p>
        </div>

        <div class="lbl">이메일 또는 휴대폰 번호</div>
        <div class="vrow">
          <input type="text" id="lid" placeholder="sohee@example.com 또는 010-1234-5678" oninput="onLid()">
          <button class="vbtn" id="sendBtn" onclick="sendCode()">인증번호 받기</button>
        </div>
        <div class="vbox" id="vbox" style="display:none">
          <input type="text" id="code" inputmode="numeric" maxlength="6" placeholder="인증번호 6자리" oninput="update()">
          <button class="vbtn" onclick="checkCode()">확인</button>
          <span class="vok" id="ok" style="display:none">✓ 인증됨</span>
          <div class="vhint" id="hint"></div>
        </div>

        <button class="btn" id="loginBtn" onclick="login()" disabled>로그인</button>
        <span class="link">아직 계정이 없으신가요? <a class="link-em" onclick="location.href='pro-signup.html'">스타일리스트 가입</a></span>
      </section>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/pro-login.js?v=b9402092"></script>
</body>
</html>
