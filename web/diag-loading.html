<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 — 진단 중</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css">
<link rel="stylesheet" href="css/fitting.css?v=8ad71bfe">
<link rel="stylesheet" href="css/diag.css?v=88e90f1e">
</head>
<body>

<div class="dhead">
  <div class="dhead-in">
    <a class="dx" href="index.html" title="닫기">✕</a>
  </div>
</div>

<div class="flow">
  <div class="dstepc">
    <div class="dnode done"><span class="ddot">1</span><span class="dlbl">기본정보</span></div>
    <div class="dconn solid done"></div>
    <div class="dnode done"><span class="ddot">2</span><span class="dlbl">착용경험</span></div>
    <div class="dconn fillnow"><i></i></div>
    <div class="dnode now"><span class="ddot">3</span><span class="dlbl">진단중</span></div>
  </div>
  <div class="loading-wrap">
    <div class="lmark">FITTING</div>
    <div class="lruler">
      <div class="nums"><span>0</span><span>60</span><span>120</span><span>180</span></div>
      <div class="tape"><i class="lfill" id="lfill"></i></div>
      <div class="ticks"></div>
      <div class="ticks major"></div>
      <div class="marker" id="lmarker"></div>
    </div>
    <div class="lpct" id="lpct">0%</div>
    <h2 class="step-h" id="ltitle">체형을 진단하고 있어요</h2>
    <p class="lsub" id="lsub">입어본 옷을 바탕으로 체형과 선호핏을 분석하고 있어요</p>
    <ul class="load-steps" id="steps"></ul>
  </div>
</div>

<script src="js/diag-loading.js?v=5b4c31bb"></script>
</body>
</html>
