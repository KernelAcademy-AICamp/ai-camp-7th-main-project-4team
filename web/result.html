<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 — 진단 결과</title>

<!-- 결과 준비 로딩 오버레이 — 분류·카드·측정·추천이 실제로 그려지면 result.js가 걷어냄(진행중→결과 버벅임 제거) -->
<div id="rloading" class="rloading" role="status" aria-live="polite">
  <div class="rloading-in"><div class="rloading-spin" aria-hidden="true"></div><p>결과를 준비하고 있어요</p></div>
</div>

<div class="dhead"><div class="dhead-in"><a class="logo" href="index.html">Fitting<i></i></a><a class="dx" href="index.html" title="닫기">✕</a></div></div>

<div class="rwrap">
  <h1 id="rtitle">내 핏 타입이 나왔어요</h1>
  <div class="subttl">평소 입던 옷으로 분석한 결과예요 · 저장하고 브랜드별 추천 사이즈도 확인해보세요</div>
  <div class="rgrid">
    <div class="rleft">
      <div id="cardslot"></div>
      <div id="rtypeid" class="dtl-id"></div>
      <div id="rfit" class="dtl-fitbox"></div>
    </div>
    <div class="rcol">
      <div id="rtip" class="dtl-tip"></div>
      <div id="recs" class="rpanel"></div>
      <div class="rpanel"><div class="rfbq">추천 결과가 잘 맞나요? <span>· 정확도 검증</span></div>
        <div class="rseg"><div class="o ok" onclick="fb(this,'맞음')"><svg class="ricon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> 맞아요</div><div class="o mid" onclick="fb(this,'보통')"><svg class="ricon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg> 보통</div><div class="o no" onclick="fb(this,'안맞음')"><svg class="ricon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg> 안 맞아요</div></div>
        <label class="rconsent"><input type="checkbox" id="eiConsent" onchange="setEngineConsent(this.checked)">
          <span class="rconsent-txt"><b>익명으로 진단 개선</b>에 활용하는 데 동의하며, <b>만 14세 이상</b> 또는 법정대리인 동의를 확인했어요 (선택)
          </span></label></div>
      <div id="meas" class="rpanel"></div>
      <div id="means" class="rpanel"></div>
      <div class="rcta"><button type="button" class="rbtn p" onclick="saveResult()">결과 저장하기</button><button type="button" class="rbtn l" onclick="goExpert()">스타일리스트 찾기</button></div>
      <p class="rcta-note">비회원 진단은 끝까지 무료예요 · 저장·스타일리스트 매칭은 로그인 후 이어져요</p>
      <p class="rcta-note" style="margin-top:10px"><a href="#" onclick="resetDiag();return false" style="color:var(--sub);text-decoration:underline"><svg class="ricon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg> 진단 초기화 — 입력을 지우고 처음부터</a></p>
      <p class="rcta-note" style="margin-top:22px;padding-top:16px;border-top:1px solid var(--line);font-size:14.5px;color:var(--sub2)"><a href="about.html" style="color:var(--sub2)">서비스 소개</a> · <a href="terms.html" style="color:var(--sub2)">이용약관</a> · <a href="privacy.html" style="color:var(--sub2)">개인정보 처리방침</a></p>
    </div>
  </div>
</div>
