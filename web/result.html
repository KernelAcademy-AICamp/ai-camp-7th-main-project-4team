<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 — 진단 결과</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css">
<link rel="stylesheet" href="fitting.css">
<link rel="stylesheet" href="diag.css">
<style>
  /* 결과 화면 — sohee 디자인 언어 + sangmin 콘텐츠 (자체 팔레트로 클래스 격리) */
  .rwrap{ --g:#2E4A3B; --gs:#E7EFEA; --ink:#16140F; --ink2:#3A382F; --sub:#6E6B63; --sub2:#A6A29A;
          --line:#E6E5E1; --line2:#DAD8D2; --warn:#B0553F; --wsoft:#F7ECE8;
          max-width:1180px; margin:0 auto; padding:36px 30px 90px; }
  .rwrap h1{ font-size:28px; font-weight:800; letter-spacing:-.04em; color:var(--ink); }
  .rwrap .subttl{ font-size:14.5px; color:var(--sub); margin-top:8px; }
  .rgrid{ display:grid; grid-template-columns:392px 1fr; gap:34px; align-items:start; margin-top:28px; }
  @media(max-width:840px){ .rgrid{ grid-template-columns:1fr; } }
  .rcard iframe{ width:392px; max-width:100%; height:684px; border:0; border-radius:22px; display:block; position:sticky; top:80px; box-shadow:0 18px 44px rgba(20,22,28,.14); }
  .rlock{ border:1.5px dashed var(--line2); border-radius:22px; background:repeating-linear-gradient(135deg,#fbfaf8,#fbfaf8 10px,#f5f4f1 10px,#f5f4f1 20px);
          min-height:520px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 26px; position:sticky; top:80px; }
  .rlock .lk{ font-size:30px; } .rlock .t1{ font-size:16px; font-weight:800; color:var(--sub); margin-top:12px; }
  .rlock .t2{ font-size:13px; color:var(--sub2); margin-top:8px; line-height:1.55; max-width:240px; }
  .rlock .b{ margin-top:18px; background:var(--g); color:#fff; font-size:14px; font-weight:800; padding:12px 18px; border-radius:12px; text-decoration:none; }
  /* 카드 하단 신뢰도 배지 + 정확도 넛지 */
  .rcardnote{ display:flex; flex-direction:column; gap:7px; align-items:center; text-align:center; margin-top:13px; }
  .rconf{ font-size:11px; font-weight:800; letter-spacing:.02em; padding:4px 11px; border-radius:999px; }
  .rconf.low{ background:#f2ece0; color:#8a7a52; } .rconf.mid{ background:#e7efe7; color:#4a7a4a; } .rconf.high{ background:var(--g); color:#fff; }
  .rconf-msg{ font-size:12px; color:var(--sub2); line-height:1.5; max-width:300px; } .rconf-msg a{ color:var(--ink); font-weight:700; }

  .rcol{ display:flex; flex-direction:column; gap:18px; min-width:0; }
  .rpanel{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:22px 24px; }
  .rkicker{ font-size:16px; font-weight:800; letter-spacing:-.03em; color:var(--ink); }
  .rrow{ display:flex; justify-content:space-between; align-items:center; }
  .rchip{ font-size:11.5px; font-weight:700; color:var(--g); background:var(--gs); padding:5px 11px; border-radius:20px; white-space:nowrap; }
  .rnote{ font-size:12.5px; color:var(--sub); margin-top:6px; line-height:1.5; }
  .rfoot{ font-size:12px; color:var(--sub2); margin-top:14px; line-height:1.5; }
  /* 추천 */
  .rsthead{ display:flex; justify-content:space-between; font-size:11px; font-weight:800; color:var(--sub2); letter-spacing:.06em; padding:14px 0 2px; }
  .rszrow{ display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--line); }
  .rszrow:last-child{ border:0; padding-bottom:0; }
  .rbd{ font-size:15.5px; font-weight:700; color:var(--ink); } .rbd small{ display:block; font-size:12.5px; color:var(--sub2); font-weight:500; margin-top:3px; }
  .rsz{ display:flex; align-items:center; gap:10px; } .rsz .n{ font-size:22px; font-weight:800; font-family:var(--suit,inherit); font-feature-settings:"tnum"; }
  .rpill{ font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:20px; background:var(--gs); color:var(--g); white-space:nowrap; }
  .rpill.warn{ background:var(--wsoft); color:var(--warn); }
  .rpill.lo{ background:#f0efec; color:var(--sub2); }  /* 핏 지수 낮은 추천 — 톤다운 */
  .rpill{ font-feature-settings:"tnum"; }              /* 핏 지수 숫자 정렬 */
  /* 스펙트럼 */
  .rgrp{ font-size:11.5px; font-weight:800; color:var(--sub2); margin:18px 0 2px; }
  .rspec{ margin-top:16px; } .rspec:first-of-type{ margin-top:14px; }
  .rspec .top{ display:flex; justify-content:space-between; align-items:baseline; font-size:12.5px; }
  .rspec .pole{ color:var(--sub2); font-weight:600; } .rspec .pole.dom{ color:var(--ink); font-weight:800; }
  .rspec .pct{ color:var(--g); font-weight:800; } .rspec .pct .n{ font-size:14px; font-feature-settings:"tnum"; }
  .rtrack{ height:7px; background:#EDECE8; border-radius:4px; margin:8px 0 7px; overflow:hidden; } .rtrack i{ display:block; height:100%; background:var(--g); border-radius:4px; }
  .raxis{ font-size:12px; color:var(--sub); }
  /* 결과 풀이 */
  .rex{ margin-top:16px; } .rex:first-of-type{ margin-top:14px; }
  .rex .lbl{ display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:800; color:var(--ink); }
  .rex .mk{ width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; }
  .rex.plus .mk{ background:var(--gs); color:var(--g); } .rex.eq .mk{ background:#EDEEF1; color:var(--ink2); } .rex.warn .mk{ background:var(--wsoft); color:var(--warn); }
  .rex p{ font-size:13.5px; color:var(--sub); line-height:1.6; margin-top:7px; } .rex p strong{ color:var(--ink); font-weight:700; }
  /* 옷장 게이트 */
  .rcat{ display:flex; align-items:center; gap:10px; padding:13px 0; border-bottom:1px solid var(--line); } .rcat:last-child{ border:0; padding-bottom:0; }
  .rcat .nm{ font-size:15px; font-weight:700; color:var(--ink); min-width:52px; }
  .rkind{ font-size:10px; font-weight:800; padding:2px 7px; border-radius:6px; } .rkind.base{ background:var(--gs); color:var(--g); } .rkind.der{ background:#EDEEF1; color:var(--sub); }
  .rcat .meta{ font-size:12.5px; color:var(--sub); flex:1; } .rcat .go{ font-size:13px; font-weight:800; color:var(--g); white-space:nowrap; text-decoration:none; }
  .rcat.done .go{ color:var(--sub2); } .rcat.lock{ opacity:.5; } .rcat.lock .go{ color:var(--sub2); }
  .rgnotice{ background:var(--gs); border-radius:12px; padding:13px 15px; font-size:12.5px; color:var(--ink2); line-height:1.55; margin-top:16px; } .rgnotice b{ font-weight:800; }
  /* 피드백·버튼 */
  .rfbq{ font-size:15px; font-weight:700; color:var(--ink); } .rfbq span{ font-size:12.5px; color:var(--sub); font-weight:500; }
  .rseg{ display:flex; gap:10px; margin-top:14px; } .rseg .o{ flex:1; text-align:center; padding:13px; border:1px solid var(--line); border-radius:12px; font-size:14px; font-weight:700; color:var(--ink); cursor:pointer; }
  .rconsent{ display:flex; align-items:flex-start; gap:8px; margin-top:14px; cursor:pointer; }
  .rconsent input{ margin-top:2px; width:15px; height:15px; accent-color:var(--g); flex:none; }
  .rconsent-txt{ font-size:12.5px; color:var(--sub); line-height:1.55; } .rconsent-txt > b{ color:var(--ink2); font-weight:700; }
  .rconsent-sub{ display:block; margin-top:3px; font-size:11.5px; color:var(--sub2); } .rconsent-sub b{ color:var(--sub); font-weight:700; }
  .rseg .o.on{ background:var(--g); border-color:var(--g); color:#fff; }
  .rcta{ display:flex; gap:12px; } .rbtn{ flex:1; text-align:center; padding:16px; border-radius:13px; font-size:15px; font-weight:800; text-decoration:none; }
  .rbtn.p{ background:var(--ink); color:#fff; } .rbtn.l{ background:#fff; border:1.5px solid var(--line2); color:var(--ink); }
  .rcta-note{ text-align:center; font-size:12.5px; color:var(--sub2); margin-top:4px; }
</style>
</head>
<body>

<div class="dhead"><div class="dhead-in"><a class="logo" href="index.html">Fitting<i></i></a><div class="dprog"><div class="prog"><span class="seg done"></span><span class="seg done"></span></div></div><a class="dx" href="index.html" title="닫기">✕</a></div></div>

<div class="rwrap">
  <h1 id="rtitle">내 핏 타입이 나왔어요</h1>
  <div class="subttl">평소 입던 옷으로 분석한 결과예요 · 저장하고 브랜드별 추천 사이즈도 확인해보세요</div>
  <div class="rgrid">
    <div id="cardslot"></div>
    <div class="rcol">
      <div id="recs" class="rpanel"></div>
      <div class="rpanel"><div class="rfbq">이 추천, 실제로 맞아요? <span>· 정확도 검증</span></div>
        <div class="rseg"><div class="o" onclick="fb(this,'맞음')">✅ 맞아요</div><div class="o" onclick="fb(this,'애매')">➖ 애매</div><div class="o" onclick="fb(this,'틀림')">❌ 틀려요</div></div>
        <label class="rconsent"><input type="checkbox" id="eiConsent" onchange="setEngineConsent(this.checked)">
          <span class="rconsent-txt">이 진단·피드백을 <b>익명으로 엔진 개선</b>에 활용하는 데 동의합니다.
            <span class="rconsent-sub">체크 시 <b>만 14세 이상</b>이거나 법정대리인의 동의를 받은 것으로 간주해요 · 선택</span>
          </span></label></div>
      <div id="meas" class="rpanel"></div>
      <div id="means" class="rpanel"></div>
      <div id="gate" class="rpanel"></div>
      <div class="rcta"><a class="rbtn p" href="index.html">결과 저장하기</a><a class="rbtn l" href="index.html#shop">전문가에게 받기</a></div>
      <p class="rcta-note">비회원 진단은 끝까지 무료예요 · 저장·전문가 매칭은 로그인 후 이어져요</p>
      <p class="rcta-note" style="margin-top:10px"><a href="#" onclick="resetDiag();return false" style="color:var(--sub);text-decoration:underline">🔄 진단 초기화 — 입력을 지우고 처음부터</a></p>
      <p class="rcta-note" style="margin-top:22px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--sub2)"><a href="about.html" style="color:var(--sub2)">서비스 소개</a> · <a href="terms.html" style="color:var(--sub2)">이용약관</a> · <a href="privacy.html" style="color:var(--sub2)">개인정보 처리방침</a></p>
    </div>
  </div>
</div>

<script src="js/body-model.js"></script>
<script src="js/engine.js"></script>
<script src="js/engine-mock.js"></script>
<script>
  var payload={}; try{ payload=JSON.parse(sessionStorage.getItem('fitting.dx')||'{}'); }catch(e){}
  var savedBasic={}; try{ savedBasic=JSON.parse(sessionStorage.getItem('fitting.basic')||'{}'); }catch(e){}
  // 건너뛰기(0벌): dx가 없어 기본 추정만 — fitting.basic(성별·키·몸무게)을 써야 측정·추천이 나온다.
  if(!payload.experiences) payload.experiences=[];
  if(!payload.basic || payload.basic.height==null) payload.basic=savedBasic;
  if(!payload.prefs) payload.prefs={};
  var gender=(payload.basic&&payload.basic.gender)||'female';
  var dx=FittingEngine.diagnose(payload);

  // 완료 카테고리 = 착용경험(실착) + 선호핏만 진단(실측 데이터 없는 기반의 구조적 예외).
  // 0벌(건너뛰기)은 prefs가 비어 있어 아무것도 완료로 잡히지 않음(카드는 회귀 추정으로 노출).
  var doneCats={}; (payload.experiences||[]).forEach(function(e){ if(e.category) doneCats[e.category]=1; });
  Object.keys(payload.prefs||{}).forEach(function(c){ doneCats[c]=1; });
  var upperDone=!!doneCats.TOP, lowerDone=!!doneCats.BOTTOM, cardReady=upperDone&&lowerDone;

  // ── 이번 진단 카테고리(전환식): ?cat= 우선 → 마지막 착용경험 → 선호핏 키 → TOP ──
  var CATMAP={top:'TOP',bottom:'BOTTOM',outer:'OUTER',dress:'DRESS',skirt:'SKIRT'};
  var CATLABEL={TOP:'상의',BOTTOM:'하의',OUTER:'아우터',DRESS:'원피스',SKIRT:'치마'};
  var qcat=new URLSearchParams(location.search).get('cat');
  var exps=payload.experiences||[];
  var curCat = (qcat&&CATMAP[qcat]) ? CATMAP[qcat]
             : (exps.length ? exps[exps.length-1].category
             : (payload.prefs ? Object.keys(payload.prefs)[0] : 'TOP')) || 'TOP';
  var curLabel=CATLABEL[curCat]||'상의';
  var isTop=(curCat==='TOP');
  // 카테고리별 체형 측정 부위 — body-model.js 키(chestFull·waist·hip·shoulder·arm) 기준.
  // 형식: [key, 왼쪽(낮은/좁은 끝), 오른쪽(높은/넓은 끝), axis]. 막대는 백분위만큼 왼→오 채워짐.
  var MEAS={
    TOP:   [['shoulder','좁은 어깨','넓은 어깨','어깨 — 어깨 기준으로 사이즈가 갈려요'],
            ['chestFull','슬림한 가슴','볼륨 있는 가슴','가슴 — 슬림핏은 여유를 확인해요'],
            ['waist','슬림한 배','볼륨 있는 배','배 — 표준 대비 위치'],
            ['arm','짧은 상체·팔','긴 상체·팔','총장·소매 — 기장이 맞는지']],
    BOTTOM:[['waist','슬림한 허리','볼륨 있는 허리','허리 — 밴드·버튼 기준'],
            ['hip','슬림한 엉덩이','볼륨 있는 엉덩이','엉덩이 — 힙 기준으로 사이즈가 갈려요']],
    OUTER: [['shoulder','좁은 어깨','넓은 어깨','어깨 — 아우터는 어깨·품 기준'],
            ['chestFull','슬림한 가슴','볼륨 있는 가슴','가슴·품 — 레이어링 여유']],
    SKIRT: [['waist','슬림한 허리','볼륨 있는 허리','허리 — 치마 밴드 기준'],
            ['hip','슬림한 엉덩이','볼륨 있는 엉덩이','엉덩이 — 힙 기준']],
    DRESS: [['chestFull','슬림한 가슴','볼륨 있는 가슴','가슴 — 상의 기준'],
            ['waist','슬림한 허리','볼륨 있는 허리','허리 — 잘록 정도'],
            ['hip','슬림한 엉덩이','볼륨 있는 엉덩이','엉덩이 — 힙 기준']]
  };

  // ── 8유형 체형 카드 노출 규칙 ──
  //  · 0벌(건너뛰기): 옷 입력을 건너뛴 종착 상태 → 회귀 기본 추정 카드(저신뢰)
  //  · 완성(상+하): 8유형 카드
  //  · 부분(상의만/하의만): 진행 중 → 잠금(나머지 완성 유도)
  var slot=document.getElementById('cardslot');
  var noneDone=!upperDone && !lowerDone;
  var showCard=cardReady || noneDone;
  function cardNoteHTML(){
    var tier=dx.confidenceTier||'low';
    if(!cardReady && tier==='high') tier='mid'; // 완성 전엔 '높음' 아님
    var tierKo=tier==='high'?'높음':tier==='mid'?'보통':'낮음';
    var msg='';
    if(noneDone){ // 0벌: 실착을 넣으면 정밀해진다는 안내
      msg='<span class="rconf-msg"><a href="diag-fit.html?cat=top">상의</a> · <a href="diag-fit.html?cat=bottom">하의</a> 실착을 넣으면 체형이 또렷해져요</span>';
    }
    return '<div class="rcardnote"><span class="rconf '+tier+'">정확도 '+tierKo+(tier==='low'?' · 기본 추정':'')+'</span>'+msg+'</div>';
  }
  function renderCard(type){
    slot.innerHTML='<iframe src="card.html?type='+(type||'BAL')+'&g='+gender+'" scrolling="no" title="내 결과 카드"></iframe>'+cardNoteHTML();
  }
  var cardType=dx.bodyType||'BAL';
  if(showCard){
    slot.className='rcard';
    renderCard(cardType);
  }else{
    // 부분 완료: 아직 안 한 기반으로 유도
    slot.className='rlock';
    var needLabel=upperDone?'하의':'상의';
    var doneRegion=upperDone?'상체':'하체';
    var needHref=upperDone?'diag-fit.html?cat=bottom&reuse=1&have=top':'diag-fit.html?cat=top&reuse=1&have=bottom';
    document.getElementById('rtitle').textContent=doneRegion+' 부분 진단이 끝났어요';
    slot.innerHTML='<div class="lk">🔒</div><div class="t1">체형 카드는 상·하의를 모두 진단하면 나와요</div>'+
      '<div class="t2">지금은 '+doneRegion+'만 파악됐어요 — 8유형 체형은 '+needLabel+'까지 해야 확정돼요</div>'+
      '<a class="b" href="'+needHref+'">'+needLabel+' 진단하기 →</a>';
  }

  // ── 브랜드별 추천 사이즈 — TOP만 실계산(규칙①②③+garments), 나머지는 정직하게 '준비중' ──
  var FLK={slim:'슬림',regular:'레귤러',loose:'루즈',oversize:'오버',skinny:'스키니'};
  function renderRecs(recs, real){
    // 몸에 가장 잘 맞을 브랜드만 — 핏 지수 상위. real(엔진 실계산)이면 60%+ 중 상위 3(없으면 상위 3).
    var ranked=(recs||[]).slice().sort(function(a,b){ return (b.fitScore||0)-(a.fitScore||0); });
    if(real){ var good=ranked.filter(function(r){ return (r.fitScore||0)>=60; }); ranked=(good.length?good:ranked).slice(0,3); }
    else ranked=ranked.slice(0,3);
    document.getElementById('recs').innerHTML=
      '<div class="rrow"><div class="rkicker">가장 잘 맞을 브랜드·사이즈</div><span class="rchip">이번 진단 · '+curLabel+'</span></div>'+
      '<div class="rnote">평소 착용감 기준, 몸에 <b style="color:var(--ink2)">가장 잘 맞을 순</b>으로 추렸어요 · <b style="color:var(--ink2)">핏 지수</b>=예상 적합도</div>'+
      '<div class="rsthead"><span>브랜드</span><span>사이즈 · 핏 지수</span></div>'+
      ranked.map(function(r){
        var note=(FLK[r.fitLine]||'')+' · '+r.bottleneck+' 기준'+(r.variance?' · '+r.variance:'');
        // 핏 라벨 + 지수를 한 칩에: "딱맞음 75%"
        var scoreTxt=(r.fitScore!=null)?' '+r.fitScore+'%':'';
        var pillCls=(r.warn?' warn':(r.fitScore!=null&&r.fitScore<70?' lo':''));
        return '<div class="rszrow"><div class="rbd">'+r.brandName+'<small>'+note+'</small></div>'+
          '<div class="rsz"><span class="n">'+r.size+'</span><span class="rpill'+pillCls+'">'+r.fit+scoreTxt+'</span></div></div>';
      }).join('')+
      (real?'<div class="rfoot">※ 핏 지수 = 브랜드 실측(단면) 대비 가슴·어깨 여유로 계산 · '+curLabel+' 긴팔 기준 · 착용경험을 넣으면 정밀해져요</div>':'');
  }
  // 추천은 A축 사이즈 시드가 있는 TOP만 실제. 나머지 카테고리는 측정만 보여주고 추천은 '준비중'.
  function renderRecsPending(){
    document.getElementById('recs').innerHTML=
      '<div class="rrow"><div class="rkicker">브랜드별 추천 사이즈</div><span class="rchip">이번 진단 · '+curLabel+'</span></div>'+
      '<div class="rgnotice" style="margin-top:12px">🔒 <b>'+curLabel+' 브랜드 추천은 준비 중</b>이에요 — '+curLabel+' 사이즈표 데이터를 모으는 단계라, 아래 <b>체형 측정</b>으로 먼저 보여드려요. <span style="color:var(--sub2)">(상의는 브랜드별 실계산 제공)</span></div>';
  }
  if(isTop){
    // 목업 초기 렌더(로드 전) — 엔진 recs 형태 변환
    renderRecs((dx.recs||[]).map(function(r){ return { brandName:r.brandName, fitLine:'regular', bottleneck:r.bottleneck, size:r.size, fit:(r.warnings&&r.warnings[0])||'추천', warn:false, variance:null }; }), false);
  } else {
    renderRecsPending();
  }

  // ── 내 체형 측정 + 실추천(회귀·garments) ──
  // 왼쪽 poleL=낮은 끝, 오른쪽 poleR=높은 끝. 막대는 백분위만큼 왼→오. 강조(dom)는 가까운 쪽.
  function specRow(poleL,pct,poleR,axis){
    pct=Math.max(3,Math.min(97,Math.round(pct||50)));
    var lc=pct<50?' dom':'', rc=pct>=50?' dom':'';
    return '<div class="rspec"><div class="top"><span class="pole'+lc+'">'+poleL+'</span><span class="pct"><span class="n">'+pct+'</span>%</span><span class="pole'+rc+'">'+poleR+'</span></div>'+
      '<div class="rtrack"><i style="width:'+pct+'%"></i></div><div class="raxis">'+axis+'</div></div>';
  }
  var FITPCT={skinny:20,slim:32,regular:55,loose:70,oversize:85};
  if(window.BodyModel){ BodyModel.load().then(function(){
    var est=BodyModel.estimate(payload.basic||{});
    if(!est.ready) return;
    var pm={}, cm={}; est.parts.forEach(function(p){ pm[p.key]=p.pct; cm[p.key]=p.cm; });
    var pref=(payload.prefs&&payload.prefs[curCat])||'regular';

    // garments 로드 → 착용경험 역산(규칙④~⑧)으로 chest·shoulder prior 덮어쓰기 → 측정·추천 모두 반영.
    return fetch('data/garments.json').then(function(r){return r.json();}).catch(function(){return null;}).then(function(gj){
      var specs=gj&&gj.specs, expUsed=false;
      if(isTop && specs && window.FitEngine && FitEngine.bodyFromExperiences){
        var eb=FitEngine.bodyFromExperiences(payload.experiences, specs);
        if(eb.chest!=null){ cm.chestFull=eb.chest; var pc=BodyModel.pctOf(est.sex,'chestFull',eb.chest); if(pc!=null)pm.chestFull=pc; expUsed=true; }
        if(eb.shoulder!=null){ cm.shoulder=eb.shoulder; var ps=BodyModel.pctOf(est.sex,'shoulder',eb.shoulder); if(ps!=null)pm.shoulder=ps; expUsed=true; }
      }

      // 0벌: 착용경험 신호가 없어 dx.bodyType는 무의미(BAL) → 회귀 볼륨축 추정으로 교체(showCard·low일 때만).
      if(showCard && dx.confidenceTier==='low' && FittingEngine.bodyTypeFromMeasure){
        var mtype=FittingEngine.bodyTypeFromMeasure({shoulder:pm.shoulder,chest:pm.chestFull,waist:pm.waist,hip:pm.hip});
        if(mtype && mtype!==cardType){ cardType=mtype; renderCard(mtype); }
      }

      // 측정: 이번 진단 카테고리의 필수 부위 + 여유 선호핏 (역산 반영된 pm)
      var rows=(MEAS[curCat]||MEAS.TOP).map(function(m){ return specRow(m[1],pm[m[0]],m[2],m[3]); }).join('');
      document.getElementById('meas').innerHTML=
        '<div class="rrow"><div class="rkicker">내 체형 측정</div><span class="rchip">'+curLabel+' 기준</span></div>'+
        '<div class="rgrp">필수 부위 — '+(expUsed?'착용경험으로 <b style="color:var(--ink2)">역산</b>한 몸':'키·몸무게로 추정한 몸')+'</div>'+
        rows+
        '<div class="rgrp">선호</div>'+
        specRow('타이트 선호',FITPCT[pref]||55,'여유 핏 선호','여유 선호핏 — 고른 핏 취향')+
        '<div class="rnote" style="margin-top:16px">부위는 <b style="color:var(--ink2)">카테고리별로 달라져요</b>. '+(cardReady?'상·하의를 모두 마쳐 전신 비율까지 볼 수 있어요.':'다른 카테고리까지 진단하면 상하 균형·전신 비율이 나와요.')+'</div>';

      // 추천 — 브랜드 사이즈 데이터가 있는 TOP만 (역산 반영된 bodyVec)
      if(isTop && specs && cm.chestFull!=null){
        var recs=FitEngine.recommend({ chest:cm.chestFull, shoulder:cm.shoulder }, pref, est.sex, 'long_sleeve', specs);
        if(recs.length) renderRecs(recs, true);
      }
    });
  }).catch(function(){ /* file:// 등 실패 시 목업/기본 유지 */ }); }

  // ── 결과 풀이 (＋강점 / ＝핏 공식 / ！주의) — 규칙 기반 골격, 서술은 AI 자리 ──
  var MEANS={
    TOP:   {eq:'어깨·가슴 중 큰 쪽을 기준으로', warn:'슬림핏은 가슴이 끼일 수 있어'},
    BOTTOM:{eq:'허리·엉덩이 중 큰 쪽을 기준으로', warn:'스키니는 허벅지가 끼일 수 있어'},
    OUTER: {eq:'어깨·품을 기준으로', warn:'이너 위에 겹쳐 입으면 품이 빠듯할 수 있어'},
    SKIRT: {eq:'허리·엉덩이 중 큰 쪽을 기준으로', warn:'타이트 스커트는 힙이 끼일 수 있어'},
    DRESS: {eq:'가슴·허리·엉덩이 중 큰 쪽을 기준으로', warn:'상하 비율이 안 맞으면 한 곳이 끼일 수 있어'}
  };
  var mn=MEANS[curCat]||MEANS.TOP;
  document.getElementById('means').innerHTML=
    '<div class="rkicker">결과 풀이</div>'+
    '<div class="rex plus"><div class="lbl"><span class="mk">＋</span> 강점</div><p>가장 또렷한 부위를 기준으로 맞추면 <strong>실루엣이 안정적으로</strong> 떨어져요.</p></div>'+
    '<div class="rex eq"><div class="lbl"><span class="mk">＝</span> 핏 공식</div><p><strong>'+mn.eq+'</strong> 사이즈를 고르고, 나머지는 여유로 조절하세요.</p></div>'+
    '<div class="rex warn"><div class="lbl"><span class="mk">！</span> 주의</div><p>'+mn.warn+' <strong>같은 치수에서 한 단계 위</strong>를 고려하세요.</p></div>'+
    '<div class="rfoot">※ 캐릭터·해설 서술은 AI가 생성하는 자리예요(현재는 규칙 기반 예시).</div>';

  // ── 옷장 · 이어서 진단 ──
  function catRow(nm,kind,kcls,meta,go,href,cls){
    var g = href?'<a class="go" href="'+href+'">'+go+'</a>':'<span class="go">'+go+'</span>';
    return '<div class="rcat '+(cls||'')+'"><span class="nm">'+nm+'</span><span class="rkind '+kcls+'">'+kind+'</span><span class="meta">'+meta+'</span>'+g+'</div>';
  }
  // 옷장 게이트는 상·하의(기반) 완성 후에만 노출 — 미완성 안내는 카드 영역 잠금이 담당(중복 제거).
  var gateEl=document.getElementById('gate');
  if(cardReady){
    gateEl.innerHTML=
      '<div class="rrow"><div class="rkicker">옷장 · 이어서 진단</div><span class="rchip">기반 완료 · 파생 열림</span></div>'+
      '<div class="rgrp">기반 — 실착으로 <b style="color:var(--ink2)">체형을 잠갔어요</b></div>'+
      catRow('상의','기반','base','상체 잠금 완료','완료 ✓',null,'done')+
      catRow('하의','기반','base','하체 잠금 완료','완료 ✓',null,'done')+
      '<div class="rgrp">파생 — 체형 재사용, <b style="color:var(--ink2)">선호핏만</b></div>'+
      catRow('아우터','파생','der','상체 기반 · 해금됨','선호핏만 30초 →','diag-fit.html?cat=outer&reuse=1&have=top','')+
      // 치마·원피스는 여성만 노출 (남성 제외)
      (gender==='male' ? '' :
        catRow('치마','파생','der','하체 기반 · 해금됨','선호핏만 30초 →','diag-fit.html?cat=skirt&reuse=1&have=bottom','')+
        catRow('원피스','파생','der','상체+하체 · 해금됨','선호핏만 30초 →','diag-fit.html?cat=dress&reuse=1&have=top,bottom',''))+
      '<div class="rgnotice"><b>기반(상·하의) 완료</b> — '+(gender==='male'?'아우터':'아우터·원피스·치마')+'는 옷을 다시 넣지 않고 <b>선호핏만으로</b> 열려요.</div>';
  } else {
    gateEl.style.display='none';
  }

  // ── 엔진 개선 활용: 선택 동의(opt-in). 진단 이용엔 영향 없음(서비스 제공 근거로 수집·처리). ──
  function engineConsented(){ try{ return JSON.parse(sessionStorage.getItem('fitting.consent')||'{}').engineImprove===true; }catch(e){ return false; } }
  // 체크 = 엔진 개선 동의 + 만14세 이상/법정대리인 동의 확인(자기확인). 동의 지점에서만 나이 확인.
  function setEngineConsent(on){
    try{ sessionStorage.setItem('fitting.consent', JSON.stringify({ engineImprove:!!on, ageAttested:!!on, at:new Date().toISOString() })); }catch(e){}
  }
  // 저장된 동의 상태를 체크박스에 반영(재방문·재렌더 시)
  (function(){ var el=document.getElementById('eiConsent'); if(el) el.checked=engineConsented(); })();

  // ── 피드백 로깅(킬 메트릭 원천). 엔진 개선 활용은 동의(engineImprove)한 경우로 표기 ──
  function fb(el,verdict){
    [].forEach.call(el.parentElement.children,function(c){c.classList.remove('on');}); el.classList.add('on');
    var consent={}; try{ consent=JSON.parse(sessionStorage.getItem('fitting.consent')||'{}'); }catch(e){}
    var rec={ ts:new Date().toISOString(), bodyType:dx.bodyType, verdict:verdict, confidenceTier:dx.confidenceTier, engineImprove:consent.engineImprove===true, ageAttested:consent.ageAttested===true };
    try{ var k='fitting.feedback', arr=JSON.parse(localStorage.getItem(k)||'[]'); arr.push(rec); localStorage.setItem(k,JSON.stringify(arr)); }catch(e){}
  }
  // 진단 초기화 — 누적된 입력(dx·기본정보·동의·피드백)을 지우고 처음부터. (목업 테스트용)
  function resetDiag(){
    try{ ['fitting.dx','fitting.basic','fitting.consent'].forEach(function(k){ sessionStorage.removeItem(k); }); }catch(e){}
    try{ localStorage.removeItem('fitting.feedback'); }catch(e){}
    location.href='diag-basic.html';
  }
</script>
</body>
</html>
