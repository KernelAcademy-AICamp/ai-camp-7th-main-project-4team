<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 — 기본 정보</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css">
<link rel="stylesheet" href="css/fitting.css?v=90fc1187">
<link rel="stylesheet" href="css/diag.css?v=79905114">
</head>
<body>

<div class="dhead">
  <div class="dhead-in">
    <a class="logo" href="index.html">Fitting<i></i></a>
    <a class="dx" href="index.html" title="닫기">✕</a>
  </div>
</div>

<div class="flow">
  <div class="dstepc">
    <div class="dnode now"><span class="ddot">1</span><span class="dlbl">기본정보</span></div>
    <div class="dconn seg" id="qconn"><span><i></i></span><span><i></i></span></div>
    <div class="dnode"><span class="ddot">2</span><span class="dlbl">착용경험</span></div>
    <div class="dconn solid"></div>
    <div class="dnode"><span class="ddot">3</span><span class="dlbl">진단중</span></div>
  </div>

  <!-- Q1 성별 -->
  <div class="wstep active">
    <h2 class="qhead">성별을 알려주세요</h2>
    <p class="qhelp">성별에 따라 사이즈 기준이 달라져요</p>
    <div class="qbody">
      <div class="seg stack">
        <div class="opt" onclick="pickSex(this)">남성</div>
        <div class="opt" onclick="pickSex(this)">여성</div>
      </div>
    </div>
  </div>

  <!-- Q2 나이·키·몸무게 (한 화면) -->
  <div class="wstep">
    <h2 class="qhead">나이, 키, 몸무게를 알려주세요</h2>
    <p class="qhelp">체형을 분석하는 데 필요한 정보예요</p>
    <div class="qbody">
      <div class="grid-3">
        <div class="field"><label>나이</label><select id="age"></select></div>
        <div class="field"><label>키 (cm)</label><input id="height" type="text" inputmode="numeric" maxlength="3" placeholder="140cm-200cm 사이" oninput="numOnly(this)" autocomplete="off"><small class="fhint" id="hintHeight">140cm-200cm 사이로 입력해주세요</small></div>
        <div class="field"><label>몸무게 (kg)</label><input id="weight" type="text" inputmode="numeric" maxlength="3" placeholder="30kg-130kg 사이" oninput="numOnly(this)" autocomplete="off"><small class="fhint" id="hintWeight">30kg-130kg 사이로 입력해주세요</small></div>
      </div>
    </div>
  </div>

  <!-- 내비 -->
  <div class="wnav">
    <button class="btn-line" onclick="prev()">이전</button>
    <span class="spacer"></span>
    <button class="btn-primary" id="nextbtn" onclick="next()" disabled>다음</button>
  </div>
</div>

<script src="js/diag-basic.js?v=f5f50b95"></script>
</body>
</html>
