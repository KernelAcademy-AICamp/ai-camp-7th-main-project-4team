<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏팅 — 기본 정보</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css">
<link rel="stylesheet" href="fitting.css">
<link rel="stylesheet" href="diag.css">
</head>
<body>

<div class="dhead">
  <a class="logo" href="index.html">Fitting<i></i></a>
  <div class="dprog">
    <div class="stepper"><span class="label">STEP 1 / 2 · 기본 정보</span><span class="dot now"></span><span class="dot"></span></div>
    <div class="wprogress hd"><div class="bar"><i id="wfill"></i></div><span class="frac" id="wfrac">1 / 2</span></div>
  </div>
  <a class="dx" href="index.html" title="닫기">✕</a>
</div>

<div class="flow">
  <p class="small mb-8" style="margin-top:20px">키·몸무게 같은 <strong>체형 값</strong>만 먼저 받아요. 선호하는 핏은 옷 종류를 고른 뒤 여쭤봐요(종류마다 취향이 다르니까요).</p>

  <!-- Q1 성별 -->
  <div class="wstep active">
    <span class="qnum">Question 1</span>
    <h2 class="qhead">성별을 알려주세요</h2>
    <p class="qhelp">브랜드 사이즈 체계가 성별로 갈려서 먼저 여쭤요.</p>
    <div class="qbody">
      <div class="seg stack">
        <div class="opt" onclick="pickSex(this)">남성</div>
        <div class="opt" onclick="pickSex(this)">여성</div>
      </div>
    </div>
  </div>

  <!-- Q2 나이·키·몸무게 (한 화면) -->
  <div class="wstep">
    <span class="qnum">Question 2</span>
    <h2 class="qhead">나이 · 키 · 몸무게를<br>알려주세요</h2>
    <p class="qhelp">체형 분포를 좁히는 데 쓰여요. 특히 <strong>몸무게가 사이즈 정확도에 가장 큰 영향</strong>을 줘요.</p>
    <div class="qbody">
      <div class="grid-3">
        <div class="field"><label>나이</label><select id="age"></select></div>
        <div class="field"><label>키</label><select id="height"></select></div>
        <div class="field"><label>몸무게</label><select id="weight"></select></div>
      </div>
    </div>
  </div>

  <!-- 내비 -->
  <div class="wnav">
    <button class="btn-line" onclick="prev()">이전</button>
    <span class="spacer"></span>
    <button class="btn-primary" id="nextbtn" onclick="next()">다음</button>
  </div>
</div>

<script>
  const NEXT_URL='diag-fit.html', PREV_URL='index.html';
  const steps=[...document.querySelectorAll('.wstep')];
  let cur=0;
  function render(){
    steps.forEach((s,k)=>s.classList.toggle('active',k===cur));
    document.getElementById('wfill').style.width=((cur+1)/steps.length*100)+'%';
    document.getElementById('wfrac').textContent=(cur+1)+' / '+steps.length;
    document.getElementById('nextbtn').textContent = cur===steps.length-1 ? '옷 종류 고르기' : '다음';
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function saveBasic(){
    // 진단 스냅샷 기본값 — 다음 화면(착용경험)·결과에서 재사용
    var basic={ gender: sex==='남성'?'male':'female',
      age: document.getElementById('age').value,
      height: document.getElementById('height').value,
      weight: document.getElementById('weight').value };
    try{ sessionStorage.setItem('fitting.basic', JSON.stringify(basic)); }catch(e){}
  }
  function next(){ if(cur<steps.length-1){cur++;render()} else { saveBasic(); location.href=NEXT_URL; } }
  function prev(){ if(cur>0){cur--;render()} else location.href=PREV_URL; }
  function pick(el){[...el.parentElement.children].forEach(c=>c.classList.remove('on'));el.classList.add('on')}
  function pickNext(el){pick(el);setTimeout(next,220)}   // 단일 선택 → 자동 진행

  let sex='남성';
  const AGE=['10대','20대','30대','40대','50대','60대 이상'];
  function fill(id,list,def){ document.getElementById(id).innerHTML=list.map(v=>'<option'+(v===def?' selected':'')+'>'+v+'</option>').join(''); }
  function scaleOpen(a,b,u){ const r=[a+u+' 이하']; for(let i=a+1;i<b;i++) r.push(i+u); r.push(b+u+' 이상'); return r; }
  function applyDefaults(){
    const m = sex==='남성';
    fill('age', AGE, '20대');
    fill('height', scaleOpen(140,200,'cm'), m?'173cm':'160cm');
    fill('weight', scaleOpen(35,150,'kg'), m?'72kg':'55kg');
  }
  function pickSex(el){ sex=el.textContent.trim(); applyDefaults(); pickNext(el); }

  applyDefaults();
  render();
</script>
</body>
</html>
